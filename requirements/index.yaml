brief:
  problem: Professional operator-creators building across multiple channels lose intent, evidence, approvals, identity, and lessons as work moves between AI chats, research tools, editors, schedulers, and analytics dashboards. Clark Pro is a Mac-first creator operating system that keeps the workflow and the creator model in one inspectable, portable workspace, so automation can add leverage without taking hidden authority or erasing judgment.
  north_star: "**North Star:** A creator turns a rough thought into a coordinated body of published work while preserving why it mattered, what evidence supports it, which version was approved, what it cost, what happened afterward, and which lesson deserves to influence future work."
  roles: [creator, workspace_admin, reviewer, external_agent, team_member]
  personas: [Goals, Turn intent into a coherent weekly body of work across channels while preserving voice and judgment, The Integration Builder, Connect agents and mature engines through stable governed contracts, The Collaborating Team Lead, Coordinate shared production without mixing personal and team identity or losing accountability]
  areas: [Contracts & Product Proof, Native Studio & Harness, Idea Foundry & Creation, MCP & Clark Bridge, Creator Memory, Tool Packs, Agent Skills, Distribution & Observation, Team & Release]

