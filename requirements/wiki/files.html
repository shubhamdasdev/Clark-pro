var FILES=[{"rel":"brief.md","content":"# Product Brief: Clark Pro\n\n**Project:** clark-pro\n**Project Type:** Product\n**Repo:** https://github.com/shubhamdasdev/Clark-pro\n**Version:** 1.0\n**Updated:** 2026-07-13\n**PM Persona:** pragmatist\n**Sources:** [Product requirements](research/history/import-2026-07-13/product/01-product-description.md), [Vision](research/history/import-2026-07-13/vision.md), [Roadmap](research/history/import-2026-07-13/roadmap.md), [Ground status](research/history/import-2026-07-13/evidence/ground-status.md)\n\n---\n\n## Problem Statement\n\nProfessional operator-creators building across multiple channels lose intent, evidence, approvals, identity, and lessons as work moves between AI chats, research tools, editors, schedulers, and analytics dashboards. Clark Pro is a Mac-first creator operating system that keeps the workflow and the creator model in one inspectable, portable workspace, so automation can add leverage without taking hidden authority or erasing judgment.\n\n## North Star\n\n**North Star:** A creator turns a rough thought into a coordinated body of published work while preserving why it mattered, what evidence supports it, which version was approved, what it cost, what happened afterward, and which lesson deserves to influence future work.\n\n## Goals & Success Metrics\n\n| Goal | Metric | Target |\n|------|--------|--------|\n| Prove whole-product continuity | Representative end-to-end weekly cycles completed | 4 consecutive cycles before Clark Pro 1.0 |\n| Produce useful creative work | Approved artifacts judged publishable with normal editing | At least 80% in the Stratum 3 validation run |\n| Preserve trust in mutations | Paid or mutating actions with complete permission and provenance receipts | 100% |\n| Eliminate ambiguous publishing | Duplicate verified publications and unexplained terminal states | 0 |\n| Preserve local ownership | Backup, restore, migration, and export acceptance runs passing | 100% before external release |\n\n## Roles\n\n| Role | Description |\n|------|-------------|\n| **creator** | Operates personal projects, creates and reviews artifacts, and makes memory, Skill, budget, and publication decisions |\n| **workspace_admin** | Manages credentials, connections, Tool Packs, Skills, policies, backups, clients, and high-authority workspace actions |\n| **reviewer** | Reviews evidence, policy, costs, comparisons, and exact artifact versions before approval |\n| **external_agent** | Uses Clark Bridge through explicitly granted workspace, tool, resource, and job scopes |\n| **team_member** | Participates in shared workspaces through assigned roles, comments, tasks, and approvals |\n\n## Personas\n\n| Persona | Primary Role | Goals | Pain Points |\n|---------|-------------|-------|-------------|\n| **The Operator-Creator** | creator | Turn intent into a coherent weekly body of work across channels while preserving voice and judgment | Repeating context, manual handoffs, opaque automation, and fragmented evidence |\n| **The Trust-Conscious Operator** | workspace_admin | Understand and control every permission, credential, package, memory, cost, and external mutation | Hidden authority, supply-chain risk, irreversible updates, and unclear recovery |\n| **The Integration Builder** | external_agent | Connect agents and mature engines through stable governed contracts | Private APIs, state duplication, weak scoping, and lost long-running work |\n| **The Collaborating Team Lead** | team_member | Coordinate shared production without mixing personal and team identity or losing accountability | Approval ambiguity, offline conflicts, excessive credential sharing, and opaque hosted ownership |\n\n## Product Areas\n\n| Area | Description |\n|------|-------------|\n| Contracts & Product Proof | Versioned contracts, fixtures, threat decisions, evidence, creator validation, and accountable signoff |\n| Native Studio & Harness | Hardened Mac shell, canonical events, assets, durable runs, recovery, portability, and release trust |\n| Idea Foundry & Creation | Capture, research, claims, branches, writing, media, comparisons, policy, and exact-version approval |\n| MCP & Clark Bridge | Governed capability consumption and a scoped canonical MCP surface for external agents |\n| Creator Memory | Evidence-bound memory, retrieval, correction, forgetting, reflection, and influenced-artifact provenance |\n| Tool Packs | Reuse-first integration, quarantine, supply-chain evidence, adapters, converters, safe UI, migration, and rollback |\n| Agent Skills | Package validation, trust ceilings, invocation, sandboxing, regression, evolution, and rollback |\n| Distribution & Observation | Social accounts, scheduling, publishing, reconciliation, export, analytics, evidence review, and experiments |\n| Team & Release | Shared workspaces, sync, remote workers, hosted continuity, tenant isolation, and whole-product release proof |\n\n## Scope\n\n### In Scope (Clark Pro 1.0)\n\n- Signed and notarized Mac application with local canonical event and asset ownership\n- Focus, Canvas, Timeline, Review, Library, Memory, and Connections over one workspace model\n- Durable creation loops from capture through publication, observation, reflection, and improvement\n- Governed MCP capabilities, Clark Bridge, Tool Packs, and Agent Skills with explicit permissions and rollback\n- Postiz-first distribution with direct, assisted, and deterministic export fallbacks\n- Single-user product plus the minimum remote scheduling and workspace boundaries required for safe continuity\n\n### Out of Scope (Clark Pro 1.0)\n\n- Training proprietary foundation models\n- Generic workflow automation unrelated to creator operations\n- Fully autonomous content farming or silent memory, Skill, strategy, or publication decisions\n- Platform-policy circumvention or hidden AI disclosure\n- Mandatory cloud ownership of canonical personal state\n- Direct Clark-owned integrations for every social platform\n\n## Constraints\n\n- Canonical identity, memory, credentials, project history, and approval state remain local-first and portable.\n- Renderer code receives no ambient secrets, shell, raw filesystem, or arbitrary network authority.\n- Models and engines remain replaceable behind stable domain and capability contracts.\n- Every external mutation is idempotent or enters explicit reconciliation; blind retry is not acceptable.\n- Human, commercial, security, migration, rollback, and signing evidence cannot be replaced by passing unit tests.\n- Open-source reuse requires immutable source identity, compatible licensing, supply-chain evidence, stable interfaces, permission review, conformance, and rollback.\n"},{"rel":"epics/E-001-contracts-and-product-proof/AE-001.md","content":"# Analytics: E-001 — Contracts and Product Proof\n\n**ID:** AE-001\n**Project:** clark-pro\n**Epic:** E-001\n**Version:** 1.0\n**Updated:** 2026-07-13\n\n---\n\n**Success Metric (from epic):**\n\n| Contract and migration verification suites passing | 18 schemas and 5 upcaster tests pass | 100% passing on every main-branch change |\n| Open blocking Ground requirements | 24 open requirement-level entries | 0 before Ground signoff |\n\n---\n\n## Events\n\n| Event | Story | Trigger | Key Properties |\n|-------|-------|---------|----------------|\n| `ground_evidence_updated` | S-001-002 | after an evidence-ledger requirement is recomputed and persisted | evidence_class: \"automated\" \\| \"human\" \\| \"commercial\" \\| \"security\", result: \"verified\" \\| \"pending\" \\| \"blocked\" |\n| `creator_validation_completed` | S-001-003 | after one representative walkthrough record is finalized | critical_gate_result: \"pass\" \\| \"fail\", assistance_band: \"none\" \\| \"light\" \\| \"heavy\", cohort: \"operator_creator\" \\| \"trust_operator\" |\n| `ground_signoff_decided` | S-001-004 | after the accountable signoff ledger decision commits | decision: \"approved\" \\| \"blocked\", missing_evidence_class: \"none\" \\| \"owner\" \\| \"capacity\" \\| \"security\" \\| \"purchase_signal\" |\n\n**Property rules:** only the bounded enums/booleans above. User/time are implicit. No raw IDs, URLs, paths, account names, source/artifact/memory text, prompts, credentials, or free-form notes.\n\n**Notes**\n\n- Fire once after the stated canonical commit or completed inspection, not on button click, mount, retry, replay, or projection rebuild.\n- The event supports the epic metric by measuring the outcome boundary, not each implementation step.\n- Export remains local unless the user explicitly opts into the privacy-safe analytics sink.\n"},{"rel":"epics/E-001-contracts-and-product-proof/E-001.md","content":"# Epic: Contracts and Product Proof\n\n**ID:** E-001\n**Project:** clark-pro\n**Stage:** Ready\n**Version:** 1.0\n**Created:** 2026-07-13\n**Updated:** 2026-07-13\n**Sources:** [Authoritative epics](../../research/history/import-2026-07-13/product/03-epics-and-stories.md), [Whole-product roadmap](../../research/history/import-2026-07-13/roadmap.md)\n\n---\n\n## Outcome\n\nThe Clark team and representative creators can inspect one authoritative product model, verify its executable contracts, and distinguish automated proof from the human and commercial evidence still required to proceed.\n\n## Success Metric\n\n| Metric | Baseline | Target |\n|--------|----------|--------|\n| Contract and migration verification suites passing | 18 schemas and 5 upcaster tests pass | 100% passing on every main-branch change |\n| Open blocking Ground requirements | 24 open requirement-level entries | 0 before Ground signoff |\n\n## Primary Persona\n\nThe Trust-Conscious Operator\n\n## Dependencies\n\n- None\n\n## Stories\n\n| ID | Title | Status | Stage |\n|----|-------|--------|-------|\n| S-001-001 | Versioned Contracts and Upcasters | Done | Ready |\n| S-001-002 | Ground Prototype and Evidence Ledger | QA | Ready |\n| S-001-003 | Representative Creator Validation | Backlog | Ready |\n| S-001-004 | Commercial and Leadership Signoff | Backlog | Ready |\n\n---\n"},{"rel":"epics/E-001-contracts-and-product-proof/S-001-001-versioned-contracts-and-upcasters.md","content":"# Story: Versioned Contracts and Upcasters\n\n**ID:** S-001-001\n**Project:** clark-pro\n**Epic:** E-001\n**Stage:** Ready\n**Status:** Done\n**Priority:** P0\n**Version:** 1.0\n**Created:** 2026-07-13\n**Updated:** 2026-07-13\n**Sources:** [Authoritative epics](../../research/history/import-2026-07-13/product/03-epics-and-stories.md), [Whole-product roadmap](../../research/history/import-2026-07-13/roadmap.md), [Harness evidence](../../research/history/import-2026-07-13/evidence/harness-latest-report.json)\n\n---\n\n## Story\n\nAs a **workspace_admin**, I want to **verify every canonical event and payload against generated, versioned contracts**, so that **implementation drift and unsafe historical data fail closed before they corrupt a workspace**.\n\n## Goal\n\nDeliver the observable capability described above through Clark's canonical workspace, with enough evidence to determine whether it is complete.\n\n## Why / Rationale\n\nImplementation drift and unsafe historical data fail closed before they corrupt a workspace. This story is separated from adjacent work so the board can report verified progress without treating an incomplete product epic as finished.\n\n## Functional Requirements\n\n- Keep the JSON Schema catalog and generated runtime manifest hash-pinned.\n- Reject unknown historical steps, future versions, and invalid upcast destinations.\n\n## Acceptance Criteria\n\n- [ ] Given the contract verification commands run on the current commit, when all fixtures are evaluated, then all 18 schemas and generated outputs pass.\n- [ ] Given an unknown or future event version, when the runtime attempts to load it, then loading fails closed without rewriting history.\n\n## Negative Scenarios\n\n- A failed trust, evidence, compatibility, recovery, or policy check must leave the prior canonical state intact and expose a valid next action.\n\n## Future Scope\n\n- Broader capability beyond this verified slice remains in sibling stories and later releases.\n\n## Do Not Do\n\n- In this story, do not infer completion from UI presence, documents, or mocked fixtures when the acceptance criteria require runtime or human evidence.\n- Do not bypass Clark's event, permission, approval, provenance, or rollback contracts to make the happy path appear complete.\n\n---\n"},{"rel":"epics/E-001-contracts-and-product-proof/S-001-002-ground-prototype-and-evidence-ledger.md","content":"# Story: Ground Prototype and Evidence Ledger\n\n**ID:** S-001-002\n**Project:** clark-pro\n**Epic:** E-001\n**Stage:** Ready\n**Status:** QA\n**Priority:** P0\n**Version:** 1.0\n**Analytics:** AE-001\n**Created:** 2026-07-13\n**Updated:** 2026-07-13\n**Sources:** [Authoritative epics](../../research/history/import-2026-07-13/product/03-epics-and-stories.md), [Whole-product roadmap](../../research/history/import-2026-07-13/roadmap.md), [Desktop evidence](../../research/history/import-2026-07-13/evidence/desktop-latest-report.json)\n\n---\n\n## Story\n\nAs a **creator**, I want to **walk through the real Clark surfaces with visible provenance, authority, and evidence state**, so that **product decisions are evaluated against an honest fixture instead of a feature checklist**.\n\n## Goal\n\nDeliver the observable capability described above through Clark's canonical workspace, with enough evidence to determine whether it is complete.\n\n## Why / Rationale\n\nProduct decisions are evaluated against an honest fixture instead of a feature checklist. This story is separated from adjacent work so the board can report verified progress without treating an incomplete product epic as finished.\n\n## Functional Requirements\n\n- Render Focus, Canvas, Review, Timeline, Library, Memory, and Connections from one representative project model.\n- Keep human-evidence, runtime-evidence, and missing-evidence results distinct in the Ground ledger.\n\n## Acceptance Criteria\n\n- [ ] Given the automated prototype checks run, when the project is verified, then all mapped prototype and contract evidence remains internally consistent.\n- [ ] Given a requirement needs observed creator behavior, when only a prototype or document exists, then the ledger keeps that requirement pending rather than marking it verified.\n\n## Negative Scenarios\n\n- A failed trust, evidence, compatibility, recovery, or policy check must leave the prior canonical state intact and expose a valid next action.\n\n## Future Scope\n\n- Scope not named in this story remains in sibling stories or a later release; this story does not absorb the full parent epic.\n\n## Do Not Do\n\n- In this story, do not infer completion from UI presence, documents, or mocked fixtures when the acceptance criteria require runtime or human evidence.\n- Do not bypass Clark's event, permission, approval, provenance, or rollback contracts to make the happy path appear complete.\n\n---\n"},{"rel":"epics/E-001-contracts-and-product-proof/S-001-003-representative-creator-validation.md","content":"# Story: Representative Creator Validation\n\n**ID:** S-001-003\n**Project:** clark-pro\n**Epic:** E-001\n**Stage:** Ready\n**Status:** Backlog\n**Priority:** P0\n**Phase:** P-002-01\n**Version:** 1.0\n**Analytics:** AE-001\n**Created:** 2026-07-13\n**Updated:** 2026-07-13\n**Sources:** [Authoritative epics](../../research/history/import-2026-07-13/product/03-epics-and-stories.md), [Whole-product roadmap](../../research/history/import-2026-07-13/roadmap.md)\n\n---\n\n## Story\n\nAs a **creator**, I want to **complete observed Clark workflows with the representative Full-Week fixture**, so that **the team can prove Focus, Canvas, memory, provenance, and authority are understandable before expanding automation**.\n\n## Goal\n\nDeliver the observable capability described above through Clark's canonical workspace, with enough evidence to determine whether it is complete.\n\n## Why / Rationale\n\nThe team can prove Focus, Canvas, memory, provenance, and authority are understandable before expanding automation. This story is separated from adjacent work so the board can report verified progress without treating an incomplete product epic as finished.\n\n## Functional Requirements\n\n- Run five observed walkthroughs using the committed protocol and record assistance, wrong turns, timing, and explanation quality.\n- Redesign and retest every failed critical gate before signoff.\n\n## Acceptance Criteria\n\n- [ ] Given five representative creators complete the protocol, when results are synthesized, then every Canvas and memory comprehension gate has attributable evidence.\n- [ ] Given any critical comprehension gate fails, when Ground status is recalculated, then signoff remains blocked until a redesigned path passes a follow-up run.\n\n## Negative Scenarios\n\n- A failed trust, evidence, compatibility, recovery, or policy check must leave the prior canonical state intact and expose a valid next action.\n\n## Future Scope\n\n- Scope not named in this story remains in sibling stories or a later release; this story does not absorb the full parent epic.\n\n## Do Not Do\n\n- In this story, do not infer completion from UI presence, documents, or mocked fixtures when the acceptance criteria require runtime or human evidence.\n- Do not bypass Clark's event, permission, approval, provenance, or rollback contracts to make the happy path appear complete.\n\n---\n"},{"rel":"epics/E-001-contracts-and-product-proof/S-001-004-commercial-and-leadership-signoff.md","content":"# Story: Commercial and Leadership Signoff\n\n**ID:** S-001-004\n**Project:** clark-pro\n**Epic:** E-001\n**Stage:** Ready\n**Status:** Backlog\n**Priority:** P0\n**Phase:** P-002-01\n**Version:** 1.0\n**Analytics:** AE-001\n**Created:** 2026-07-13\n**Updated:** 2026-07-13\n**Sources:** [Authoritative epics](../../research/history/import-2026-07-13/product/03-epics-and-stories.md), [Whole-product roadmap](../../research/history/import-2026-07-13/roadmap.md)\n\n---\n\n## Story\n\nAs a **workspace_admin**, I want to **record accountable owners, capacity, security approval, and a binding replacement signal**, so that **Ground closes only when the project has real organizational and commercial commitment**.\n\n## Goal\n\nDeliver the observable capability described above through Clark's canonical workspace, with enough evidence to determine whether it is complete.\n\n## Why / Rationale\n\nGround closes only when the project has real organizational and commercial commitment. This story is separated from adjacent work so the board can report verified progress without treating an incomplete product epic as finished.\n\n## Functional Requirements\n\n- Assign named primary and backup owners with capacity and dependency commitments.\n- Complete the design-partner and purchase-signal protocols without substituting compliments or hypothetical intent.\n\n## Acceptance Criteria\n\n- [ ] Given all required evidence is present, when each named leadership role signs the ledger, then Ground may transition to closed.\n- [ ] Given any owner, capacity commitment, security proof, or binding purchase signal is absent, when the ledger is verified, then Ground remains open with a precise next action.\n\n## Negative Scenarios\n\n- A failed trust, evidence, compatibility, recovery, or policy check must leave the prior canonical state intact and expose a valid next action.\n\n## Future Scope\n\n- Scope not named in this story remains in sibling stories or a later release; this story does not absorb the full parent epic.\n\n## Do Not Do\n\n- In this story, do not infer completion from UI presence, documents, or mocked fixtures when the acceptance criteria require runtime or human evidence.\n- Do not bypass Clark's event, permission, approval, provenance, or rollback contracts to make the happy path appear complete.\n\n---\n"},{"rel":"epics/E-001-contracts-and-product-proof/T-001-001-versioned-contracts-and-upcasters.md","content":"# Test Plan: Versioned Contracts and Upcasters\n\n**ID:** T-001-001\n**Project:** clark-pro\n**Story:** S-001-001\n**Epic:** E-001\n**Stage:** Refinement\n**Version:** 1.0\n**Created:** 2026-07-13\n**Updated:** 2026-07-13\n\n---\n\n## Scope\n\nVerify Versioned Contracts and Upcasters end-to-end against every acceptance criterion, its trust-preserving negative path, boundary/idempotency behavior, and the canonical receipt/evidence contract. This plan does not infer story completion from a screen or document alone.\n\n## Prerequisites\n\n- A clean deterministic workspace fixture at the story’s required schema version.\n- Access to clark-pro/contracts, clark-pro/evidence, and clark-pro/prototype and the canonical event/projection/receipt inspection harness.\n- External systems use recorded or sandbox responses; no production mutation is required for routine CI.\n- UI bucket note: product-team labels visible journey cases `Maestro`; Clark’s desktop executor is Playwright Electron with the same before/after evidence contract.\n\n## AC Coverage Map\n\n| AC | Test Cases | Bucket | Coverage |\n|----|-----------|--------|----------|\n| AC-001 | TC-001-001-001 (P0) | Unit / Harness | ✓ |\n| AC-002 | TC-001-001-001 (P0), TC-001-001-002 | Unit / Harness · Unit / Harness | ✓ |\n\n**Bucket totals:** 0 Maestro · 3 Unit / Harness · 0 Code Review. The P0 uses the cheapest bucket that still proves the AC; data and failure predicates remain Harness cases.\n\n---\n\n## Core Test Flow\n\n### TC-001-001-001: Complete acceptance path for Versioned Contracts and Upcasters\n\n**Type:** E2E\n**Priority:** P0\n**Automation:** Unit / Harness\n**AC Covered:** AC-001, AC-002\n**Dependencies:** Story dependencies and parent release architecture gate must be satisfied\n\n**Setup:**\n- Use the repository’s deterministic Node/Harness fixtures in clark-pro/contracts, clark-pro/evidence, and clark-pro/prototype.\n- Reset canonical test state and record the starting event/projection/hash snapshot.\n- Stub external providers or use recorded conformance responses; no production credentials.\n\n**Steps:**\n1. Establish: the contract verification commands run on the current commit.\n2. Perform: all fixtures are evaluated.\n3. Verify AC-001: all 18 schemas and generated outputs pass.\n4. Establish: an unknown or future event version.\n5. Perform: the runtime attempts to load it.\n6. Verify AC-002: loading fails closed without rewriting history.\n7. Re-run the same command or fixture identity and assert idempotent behavior with no duplicate mutation.\n\n**Expected Result:**\n- AC-001: Given the contract verification commands run on the current commit, when all fixtures are evaluated, then all 18 schemas and generated outputs pass.\n- AC-002: Given an unknown or future event version, when the runtime attempts to load it, then loading fails closed without rewriting history.\n- Canonical state and evidence match the exact tested revision; no hidden authority, duplicate mutation, or unsupported completion claim is introduced.\n\n**Failure Indicators:**\nAny AC outcome is absent, applies to a different version/actor/scope, bypasses a gate, duplicates state, loses lineage, or relies only on mocked/UI presence where runtime or human evidence is required.\n\n---\n\n## Sub Flows\n\n### TC-001-001-002: Failed gate preserves prior trusted state and exposes recovery\n\n**Type:** Negative\n**Priority:** P1\n**Automation:** Unit / Harness\n**AC Covered:** AC-002\n**Dependencies:** None\n\n**Setup:**\n- Seed one valid prior canonical state and record aggregate version, event count, active revision/authority, asset hashes, and projection snapshot.\n- Configure the relevant trust, evidence, compatibility, recovery, or policy check to fail deterministically.\n\n**Steps:**\n1. Invoke the story action against the failing gate.\n2. Assert no unauthorized provider, filesystem, credential, package, publication, memory, Skill, or canonical mutation occurs.\n3. Compare the post-run snapshot with the recorded trusted state.\n4. Assert a bounded failure receipt identifies the failed gate, owner, and valid retry/rollback/read-only next action.\n5. Restore the valid condition and prove the inverse path can proceed.\n\n**Expected Result:**\nA failed trust, evidence, compatibility, recovery, or policy check must leave the prior canonical state intact and expose a valid next action.\n\n**Failure Indicators:**\nPartial canonical write, lost prior revision, leaked secret/content, silent retry, vague error without next action, or a false “complete” state.\n\n### TC-001-001-003: Boundary, replay, and exact-version regression\n\n**Type:** Edge Case\n**Priority:** P2\n**Automation:** Unit / Harness\n**AC Covered:** AC-001, AC-002\n**Dependencies:** None\n\n**Setup:**\n- Use the smallest deterministic fixture that exercises Keep the JSON Schema catalog and generated runtime manifest hash-pinned. and Reject unknown historical steps, future versions, and invalid upcast destinations..\n- Capture the input identity, schema/revision, actor/scope, event count, and expected output hash/receipt.\n\n**Steps:**\n1. Execute at the lower valid boundary and assert the documented result.\n2. Execute at the upper/expanded/expired/stale or incompatible boundary and assert fail-closed behavior.\n3. Replay the original command, intent, provider response, or recovery checkpoint.\n4. Assert exact-version binding, no duplicate mutation/cost, and deterministic projection state.\n5. Rebuild the relevant projection or reopen the app and confirm the same observable result.\n\n**Expected Result:**\nThe story remains deterministic across boundary input, replay, restart, and projection rebuild; permissions and approvals do not expand or transfer to another revision.\n\n**Failure Indicators:**\nOff-by-one acceptance, replay duplication, stale approval, permission expansion, nondeterministic projection, or inement\n**Version:** 1.0\n**Created:** 2026-07-13\n**Updated:** 2026-07-13\n\n---\n\n## Scope\n\nVerify Ground Prototype and Evidence Ledger end-to-end against every acceptance criterion, its trust-preserving negative path, boundary/idempotency behavior, and the AE-001 product event. This plan does not infer story completion from a screen or document alone.\n\n## Prerequisites\n\n- A clean deterministic workspace fixture at the story’s required schema version.\n- Access to clark-pro/contracts, clark-pro/evidence, and clark-pro/prototype and the canonical event/projection/receipt inspection harness.\n- External systems use recorded or sandbox responses; no production mutation is required for routine CI.\n- UI bucket note: product-team labels visible journey cases `Maestro`; Clark’s desktop executor is Playwright Electron with the same before/after evidence contract.\n\n## AC Coverage Map\n\n| AC | Test Cases | Bucket | Coverage |\n|----|-----------|--------|----------|\n| AC-001 | TC-001-002-001 (P0) | Maestro | ✓ |\n| AC-002 | TC-001-002-001 (P0), TC-001-002-002 | Maestro · Unit / Harness | ✓ |\n| AE-001 | TC-001-002-004 | Analytics | ✓ |\n\n**Bucket totals:** 1 Maestro · 2 Unit / Harness · 0 Code Review · 1 Analytics. The P0 uses the cheapest bucket that still proves the AC; data and failure predicates remain Harness cases.\n\n---\n\n## Core Test Flow\n\n### TC-001-002-001: Complete acceptance path for Ground Prototype and Evidence Ledger\n\n**Type:** E2E\n**Priority:** P0\n**Automation:** Maestro\n**AC Covered:** AC-001, AC-002\n**Dependencies:** Story dependencies and parent release architecture gate must be satisfied\n\n**Captures:**\n| Label | Screen | State |\n|-------|--------|-------|\n| before | DS-focus | default |\n| after | DS-focus | verified |\n\n**Preconditions:**\n- A release-candidate Clark build is open on Screen: Focus with the story’s required canonical fixture and permissions.\n- The tester can inspect Harness events/receipts after the UI journ rs.\n3. Compare the post-run snapshot with the recorded trusted state.\n4. Assert a bounded failure receipt identifies the failed gate, owner, and valid retry/rollback/read-only next action.\n5. Restore the valid condition and prove the inverse path can proceed.\n\n**Expected Result:**\nA failed trust, evidence, compatibility, recovery, or policy check must leave the prior canonical state intact and expose a valid next action.\n\n**Failure Indicators:**\nPartial canonical write, lost prior revision, leaked secret/content, silent retry, vague error without next action, or a false “complete” state.\n\n### TC-001-002-003: Boundary, replay, and exact-version regression\n\n**Type:** Edge Case\n**Priority:** P2\n**Automation:** Unit / Harness\n**AC Covered:** AC-001, AC-002\n**Dependencies:** None\n\n**Setup:**\n- Use the smallest deterministic fixture that exercises Render Focus, Canvas, Review, Timeline, Library, Memory, and Connections from one representative project model. and Keep human-evidence, runtime-evidence, and missing-evidence results distinct in the Ground ledger..\n- Capture the input identity, schema/revision, actor/scope, event count, and expected output hash/receipt.\n\n**Steps:**\n1. Execute at the lower valid boundary and assert the documented result.\n2. Execute at the upper/expanded/expired/stale or incompatible boundary and assert fail-closed behavior.\n3. Replay the original command, intent, provider response, or recovery checkpoint.\n4. Assert exact-version binding, no duplicate mutation/cost, and deterministic projection state.\n5. Rebuild the relevant projection or reopen the app and confirm the same observable result.\n\n**Expected Result:**\nThe story remains deterministic across boundary input, replay, restart, and projection rebuild; permissions and approvals do not expand or transfer to another revision.\n\n**Failure Indicators:**\nOff-by-one acceptance, replay duplication, stale approval, permission expansion, nondeterministic projection, ojection/receipt inspection harness.\n- External systems use recorded or sandbox responses; no production mutation is required for routine CI.\n- UI bucket note: product-team labels visible journey cases `Maestro`; Clark’s desktop executor is Playwright Electron with the same before/after evidence contract.\n\n## AC Coverage Map\n\n| AC | Test Cases | Bucket | Coverage |\n|----|-----------|--------|----------|\n| AC-001 | TC-001-004-001 (P0) | Maestro | ✓ |\n| AC-002 | TC-001-004-001 (P0), TC-001-004-002 | Maestro · Unit / Harness | ✓ |\n| AE-001 | TC-001-004-004 | Analytics | ✓ |\n\n**Bucket totals:** 1 Maestro · 2 Unit / Harness · 0 Code Review · 1 Analytics. The P0 uses the cheapest bucket that still proves the AC; data and failure predicates remain Harness cases.\n\n---\n\n## Core Test Flow\n\n### TC-001-004-001: Complete acceptance path for Commercial and Leadership Signoff\n\n**Type:** E2E\n**Priority:** P0\n**Automation:** Maestro\n**AC Covered:** AC-001, AC-002\n**Dependencies:** Story dependencies and parent release architecture gate must be satisfied\n\n**Captures:**\n| Label | Screen | State |\n|-------|--------|-------|\n| before | DS-focus | default |\n| after | DS-focus | verified |\n\n**Preconditions:**\n- A release-candidate Clark build is open on Screen: Focus with the story’s required canonical fixture and permissions.\n- The tester can inspect Harness events/receipts after the UI journey.\n\n**Steps:**\n1. Establish: all required evidence is present.\n2. Perform: each named leadership role signs the ledger.\n3. Verify AC-001: Ground may transition to closed.\n4. Establish: any owner, capacity commitment, security proof, or binding purchase signal is absent.\n5. Perform: the ledger is verified.\n6. Verify AC-002: Ground remains open with a precise next action.\n7. Inspect the resulting canonical event, exact version, actor, permission/provenance receipt, and retained recovery state from Screen: Focus.\n\n**Expected Result:**\n- AC-001: Given all required evidence is present, when each named leadership role signs the ledger, then Ground may transition to closed.\n- AC-002: Given any owner, capacity commitment, security proof, or binding purchase signal is absent, when the ledger is verified, then Ground remains open with a precise next action.\n- Canonical state and evidence match the exact tested revision; no hidden authority, duplicate mutation, or unsupported completion claim is introduced.\n\n**Failure Indicators:**\nAny AC outcome is absent, applies to a different version/actor/scope, bypasses a gate, duplicates state, loses lineage, or relies only on mocked/UI presence where runtime or human evidence is required.\n\n---\n\n## Sub Flows\n\n### TC-001-004-002: Failed gate preserves prior trusted state and exposes recovery\n\n**Type:** Negative\n**Priority:** P1\n**Automation:** Unit / Harness\n**AC Covered:** AC-002\n**Dependencies:** None\n\n**Setup:**\n- Seed one valid prior canonical state and record aggregate version, event count, active revision/authority, asset hashes, and projection snapshot.\n- Configure the relevant trust, evidence, compatibility, recovery, or policy check to fail deterministically.\n\n**Steps:**\n1. Invoke the story action against the failing gate.\n2. Assert no unauthorized provider, filesystem, credential, package, publication, memory, Skill, or canonical mutation occurs.\n3. Compare the post-run snapshot with the recorded trusted state.\n4. Assert a bounded failure receipt identifies the failed gate, owner, and valid retry/rollback/read-only next action.\n5. Restore the valid condition and prove the inverse path can proceed.\n\n**Expected Result:**\nA failed trust, evidence, compatibility, recovery, or policy check must leave the prior canonical state intact and expose a valid next action.\n\n**Failure Indicators:**\nPartial canonical write, lost prior revision, leaked secret/content, silent retry, vague error without next action, or a false “complete” state.\n\n### TC-001-004-003: Boundary, replay, and exact-version regression\n\n**Type:** Edge Case\n**Priority:** P2\n**Automation:** Unit / Harness\n**AC Covered:** AC-001, AC-002\n**Dependencies:** None\n\n**Setup:**\n- Use the smallest deterministic fixture that exercises Assign named primary and backup owners with capacity and dependency commitments. and Complete the design-partner and purchase-signal protocols without substituting compliments or hypothetical intent..\n- Capture the input identity, schema/revision, actor/scope, event count, and expected output hash/receipt.\n\n**Steps:**\n1. Execute at the lower valid boundary and assert the documented result.\n2. Execute at the upper/expanded/expired/stale or incompatible boundary and assert fail-closed behavior.\n3. Replay the original command, intent, provider response, or recovery checkpoint.\n4. Assert exact-version binding, no duplicate mutation/cost, and deterministic projection state.\n5. Rebuild the relevant projection or reopen the app and confirm the same observable result.\n\n**Expected Result:**\nThe story remains deterministic across boundary input, replay, restart, and projection rebuild; permissions and approvals do not expand or transfer to another revision.\n\n**Failure Indicators:**\nOff-by-one acceptance, replay duplication, stale approval, permission expansion, nondeterministic projection, or output/receipt drift.\n\n### TC-001-004-004: Analytics — ground_signoff_decided fires with the documented shape\n\n**Type:** Analytics\n**Priority:** P1\n**Automation:** Analytics\n**AC Covered:** None (AE-001 coverage)\n**Dependencies:** None\n\n**AE reference:** AE-001 — `ground_signoff_decided`; properties: decision: \"approved\" | \"blocked\", missing_evidence_class: \"none\" | \"owner\" | \"capacity\" | \"security\" | \"purchase_signal\"; trigger: after the accountable signoff ledger decision commits.\n\n**Setup:**\n- A debug build with the local product-event projection queryable or a logged-event spy attached after canonical commit.\n\n**Steps:**\n1. Perform the action that reaches this trigger: after the accountable signoff ledger decision commits.\n2. Confirm `ground_signoff_decided` fires exactly once after the trigger, not on render, click intent, retry, replay, or projection rebuild.\n3. Confirm the payload carries only the documented bounded properties: decision: \"approved\" | \"blocked\", missing_evidence_class: \"none\" | \"owner\" | \"capacity\" | \"security\" | \"purchase_signal\".\n4. Exercise each documented enum/boolean path and confirm invalid or unbounded values are rejected.\n5. Confirm no PII, creative/source/memory text, prompt/completion, raw URL/path/name/account, UUID, credential reference, or token appears.\n\n**Expected Result:**\n`ground_signoff_decided` lands once in the local analytics projection with the exact privacy-safe shape. Remote export remains absent unless explicit opt-in is enabled.\n\n**Failure Indicators:**\nMissing, misnamed, early, double-fired, replay-fired, malformed, unbounded, or privacy-leaking event.\n\n---\n\n## Out of Scope\n\n- Scope not named in this story remains in sibling stories or a later release; this story does not absorb the full parent epic.\n- In this story, do not infer completion from UI presence, documents, or mocked fixtures when the acceptance criteria require runtime or human evidence.\n- Do not bypass Clark's event, permission, approval, provenance, or rollback contracts to make the happy path appear complete.\n- Full cross-story journey continuity is tested in TR plans and TF-006/TF-009/TF-015 where applicable, not repeated here.\n\n## Automation Notes\n\n- **Bucket allocation:** 1 Maestro · 2 Unit / Harness · 0 Code Review · 1 Analytics. The visible exact-state journey stays in the UI bucket; failure and replay predicates run cheaply in Harness.\n- **Desktop UI executor:** implement product-team `Maestro` bucket cases with Playwright Electron under `clark-pro/apps/desktop/tests/e2e/`; retain product-team TC IDs and screenshot labels.\n- **Cheap journey-validating coverage:** TC-001-004-002 and TC-001-004-003 run in CI before any TF journey.\n- **Harness location:** add a focused `node:test` fixture beside clark-pro/contracts, clark-pro/evidence, and clark-pro/prototype; use recorded providers and debug read APIs, not production secrets.\n- **Selector strategy:** stable semantic roles/names first; `data-testid` only when role/name cannot distinguish exact-version state.\n- **Flakiness risks:** OS prompts, signing/notarization, real providers, process death, and media timing require isolated release lanes with recorded receipts.\n- **Automation priority:** Tier 1 = TC-001-004-001 and safety negative; Tier 2 = boundary/replay and analytics; Tier 3 = no source-only pass substitutes for a runtime/human AC.\n\n---\n"},{"rel":"epics/E-002-native-studio-and-durable-harness/AE-002.md","content":"# Analytics: E-002 — Native Studio and Durable Harness\n\n**ID:** AE-002\n**Project:** clark-pro\n**Epic:** E-002\n**Version:** 1.0\n**Updated:** 2026-07-13\n\n---\n\n**Success Metric (from epic):**\n\n| Supported interruption scenarios recovered without duplicate mutation | Bounded idea-run and process-death scenarios pass | 100% of supported run states |\n| Release trust gates passing | 0 of signing, notarization, Gatekeeper, and update gates | 100% before external distribution |\n\n---\n\n## Events\n\n| Event | Story | Trigger | Key Properties |\n|-------|-------|---------|----------------|\n| `run_recovery_completed` | S-002-002 | after boot recovery classifies and persists an interrupted run | interruption: \"renderer\" \\| \"harness\" \\| \"sleep\" \\| \"crash\", outcome: \"recovered\" \\| \"paused\" \\| \"failed\" \\| \"reconciliation\", duplicate_prevented: boolean |\n| `workspace_restore_completed` | S-002-003 | after full quarantine validation and canonical restore commit or safe rejection | result: \"restored\" \\| \"rejected\", reason_class: \"none\" \\| \"auth\" \\| \"checksum\" \\| \"schema\" \\| \"path\" \\| \"migration\" |\n| `release_trust_gate_completed` | S-002-004 | after signing, notarization, Gatekeeper, update, or credential-revocation evidence is recorded | gate: \"signing\" \\| \"notarization\" \\| \"gatekeeper\" \\| \"update\" \\| \"credential_revocation\", result: \"pass\" \\| \"fail\" |\n\n**Property rules:** only the bounded enums/booleans above. User/time are implicit. No raw IDs, URLs, paths, account names, source/artifact/memory text, prompts, credentials, or free-form notes.\n\n**Notes**\n\n- Fire once after the stated canonical commit or completed inspection, not on button click, mount, retry, replay, or projection rebuild.\n- The event supports the epic metric by measuring the outcome boundary, not each implementation step.\n- Export remains local unless the user explicitly opts into the privacy-safe analytics sink.\n"},{"rel":"epics/E-002-native-studio-and-durable-harness/E-002.md","content":"# Epic: Native Studio and Durable Harness\n\n**ID:** E-002\n**Project:** clark-pro\n**Stage:** Ready\n**Version:** 1.0\n**Created:** 2026-07-13\n**Updated:** 2026-07-13\n**Sources:** [Authoritative epics](../../research/history/import-2026-07-13/product/03-epics-and-stories.md), [Whole-product roadmap](../../research/history/import-2026-07-13/roadmap.md)\n\n---\n\n## Outcome\n\nCreators can operate a local Mac studio whose canonical state, approvals, and active work survive renderer reloads and Harness restarts without granting the renderer ambient authority.\n\n## Success Metric\n\n| Metric | Baseline | Target |\n|--------|----------|--------|\n| Supported interruption scenarios recovered without duplicate mutation | Bounded idea-run and process-death scenarios pass | 100% of supported run states |\n| Release trust gates passing | 0 of signing, notarization, Gatekeeper, and update gates | 100% before external distribution |\n\n## Primary Persona\n\nThe Trust-Conscious Operator\n\n## Dependencies\n\n- E-001 (Contracts and Product Proof)\n\n## Stories\n\n| ID | Title | Status | Stage |\n|----|-------|--------|-------|\n| S-002-001 | Hardened Mac Shell Boundary | Done | Ready |\n| S-002-002 | Durable Event Store and Run Recovery | Done | Ready |\n| S-002-003 | Workspace Portability and Backup Recovery | Backlog | Ready |\n| S-002-004 | Keychain, Signing, and Safe Updates | Backlog | Ready |\n| S-002-005 | Accessibility and Performance Release Evidence | Backlog | Ready |\n\n---\n"},{"rel":"epics/E-002-native-studio-and-durable-harness/S-002-001-hardened-mac-shell-boundary.md","content":"# Story: Hardened Mac Shell Boundary\n\n**ID:** S-002-001\n**Project:** clark-pro\n**Epic:** E-002\n**Stage:** Ready\n**Status:** Done\n**Priority:** P0\n**Version:** 1.0\n**Created:** 2026-07-13\n**Updated:** 2026-07-13\n**Sources:** [Authoritative epics](../../research/history/import-2026-07-13/product/03-epics-and-stories.md), [Whole-product roadmap](../../research/history/import-2026-07-13/roadmap.md), [Desktop evidence](../../research/history/import-2026-07-13/evidence/desktop-latest-report.json)\n\n---\n\n## Story\n\nAs a **creator**, I want to **navigate Clark with native Mac controls while the renderer remains isolated**, so that **the desktop experience feels native without exposing shell, filesystem, secrets, or raw IPC**.\n\n## Goal\n\nDeliver the observable capability described above through Clark's canonical workspace, with enough evidence to determine whether it is complete.\n\n## Why / Rationale\n\nThe desktop experience feels native without exposing shell, filesystem, secrets, or raw IPC. This story is separated from adjacent work so the board can report verified progress without treating an incomplete product epic as finished.\n\n## Functional Requirements\n\n- Keep context isolation, sandboxing, web security, and sender validation enabled.\n- Expose only named preload methods and native menu/view accelerators.\n\n## Acceptance Criteria\n\n- [ ] Given the Electron boundary tests run, when the renderer is inspected, then Node globals, raw IPC, shell, path, and secret access are absent.\n- [ ] Given the creator uses menus or keyboard shortcuts, when a Studio view is selected, then the expected view opens with accessible names and one visible level-one heading.\n\n## Negative Scenarios\n\n- A failed trust, evidence, compatibility, recovery, or policy check must leave the prior canonical state intact and expose a valid next action.\n\n## Future Scope\n\n- Broader capability beyond this verified slice remains in sibling stories and later releases.\n\n## Do Not Do\n\n- In this story, do not infer completion from UI presence, documents, or mocked fixtures when the acceptance criteria require runtime or human evidence.\n- Do not bypass Clark's event, permission, approval, provenance, or rollback contracts to make the happy path appear complete.\n\n---\n"},{"rel":"epics/E-002-native-studio-and-durable-harness/S-002-002-durable-event-store-and-run-recovery.md","content":"# Story: Durable Event Store and Run Recovery\n\n**ID:** S-002-002\n**Project:** clark-pro\n**Epic:** E-002\n**Stage:** Ready\n**Status:** Done\n**Priority:** P0\n**Version:** 1.0\n**Analytics:** AE-002\n**Created:** 2026-07-13\n**Updated:** 2026-07-13\n**Sources:** [Authoritative epics](../../research/history/import-2026-07-13/product/03-epics-and-stories.md), [Whole-product roadmap](../../research/history/import-2026-07-13/roadmap.md), [Harness evidence](../../research/history/import-2026-07-13/evidence/harness-latest-report.json)\n\n---\n\n## Story\n\nAs a **creator**, I want to **resume an interrupted idea run from canonical local events**, so that **work, approvals, and exact artifact identity survive process death without duplicate mutation**.\n\n## Goal\n\nDeliver the observable capability described above through Clark's canonical workspace, with enough evidence to determine whether it is complete.\n\n## Why / Rationale\n\nWork, approvals, and exact artifact identity survive process death without duplicate mutation. This story is separated from adjacent work so the board can report verified progress without treating an incomplete product epic as finished.\n\n## Functional Requirements\n\n- Persist immutable workspace events in SQLite WAL mode with per-workspace hash chains and replayable projections.\n- Terminalize interrupted calls, revoke orphaned leases, and retry under fresh authority.\n\n## Acceptance Criteria\n\n- [ ] Given a running step is interrupted by Harness process death, when the supervisor restarts it, then the run returns to its correct durable gate without creating a duplicate artifact.\n- [ ] Given projections are deleted, when events replay, then run, memory, Tool Pack, and Skill projections reproduce the same state.\n\n## Negative Scenarios\n\n- A failed trust, evidence, compatibility, recovery, or policy check must leave the prior canonical state intact and expose a valid next action.\n\n## Future Scope\n\n- Broader capability beyond this verified slice remains in sibling stories and later releases.\n\n## Do Not Do\n\n- In this story, do not infer completion from UI presence, documents, or mocked fixtures when the acceptance criteria require runtime or human evidence.\n- Do not bypass Clark's event, permission, approval, provenance, or rollback contracts to make the happy path appear complete.\n\n---\n"},{"rel":"epics/E-002-native-studio-and-durable-harness/S-002-003-workspace-portability-and-backup-recovery.md","content":"# Story: Workspace Portability and Backup Recovery\n\n**ID:** S-002-003\n**Project:** clark-pro\n**Epic:** E-002\n**Stage:** Ready\n**Status:** Backlog\n**Priority:** P0\n**Phase:** P-002-02\n**Version:** 1.0\n**Analytics:** AE-002\n**Created:** 2026-07-13\n**Updated:** 2026-07-13\n**Sources:** [Authoritative epics](../../research/history/import-2026-07-13/product/03-epics-and-stories.md), [Whole-product roadmap](../../research/history/import-2026-07-13/roadmap.md)\n\n---\n\n## Story\n\nAs a **workspace_admin**, I want to **export, restore, and migrate a workspace with its assets and history intact**, so that **local ownership remains useful even after corruption, device change, or hosted-service loss**.\n\n## Goal\n\nDeliver the observable capability described above through Clark's canonical workspace, with enough evidence to determine whether it is complete.\n\n## Why / Rationale\n\nLocal ownership remains useful even after corruption, device change, or hosted-service loss. This story is separated from adjacent work so the board can report verified progress without treating an incomplete product epic as finished.\n\n## Functional Requirements\n\n- Export events, projections, content-addressed assets, checksums, and schema versions in a portable package.\n- Preview migrations and reject corrupt or incompatible imports without altering the active workspace.\n\n## Acceptance Criteria\n\n- [ ] Given a complete workspace export, when it is restored on a clean installation, then event history, artifact versions, hashes, and graph state match the source.\n- [ ] Given a corrupt checksum or incompatible migration, when import is attempted, then the active workspace remains unchanged and the failure is actionable.\n\n## Negative Scenarios\n\n- A failed trust, evidence, compatibility, recovery, or policy check must leave the prior canonical state intact and expose a valid next action.\n\n## Future Scope\n\n- Scope not named in this story remains in sibling stories or a later release; this story does not absorb the full parent epic.\n\n## Do Not Do\n\n- In this story, do not infer completion from UI presence, documents, or mocked fixtures when the acceptance criteria require runtime or human evidence.\n- Do not bypass Clark's event, permission, approval, provenance, or rollback contracts to make the happy path appear complete.\n\n---\n"},{"rel":"epics/E-002-native-studio-and-durable-harness/S-002-004-keychain-signing-and-safe-updates.md","content":"# Story: Keychain, Signing, and Safe Updates\n\n**ID:** S-002-004\n**Project:** clark-pro\n**Epic:** E-002\n**Stage:** Ready\n**Status:** Backlog\n**Priority:** P0\n**Phase:** P-002-02\n**Version:** 1.0\n**Analytics:** AE-002\n**Created:** 2026-07-13\n**Updated:** 2026-07-13\n**Sources:** [Authoritative epics](../../research/history/import-2026-07-13/product/03-epics-and-stories.md), [Whole-product roadmap](../../research/history/import-2026-07-13/roadmap.md)\n\n---\n\n## Story\n\nAs a **workspace_admin**, I want to **install and update a trusted Clark build whose credentials stay behind scoped Keychain leases**, so that **the product can leave local development without weakening its security model**.\n\n## Goal\n\nDeliver the observable capability described above through Clark's canonical workspace, with enough evidence to determine whether it is complete.\n\n## Why / Rationale\n\nThe product can leave local development without weakening its security model. This story is separated from adjacent work so the board can report verified progress without treating an incomplete product epic as finished.\n\n## Functional Requirements\n\n- Broker credentials through macOS Keychain without returning token material to the renderer or event log.\n- Ship Developer ID signing, Hardened Runtime entitlements, notarization, stapling, Gatekeeper acceptance, and signed rollback-capable updates.\n\n## Acceptance Criteria\n\n- [ ] Given a release candidate, when strict code-sign and Gatekeeper checks run, then the bundle passes with an attributable Team ID and notarization evidence.\n- [ ] Given a credential is revoked, when dependent work starts or resumes, then Clark blocks it without exposing the stored secret.\n\n## Negative Scenarios\n\n- A failed trust, evidence, compatibility, recovery, or policy check must leave the prior canonical state intact and expose a valid next action.\n\n## Future Scope\n\n- Scope not named in this story remains in sibling stories or a later release; this story does not absorb the full parent epic.\n\n## Do Not Do\n\n- In this story, do not infer completion from UI presence, documents, or mocked fixtures when the acceptance criteria require runtime or human evidence.\n- Do not bypass Clark's event, permission, approval, provenance, or rollback contracts to make the happy path appear complete.\n\n---\n"},{"rel":"epics/E-002-native-studio-and-durable-harness/S-002-005-accessibility-and-performance-release-evidence.md","content":"# Story: Accessibility and Performance Release Evidence\n\n**ID:** S-002-005\n**Project:** clark-pro\n**Epic:** E-002\n**Stage:** Ready\n**Status:** Backlog\n**Priority:** P1\n**Phase:** P-002-02\n**Version:** 1.0\n**Created:** 2026-07-13\n**Updated:** 2026-07-13\n**Sources:** [Authoritative epics](../../research/history/import-2026-07-13/product/03-epics-and-stories.md), [Whole-product roadmap](../../research/history/import-2026-07-13/roadmap.md)\n\n---\n\n## Story\n\nAs a **creator**, I want to **operate the representative workspace with keyboard and VoiceOver at production scale**, so that **native trust and control are available to creators without hidden interaction or performance failures**.\n\n## Goal\n\nDeliver the observable capability described above through Clark's canonical workspace, with enough evidence to determine whether it is complete.\n\n## Why / Rationale\n\nNative trust and control are available to creators without hidden interaction or performance failures. This story is separated from adjacent work so the board can report verified progress without treating an incomplete product epic as finished.\n\n## Functional Requirements\n\n- Run the committed VoiceOver and keyboard tasks with an accessibility expert.\n- Measure Focus and Canvas behavior with the 50-object fixture and retain attributable results.\n\n## Acceptance Criteria\n\n- [ ] Given the representative task set, when it is completed with VoiceOver and keyboard only, then all critical actions and state changes are reachable and announced.\n- [ ] Given the 50-object fixture is loaded, when the creator navigates and changes views, then the agreed responsiveness thresholds pass without losing semantic focus.\n\n## Negative Scenarios\n\n- A failed trust, evidence, compatibility, recovery, or policy check must leave the prior canonical state intact and expose a valid next action.\n\n## Future Scope\n\n- Scope not named in this story remains in sibling stories or a later release; this story does not absorb the full parent epic.\n\n## Do Not Do\n\n- In this story, do not infer completion from UI presence, documents, or mocked fixtures when the acceptance criteria require runtime or human evidence.\n- Do not bypass Clark's event, permission, approval, provenance, or rollback contracts to make the happy path appear complete.\n\n---\n"},{"rel":"epics/E-002-native-studio-and-durable-harness/T-002-001-hardened-mac-shell-boundary.md","content":"# Test Plan: Hardened Mac Shell Boundary\n\n**ID:** T-002-001\n**Project:** clark-pro\n**Story:** S-002-001\n**Epic:** E-002\n**Stage:** Refinement\n**Version:** 1.0\n**Created:** 2026-07-13\n**Updated:** 2026-07-13\n\n---\n\n## Scope\n\nVerify Hardened Mac Shell Boundary end-to-end against every acceptance criterion, its trust-preserving negative path, boundary/idempotency behavior, and the canonical receipt/evidence contract. This plan does not infer story completion from a screen or document alone.\n\n## Prerequisites\n\n- A clean deterministic workspace fixture at the story’s required schema version.\n- Access to clark-pro/apps/desktop and clark-pro/services/harness and the canonical event/projection/receipt inspection harness.\n- External systems use recorded or sandbox responses; no production mutation is required for routine CI.\n- UI bucket note: product-team labels visible journey cases `Maestro`; Clark’s desktop executor is Playwright Electron with the same before/after evidence contract.\n\n## AC Coverage Map\n\n| AC | Test Cases | Bucket | Coverage |\n|----|------  claim is introduced.\n\n**Failure Indicators:**\nAny AC outcome is absent, applies to a different version/actor/scope, bypasses a gate, duplicates state, loses lineage, or relies only on mocked/UI presence where runtime or human evidence is required.\n\n---\n\n## Sub Flows\n\n### TC-002-001-002: Failed gate preserves prior trusted state and exposes recovery\n\n**Type:** Negative\n**Priority:** P1\n**Automation:** Unit / Harness\n**AC Covered:** AC-002\n**Dependencies:** None\n\n**Setup:**\n- Seed one valid prior canonical state and record aggregate version, event count, active revision/authority, asset hashes, and projection snapshot.\n- Configure the relevant trust, evidence, compatibility, recovery, or policy check to fail deterministically.\n\n**Steps:**\n1. Invoke the story action against the failing gate.\n2. Assert no unauthorized provider, filesystem, credential, package, publication, memory, Skill, or canonical mutation occurs.\n3. Compare the post-run snapshot with the recorded trusted state.\n4. Assert a bounded failure receipt identifies the failed gate, owner, and valid retry/rollback/read-only next action.\n5. Restore the valid condition and prove the inverse path can proceed.\n\n**Expected Result:**\nA failed trust, evidence, compatibility, recovery, or policy check must leave the prior canonical state intact and expose a valid next action.\n\n**Failure Indicators:**\nPartial canonical write, lost prior revision, leaked secret/content, silent retry, vague error without next action, or a false “complete” state.\n\n### TC-002-001-003: Boundary, replay, and exact-version regression\n\n**Type:** Edge Case\n**Priority:** P2\n**Automation:** Unit / Harness\n**AC Covered:** AC-001, AC-002\n**Dependencies:** None\n\n**Setup:**\n- Use the smallest deterministic fixture that exercises Keep context isolation, sandboxing, web security, and sender validation enabled. and Expose only named preload methods and native menu/view accelerators..\n- Capture the input identity, schema/revision, actor/scope, event count, and expected output hash/receipt.\n\n**Steps:**\n1. Execute at the lower valid boundary and assert the documented result.\n2. Execute at the upper/expanded/expired/stale or incompatible boundary and assert fail-closed behavior.\n3. Replay the original command, intent, provider response, or recovery checkpoint.\n4. Assert exact-version binding, no duplicate mutation/cost, and deterministic projection state.\n5. Rebuild the relevant projection or reopen the app and confirm the same observable result.\n\n**Expected Result:**\nThe story remains deterministic across boundary input, replay, restart, and projection rebuild; permissions and approvals do not expand or transfer to another revision.\n\n**Failure Indicators:**\nOff-by-one acceptance, replay duplication, stale approval, permission expansion, nondeterministic projection, or output/receipt drift.\n\n---\n\n## Out of Scope\n\n- Broader capability beyond this verified slice remains in sibling stories and later releases.\n- In this story, do not infer completion from UI presence, documents, or mocked fixtures when the acceptance criteria require runtime or human evidence.\n- Do not bypass Clark's event, permission, approval, provenance, or rollback contracts to make the happy path appear complete.\n- Full cross-story journey continuity is tested in TR plans and TF-006/TF-009/TF-015 where applicable, not repeated here.\n\n## Automation Notes\n\n- **Bucket allocation:** 1 Maestro · 2 Unit / Harness · 0 Code Review. The visible exact-state journey stays in the UI bucket; failure and replay predicates run cheaply in Harness.\n- **Desktop UI executor:** implement product-team `Maestro` bucket cases with Playwright Electron under `clark-pro/apps/desktop/tests/e2e/`; retain product-team TC IDs and screenshot labels.\n- **Cheap journey-validating coverage:** TC-002-001-002 and TC-002-001-003 run in CI before any TF journey.\n- **Harness location:** add a focused `node:test` fixture beside clark-pro/apps/desktop and clark-pro/services/harness; use recorded providers and debug read APIs, not production secrets.\n- **Selector strategy:** stable semantic roles/names first; `data-testid` only when role/name cannot distinguish exact-version state.\n- **Flakiness risks:** OS prompts, signing/notarization, real providers, process death, and media timing require isolated release lanes with recorded receipts.\n- **Automation priority:** Tier 1 = TC-002-001-001 and safety negative; Tier 2 = boundary/replay and analytics; Tier 3 = no source-only pass substitutes for a runtime/human AC.\n\n---\n"},{"rel":"epics/E-002-native-studio-and-durable-harness/T-002-002-durable-event-store-and-run-recovery.md","content":"# Test Plan: Durable Event Store and Run Recovery\n\n**ID:** T-002-002\n**Project:** clark-pro\n**Story:** S-002-002\n**Epic:** E-002\n**Stage:** Refinement\n**Version:** 1.0\n**Created:** 2026-07-13\n**Updated:** 2026-07-13\n\n---\n\n## Scope\n\nVerify Durable Event Store and Run Recovery end-to-end against every acceptance criterion, its trust-preserving negative path, boundary/idempotency behavior, and the AE-002 product event. This plan does not infer story completion from a screen or document alone.\n\n## Prerequisites\n\n- A clean deterministic workspace fixture at the story’s required schema version.\n- Access to clark-pro/apps/desktop and clark-pro/services/harness and the canonical event/projection/receipt inspection harness.\n- External systems use recorded or sandbox responses; no production mutation is required for routine CI.\n- UI bucket note: product-team labels visible journey cases `Maestro`; Clark’s desktop executor is Playwright Electron with the same before/after evidence contract.\n\n## AC Coverage Map\n\n| AC | Test Cases | Bucket | Coverage |\n|----|-----------|--------|----------|\n| AC-001 | TC-002-002-001 (P0) | Unit / Harness | ✓ |\n| AC-002 | TC-002-002-001 (P0), TC-002-002-002 | Unit / Harness · Unit / Harness | ✓ |\n| AE-002 | TC-002-002-004 | Analytics | ✓ |\n\n**Bucket totals:** 0 Maestro · 3 Unit / Harness · 0 Code Review · 1 Analytics. The P0 uses the cheapest bucket that still proves the AC; data and failure predicates remain Harness cases.\n\n---\n\n## Core Test Flow\n\n### TC-002-002-001: Complete acceptance path for Durable Event Store and Run Recovery\n\n**Type:** E2E\n**Priority:** P0\n**Automation:** Unit / Harness\n**AC Covered:** AC-001, AC-002\n**Dependencies:** Story dependencies and parent release architecture gate must be satisfied\n\n**Setup:**\n- Use the repository’s deterministic Node/Harness fixtures in clark-pro/apps/desktop and clark-pro/services/harness.\n- Reset canonical test state and record the starting event/projection/hash snapshot.\n- Stub external providers or use recorded conformance responses; no production credentials.\n\n**Steps:**\n1. Establish: a running step is interrupted by Harness process death.\n2. Perform: the supervisor restarts it.\n3. Verify AC-001: the run returns to its correct durable gate without creating a duplicate artifact.\n4. Establish: projections are deleted.\n5. Perform: events replay.\n6. Verify AC-002: run, memory, Tool Pack, and Skill projections reproduce the same state.\n7. Re-run the same command or fixture identity and assert idempotent behavior with no duplicate mutation.\n\n**Expected Result:**\n- AC-001: Given a running step is interrupted by Harness process death, when the supervisor restarts it, then the run returns to its correct durable gate without creating a duplicate artifact.\n- AC-002: Given projections are deleted, when events replay, then run, memory, Tool Pack, and Skill projections reproduce the same state.\n- Canonical state and evidence match the exact tested revision; no hidden authority, duplicate mutation, or unsupported completion claim is introduced.\n\n**Failure Indicators:**\nAny AC outcome is absent, applies to a different version/actor/scope, bypasses a gate, duplicates state, loses lineage, or relies only on mocked/UI presence where runtime or human evidence is required.\n\n---\n\n## Sub Flows\n\n### TC-002-002-002: Failed gate preserves prior trusted state and exposes recovery\n\n**Type:** Negative\n**Priority:** P1\n**Automation:** Unit / Harness\n**AC Covered:** AC-002\n**Dependencies:** None\n\n**Setup:**\n- Seed one valid prior canonical state and record aggregate version, event count, active revision/authority, asset hashes, and projection snapshot.\n- Configure the relevant trust, evidence, compatibility, recovery, or policy check to fail deterministically.\n\n**Steps:**\n1. Invoke the story action against the failing gate.\n2. Assert no unauthorized provider, filesystem, credential, package, publication, memory, Skill, or canonical mutation occurs.\n3. Compare the post-run snapshot with the recorded trusted state.\n4. Assert a bounded failure receipt identifies the failed gate, owner, and valid retry/rollback/read-only next action.\n5. Restore the valid condition and prove the inverse path can proceed.\n\n**Expected Result:**\nA failed trust, evidence, compatibility, recovery, or policy check must leave the prior canonical state intact and expose a valid next action.\n\n**Failure Indicators:**\nPartial canonical write, lost prior revision, leaked secret/content, silent retry, vague error without next action, or a false “complete” state.\n\n### TC-002-002-003: Boundary, replay, and exact-version regression\n\n**Type:** Edge Case\n**Priority:** P2\n**Automation:** Unit / Harness\n**AC Covered:** AC-001, AC-002\n**Dependencies:** None\n\n**Setup:**\n- Use the smallest deterministic fixture that exercises Persist immutable workspace events in SQLite WAL mode with per-workspace hash chains and replayable projections. and Terminalize interrupted calls, revoke orphaned leases, and retry under fresh authority..\n- Capture the input identity, schema/revision, actor/scope, event count, and expected output hash/receipt.\n\n**Steps:**\n1. Execute at the lower valid boundary and assert the documented result.\n2. Execute at the upper/expanded/expired/stale or incompatible boundary and assert fail-closed behavior.\n3. Replay the original command, intent, provider response, or recovery checkpoint.\n4. Assert exact-version binding, no duplicate mutation/cost, and deterministic projection state.\n5. Rebuild the relevant projection or reopen the app and confirm the same observable result.\n\n**Expected Result:**\nThe story remains deterministic across boundary input, replay, restart, and projection rebuild; permissions and approvals do not expand or transfer to another revision.\n\n**Failure Indicators:**\nOff-by-one acceptance, replay duplication, stale approval, permission expansion, nondeterministic projection, or output/receipt drift.\n\n### TC-002-002-004: Analytics — run_recovery_completed fires with the documented shape\n\n**Type:** Analytics\n**Priority:** P1\n**Automation:** Analytics\n**AC Covered:** None (AE-002 coverage)\n**Dependencies:** None\n\n**AE reference:** AE-002 — `run_recovery_completed`; properties: interruption: \"renderer\" | \"harness\" | \"sleep\" | \"crash\", outcome: \"recovered\" | \"paused\" | \"failed\" | \"reconciliation\", duplicate_prevented: boolean; trigger: after boot recovery classifies and persists an interrupted run.\n\n**Setup:**\n- A debug build with the local product-event projection queryable or a logged-event spy attached after canonical commit.\n\n**Steps:**\n1. Perform the action that reaches this trigger: after boot recovery classifies and persists an interrupted run.\n2. Confirm `run_recovery_completed` fires exactly once after the trigger, not on render, click intent, retry, replay, or projection rebuild.\n3. Confirm the payload carries only the documented bounded properties: interruption: \"renderer\" | \"harness\" | \"sleep\" | \"crash\", outcome: \"recovered\" | \"paused\" | \"failed\" | \"reconciliation\", duplicate_prevented: boolean.\n4. Exercise each documented enum/boolean path and confirm invalid or unbounded values are rejected.\n5. Confirm no PII, creative/source/memory text, prompt/completion, raw URL/path/name/account, UUID, credential reference, or token appears.\n\n**Expected Result:**\n`run_recovery_completed` lands once in the local analytics projection with the exact privacy-safe shape. Remote export remains absent unless explicit opt-in is enabled.\n\n**Failure Indicators:**\nMissing, misnamed, early, double-fired, replay-fired, malformed, unbounded, or privacy-leaking event.\n\n---\n\n## Out of Scope\n\n- Broader capability beyond this verified slice remains in sibling stories and later releases.\n- In this story, do not infer completion from UI presence, documents, or mocked fixtures when the acceptance criteria require runtime or human evidence.\n- Do not bypass Clark's event, permission, approval, provenance, or rollback contracts to make the happy path appear complete.\n- Full cross-story journey continuity is tested in TR plans and TF-006/TF-009/TF-015 where applicable, not repeated here.\n\n## Automation Notes\n\n- **Bucket allocation:** 0 Maestro · 3 Unit / Harness · 0 Code Review · 1 Analytics. The AC are backend/evidence predicates that can be proven without rendering, so Harness is the honest P0.\n- **Desktop UI executor:** implement product-team `Maestro` bucket cases with Playwright Electron under `clark-pro/apps/desktop/tests/e2e/`; retain product-team TC IDs and screenshot labels.\n- **Cheap journey-validating coverage:** TC-002-002-002 and TC-002-002-003 run in CI before any TF journey.\n- **Harness location:** add a focused `node:test` fixture beside clark-pro/apps/desktop and clark-pro/services/harness; use recorded providers and debug read APIs, not production secrets.\n- **Selector strategy:** stable semantic roles/names first; `data-testid` only when role/name cannot distinguish exact-version state.\n- **Flakiness risks:** OS prompts, signing/notarization, real providers, process death, and media timing require isolated release lanes with recorded receipts.\n- **Automation priority:** Tier 1 = TC-002-002-001 and safety negative; Tier 2 = boundary/replay and analytics; Tier 3 = no source-only pass substitutes for a runtime/human AC.\n\n---\n"},{"rel":"epics/E-002-native-studio-and-durable-harness/T-002-003-workspace-portability-and-backup-recovery.md","content":"# Test Plan: Workspace Portability and Backup Recovery\n\n**ID:** T-002-003\n**Project:** clark-pro\n**Story:** S-002-003\n**Epic:** E-002\n**Stage:** Refinement\n**Version:** 1.0\n**Created:** 2026-07-13\n**Updated:** 2026-07-13\n\n---\n\n## Scope\n\nVerify Workspace Portability and Backup Recovery end-to-end against every acceptance criterion, its trust-preserving negative path, boundary/idempotency behavior, and the AE-002 product event. This plan does not infer story completion from a screen or document alone.\n\n## Prerequisites\n\n- A clean deterministic workspace fixture at the story’s required schema version.\n- Access to clark-pro/apps/desktop and clark-pro/services/harness and the canonical event/projection/receipt inspection harness.\n- External systems use recorded or sandbox responses; no production mutation is required for routine CI.\n- UI bucket note: product-team labels visible journey cases `Maestro`; Clark’s desktop executor is Playwright Electron with the same before/after evidence contract.\n\n## AC Coverage Map\n\n| AC | Test Cases | Bucket | Coverage |\n|----|-----------|--------|----------|\n| AC-001 | TC-002-003-001 (P0) | Maestro | ✓ |\n| AC-002 | TC-002-003-001 (P0), TC-002-003-002 | Maestro · Unit / Harness | ✓ |\n| AE-002 | TC-002-003-004 | Analytics | ✓ |\n\n**Bucket totals:** 1 Maestro · 2 Unit / Harness · 0 Code Review · 1 Analytics. The P0 uses the cheapest bucket that still proves the AC; data and failure predicates remain Harness cases.\n\n---\n\n## Core Test Flow\n\n### TC-002-003-001: Complete acceptance path for Workspace Portability and Backup Recove
