vises an idea.\n3. Verify AC-001: Studio shows the same canonical lineage and policy state.\n4. Establish: a missing bearer, hostile Origin or Host, oversized body, or cross-workspace request.\n5. Perform: the request arrives.\n6. Verify AC-002: it fails without leaking the credential.\n7. Re-run the same command or fixture identity and assert idempotent behavior with no duplicate mutation.\n\n**Expected Result:**\n- AC-001: Given a scoped Bridge client, when it captures or revises an idea, then Studio shows the same canonical lineage and policy state.\n- AC-002: Given a missing bearer, hostile Origin or Host, oversized body, or cross-workspace request, when the request arrives, then it fails without leaking the credential.\n- Canonical state and evidence match the exact tested revision; no hidden authority, duplicate mutation, or unsupported completion claim is introduced.\n\n**Failure Indicators:**\nAny AC outcome is absent, applies to a different version/actor/scope, bypasses a gate, duplicates state, loses lineage, or relies only on mocked/UI presence where runtime or human evidence is required.\n\n---\n\n## Sub Flows\n\n### TC-004-002-002: Failed gate preserves prior trusted state and exposes recovery\n\n**Type:** Negative\n**Priority:** P1\n**Automation:** Unit / Harness\n**AC Covered:** AC-002\n**Dependencies:** None\n\n**Setup:**\n- Seed one valid prior canonical state and record aggregate version, event count, active revision/authority, asset hashes, and projection snapshot.\n- Configure the relevant trust, evidence, compatibility, recovery, or policy check to fail deterministically.\n\n**Steps:**\n1. Invoke the story action against the failing gate.\n2. Assert no unauthorized provider, filesystem, credential, package, publication, memory, Skill, or canonical mutation occurs.\n3. Compare the post-run snapshot with the recorded trusted state.\n4. Assert a bounded failure receipt identifies the failed gate, owner, and valid retry/rollback/read-only next action.\n5. Restore the valid condition and prove the inverse path can proceed.\n\n**Expected Result:**\nA failed trust, evidence, compatibility, recovery, or policy check must leave the prior canonical state intact and expose a valid next action.\n\n**Failure Indicators:**\nPartial canonical write, lost prior revision, leaked secret/content, silent retry, vague error without next action, or a false “complete” state.\n\n### TC-004-002-003: Boundary, replay, and exact-version regression\n\n**Type:** Edge Case\n**Priority:** P2\n**Automation:** Unit / Harness\n**AC Covered:** AC-001, AC-002\n**Dependencies:** None\n\n**Setup:**\n- Use the smallest deterministic fixture that exercises Bind Streamable HTTP to localhost with bearer material outside renderer and event state. and Route Bridge mutations through the same Harness commands as Studio and record client actor metadata..\n- Capture the input identity, schema/revision, actor/scope, event count, and expected output hash/receipt.\n\n**Steps:**\n1. Execute at the lower valid boundary and assert the documented result.\n2. Execute at the upper/expanded/expired/stale or incompatible boundary and assert fail-closed behavior.\n3. Replay the original command, intent, provider response, or recovery checkpoint.\n4. Assert exact-version binding, no duplicate mutation/cost, and deterministic projection state.\n5. Rebuild the relevant projection or reopen the app and confirm the same observable result.\n\n**Expected Result:**\nThe story remains deterministic across boundary input, replay, restart, and projection rebuild; permissions and approvals do not expand or transfer to another revision.\n\n**Failure Indicators:**\nOff-by-one acceptance, replay duplication, stale approval, permission expansion, nondeterministic projection, or output/receipt drift.\n\n### TC-004-002-004: Analytics — bridge_mutation_completed fires with the documented shape\n\n**Type:** Analytics\n**Priority:** P1\n**Automation:** Analytics\n**AC Covered:** None (AE-004 coverage)\n**Dependencies:** None\n\n**AE reference:** AE-004 — `bridge_mutation_completed`; properties: mutation: \"capture\" | \"revise\", result: \"completed\" | \"denied\", client_class: \"claude\" | \"codex\" | \"hermes\" | \"other\"; trigger: after a scoped Bridge mutation commits through the canonical command layer.\n\n**Setup:**\n- A debug build with the local product-event projection queryable or a logged-event spy attached after canonical commit.\n\n**Steps:**\n1. Perform the action that reaches this trigger: after a scoped Bridge mutation commits through the canonical command layer.\n2. Confirm `bridge_mutation_completed` fires exactly once after the trigger, not on render, click intent, retry, replay, or projection rebuild.\n3. Confirm the payload carries only the documented bounded properties: mutation: \"capture\" | \"revise\", result: \"completed\" | \"denied\", client_class: \"claude\" | \"codex\" | \"hermes\" | \"other\".\n4. Exercise each documented enum/boolean path and confirm invalid or unbounded values are rejected.\n5. Confirm no PII, creative/source/memory text, prompt/completion, raw URL/path/name/account, UUID, credential reference, or token appears.\n\n**Expected Result:**\n`bridge_mutation_completed` lands once in the local analytics projection with the exact privacy-safe shape. Remote export remains absent unless explicit opt-in is enabled.\n\n**Failure Indicators:**\nMissing, misnamed, early, double-fired, replay-fired, malformed, unbounded, or privacy-leaking event.\n\n---\n\n## Out of Scope\n\n- Broader capability beyond this verified slice remains in sibling stories and later releases.\n- In this story, do not infer completion from UI presence, documents, or mocked fixtures when the acceptance criteria require runtime or human evidence.\n- Do not bypass Clark's event, permission, approval, provenance, or rollback contracts to make the happy path appear complete.\n- Full cross-story journey continuity is tested in TR plans and TF-006/TF-009/TF-015 where applicable, not repeated here.\n\n## Automation Notes\n\n- **Bucket allocation:** 0 Maestro · 3 Unit / Harness · 0 Code Review · 1 Analytics. The AC are backend/evidence predicates that can be proven without rendering, so Harness is the honest P0.\n- **Desktop UI executor:** implement product-team `Maestro` bucket cases with Playwright Electron under `clark-pro/apps/desktop/tests/e2e/`; retain product-team TC IDs and screenshot labels.\n- **Cheap journey-validating coverage:** TC-004-002-002 and TC-004-002-003 run in CI before any TF journey.\n- **Harness location:** add a focused `node:test` fixture beside clark-pro/mcp-conformance and clark-pro/services/harness; use recorded providers and debug read APIs, not production secrets.\n- **Selector strategy:** stable semantic roles/names first; `data-testid` only when role/name cannot distinguish exact-version state.\n- **Flakiness risks:** OS prompts, signing/notarization, real providers, process death, and media timing require isolated release lanes with recorded receipts.\n- **Automation priority:** Tier 1 = TC-004-002-001 and safety negative; Tier 2 = boundary/replay and analytics; Tier 3 = no source-only pass substitutes for a runtime/human AC.\n\n---\n"},{"rel":"epics/E-004-mcp-and-clark-bridge/T-004-003-durable-bridge-tasks-and-client-pairing.md","content":"# Test Plan: Durable Bridge Tasks and Client Pairing\n\n**ID:** T-004-003\n**Project:** clark-pro\n**Story:** S-004-003\n**Epic:** E-004\n**Stage:** Refinement\n**Version:** 1.0\n**Created:** 2026-07-13\n**Updated:** 2026-07-13\n\n---\n\n## Scope\n\nVerify Durable Bridge Tasks and Client Pairing end-to-end against every acceptance criterion, its trust-preserving negative path, boundary/idempotency behavior, and the AE-004 product event. This plan does not infer story completion from a screen or document alone.\n\n## Prerequisites\n\n- A clean deterministic workspace fixture at the story’s required schema version.\n- Access to clark-pro/mcp-conformance and clark-pro/services/harness and the canonical event/projection/receipt inspection harness.\n- External systems use recorded or sandbox responses; no production mutation is required for routine CI.\n- UI bucket note: product-team labels visible journey cases `Maestro`; Clark’s desktop executor is Playwright Electron with the same before/after evidence contract.\n\n## AC Coverage Map\n\n| AC | Test Cases | Bucket | Coverage |\n|----|-----------|--------|----------|\n| AC-001 | TC-004-003-001 (P0) | Unit / Harness | ✓ |\n| AC-002 | TC-004-003-001 (P0), TC-004-003-002 | Unit / Harness · Unit / Harness | ✓ |\n| AE-004 | TC-004-003-004 | Analytics | ✓ |\n\n**Bucket totals:** 0 Maestro · 3 Unit / Harness · 0 Code Review · 1 Analytics. The P0 uses the cheapest bucket that still proves the AC; data and failure predicates remain Harness cases.\n\n---\n\n## Core Test Flow\n\n### TC-004-003-001: Complete acceptance path for Durable Bridge Tasks and Client Pairing\n\n**Type:** E2E\n**Priority:** P0\n**Automation:** Unit / Harness\n**AC Covered:** AC-001, AC-002\n**Dependencies:** Story dependencies and parent release architecture gate must be satisfied\n\n**Setup:**\n- Use the repository’s deterministic Node/Harness fixtures in clark-pro/mcp-conformance and clark-pro/services/harness.\n- Reset canonical test state and record the starting event/projection/hash snapshot.\n- Stub external providers or use recorded conformance responses; no production credentials.\n\n**Steps:**\n1. Establish: a client disconnects after starting durable work.\n2. Perform: it reconnects with the same intent identity.\n3. Verify AC-001: it receives the existing job rather than creating a duplicate.\n4. Establish: client access is revoked.\n5. Perform: it attempts a new read or mutation.\n6. Verify AC-002: Clark denies access immediately while the canonical job state remains intact.\n7. Re-run the same command or fixture identity and assert idempotent behavior with no duplicate mutation.\n\n**Expected Result:**\n- AC-001: Given a client disconnects after starting durable work, when it reconnects with the same intent identity, then it receives the existing job rather than creating a duplicate.\n- AC-002: Given client access is revoked, when it attempts a new read or mutation, then Clark denies access immediately while the canonical job state remains intact.\n- Canonical state and evidence match the exact tested revision; no hidden authority, duplicate mutation, or unsupported completion claim is introduced.\n\n**Failure Indicators:**\nAny AC outcome is absent, applies to a different version/actor/scope, bypasses a gate, duplicates state, loses lineage, or relies only on mocked/UI presence where runtime or human evidence is required.\n\n---\n\n## Sub Flows\n\n### TC-004-003-002: Failed gate preserves prior trusted state and exposes recovery\n\n**Type:** Negative\n**Priority:** P1\n**Automation:** Unit / Harness\n**AC Covered:** AC-002\n**Dependencies:** None\n\n**Setup:**\n- Seed one valid prior canonical state and record aggregate version, event count, active revision/authority, asset hashes, and projection snapshot.\n- Configure the relevant trust, evidence, compatibility, recovery, or policy check to fail deterministically.\n\n**Steps:**\n1. Invoke the story action against the failing gate.\n2. Assert no unauthorized provider, filesystem, credential, package, publication, memory, Skill, or canonical mutation occurs.\n3. Compare the post-run snapshot with the recorded trusted state.\n4. Assert a bounded failure receipt identifies the failed gate, owner, and valid retry/rollback/read-only next action.\n5. Restore the valid condition and prove the inverse path can proceed.\n\n**Expected Result:**\nA failed trust, evidence, compatibility, recovery, or policy check must leave the prior canonical state intact and expose a valid next action.\n\n**Failure Indicators:**\nPartial canonical write, lost prior revision, leaked secret/content, silent retry, vague error without next action, or a false “complete” state.\n\n### TC-004-003-003: Boundary, replay, and exact-version regression\n\n**Type:** Edge Case\n**Priority:** P2\n**Automation:** Unit / Harness\n**AC Covered:** AC-001, AC-002\n**Dependencies:** None\n\n**Setup:**\n- Use the smallest deterministic fixture that exercises Map negotiated MCP Tasks or Clark job receipts to durable Harness runs with explicit cancellation and reconciliation states. and Pair and revoke clients through a Keychain-backed, workspace-scoped flow..\n- Capture the input identity, schema/revision, actor/scope, event count, and expected output hash/receipt.\n\n**Steps:**\n1. Execute at the lower valid boundary and assert the documented result.\n2. Execute at the upper/expanded/expired/stale or incompatible boundary and assert fail-closed behavior.\n3. Replay the original command, intent, provider response, or recovery checkpoint.\n4. Assert exact-version binding, no duplicate mutation/cost, and deterministic projection state.\n5. Rebuild the relevant projection or reopen the app and confirm the same observable result.\n\n**Expected Result:**\nThe story remains deterministic across boundary input, replay, restart, and projection rebuild; permissions and approvals do not expand or transfer to another revision.\n\n**Failure Indicators:**\nOff-by-one acceptance, replay duplication, stale approval, permission expansion, nondeterministic projection, or output/receipt drift.\n\n### TC-004-003-004: Analytics — bridge_job_reconnected fires with the documented shape\n\n**Type:** Analytics\n**Priority:** P1\n**Automation:** Analytics\n**AC Covered:** None (AE-004 coverage)\n**Dependencies:** None\n\n**AE reference:** AE-004 — `bridge_job_reconnected`; properties: task_mode: \"mcp_task\" | \"clark_receipt\", state: \"running\" | \"waiting_review\" | \"terminal\", duplicate_prevented: boolean; trigger: after a client reconnect resolves the same durable intent to a job.\n\n**Setup:**\n- A debug build with the local product-event projection queryable or a logged-event spy attached after canonical commit.\n\n**Steps:**\n1. Perform the action that reaches this trigger: after a client reconnect resolves the same durable intent to a job.\n2. Confirm `bridge_job_reconnected` fires exactly once after the trigger, not on render, click intent, retry, replay, or projection rebuild.\n3. Confirm the payload carries only the documented bounded properties: task_mode: \"mcp_task\" | \"clark_receipt\", state: \"running\" | \"waiting_review\" | \"terminal\", duplicate_prevented: boolean.\n4. Exercise each documented enum/boolean path and confirm invalid or unbounded values are rejected.\n5. Confirm no PII, creative/source/memory text, prompt/completion, raw URL/path/name/account, UUID, credential reference, or token appears.\n\n**Expected Result:**\n`bridge_job_reconnected` lands once in the local analytics projection with the exact privacy-safe shape. Remote export remains absent unless explicit opt-in is enabled.\n\n**Failure Indicators:**\nMissing, misnamed, early, double-fired, replay-fired, malformed, unbounded, or privacy-leaking event.\n\n---\n\n## Out of Scope\n\n- Scope not named in this story remains in sibling stories or a later release; this story does not absorb the full parent epic.\n- In this story, do not infer completion from UI presence, documents, or mocked fixtures when the acceptance criteria require runtime or human evidence.\n- Do not bypass Clark's event, permission, approval, provenance, or rollback contracts to make the happy path appear complete.\n- Full cross-story journey continuity is tested in TR plans and TF-006/TF-009/TF-015 where applicable, not repeated here.\n\n## Automation Notes\n\n- **Bucket allocation:** 0 Maestro · 3 Unit / Harness · 0 Code Review · 1 Analytics. The AC are backend/evidence predicates that can be proven without rendering, so Harness is the honest P0.\n- **Desktop UI executor:** implement product-team `Maestro` bucket cases with Playwright Electron under `clark-pro/apps/desktop/tests/e2e/`; retain product-team TC IDs and screenshot labels.\n- **Cheap journey-validating coverage:** TC-004-003-002 and TC-004-003-003 run in CI before any TF journey.\n- **Harness location:** add a focused `node:test` fixture beside clark-pro/mcp-conformance and clark-pro/services/harness; use recorded providers and debug read APIs, not production secrets.\n- **Selector strategy:** stable semantic roles/names first; `data-testid` only when role/name cannot distinguish exact-version state.\n- **Flakiness risks:** OS prompts, signing/notarization, real providers, process death, and media timing require isolated release lanes with recorded receipts.\n- **Automation priority:** Tier 1 = TC-004-003-001 and safety negative; Tier 2 = boundary/replay and analytics; Tier 3 = no source-only pass substitutes for a runtime/human AC.\n\n---\n"},{"rel":"epics/E-004-mcp-and-clark-bridge/T-004-004-external-client-examples-and-compatibility.md","content":"# Test Plan: External Client Examples and Compatibility\n\n**ID:** T-004-004\n**Project:** clark-pro\n**Story:** S-004-004\n**Epic:** E-004\n**Stage:** Refinement\n**Version:** 1.0\n**Created:** 2026-07-13\n**Updated:** 2026-07-13\n\n---\n\n## Scope\n\nVerify External Client Examples and Compatibility end-to-end against every acceptance criterion, its trust-preserving negative path, boundary/idempotency behavior, and the AE-004 product event. This plan does not infer story completion from a screen or document alone.\n\n## Prerequisites\n\n- A clean deterministic workspace fixture at the story’s required schema version.\n- Access to clark-pro/mcp-conformance and clark-pro/services/harness and the canonical event/projection/receipt inspection harness.\n- External systems use recorded or sandbox responses; no production mutation is required for routine CI.\n- UI bucket note: product-team labels visible journey cases `Maestro`; Clark’s desktop executor is Playwright Electr raw IDs, URLs, paths, account names, source/artifact/memory text, prompts, credentials, or free-form notes.\n\n**Notes**\n\n- Fire once after the stated canonical commit or completed inspection, not on button click, mount, retry, replay, or projection rebuild.\n- The event supports the epic metric by measuring the outcome boundary, not each implementation step.\n- Export remains local unless the user explicitly opts into the privacy-safe analytics sink.\n"},{"rel":"epics/E-005-governed-memory/E-005.md","content":"# Epic: Governed Creator Memory\n\n**ID:** E-005\n**Project:** clark-pro\n**Stage:** Ready\n**Version:** 1.0\n**Created:** 2026-07-13\n**Updated:** 2026-07-13\n**Sources:** [Authoritative epics](../../research/history/import-2026-07-13/product/03-epics-and-stories.md), [Whole-product roadmap](../../research/history/import-2026-07-13/roadmap.md)\n\n---\n\n## Outcome\n\nCreators can inspect, promote, retrieve, correct, dispute, expire, export, and forget scoped beliefs without silent learning or cross-workspace leakage.\n\n## Success Metric\n\n| Metric | Baseline | Target |\n|--------|----------|--------|\n| Forgotten or inactive memories returned by retrieval | 0 in the bounded retrieval suite | 0 |\n| Memory proposals accepted, edited, rejected, and corrected | Bounded workflow instrumented; no creator baseline | Establish representative baseline |\n\n## Primary Persona\n\nThe Trust-Conscious Operator\n\n## Dependencies\n\n- E-001 (Contracts and Product Proof)\n- E-002 (Native Studio and Durable Harness)\n\n## Stories\n\n| ID | Title | Status | Stage |\n|----|-------|--------|-------|\n| S-005-001 | Evidence-Bound Memory Promotion | Done | Ready |\n| S-005-002 | Scoped Retrieval, Correction, and Forgetting | Done | Ready |\n| S-005-003 | Semantic Retrieval and Reflection Lineage | Backlog | Ready |\n| S-005-004 | Physical Erasure and Memory Validation Corpus | Backlog | Ready |\n\n---\n"},{"rel":"epics/E-005-governed-memory/S-005-001-evidence-bound-memory-promotion.md","content":"# Story: Evidence-Bound Memory Promotion\n\n**ID:** S-005-001\n**Project:** clark-pro\n**Epic:** E-005\n**Stage:** Ready\n**Status:** Done\n**Priority:** P0\n**Version:** 1.0\n**Analytics:** AE-005\n**Created:** 2026-07-13\n**Updated:** 2026-07-13\n**Sources:** [Authoritative epics](../../research/history/import-2026-07-13/product/03-epics-and-stories.md), [Whole-product roadmap](../../research/history/import-2026-07-13/roadmap.md), [Harness evidence](../../research/history/import-2026-07-13/evidence/harness-latest-report.json)\n\n---\n\n## Story\n\nAs a **creator**, I want to **review a memory proposal with exact evidence, scope, confidence, sensitivity, and retrieval policy**, so that **only deliberate creator decisions can make a belief active**.\n\n## Goal\n\nDeliver the observable capability described above through Clark's canonical workspace, with enough evidence to determine whether it is complete.\n\n## Why / Rationale\n\nOnly deliberate creator decisions can make a belief active. This story is separated from adjacent work so the board can report verified progress without treating an incomplete product epic as finished.\n\n## Functional Requirements\n\n- Require exact same-workspace evidence and keep proposals excluded from retrieval until promotion.\n- Record revision-specific creator decisions and trusted retrieval ceilings.\n\n## Acceptance Criteria\n\n- [ ] Given a new memory proposal, when retrieval runs before promotion, then the proposal is absent.\n- [ ] Given the creator promotes the exact proposal revision, when retrieval policy permits it, then the active memory is returned with its evidence and decision lineage.\n\n## Negative Scenarios\n\n- A failed trust, evidence, compatibility, recovery, or policy check must leave the prior canonical state intact and expose a valid next action.\n\n## Future Scope\n\n- Broader capability beyond this verified slice remains in sibling stories and later releases.\n\n## Do Not Do\n\n- In this story, do not infer completion from UI presence, documents, or mocked fixtures when the acceptance criteria require runtime or human evidence.\n- Do not bypass Clark's event, permission, approval, provenance, or rollback contracts to make the happy path appear complete.\n\n---\n"},{"rel":"epics/E-005-governed-memory/S-005-002-scoped-retrieval-correction-and-forgetting.md","content":"# Story: Scoped Retrieval, Correction, and Forgetting\n\n**ID:** S-005-002\n**Project:** clark-pro\n**Epic:** E-005\n**Stage:** Ready\n**Status:** Done\n**Priority:** P0\n**Version:** 1.0\n**Analytics:** AE-005\n**Created:** 2026-07-13\n**Updated:** 2026-07-13\n**Sources:** [Authoritative epics](../../research/history/import-2026-07-13/product/03-epics-and-stories.md), [Whole-product roadmap](../../research/history/import-2026-07-13/roadmap.md), [Harness evidence](../../research/history/import-2026-07-13/evidence/harness-latest-report.json)\n\n---\n\n## Story\n\nAs a **creator**, I want to **retrieve memory by task policy and replace, dispute, or forget an active claim**, so that **the creator can correct Clark without hidden residual retrieval behavior**.\n\n## Goal\n\nDeliver the observable capability described above through Clark's canonical workspace, with enough evidence to determine whether it is complete.\n\n## Why / Rationale\n\nThe creator can correct Clark without hidden residual retrieval behavior. This story is separated from adjacent work so the board can report verified progress without treating an incomplete product epic as finished.\n\n## Functional Requirements\n\n- Enforce workspace/project scope, active state, expiry, sensitivity ceilings, and destination send policy.\n- Use append-only correction lineage and logical forgetting with projection redaction and derivative deletion.\n\n## Acceptance Criteria\n\n- [ ] Given an active claim is corrected, when the replacement is promoted, then the prior claim is disputed and excluded while lineage remains inspectable.\n- [ ] Given a memory is forgotten, when fresh or idempotently replayed retrieval runs, then the item is not returned and projected personal text is redacted.\n\n## Negative Scenarios\n\n- A failed trust, evidence, compatibility, recovery, or policy check must leave the prior canonical state intact and expose a valid next action.\n\n## Future Scope\n\n- Broader capability beyond this verified slice remains in sibling stories and later releases.\n\n## Do Not Do\n\n- In this story, do not infer completion from UI presence, documents, or mocked fixtures when the acceptance criteria require runtime or human evidence.\n- Do not bypass Clark's event, permission, approval, provenance, or rollback contracts to make the happy path appear complete.\n\n---\n"},{"rel":"epics/E-005-governed-memory/S-005-003-semantic-retrieval-and-reflection-lineage.md","content":"# Story: Semantic Retrieval and Reflection Lineage\n\n**ID:** S-005-003\n**Project:** clark-pro\n**Epic:** E-005\n**Stage:** Ready\n**Status:** Backlog\n**Priority:** P1\n**Phase:** P-002-03\n**Version:** 1.0\n**Analytics:** AE-005\n**Created:** 2026-07-13\n**Updated:** 2026-07-13\n**Sources:** [Authoritative epics](../../research/history/import-2026-07-13/product/03-epics-and-stories.md), [Whole-product roadmap](../../research/history/import-2026-07-13/roadmap.md)\n\n---\n\n## Story\n\nAs a **creator**, I want to **receive small evidence-linked memory proposals from completed trajectories and see when active memory influenced later artifacts**, so that **personalization compounds without turning noisy outcomes into opaque permanent beliefs**.\n\n## Goal\n\nDeliver the observable capability described above through Clark's canonical workspace, with enough evidence to determine whether it is complete.\n\n## Why / Rationale\n\nPersonalization compounds without turning noisy outcomes into opaque permanent beliefs. This story is separated from adjacent work so the board can report verified progress without treating an incomplete product epic as finished.\n\n## Functional Requirements\n\n- Add bounded semantic retrieval with leakage, poisoning, correction, and helpfulness evaluation.\n- Link reflection proposals and influenced artifacts to exact observations, decisions, and memory revisions.\n\n## Acceptance Criteria\n\n- [ ] Given a completed trajectory, when reflection runs, then it returns no change or a small scoped proposal with evidence and uncertainty.\n- [ ] Given an active memory influences a generated artifact, when the creator inspects provenance, then the exact memory revision and retrieval policy receipt are visible.\n\n## Negative Scenarios\n\n- A failed trust, evidence, compatibility, recovery, or policy check must leave the prior canonical state intact and expose a valid next action.\n\n## Future Scope\n\n- Scope not named in this story remains in sibling stories or a later release; this story does not absorb the full parent epic.\n\n## Do Not Do\n\n- In this story, do not infer completion from UI presence, documents, or mocked fixtures when the acceptance criteria require runtime or human evidence.\n- Do not bypass Clark's event, permission, approval, provenance, or rollback contracts to make the happy path appear complete.\n\n---\n"},{"rel":"epics/E-005-governed-memory/S-005-004-physical-erasure-and-memory-validation-corpus.md","content":"# Story: Physical Erasure and Memory Validation Corpus\n\n**ID:** S-005-004\n**Project:** clark-pro\n**Epic:** E-005\n**Stage:** Ready\n**Status:** Backlog\n**Priority:** P0\n**Phase:** P-002-03\n**Version:** 1.0\n**Created:** 2026-07-13\n**Updated:** 2026-07-13\n**Sources:** [Authoritative epics](../../research/history/import-2026-07-13/product/03-epics-and-stories.md), [Whole-product roadmap](../../research/history/import-2026-07-13/roadmap.md)\n\n---\n\n## Story\n\nAs a **workspace_admin**, I want to **prove deletion, backup retention, and retrieval behavior against a representative privacy corpus**, so that **forgetting claims match the physical data lifecycle and regulatory expectations**.\n\n## Goal\n\nDeliver the observable capability described above through Clark's canonical workspace, with enough evidence to determine whether it is complete.\n\n## Why / Rationale\n\nForgetting claims match the physical data lifecycle and regulatory expectations. This story is separated from adjacent work so the board can report verified progress without treating an incomplete product epic as finished.\n\n## Functional Requirements\n\n- Define cryptographic erasure or safe event-log compaction for personal payloads and derived indexes.\n- Maintain a corpus covering leakage, poisoning, expiry, correction, forget, backup, and restore behavior.\n\n## Acceptance Criteria\n\n- [ ] Given a creator completes physical erasure, when active storage, derivatives, exports, and defined backup-retention boundaries are inspected, then deleted payloads are absent or explicitly disclosed under the retention policy.\n- [ ] Given the memory corpus runs on a release candidate, when any leakage, correction, or forget case fails, then release signoff is blocked.\n\n## Negative Scenarios\n\n- A failed trust, evidence, compatibility, recovery, or policy check must leave the prior canonical state intact and expose a valid next action.\n\n## Future Scope\n\n- Scope not named in this story remains in sibling stories or a later release; this story does not absorb the full parent epic.\n\n## Do Not Do\n\n- In this story, do not infer completion from UI presence, documents, or mocked fixtures when the acceptance criteria require runtime or human evidence.\n- Do not bypass Clark's event, permission, approval, provenance, or rollback contracts to make the happy path appear complete.\n\n---\n"},{"rel":"epics/E-005-governed-memory/T-005-001-evidence-bound-memory-promotion.md","content":"# Test Plan: Evidence-Bound Memory Promotion\n\n**ID:** T-005-001\n**Project:** clark-pro\n**Story:** S-005-001\n**Epic:** E-005\n**Stage:** Refinement\n**Version:** 1.0\n**Created:** 2026-07-13\n**Updated:** 2026-07-13\n\n---\n\n## Scope\n\nVerify Evidence-Bound Memory Promotion end-to-end against every acceptance criterion, its trust-preserving negative path, boundary/idempotency behavior, and the AE-005 product event. This plan does not infer story completion from a screen or document alone.\n\n## Prerequisites\n\n- A clean deterministic workspace fixture at the story’s required schema version.\n- Access to clark-pro/services/harness memory repositories and fixtures and the canonical event/projection/receipt inspection harness.\n- External systems use recorded or sandbox responses; no production mutation is required for routine CI.\n- UI bucket note: product-team labels visible journey cases `Maestro`; Clark’s desktop executor is Playwright Electron with the same before/after evidence contract.\n\n## AC Coverage Map\n\n| AC | Test Cases | Bucket | Coverage |\n|----|-----------|--------|----------|\n| AC-001 | TC-005-001-001 (P0) | Maestro | ✓ |\n| AC-002 | TC-005-001-001 (P0), TC-005-001-002 | Maestro · Unit / Harness | ✓ |\n| AE-005 | TC-005-001-004 | Analytics | ✓ |\n\n**Bucket totals:** 1 Maestro · 2 Unit / Harness · 0 Code Review · 1 Analytics. The P0 uses the cheapest bucket that still proves the AC; data and failure predicates remain Harness cases.\n\n---\n\n## Core Test Flow\n\n### TC-005-001-001: Complete acceptance path for Evidence-Bound Memory Promotion\n\n**Type:** E2E\n**Priority:** P0\n**Automation:** Maestro\n**AC Covered:** AC-001, AC-002\n**Dependencies:** Story dependencies and parent release architecture gate must be satisfied\n\n**Captures:**\n| Label | Screen | State |\n|-------|--------|-------|\n| before | DS-memory-proposal | default |\n| after | DS-memory-proposal | verified |\n\n**Preconditions:**\n- A release-candidate Clark build is open on Overlay: Memory Proposal with the story’s required canonical fixture and permissions.\n- The tester can inspect Harness events/receipts after the UI journey.\n\n**Steps:**\n1. Establish: a new memory proposal.\n2. Perform: retrieval runs before promotion.\n3. Verify AC-001: the proposal is absent.\n4. Establish: the creator promotes the exact proposal revision.\n5. Perform: retrieval policy permits it.\n6. Verify AC-002: the active memory is returned with its evidence and decision lineage.\n7. Inspect the resulting canonical event, exact version, actor, permission/provenance receipt, and retained recovery state from Overlay: Memory Proposal.\n\n**Expected Result:**\n- AC-001: Given a new memory proposal, when retrieval runs before promotion, then the proposal is absent.\n- AC-002: Given the creator promotes the exact proposal revision, when retrieval policy permits it, then the active memory is returned with its evidence and decision lineage.\n- Canonical state and evidence match the exact tested revision; no hidden authority, duplicate mutation, or unsupported completion claim is introduced.\n\n**Failure Indicators:**\nAny AC outcome is absent, applies to a different version/actor/scope, bypasses a gate, duplicates state, loses lineage, or relies only on mocked/UI presence where runtime or human evidence is required.\n\n---\n\n## Sub Flows\n\n### TC-005-001-002: Failed gate preserves prior trusted state and exposes recovery\n\n**Type:** Negative\n**Priority:** P1\n**Automation:** Unit / Harness\n**AC Covered:** AC-002\n**Dependencies:** None\n\n**Setup:**\n- Seed one valid prior canonical state and record aggregate version, event count, active revision/authority, asset hashes, and projection snapshot.\n- Configure the relevant trust, evidence, compatibility, recovery, or policy check to fail deterministically.\n\n**Steps:**\n1. Invoke the story action against the failing gate.\n2. Assert no unauthorized provider, filesystem, credential, package, publication, memory, Skill, or canonical mutation occurs.\n3. Compare the post-run snapshot with the recorded trusted state.\n4. Assert a bounded failure receipt identifies the failed gate, owner, and valid retry/rollback/read-only next action.\n5. Restore the valid condition and prove the inverse path can proceed.\n\n**Expected Result:**\nA failed trust, evidence, compatibility, recovery, or policy check must leave the prior canonical state intact and expose a valid next action.\n\n**Failure Indicators:**\nPartial canonical write, lost prior revision, leaked secret/content, silent retry, vague error without next action, or a false “complete” state.\n\n### TC-005-001-003: Boundary, replay, and exact-version regression\n\n**Type:** Edge Case\n**Priority:** P2\n**Automation:** Unit / Harness\n**AC Covered:** AC-001, AC-002\n**Dependencies:** None\n\n**Setup:**\n- Use the smallest deterministic fixture that exercises Require exact same-workspace evidence and keep proposals excluded from retrieval until promotion. and Record revision-specific creator decisions and trusted retrieval ceilings..\n- Capture the input identity, schema/revision, actor/scope, event count, and expected output hash/receipt.\n\n**Steps:**\n1. Execute at the lower valid boundary and assert the documented result.\n2. Execute at the upper/expanded/expired/stale or incompatible boundary and assert fail-closed behavior.\n3. Replay the original command, intent, provider response, or recovery checkpoint.\n4. Assert exact-version binding, no duplicate mutation/cost, and deterministic projection state.\n5. Rebuild the relevant projection or reopen the app and confirm the same observable result.\n\n**Expected Result:**\nThe story remains deterministic across boundary input, replay, restart, and projection rebuild; permissions and approvals do not expand or transfer to another revision.\n\n**Failure Indicators:**\nOff-by-one acceptance, replay duplication, stale approval, permission expansion, nondeterministic projection, or output/receipt drift.\n\n### TC-005-001-004: Analytics — memory_proposal_decided fires with the documented shape\n\n**Type:** Analytics\n**Priority:** P1\n**Automation:** Analytics\n**AC Covered:** None (AE-005 coverage)\n**Dependencies:** None\n\n**AE reference:** AE-005 — `memory_proposal_decided`; properties: decision: \"promoted\" | \"edited\" | \"disputed\" | \"deferred\" | \"rejected\", sensitivity: \"standard\" | \"sensitive\" | \"never_remote\"; trigger: after a revision-specific memory decision commits.\n\n**Setup:**\n- A debug build with the local product-event projection queryable or a logged-event spy attached after canonical commit.\n\n**Steps:**\n1. Perform the action that reaches this trigger: after a revision-specific memory decision commits.\n2. Confirm `memory_proposal_decided` fires exactly once after the trigger, not on render, click intent, retry, replay, or projection rebuild.\n3. Confirm the payload carries only the documented bounded properties: decision: \"promoted\" | \"edited\" | \"disputed\" | \"deferred\" | \"rejected\", sensitivity: \"standard\" | \"sensitive\" | \"never_remote\".\n4. Exercise each documented enum/boolean path and confirm invalid or unbounded values are rejected.\n5. Confirm no PII, creative/source/memory text, prompt/completion, raw URL/path/name/account, UUID, credential reference, or token appears.\n\n**Expected Result:**\n`memory_proposal_decided` lands once in the local analytics projection with the exact privacy-safe shape. Remote export remains absent unless explicit opt-in is enabled.\n\n**Failure Indicators:**\nMissing, misnamed, early, double-fired, replay-fired, malformed, unbounded, or privacy-leaking event.\n\n---\n\n## Out of Scope\n\n- Broader capability beyond this verified slice remains in sibling stories and later releases.\n- In this story, do not infer completion from UI presence, documents, or mocked fixtures when the acceptance criteria require runtime or human evidence.\n- Do not bypass Clark's event, permission, approval, provenance, or rollback contracts to make the happy path appear complete.\n- Full cross-story journey continuity is tested in TR plans and TF-006/TF-009/TF-015 where applicable, not repeated here.\n\n## Automation Notes\n\n- **Bucket allocation:** 1 Maestro · 2 Unit / Harness · 0 Code Review · 1 Analytics. The visible exact-state journey stays in the UI bucket; failure and replay predicates run cheaply in Harness.\n- **Desktop UI executor:** implement product-team `Maestro` bucket cases with Playwright Electron under `clark-pro/apps/desktop/tests/e2e/`; retain product-team TC IDs and screenshot labels.\n- **Cheap journey-validating coverage:** TC-005-001-002 and TC-005-001-003 run in CI before any TF journey.\n- **Harness location:** add a focused `node:test` fixture beside clark-pro/services/harness memory repositories and fixtures; use recorded providers and debug read APIs, not production secrets.\n- **Selector strategy:** stable semantic roles/names first; `data-testid` only when role/name cannot distinguish exact-version state.\n- **Flakiness risks:** OS prompts, signing/notarization, real providers, process death, and media timing require isolated release lanes with recorded receipts.\n- **Automation priority:** Tier 1 = TC-005-001-001 and safety negative; Tier 2 = boundary/replay and analytics; Tier 3 = no source-only pass substitutes for a runtime/human AC.\n\n---\n"},{"rel":"epics/E-005-governed-memory/T-005-002-scoped-retrieval-correction-and-forgetting.md","content":"# Test Plan: Scoped Retrieval, Correction, and Forgetting\n\n**ID:** T-005-002\n**Project:** clark-pro\n**Story:** S-005-002\n**Epic:** E-005\n**Stage:** Refinement\n**Version:** 1.0\n**Created:** 2026-07-13\n**Updated:** 2026-07-13\n\n---\n\n## Scope\n\nVerify Scoped Retrieval, Correction, and Forgetting end-to-end against every acceptance criterion, its trust-preserving negative path, boundary/idempotency behavior, and the AE-005 product event. This plan does not infer story completion from a screen or document alone.\n\n## Prerequisites\n\n- A clean deterministic workspace fixture at the story’s required schema  without next action, or a false “complete” state.\n\n### TC-005-002-003: Boundary, replay, and exact-version regression\n\n**Type:** Edge Case\n**Priority:** P2\n**Automation:** Unit / Harness\n**AC Covered:** AC-001, AC-002\n**Dependencies:** None\n\n**Setup:**\n- Use the smallest deterministic fixture that exercises Enforce workspace/project scope, active state, expiry, sensitivity ceilings, and destination send policy. and Use append-only correction lineage and logical forgetting with projection redaction and derivative deletion..\n- Capture the input identity, schema/revision, actor/scope, event count, and expected output hash/receipt.\n\n**Steps:**\n1. Execute at the lower valid boundary and assert the documented result.\n2. Execute at the upper/expanded/expired/stale or incompatible boundary and assert fail-closed behavior.\n3. Replay the original command, intent, provider response, or recovery checkpoint.\n4. Assert exact-version binding, no duplicate mutation/cost, and deterministic projection state.\n5. Rebuild the relevant projection or reopen the app and confirm the same observable result.\n\n**Expected Result:**\nThe story remains deterministic across boundary input, replay, restart, and projection rebuild; permissions and approvals do not expand or transfer to another revision.\n\n**Failure Indicators:**\nOff-by-one acceptance, replay duplication, stale approval, permission expansion, nondeterministic projection, or output/receipt drift.\n\n### TC-005-002-004: Analytics — memory_forget_completed fires with the documented shape\n\n**Type:** Analytics\n**Priority:** P1\n**Automation:** Analytics\n**AC Covered:** None (AE-005 coverage)\n**Dependencies:** None\n\n**AE reference:** AE-005 — `memory_forget_completed`; properties: result: \"complete\" | \"partial_disclosed\" | \"failed\", backup_copy: \"none\" | \"retained_disclosed\"; trigger: after retrieval exclusion, projection redaction, and derivative deletion finish.\n\n**Setup:**\n- A debug build with the local product-event projection queryable or a logged-event spy attached after canonical commit.\n\n**Steps:**\n1. Perform the action that reaches this trigger: after retrieval exclusion, projection redaction, and derivative deletion finish.\n2. Confirm `memory_forget_completed` fires exactly once after the trigger, not on render, click intent, retry, replay, or projection rebuild.\n3. Confirm the payload carries only the documented bounded properties: result: \"complete\" | \"partial_disclosed\" | \"failed\", backup_copy: \"none\" | \"retained_disclosed\".\n4. Exercise each documented enum/boolean path and confirm invalid or unbounded values are rejected.\n5. Confirm no PII, creative/source/memory text, prompt/completion, raw URL/path/name/account, UUID, credential reference, or token appears.\n\n**Expected Result:**\n`memory_forget_completed` lands once in the local analytics projection with the exact privacy-safe shape. Remote export remains absent unless explicit opt-in is enabled.\n\n**Failure Indicators:**\nMissing, misnamed, early, double-fired, replay-fired, malformed, unbounded, or privacy-leaking event.\n\n---\n\n## Out of Scope\n\n- Broader capability beyond this verified slice remains in sibling stories and later releases.\n- In this story, do not infer completion from UI presence, documents, or mocked fixtures when the acceptance criteria require runtime or human evidence.\n- Do not bypass Clark's event, permission, approval, provenance, or rollback contracts to make the happy path appear complete.\n- Full cross-story journey continuity is tested in TR plans and TF-006/TF-009/TF-015 where applicable, not repeated here.\n\n## Automation Notes\n\n- **Bucket allocation:** 0 Maestro · 3 Unit / Harness · 0 Code Review · 1 Analytics. The AC are backend/evidence predicates that can be proven without rendering, so Harness is the honest P0.\n- **Desktop UI executor:** implement product-team `Maestro` bucket cases with Playwright Electron under `clark-pro/apps/desktop/tests/e2e/`; retain product-team TC IDs and screenshot labels.\n- **Cheap journey-validating coverage:** TC-005-002-002 and TC-005-002-003 run in CI before any TF journey.\n- **Harness location:** add a focused `node:test` fixture beside clark-pro/services/harness memory repositories and fixtures; use recorded providers and debug read APIs, not production secrets.\n- **Selector strategy:** stable semantic roles/names first; `data-testid` only when role/name cannot distinguish exact-version state.\n- **Flakiness risks:** OS prompts, signing/notarization, real providers, process death, and media timing require isolated release lanes with recorded receipts.\n- **Automation priority:** Tier 1 = TC-005-002-001 and safety negative; Tier 2 = boundary/replay and analytics; Tier 3 = no source-only pass substitutes for a runtime/human AC.\n\n---\n"},{"rel":"epics/E-005-governed-memory/T-005-003-semantic-retrieval-and-reflection-lineage.md","content":"# Test Plan: Semantic Retrieval and Reflection Lineage\n\n**ID:** T-005-003\n**Project:** clark-pro\n**Story:** S-005-003\n**Epic:** E-005\n**Stage:** Refinement\n**Version:** 1.0\n**Created:** 2026-07-13\n**Updated:** 2026-07-13\n\n---\n\n## Scope\n\nVerify Semantic Retrieval and Reflection Lineage end-to-end against every acceptance criterion, its trust-preserving negative path, boundary/idempotency behavior, and the AE-005 product event. This plan does not infer story completion from a screen or document alone.\n\n## Prerequisites\n\n- A clean deterministic workspace fixture at the story’s required schema version.\n- Access to clark-pro/services/harness memory repositories and fixtures and the canonical event/projection/receipt inspection harness.\n- External systems use recorded or sandbox responses; no production mutation is required for routine CI.\n- UI bucket note: product-team labels visible journey cases `Maestro`; Clark’s desktop executor is Playwright Electron with the same before/after evidence contract.\n\n## AC Coverage Map\n\n| AC | Test Cases | Bucket | Coverage |\n|----|-----------|--------|----------|\n| AC-001 | TC-005-003-001 (P0) | Maestro | ✓ |\n| AC-002 | TC-005-003-001 (P0), TC-005-003-002 | Maestro · Unit / Harness | ✓ |\n| AE-005 | TC-005-003-004 | Analytics | ✓ |\n\n**Bucket totals:** 1 Maestro · 2 Unit / Harness · 0 Code Review · 1 Analytics. The P0 uses the cheapest bucket that still proves the AC; data and failure predicates remain Harness cases.\n\n---\n\n## Core Test Flow\n\n### TC-005-003-001: Complete acceptance path for Semantic Retrieval and Reflection Lineage\n\n**Type:** E2E\n**Priority:** P0\n**Automation:** Maestro\n**AC Covered:** AC-001, AC-002\n**Dependencies:** Story dependencies and parent release architecture gate must be satisfied\n\n**Captures:**\n| Label | Screen | State |\n|-------|--------|-------|\n| before | DS-memory | default |\n| after | DS-memory | verified |\n\n**Preconditions:**\n- A release-candidate Clark build is open on Screen: Memory with the story’s required canonical fixture and permissions.\n- The tester can inspect Harness events/receipts after the UI journey.\n\n**Steps:**\n1. Establish: a completed trajectory.\n2. Perform: reflection runs.\n3. Verify AC-001: it returns no change or a small scoped proposal with evidence and uncertainty.\n4. Establish: an active memory influences a generated artifact.\n5. Perform: the creator inspects provenance.\n6. Verify AC-002: the exact memory revision and retrieval policy receipt are visible.\n7. Inspect the resulting canonical event, exact version, actor, permission/provenance receipt, and retained recovery state from Screen: Memory.\n\n**Expected Result:**\n- AC-001: Given a completed trajectory, when reflection runs, then it returns no change or a small scoped proposal with evidence and uncertainty.\n- AC-002: Given an active memory influences a generated artifact, when the creator inspects provenance, then the exact memory revision and retrieval policy receipt are visible.\n- Canonical state and evidence match the exact tested revision; no hidden authority, duplicate mutation, or unsupported completion claim is introduced.\n\n**Failure Indicators:**\nAny AC outcome is absent, applies to a different version/actor/scope, bypasses a gate, duplicates state, loses lineage, or relies only on mocked/UI presence where runtime or human evidence is required.\n\n---\n\n## Sub Flows\n\n### TC-005-003-002: Failed gate preserves prior trusted state and exposes recovery\n\n**Type:** Negative\n**Priority:** P1\n**Automation:** Unit / Harness\n**AC Covered:** AC-002\n**Dependencies:** None\n\n**Setup:**\n- Seed one valid prior canonical state and record aggregate version, event count, active revision/authority, asset hashes, and projection snapshot.\n- Configure the relevant trust, evidence, compatibility, recovery, or policy check to fail deterministically.\n\n**Steps:**\n1. Invoke the story action against the failing gate.\n2. Assert no unauthorized provider, filesystem, credential, package, publication, memory, Skill, or canonical mutation occurs.\n3. Compare the post-run snapshot with the recorded trusted state.\n4. Assert a bounded failure receipt identifies the failed gate, owner, and valid retry/rollback/read-only next action.\n5. Restore the valid condition and prove the inverse path can proceed.\n\n**Expected Result:**\nA failed trust, evidence, compatibility, recovery, or policy check must leave the prior canonical state intact and expose a valid next action.\n\n**Failure Indicators:**\nPartial canonical write, lost prior revision, leaked secret/content, silent retry, vague error without next action, or a false “complete” state.\n\n### TC-005-003-003: Boundary, replay, and exact-version regression\n\n**Type:** Edge Case\n**Priority:** P2\n**Automation:** Unit / Harness\n**AC Covered:** AC-001, AC-002\n**Dependencies:** None\n\n**Setup:**\n- Use the smallest deterministic fixture that exercises Add bounded semantic retrieval with leakage, intent, retry, replay, or projection rebuild.\n3. Confirm the payload carries only the documented bounded properties: memory_type: \"constitution\" | \"semantic\" | \"episode\" | \"performance\" | \"skill_context\", policy_result: \"included\" | \"excluded\".\n4. Exercise each documented enum/boolean path and confirm invalid or unbounded values are rejected.\n5. Confirm no PII, creative/source/memory text, prompt/completion, raw URL/path/name/account, UUID, credential reference, or token appears.\n\n**Expected Result:**\n`memory_influence_inspected` lands once in the local analytics projection with the exact privacy-safe shape. Remote export remains absent unless explicit opt-in is enabled.\n\n**Failure Indicators:**\nMissing, misnamed, early, double-fired, replay-fired, malformed, unbounded, or privacy-leaking event.\n\n---\n\n## Out of Scope\n\n- Scope not named in this story remains in sibling stories or a later release; this story does not absorb the full parent epic.\n- In this story, do not infer completion from UI presence, documents, or mocked fixtures when the acceptance criteria require runtime or human evidence.\n- Do not bypass Clark's event, permission, approval, provenance, or rollback contracts to make the happy path appear complete.\n- Full cross-story journey continuity is tested in TR plans and TF-006/TF-009/TF-015 where applicable, not repeated here.\n\n## Automation Notes\n\n- **Bucket allocation:** 1 Maestro · 2 Unit / Harness · 0 Code Review · 1 Analytics. The visible exact-state journey stays in the UI bucket; failure and replay predicates run cheaply in Harness.\n- **Desktop UI executor:** implement product-team `Maestro` bucket cases with Playwright Electron under `clark-pro/apps/desktop/tests/e2e/`; retain product-team TC IDs and screenshot labels.\n- **Cheap journey-validating coverage:** TC-005-003-002 and TC-005-003-003 run in CI before any TF journey.\n- **Harness location:** add a focused `node:test` fixture beside clark-pro/services/harness memory repositories and fixtures; use recorded providers and debug read APIs, not production secrets.\n- **Selector strategy:** stable semantic roles/names first; `data-testid` only when role/name cannot distinguish exact-version state.\n- **Flakiness risks:** OS prompts, signing/notarization, real providers, process death, and media timing require isolated release lanes with recorded receipts.\n- **Automation priority:** Tier 1 = TC-005-003-001 and safety negative; Tier 2 = boundary/replay and analytics; Tier 3 = no source-only pass substitutes for a runtime/human AC.\n\n---\n"},{"rel":"epics/E-005-governed-memory/T-005-004-physical-erasure-and-memory-validation-corpus.md","content":"# Test Plan: Physical Erasure and Memory Validation Corpus\n\n**ID:** T-005-004\n**Project:** clark-pro\n**Story:** S-005-004\n**Epic:** E-005\n**Stage:** Refinement\n**Version:** 1.0\n**Created:** 2026-07-13\n**Updated:** 2026-07-13\n\n---\n\n## Scope\n\nVerify Physical Erasure and Memory Validation Corpus end-to-end against every acceptance criterion, its trust-preserving negative path, boundary/idempotency behavior, and the canonical receipt/evidence contract. This plan does not infer story completion from a screen or document alone.\n\n## Prerequisites\n\n- A clean deterministic workspace fixture at the story’s required schema version.\n- Access to clark-pro/services/harness memory repositories and fixtures and the canonical event/projection/receipt inspection harness.\n- External systems use recorded or sandbox responses; no production mutation is required for routine CI.\n- UI bucket note: product-team labels visible journey cases `Maestro`; Clark’s desktop executor is Playwright Electron with the same before/after evidence contract.\n\n## AC Coverage Map\n\n| AC | Test Cases | Bucket | Coverage |\n|----|-----------|--------|----------|\n| AC-001 | TC-005-004-001 (P0) | Unit / Harness | ✓ |\n| AC-002 | TC-005-004-001 (P0), TC-005-004-002 | Unit / Harness · Unit / Harness |
