ss substitutes for a runtime/human AC.\n\n---\n"},{"rel":"epics/E-002-native-studio-and-durable-harness/T-002-004-keychain-signing-and-safe-updates.md","content":"# Test Plan: Keychain, Signing, and Safe Updates\n\n**ID:** T-002-004\n**Project:** clark-pro\n**Story:** S-002-004\n**Epic:** E-002\n**Stage:** Refinement\n**Version:** 1.0\n**Created:** 2026-07-13\n**Updated:** 2026-07-13\n\n---\n\n## Scope\n\nVerify Keychain, Signing, and Safe Updates end-to-end against every acceptance criterion, its trust-preserving negative path, boundary/idempotency behavior, and the AE-002 product event. This plan does not infer story completion from a screen or document alone.\n\n## Prerequisites\n\n- A clean deterministic workspace fixture at the story’s required schema version.\n- Access to clark-pro/apps/desktop and clark-pro/services/harness and the canonical event/projection/receipt inspection harness.\n- External systems use recorded or sandbox responses; no production mutation is required for routine CI.\n- UI bucket note: product-team labels visible journey cases `Maestro`; Clark’s desktop executor is Playwright Electron with the same before/after evidence contract.\n\n## AC Coverage Map\n\n| AC | Test Cases | Bucket | Coverage |\n|----|-----------|--------|----------|\n| AC-001 | TC-002-004-001 (P0) | Unit / Harness | ✓ |\n| AC-002 | TC-002-004-001 (P0), TC-002-004-002 | Unit / Harness · Unit / Harness | ✓ |\n| AE-002 | TC-002-004-004 | Analytics | ✓ |\n\n**Bucket totals:** 0 Maestro · 3 Unit / Harness · 0 Code Review · 1 Analytics. The P0 uses the cheapest bucket that still proves the AC; data and failure predicates remain Harness cases.\n\n---\n\n## Core Test Flow\n\n### TC-002-004-001: Complete acceptance path for Keychain, Signing, and Safe Updates\n\n**Type:** E2E\n**Priority:** P0\n**Automation:** Unit / Harness\n**AC Covered:** AC-001, AC-002\n**Dependencies:** Story dependencies and parent release architecture gate must be satisfied\n\n**Setup:**\n- Use the repository’s deterministic Node/Harness fixtures in clark-pro/apps/desktop and clark-pro/services/harness.\n- Reset canonical test state and record the starting event/projection/hash snapshot.\n- Stub external providers or use recorded conformance responses; no production credentials.\n\n**Steps:**\n1. Establish: a release candidate.\n2. Perform: strict code-sign and Gatekeeper checks run.\n3. Verify AC-001: the bundle passes with an attributable Team ID and notarization evidence.\n4. Establish: a credential is revoked.\n5. Perform: dependent work starts or resumes.\n6. Verify AC-002: Clark blocks it without exposing the stored secret.\n7. Re-run the same command or fixture identity and assert idempotent behavior with no duplicate mutation.\n\n**Expected Result:**\n- AC-001: Given a release candidate, when strict code-sign and Gatekeeper checks run, then the bundle passes with an attributable Team ID and notarization evidence.\n- AC-002: Given a credential is revoked, when dependent work starts or resumes, then Clark blocks it without exposing the stored secret.\n- Canonical state and evidence match the exact tested revision; no hidden authority, duplicate mutation, or unsupported completion claim is introduced.\n\n**Failure Indicators:**\nAny AC outcome is absent, applies to a different version/actor/scope, bypasses a gate, duplicates state, loses lineage, or relies only on mocked/UI presence where runtime or human evidence is required.\n\n---\n\n## Sub Flows\n\n### TC-002-004-002: Failed gate preserves prior trusted state and exposes recovery\n\n**Type:** Negative\n**Priority:** P1\n**Automation:** Unit / Harness\n**AC Covered:** AC-002\n**Dependencies:** None\n\n**Setup:**\n- Seed one valid prior canonical state and record aggregate version, event count, active revision/authority, asset hashes, and projection snapshot.\n- Configure the relevant trust, evidence, compatibility, recovery, or policy check to fail deterministically.\n\n**Steps:**\n1. Invoke the story action against the failing gate.\n2. Assert no unauthorized provider, filesystem, credential, package, publication, memory, Skill, or canonical mutation occurs.\n3. Compare the post-run snapshot with the recorded trusted state.\n4. Assert a bounded failure receipt identifies the failed gate, owner, and valid retry/rollback/read-only next action.\n5. Restore the valid condition and prove the inverse path can proceed.\n\n**Expected Result:**\nA failed trust, evidence, compatibility, recovery, or policy check must leave the prior canonical state intact and expose a valid next action.\n\n**Failure Indicators:**\nPartial canonical write, lost prior revision, leaked secret/content, silent retry, vague error without next action, or a false “complete” state.\n\n### TC-002-004-003: Boundary, replay, and exact-version regression\n\n**Type:** Edge Case\n**Priority:** P2\n**Automation:** Unit / Harness\n**AC Covered:** AC-001, AC-002\n**Dependencies:** None\n\n**Setup:**\n- Use the smallest deterministic fixture that exercises Broker credentials through macOS Keychain without returning token material to the renderer or event log. and Ship Developer ID signing, Hardened Runtime entitlements, notarization, stapling, Gatekeeper acceptance, and signed rollback-capable updates..\n- Capture the input identity, schema/revision, actor/scope, event count, and expected output hash/receipt.\n\n**Steps:**\n1. Execute at the lower valid boundary and assert the documented result.\n2. Execute at the upper/expanded/expired/stale or incompatible boundary and assert fail-closed behavior.\n3. Replay the original command, intent, provider response, or recovery checkpoint.\n4. Assert exact-version binding, no duplicate mutation/cost, and deterministic projection state.\n5. Rebuild the relevant projection or reopen the app and confirm the same observable result.\n\n**Expected Result:**\nThe story remains deterministic across boundary input, replay, restart, and projection rebuild; permissions and approvals do not expand or transfer to another revision.\n\n**Failure Indicators:**\nOff-by-one acceptance, replay duplication, stale approval, permission expansion, nondeterministic projection, or output/receipt drift.\n\n### TC-002-004-004: Analytics — release_trust_gate_completed fires with the documented shape\n\n**Type:** Analytics\n**Priority:** P1\n**Automation:** Analytics\n**AC Covered:** None (AE-002 coverage)\n**Dependencies:** None\n\n**AE reference:** AE-002 — `release_trust_gate_completed`; properties: gate: \"signing\" | \"notarization\" | \"gatekeeper\" | \"update\" | \"credential_revocation\", result: \"pass\" | \"fail\"; trigger: after signing, notarization, Gatekeeper, update, or credential-revocation evidence is recorded.\n\n**Setup:**\n- A debug build with the local product-event projection queryable or a logged-event spy attached after canonical commit.\n\n**Steps:**\n1. Perform the action that reaches this trigger: after signing, notarization, Gatekeeper, update, or credential-revocation evidence is recorded.\n2. Confirm `release_trust_gate_completed` fires exactly once after the trigger, not on render, click intent, retry, replay, or projection rebuild.\n3. Confirm the payload carries only the documented bounded properties: gate: \"signing\" | \"notarization\" | \"gatekeeper\" | \"update\" | \"credential_revocation\", result: \"pass\" | \"fail\".\n4. Exercise each documented enum/boolean path and confirm invalid or unbounded values are rejected.\n5. Confirm no PII, creative/source/memory text, prompt/completion, raw URL/path/name/account, UUID, credential reference, or token appears.\n\n**Expected Result:**\n`release_trust_gate_completed` lands once in the local analytics projection with the exact privacy-safe shape. Remote export remains absent unless explicit opt-in is enabled.\n\n**Failure Indicators:**\nMissing, misnamed, early, double-fired, replay-fired, malformed, unbounded, or privacy-leaking event.\n\n---\n\n## Out of Scope\n\n- Scope not named in this story remains in sibling stories or a later release; this story does not absorb the full parent epic.\n- In this story, do not infer completion from UI presence, documents, or mocked fixtures when the acceptance criteria require runtime or human evidence.\n- Do not bypass Clark's event, permission, approval, provenance, or rollback contracts to make the happy path appear complete.\n- Full cross-story journey continuity is tested in TR plans and TF-006/TF-009/TF-015 where applicable, not repeated here.\n\n## Automation Notes\n\n- **Bucket allocation:** 0 Maestro · 3 Unit / Harness · 0 Code Review · 1 Analytics. The AC are backend/evidence predicates that can be proven without rendering, so Harness is the honest P0.\n- **Desktop UI executor:** implement product-team `Maestro` bucket cases with Playwright Electron under `clark-pro/apps/desktop/tests/e2e/`; retain product-team TC IDs and screenshot labels.\n- **Cheap journey-validating coverage:** TC-002-004-002 and TC-002-004-003 run in CI before any TF journey.\n- **Harness location:** add a focused `node:test` fixture beside clark-pro/apps/desktop and clark-pro/services/harness; use recorded providers and debug read APIs, not production secrets.\n- **Selector strategy:** stable semantic roles/names first; `data-testid` only when role/name cannot distinguish exact-version state.\n- **Flakiness risks:** OS prompts, signing/notarization, real providers, process death, and media timing require isolated release lanes with recorded receipts.\n- **Automation priority:** Tier 1 = TC-002-004-001 and safety negative; Tier 2 = boundary/replay and analytics; Tier 3 = no source-only pass substitutes for a runtime/human AC.\n\n---\n"},{"rel":"epics/E-002-native-studio-and-durable-harness/T-002-005-accessibility-and-performance-release-evidence.md","content":"# Test Plan: Accessibility and Performance Release Evidence\n\n**ID:** T-002-005\n**Project:** clark-pro\n**Story:** S-002-005\n**Epic:** E-002\n**Stage:** Refinem ot with the recorded trusted state.\n4. Assert a bounded failure receipt identifies the failed gate, owner, and valid retry/rollback/read-only next action.\n5. Restore the valid condition and prove the inverse path can proceed.\n\n**Expected Result:**\nA failed trust, evidence, compatibility, recovery, or policy check must leave the prior canonical state intact and expose a valid next action.\n\n**Failure Indicators:**\nPartial canonical write, lost prior revision, leaked secret/content, silent retry, vague error without next action, or a false “complete” state.\n\n### TC-002-005-003: Boundary, replay, and exact-version regression\n\n**Type:** Edge Case\n**Priority:** P2\n**Automation:** Unit / Harness\n**AC Covered:** AC-001, AC-002\n**Dependencies:** None\n\n**Setup:**\n- Use the smallest deterministic fixture that exercises Run the committed VoiceOver and keyboard tasks with an accessibility expert. and Measure Focus and Canvas behavior with the 50-object fixture and retain attributable results..\n- Capture the input identity, schema/revision, actor/scope, event count, and expected output hash/receipt.\n\n**Steps:**\n1. Execute at the lower valid boundary and assert the documented result.\n2. Execute at the upper/expanded/expired/stale or incompatible boundary and assert fail-closed behavior.\n3. Replay the original command, intent, provider response, or recovery checkpoint.\n4. Assert exact-version binding, no duplicate mutation/cost, and deterministic projection state.\n5. Rebuild the relevant projection or reopen the app and confirm the same observable result.\n\n**Expected Result:**\nThe story remains deterministic across boundary input, replay, restart, and projection rebuild; permissions and approvals do not expand or transfer to another revision.\n\n**Failure Indicators:**\nOff-by-one acceptance, replay duplication, stale approval, permission expansion, nondeterministic projection, or output/receipt drift.\n\n---\n\n## Out of Scope\n\n- Scope not named in this story remains in sibling stories or a later release; this story does not absorb the full parent epic.\n- In this story, do not infer completion from UI presence, documents, or mocked fixtures when the acceptance criteria require runtime or human evidence.\n- Do not bypass Clark's event, permission, approval, provenance, or rollback contracts to make the happy path appear complete.\n- Full cross-story journey continuity is tested in TR plans and TF-006/TF-009/TF-015 where applicable, not repeated here.\n\n## Automation Notes\n\n- **Bucket allocation:** 1 Maestro · 2 Unit / Harness · 0 Code Review. The visible exact-state journey stays in the UI bucket; failure and replay predicates run cheaply in Harness.\n- **Desktop UI executor:** implement product-team `Maestro` bucket cases with Playwright Electron under `clark-pro/apps/desktop/tests/e2e/`; retain product-team TC IDs and screenshot labels.\n- **Cheap journey-validating coverage:** TC-002-005-002 and TC-002-005-003 run in CI before any TF journey.\n- **Harness location:** add a focused `node:test` fixture beside clark-pro/apps/desktop and clark-pro/services/harness; use recorded providers and debug read APIs, not production secrets.\n- **Selector strategy:** stable semantic roles/names first; `data-testid` only when role/name cannot distinguish exact-version state.\n- **Flakiness risks:** OS prompts, signing/notarization, real providers, process death, and media timing require isolated release lanes with recorded receipts.\n- **Automation priority:** Tier 1 = TC-002-005-001 and safety negative; Tier 2 = boundary/replay and analytics; Tier 3 = no source-only pass substitutes for a runtime/human AC.\n\n---\n"},{"rel":"epics/E-003-idea-foundry-and-creation-studio/AE-003.md","content":"# Analytics: E-003 — Idea Foundry and Creation Studio\n\n**ID:** AE-003\n**Project:** clark-pro\n**Epic:** E-003\n**Version:** 1.0\n**Updated:** 2026-07-13\n\n---\n\n**Success Metric (from epic):**\n\n| Approved artifacts judged publishable with normal editing | No representative weekly baseline yet | At least 80% in the Stratum 3 validation run |\n| Final factual assertions with a source or explicit creator assertion | Bounded thesis slice does not claim factual research | 100% in production creation loops |\n\n---\n\n## Events\n\n| Event | Story | Trigger | Key Properties |\n|-------|-------|---------|----------------|\n| `idea_revision_created` | S-003-001 | after the immutable revision and replacement run commit atomically | source: \"capture\" \\| \"canvas\" \\| \"review\", prior_authority_invalidated: boolean |\n| `artifact_version_approved` | S-003-005 | after an exact-version approval decision commits | artifact_class: \"text\" \\| \"image\" \\| \"audio\" \\| \"video\" \\| \"carousel\", gate_result: \"pass\" \\| \"blocked\", human_edit: boolean |\n| `creation_loop_completed` | S-003-004 | after all selected branches terminalize and accepted outputs are persisted | template: \"full_week\" \\| \"short_form\" \\| \"long_form\" \\| \"build_in_public\", outcome: \"completed\" \\| \"partial\" \\| \"failed\", media_included: boolean |\n\n**Property rules:** only the bounded enums/booleans above. User/time are implicit. No raw IDs, URLs, paths, account names, source/artifact/memory text, prompts, credentials, or free-form notes.\n\n**Notes**\n\n- Fire once after the stated canonical commit or completed inspection, not on button click, mount, retry, replay, or projection rebuild.\n- The event supports the epic metric by measuring the outcome boundary, not each implementation step.\n- Export remains local unless the user explicitly opts into the privacy-safe analytics sink.\n"},{"rel":"epics/E-003-idea-foundry-and-creation-studio/E-003.md","content":"# Epic: Idea Foundry and Creation Studio\n\n**ID:** E-003\n**Project:** clark-pro\n**Stage:** Ready\n**Version:** 1.0\n**Created:** 2026-07-13\n**Updated:** 2026-07-13\n**Sources:** [Authoritative epics](../../research/history/import-2026-07-13/product/03-epics-and-stories.md), [Whole-product roadmap](../../research/history/import-2026-07-13/roadmap.md)\n\n---\n\n## Outcome\n\nCreators can move from rough intent to evidence-linked, versioned, reviewable content while retaining alternatives, upstream lineage, and exact-version approval.\n\n## Success Metric\n\n| Metric | Baseline | Target |\n|--------|----------|--------|\n| Approved artifacts judged publishable with normal editing | No representative weekly baseline yet | At least 80% in the Stratum 3 validation run |\n| Final factual assertions with a source or explicit creator assertion | Bounded thesis slice does not claim factual research | 100% in production creation loops |\n\n## Primary Persona\n\nThe Operator-Creator\n\n## Dependencies\n\n- E-001 (Contracts and Product Proof)\n- E-002 (Native Studio and Durable Harness)\n\n## Stories\n\n| ID | Title | Status | Stage |\n|----|-------|--------|-------|\n| S-003-001 | Immutable Idea Capture and Revision Lineage | Done | Ready |\n| S-003-002 | Evidence-Honest Idea Inspection and Canvas | Done | Ready |\n| S-003-003 | Source Ingestion and Claim Ledger | Backlog | Ready |\n| S-003-004 | Writing, Media, and Platform Variants | Backlog | Ready |\n| S-003-005 | Version-Specific Review and Policy Gates | Backlog | Ready |\n\n---\n"},{"rel":"epics/E-003-idea-foundry-and-creation-studio/S-003-001-immutable-idea-capture-and-revision-lineage.md","content":"# Story: Immutable Idea Capture and Revision Lineage\n\n**ID:** S-003-001\n**Project:** clark-pro\n**Epic:** E-003\n**Stage:** Ready\n**Status:** Done\n**Priority:** P0\n**Version:** 1.0\n**Analytics:** AE-003\n**Created:** 2026-07-13\n**Updated:** 2026-07-13\n**Sources:** [Authoritative epics](../../research/history/import-2026-07-13/product/03-epics-and-stories.md), [Whole-product roadmap](../../research/history/import-2026-07-13/roadmap.md), [Harness evidence](../../research/history/import-2026-07-13/evidence/harness-latest-report.json)\n\n---\n\n## Story\n\nAs a **creator**, I want to **capture an idea and create explicit revisions with root and parent lineage**, so that **upstream decisions can change without rewriting history or preserving stale approval**.\n\n## Goal\n\nDeliver the observable capability described above through Clark's canonical workspace, with enough evidence to determine whether it is complete.\n\n## Why / Rationale\n\nUpstream decisions can change without rewriting history or preserving stale approval. This story is separated from adjacent work so the board can report verified progress without treating an incomplete product epic as finished.\n\n## Functional Requirements\n\n- Store each revision as an immutable artifact version with stable logical identity.\n- Atomically cancel superseded runs and invalidate pending exact-version approvals.\n\n## Acceptance Criteria\n\n- [ ] Given an approved or pending idea revision, when the creator requests a revision with a reason, then a new version and run are appended with root and parent lineage.\n- [ ] Given the prior revision had approval authority, when the new revision is created, then the old authority is invalidated and cannot complete the replacement artifact.\n\n## Negative Scenarios\n\n- A failed trust, evidence, compatibility, recovery, or policy check must leave the prior canonical state intact and expose a valid next action.\n\n## Future Scope\n\n- Broader capability beyond this verified slice remains in sibling stories and later releases.\n\n## Do Not Do\n\n- In this story, do not infer completion from UI presence, documents, or mocked fixtures when the acceptance criteria require runtime or human evidence.\n- Do not bypass Clark's event, permission, approval, provenance, or rollback contracts to make the happy path appear complete.\n\n---\n"},{"rel":"epics/E-003-idea-foundry-and-creation-studio/S-003-002-evidence-honest-idea-inspection-and-canvas.md","content":"# Story: Evidence-Honest Idea Inspection and Canvas\n\n**ID:** S-003-002\n**Project:** clark-pro\n**Epic:** E-003\n**Stage:** Ready\n**Status:** Done\n**Priority:** P0\n**Version:** 1.0\n**Created:** 2026-07-13\n**Updated:** 2026-07-13\n**Sources:** [Authoritative epics](../../research/history/import-2026-07-13/product/03-epics-and-stories.md), [Whole-product roadmap](../../research/history/import-2026-07-13/roadmap.md), [Desktop evidence](../../research/history/import-2026-07-13/evidence/desktop-latest-report.json)\n\n---\n\n## Story\n\nAs a **creator**, I want to **inspect thesis structure, open evidence gates, lineage, and the next creator decision in one Canvas**, so that **structural completeness is never confused with market validation or research proof**.\n\n## Goal\n\nDeliver the observable capability described above through Clark's canonical workspace, with enough evidence to determine whether it is complete.\n\n## Why / Rationale\n\nStructural completeness is never confused with market validation or research proof. This story is separated from adjacent work so the board can report verified progress without treating an incomplete product epic as finished.\n\n## Functional Requirements\n\n- Show ten thesis facets, structural completeness, evidence readiness, and five open observed-proof gates from canonical events.\n- Keep Canvas and Focus synchronized through the same projections and exact-version review state.\n\n## Acceptance Criteria\n\n- [ ] Given a structurally complete idea scores ten of ten, when no observed evidence exists, then the UI reports evidence required rather than validated.\n- [ ] Given a revision supersedes a prior run, when Canvas reloads, then lineage, stale authority, and the current review gate remain correct.\n\n## Negative Scenarios\n\n- A failed trust, evidence, compatibility, recovery, or policy check must leave the prior canonical state intact and expose a valid next action.\n\n## Future Scope\n\n- Broader capability beyond this verified slice remains in sibling stories and later releases.\n\n## Do Not Do\n\n- In this story, do not infer completion from UI presence, documents, or mocked fixtures when the acceptance criteria require runtime or human evidence.\n- Do not bypass Clark's event, permission, approval, provenance, or rollback contracts to make the happy path appear complete.\n\n---\n"},{"rel":"epics/E-003-idea-foundry-and-creation-studio/S-003-003-source-ingestion-and-claim-ledger.md","content":"# Story: Source Ingestion and Claim Ledger\n\n**ID:** S-003-003\n**Project:** clark-pro\n**Epic:** E-003\n**Stage:** Ready\n**Status:** Backlog\n**Priority:** P0\n**Phase:** P-002-03\n**Version:** 1.0\n**Created:** 2026-07-13\n**Updated:** 2026-07-13\n**Sources:** [Authoritative epics](../../research/history/import-2026-07-13/product/03-epics-and-stories.md), [Whole-product roadmap](../../research/history/import-2026-07-13/roadmap.md)\n\n---\n\n## Story\n\nAs a **creator**, I want to **bring text, URLs, documents, screenshots, audio, video, and files into a traceable claim workflow**, so that **final assertions retain original evidence and visible uncertainty**.\n\n## Goal\n\nDeliver the observable capability described above through Clark's canonical workspace, with enough evidence to determine whether it is complete.\n\n## Why / Rationale\n\nFinal assertions retain original evidence and visible uncertainty. This story is separated from adjacent work so the board can report verified progress without treating an incomplete product epic as finished.\n\n## Functional Requirements\n\n- Retain original bytes or text, source health, citations, claims, uncertainty, and creator assertions.\n- Support pin, dispute, replace, and saturation review without triggering paid work on capture.\n\n## Acceptance Criteria\n\n- [ ] Given a supported source is captured, when it enters a project, then its original content and provenance remain retrievable without starting research or generation.\n- [ ] Given a final factual assertion is reviewed, when no source or explicit creator assertion supports it, then approval is blocked with the missing evidence visible.\n\n## Negative Scenarios\n\n- A failed trust, evidence, compatibility, recovery, or policy check must leave the prior canonical state intact and expose a valid next action.\n\n## Future Scope\n\n- Scope not named in this story remains in sibling stories or a later release; this story does not absorb the full parent epic.\n\n## Do Not Do\n\n- In this story, do not infer completion from UI presence, documents, or mocked fixtures when the acceptance criteria require runtime or human evidence.\n- Do not bypass Clark's event, permission, approval, provenance, or rollback contracts to make the happy path appear complete.\n\n---\n"},{"rel":"epics/E-003-idea-foundry-and-creation-studio/S-003-004-writing-media-and-platform-variants.md","content":"# Story: Writing, Media, and Platform Variants\n\n**ID:** S-003-004\n**Project:** clark-pro\n**Epic:** E-003\n**Stage:** Ready\n**Status:** Backlog\n**Priority:** P1\n**Phase:** P-002-03\n**Version:** 1.0\n**Analytics:** AE-003\n**Created:** 2026-07-13\n**Updated:** 2026-07-13\n**Sources:** [Authoritative epics](../../research/history/import-2026-07-13/product/03-epics-and-stories.md), [Whole-product roadmap](../../research/history/import-2026-07-13/roadmap.md)\n\n---\n\n## Story\n\nAs a **creator**, I want to **produce scripts, long-form work, images, audio, video, reels, carousels, captions, and thumbnails from shared lineage**, so that **one intent can become a coordinated body of platform-ready work without flattening artifacts into text blobs**.\n\n## Goal\n\nDeliver the observable capability described above through Clark's canonical workspace, with enough evidence to determine whether it is complete.\n\n## Why / Rationale\n\nOne intent can become a coordinated body of platform-ready work without flattening artifacts into text blobs. This story is separated from adjacent work so the board can report verified progress without treating an incomplete product epic as finished.\n\n## Functional Requirements\n\n- Represent each output as a typed, versioned artifact with provider, cost, tool revision, and input lineage.\n- Reconnect asynchronous media jobs after restart and validate outputs with isolated media workers.\n\n## Acceptance Criteria\n\n- [ ] Given a reviewed angle, when text and media branches run, then each accepted artifact records its exact inputs, capability revision, cost, and technical metadata.\n- [ ] Given the app restarts during an asynchronous provider job, when it relaunches, then Clark reconnects by provider identity without duplicating the paid job.\n\n## Negative Scenarios\n\n- A failed trust, evidence, compatibility, recovery, or policy check must leave the prior canonical state intact and expose a valid next action.\n\n## Future Scope\n\n- Scope not named in this story remains in sibling stories or a later release; this story does not absorb the full parent epic.\n\n## Do Not Do\n\n- In this story, do not infer completion from UI presence, documents, or mocked fixtures when the acceptance criteria require runtime or human evidence.\n- Do not bypass Clark's event, permission, approval, provenance, or rollback contracts to make the happy path appear complete.\n\n---\n"},{"rel":"epics/E-003-idea-foundry-and-creation-studio/S-003-005-version-specific-review-and-policy-gates.md","content":"# Story: Version-Specific Review and Policy Gates\n\n**ID:** S-003-005\n**Project:** clark-pro\n**Epic:** E-003\n**Stage:** Ready\n**Status:** Backlog\n**Priority:** P0\n**Phase:** P-002-03\n**Version:** 1.0\n**Analytics:** AE-003\n**Created:** 2026-07-13\n**Updated:** 2026-07-13\n**Sources:** [Authoritative epics](../../research/history/import-2026-07-13/product/03-epics-and-stories.md), [Whole-product roadmap](../../research/history/import-2026-07-13/roadmap.md)\n\n---\n\n## Story\n\nAs a **reviewer**, I want to **compare versions and approve only the exact artifact that passed evidence, brand, budget, accessibility, disclosure, and confidentiality checks**, so that **no stale or invalid output can publish under a prior approval**.\n\n## Goal\n\nDeliver the observable capability described above through Clark's canonical workspace, with enough evidence to determine whether it is complete.\n\n## Why / Rationale\n\nNo stale or invalid output can publish under a prior approval. This story is separated from adjacent work so the board can report verified progress without treating an incomplete product epic as finished.\n\n## Functional Requirements\n\n- Render platform previews, text or media comparisons, evidence, costs, policy results, and decision alternatives.\n- Bind approvals to exact artifact versions and invalidate them when upstream lineage changes.\n\n## Acceptance Criteria\n\n- [ ] Given two artifact versions, when the reviewer selects one, then Clark records the chosen version, alternatives, actor, reason, and reversibility.\n- [ ] Given an approved artifact becomes stale or violates a required gate, when publication is attempted, then the prior approval cannot authorize the mutation.\n\n## Negative Scenarios\n\n- A failed trust, evidence, compatibility, recovery, or policy check must leave the prior canonical state intact and expose a valid next action.\n\n## Future Scope\n\n- Scope not named in this story remains in sibling stories or a later release; this story does not absorb the full parent epic.\n\n## Do Not Do\n\n- In this story, do not infer completion from UI presence, documents, or mocked fixtures when the acceptance criteria require runtime or human evidence.\n- Do not bypass Clark's event, permission, approval, provenance, or rollback contracts to make the happy path appear complete.\n\n---\n"},{"rel":"epics/E-003-idea-foundry-and-creation-studio/T-003-001-immutable-idea-capture-and-revision-lineage.md","content":"# Test Plan: Immutable Idea Capture and Revision Lineage\n\n**ID:** T-003-001\n**Project:** clark-pro\n**Story:** S-003-001\n**Epic:** E-003\n**Stage:** Refinement\n**Version:** 1.0\n**Created:** 2026-07-13\n**Updated:** 2026-07-13\n\n---\n\n## Scope\n\nVerify Immutable Idea Capture and Revision Lineage end-to-end against every acceptance criterion, its trust-preserving negative path, boundary/idempotency behavior, and the AE-003 product event. This plan does not infer story completion from a screen or document alone.\n\n## Prerequisites\n\n- A clean deterministic workspace fixture at the story’s required schema version.\n- Access to clark-pro/apps/desktop and clark-pro/services/harness and the canonical event/projection/receipt inspection harness.\n- External systems use recorded or sandbox responses; no production mutation is required for routine CI.\n- UI bucket note: product-team labels visible journey cases `Maestro`; Clark’s desktop executor is Playwright Electron with the same before/after evidence contract.\n\n## AC Coverage Map\n\n| AC | Test Cases | Bucket | Coverage |\n|----|-----------|--------|----------|\n| AC-001 | TC-003-001-001 (P0) | Maestro | ✓ |\n| AC-002 | TC-003-001-001 (P0), TC-003-001-002 | Maestro · Unit / Harness | ✓ |\n| AE-003 | TC-003-001-004 | Analytics | ✓ |\n\n**Bucket totals:** 1 Maestro · 2 Unit / Harness · 0 Code Review · 1 Analytics. The P0 uses the cheapest bucket that still proves the AC; data and failure predicates remain Harness cases.\n\n---\n\n## Core Test Flow\n\n### TC-003-001-001: Complete acceptance path for Immutable Idea Capture and Revision Lineage\n\n**Type:** E2E\n**Priority:** P0\n**Automation:** Maestro\n**AC Covered:** AC-001, AC-002\n**Dependencies:** Story dependencies and parent release architecture gate must be satisfied\n\n**Captures:**\n| Label | Screen | State |\n|-------|--------|-------|\n| before | DS-canvas | default |\n| after | DS-canvas | verified |\n\n**Preconditions:**\n- A release-candidate Clark build is open on Screen: Canvas with the story’s required canonical fixture and permissions.\n- The tester can inspect Harness events/receipts after the UI journey.\n\n**Steps:**\n1. Establish: an approved or pending idea revision.\n2. Perform: the creator requests a revision with a reason.\n3. Verify AC-001: a new version and run are appended with root and parent lineage.\n4. Establish: the prior revision had approval authority.\n5. Perform: the new revision is created.\n6. Verify AC-002: the old authority is invalidated and cannot complete the replacement artifact.\n7. Inspect the resulting canonical event, exact version, actor, permission/provenance receipt, and retained recovery state from Screen: Canvas.\n\n**Expected Result:**\n- AC-001: Given an approved or pending idea revision, when the creator requests a revision with a reason, then a new version and run are appended with root and parent lineage.\n- AC-002: Given the prior revision had approval authority, when the new revision is created, then the old authority is invalidated and cannot complete the replacement artifact.\n- Canonical state and evidence match the exact tested revision; no hidden authority, duplicate mutation, or unsupported completion claim is introduced.\n\n**Failure Indicators:**\nAny AC outcome is absent, applies to a different version/actor/scope, bypasses a gate, duplicates state, loses lineage, or relies only on mocked/UI presence where runtime or human evidence is required.\n\n---\n\n## Sub Flows\n\n### TC-003-001-002: Failed gate preserves prior trusted state and exposes recovery\n\n**Type:** Negative\n**Priority:** P1\n**Automation:** Unit / Harness\n**AC Covered:** AC-002\n**Dependencies:** None\n\n**Setup:**\n- Seed one valid prior canonical state and record aggregate version, event count, active revision/authority, asset hashes, and projection snapshot.\n- Configure the relevant trust, evidence, compatibility, recovery, or policy check to fail deterministically.\n\n**Steps:**\n1. Invoke the story action against the failing gate.\n2. Assert no unauthorized provider, filesystem, credential, package, publication, memory, Skill, or canonical mutation occurs.\n3. Compare the post-run snapshot with the recorded trusted state.\n4. Assert a bounded failure receipt identifies the failed gate, owner, and valid retry/rollback/read-only next action.\n5. Restore the valid condition and prove the inverse path can proceed.\n\n**Expected Result:**\nA failed trust, evidence, compatibility, recovery, or policy check must leave the prior canonical state intact and expose a valid next action.\n\n**Failure Indicators:**\nPartial canonical write, lost prior revision, leaked secret/content, silent retry, vague error without next action, or a false “complete” state.\n\n### TC-003-001-003: Boundary, replay, and exact-version regression\n\n**Type:** Edge Case\n**Priority:** P2\n**Automation:** Unit / Harness\n**AC Covered:** AC-001, AC-002\n**Dependencies:** None\n\n**Setup:**\n- Use the smallest deterministic fixture that exercises Store each revision as an immutable artifact version with stable logical identity. and Atomically cancel superseded runs and invalidate pending exact-version approvals..\n- Capture the input identity, schema/revision, actor/scope, event count, and expected output hash/receipt.\n\n**Steps:**\n1. Execute at the lower valid boundary and assert the documented result.\n2. Execute at the upper/expanded/expired/stale or incompatible boundary and assert fail-closed behavior.\n3. Replay the original command, intent, provider response, or recovery checkpoint.\n4. Assert exact-version binding, no duplicate mutation/cost, and deterministic projection state.\n5. Rebuild the relevant projection or reopen the app and confirm the same observable result.\n\n**Expected Result:**\nThe story remains deterministic across boundary input, replay, restart, and projection rebuild; permissions and approvals do not expand or transfer to another revision.\n\n**Failure Indicators:**\nOff-by-one acceptance, replay duplication, stale approval, permission expansion, nondeterministic projection, or output/receipt drift.\n\n### TC-003-001-004: Analytics — idea_revision_created fires with the documented shape\n\n**Type:** Analytics\n**Priority:** P1\n**Automation:** Analytics\n**AC Covered:** None (AE-003 coverage)\n**Dependencies:** None\n\n**AE reference:** AE-003 — `idea_revision_created`; properties: source: \"capture\" | \"canvas\" | \"review\", prior_authority_invalidated: boolean; trigger: after the immutable revision and replacement run commit atomically.\n\n**Setup:**\n- A debug build with the local product-event projection queryable or a logged-event spy attached after canonical commit.\n\n**Steps:**\n1. Perform the action that reaches this trigger: after the immutable revision and replacement run commit atomically.\n2. Confirm `idea_revision_created` fires exactly once after the trigger, not on render, click intent, retry, replay, or projection rebuild.\n3. Confirm the payload carries only the documented bounded properties: source: \"capture\" | \"canvas\" | \"review\", prior_authority_invalidated: boolean.\n4. Exercise each documented enum/boolean path and confirm invalid or unbounded values are rejected.\n5. Confirm no PII, creative/source/memory text, prompt/completion, raw URL/path/name/account, UUID, credential reference, or token appears.\n\n**Expected Result:**\n`idea_revision_created` lands once in the local analytics projection with the exact privacy-safe shape. Remote export remains absent unless explicit opt-in is enabled.\n\n**Failure Indicators:**\nMissing, misnamed, early, double-fired, replay-fired, malformed, unbounded, or privacy-leaking event.\n\n---\n\n## Out of Scope\n\n- Broader capability beyond this verified slice remains in sibling stories and later releases.\n- In this story, do not infer completion from UI presence, documents, or mocked fixtures when the acceptance criteria require runtime or human evidence.\n- Do not bypass Clark's event, permission, approval, provenance, or rollback contracts to make the happy path appear complete.\n- Full cross-story journey continuity is tested in TR plans and TF-006/TF-009/TF-015 where applicable, not repeated here.\n\n## Automation Notes\n\n- **Bucket allocation:** 1 Maestro · 2 Unit / Harness · 0 Code Review · 1 Analytics. The visible exact-state journey stays in the UI bucket; failure and replay predicates run cheaply in Harness.\n- **Desktop UI executor:** implement product-team `Maestro` bucket cases with Playwright Electron under `clark-pro/apps/desktop/tests/e2e/`; retain product-team TC IDs and screenshot labels.\n- **Cheap journey-validating coverage:** TC-003-001-002 and TC-003-001-003 run in CI before any TF journey.\n- **Harness location:** add a focused `node:test` fixture beside clark-pro/apps/desktop and clark-pro/services/harness; use recorded providers and debug read APIs, not production secrets.\n- **Selector strategy:** stable semantic roles/names first; `data-testid` only when role/name cannot distinguish exact-version state.\n- **Flakiness risks:** OS prompts, signing/notarization, real providers, process death, and media timing require isolated release lanes with recorded receipts.\n- **Automation priority:** Tier 1 = TC-003-001-001 and safety negative; Tier 2 = boundary/replay and analytics; Tier 3 = no source-only pass substitutes for a runtime/human AC.\n\n---\n"},{"rel":"epics/E-003-idea-foundry-and-creation-studio/T-003-002-evidence-honest-idea-inspection-and-canvas.md","content":"# Test Plan: Evidence-Honest Idea Inspection and Canvas\n\n**ID:** T-003-002\n**Project:** clark-pro\n**Story:** S-003-002\n**Epic:** E-003\n**Stage:** Refinement\n**Version:** 1.0\n**Created:** 2026-07-13\n**Updated:** 2026-07-13\n\n---\n\n## Scope\n\nVerify Evidence-Honest Idea Inspection and Canvas end-to-end against every acceptance criterion, its trust-preserving negative path, boundary/idempotency behavior, and the canonical receipt/evidence contract. This plan does not infer story completion from a screen or document alone.\n\n## Prerequisites\n\n- A c false “complete” state.\n\n### TC-003-003-003: Boundary, replay, and exact-version regression\n\n**Type:** Edge Case\n**Priority:** P2\n**Automation:** Unit / Harness\n**AC Covered:** AC-001, AC-002\n**Dependencies:** None\n\n**Setup:**\n- Use the smallest deterministic fixture that exercises Retain original bytes or text, source health, citations, claims, uncertainty, and creator assertions. and Support pin, dispute, replace, and saturation review without triggering paid work on capture..\n- Capture the input identity, schema/revision, actor/scope, event count, and expected output hash/receipt.\n\n**Steps:**\n1. Execute at the lower valid boundary and assert the documented result.\n2. Execute at the upper/expanded/expired/stale or incompatible boundary and assert fail-closed behavior.\n3. Replay the original command, intent, provider response, or recovery checkpoint.\n4. Assert exact-version binding, no duplicate mutation/cost, and deterministic projection state.\n5. Rebuild the relevant projection or reopen the app and confirm the same observable result.\n\n**Expected Result:**\nThe story remains deterministic across boundary input, replay, restart, and projection rebuild; permissions and approvals do not expand or transfer to another revision.\n\n**Failure Indicators:**\nOff-by-one acceptance, replay duplication, stale approval, permission expansion, nondeterministic projection, or output/receipt drift.\n\n---\n\n## Out of Scope\n\n- Scope not named in this story remains in sibling stories or a later release; this story does not absorb the full parent epic.\n- In this story, do not infer completion from UI presence, documents, or mocked fixtures when the acceptance criteria require runtime or human evidence.\n- Do not bypass Clark's event, permission, approval, provenance, or rollback contracts to make the happy path appear complete.\n- Full cross-story journey continuity is tested in TR plans and TF-006/TF-009/TF-015 where applicable, not repeated here.\n\n## Automation Notes\n\n- **Bucket allocation:** 1 Maestro · 2 Unit / Harness · 0 Code Review. The visible exact-state journey stays in the UI bucket; failure and replay predicates run cheaply in Harness.\n- **Desktop UI executor:** implement product-team `Maestro` bucket cases with Playwright Electron under `clark-pro/apps/desktop/tests/e2e/`; retain product-team TC IDs and screenshot labels.\n- **Cheap journey-validating coverage:** TC-003-003-002 and TC-003-003-003 run in CI before any TF journey.\n- **Harness location:** add a focused `node:test` fixture beside clark-pro/apps/desktop and clark-pro/services/harness; use recorded providers and debug read APIs, not production secrets.\n- **Selector strategy:** stable semantic roles/names first; `data-testid` only when role/name cannot distinguish exact-version state.\n- **Flakiness risks:** OS prompts, signing/notarization, real providers, process death, and media timing require isolated release lanes with recorded receipts.\n- **Automation priority:** Tier 1 = TC-003-003-001 and safety negative; Tier 2 = boundary/replay and analytics; Tier 3 = no source-only pass substitutes for a runtime/human AC.\n\n---\n"},{"rel":"epics/E-003-idea-foundry-and-creation-studio/T-003-004-writing-media-and-platform-variants.md","content":"# Test Plan: Writing, Media, and Platform Variants\n\n**ID:** T-003-004\n**Project:** clark-pro\n**Story:** S-003-004\n**Epic:** E-003\n**Stage:** Refinement\n**Version:** 1.0\n**Created:** 2026-07-13\n**Updated:** 2026-07-13\n\n---\n\n## Scope\n\nVerify Writing, Media, and Platform Variants end-to-end against every acceptance criterion, its trust-preserving negative path, boundary/idempotency behavior, and the AE-003 product event. This plan does not infer story completion from a screen or document alone.\n\n## Prerequisites\n\n- A clean deterministic workspace fixture at the story’s required schema version.\n- Access to clark-pro/apps/desktop and clark-pro/services/harness and the canonical event/proj ide clark-pro/apps/desktop and clark-pro/services/harness; use recorded providers and debug read APIs, not production secrets.\n- **Selector strategy:** stable semantic roles/names first; `data-testid` only when role/name cannot distinguish exact-version state.\n- **Flakiness risks:** OS prompts, signing/notarization, real providers, process death, and media timing require isolated release lanes with recorded receipts.\n- **Automation priority:** Tier 1 = TC-003-005-001 and safety negative; Tier 2 = boundary/replay and analytics; Tier 3 = no source-only pass substitutes for a runtime/human AC.\n\n---\n"},{"rel":"epics/E-004-mcp-and-clark-bridge/AE-004.md","content":"# Analytics: E-004 — MCP and Clark Bridge\n\n**ID:** AE-004\n**Project:** clark-pro\n**Epic:** E-004\n**Version:** 1.0\n**Updated:** 2026-07-13\n\n---\n\n**Success Metric (from epic):**\n\n| Hostile MCP conformance cases passing | 36 of 36 Ground cases pass | 100% for every supported transport and release |\n| Studio and Bridge state-equivalence scenarios passing | Bounded capture, revision, list, and get pass | 100% of exposed mutations |\n\n---\n\n## Events\n\n| Event | Story | Trigger | Key Properties |\n|-------|-------|---------|----------------|\n| `bridge_mutation_completed` | S-004-002 | after a scoped Bridge mutation commits through the canonical command layer | mutation: \"capture\" \\| \"revise\", result: \"completed\" \\| \"denied\", client_class: \"claude\" \\| \"codex\" \\| \"hermes\" \\| \"other\" |\n| `bridge_job_reconnected` | S-004-003 | after a client reconnect resolves the same durable intent to a job | task_mode: \"mcp_task\" \\| \"clark_receipt\", state: \"running\" \\| \"waiting_review\" \\| \"terminal\", duplicate_prevented: boolean |\n| `client_conformance_completed` | S-004-004 | after one public client fixture completes or fails conformance | client_class: \"claude\" \\| \"codex\" \\| \"hermes\" \\| \"other\", result: \"pass\" \\| \"fail\", task_mode: \"mcp_task\" \\| \"clark_receipt\" |\n\n**Property rules:** only the bounded enums/booleans above. User/time are implicit. No raw IDs, URLs, paths, account names, source/artifact/memory text, prompts, credentials, or free-form notes.\n\n**Notes**\n\n- Fire once after the stated canonical commit or completed inspection, not on button click, mount, retry, replay, or projection rebuild.\n- The event supports the epic metric by measuring the outcome boundary, not each implementation step.\n- Export remains local unless the user explicitly opts into the privacy-safe analytics sink.\n"},{"rel":"epics/E-004-mcp-and-clark-bridge/E-004.md","content":"# Epic: MCP and Clark Bridge\n\n**ID:** E-004\n**Project:** clark-pro\n**Stage:** Ready\n**Version:** 1.0\n**Created:** 2026-07-13\n**Updated:** 2026-07-13\n**Sources:** [Authoritative epics](../../research/history/import-2026-07-13/product/03-epics-and-stories.md), [Whole-product roadmap](../../research/history/import-2026-07-13/roadmap.md)\n\n---\n\n## Outcome\n\nConnected tools and external agents can use Clark through scoped, inspectable contracts while producing the same canonical state and policy decisions as Studio.\n\n## Success Metric\n\n| Metric | Baseline | Target |\n|--------|----------|--------|\n| Hostile MCP conformance cases passing | 36 of 36 Ground cases pass | 100% for every supported transport and release |\n| Studio and Bridge state-equivalence scenarios passing | Bounded capture, revision, list, and get pass | 100% of exposed mutations |\n\n## Primary Persona\n\nThe Integration Builder\n\n## Dependencies\n\n- E-001 (Contracts and Product Proof)\n- E-002 (Native Studio and Durable Harness)\n\n## Stories\n\n| ID | Title | Status | Stage |\n|----|-------|--------|-------|\n| S-004-001 | Governed Bundled MCP Capability | Done | Ready |\n| S-004-002 | Scoped Clark Bridge Core | Done | Ready |\n| S-004-003 | Durable Bridge Tasks and Client Pairing | Backlog | Ready |\n| S-004-004 | External Client Examples and Compatibility | Backlog | Ready |\n\n---\n"},{"rel":"epics/E-004-mcp-and-clark-bridge/S-004-001-governed-bundled-mcp-capability.md","content":"# Story: Governed Bundled MCP Capability\n\n**ID:** S-004-001\n**Project:** clark-pro\n**Epic:** E-004\n**Stage:** Ready\n**Status:** Done\n**Priority:** P0\n**Version:** 1.0\n**Created:** 2026-07-13\n**Updated:** 2026-07-13\n**Sources:** [Authoritative epics](../../research/history/import-2026-07-13/product/03-epics-and-stories.md), [Whole-product roadmap](../../research/history/import-2026-07-13/roadmap.md), [Harness evidence](../../research/history/import-2026-07-13/evidence/harness-latest-report.json)\n\n---\n\n## Story\n\nAs a **workspace_admin**, I want to **register and invoke a pinned MCP capability through exact schemas and short-lived permission leases**, so that **external tool results enter canonical state without inheriting ambient process authority**.\n\n## Goal\n\nDeliver the observable capability described above through Clark's canonical workspace, with enough evidence to determine whether it is complete.\n\n## Why / Rationale\n\nExternal tool results enter canonical state without inheriting ambient process authority. This story is separated from adjacent work so the board can report verified progress without treating an incomplete product epic as finished.\n\n## Functional Requirements\n\n- Pin the server source hash, tool inventory, schemas, environment profile, and structured result envelope.\n- Record permission, lease, invocation, health, and denial receipts in canonical events.\n\n## Acceptance Criteria\n\n- [ ] Given the bundled server starts, when discovery and invocation complete, then the exact two-tool inventory and schemas match the pinned capability contract.\n- [ ] Given source, schema, environment, or authority expands, when validation runs, then the invocation is denied before a lease or tool call is issued.\n\n## Negative Scenarios\n\n- A failed trust, evidence, compatibility, recovery, or policy check must leave the prior canonical state intact and expose a valid next action.\n\n## Future Scope\n\n- Broader capability beyond this verified slice remains in sibling stories and later releases.\n\n## Do Not Do\n\n- In this story, do not infer completion from UI presence, documents, or mocked fixtures when the acceptance criteria require runtime or human evidence.\n- Do not bypass Clark's event, permission, approval, provenance, or rollback contracts to make the happy path appear complete.\n\n---\n"},{"rel":"epics/E-004-mcp-and-clark-bridge/S-004-002-scoped-clark-bridge-core.md","content":"# Story: Scoped Clark Bridge Core\n\n**ID:** S-004-002\n**Project:** clark-pro\n**Epic:** E-004\n**Stage:** Ready\n**Status:** Done\n**Priority:** P0\n**Version:** 1.0\n**Analytics:** AE-004\n**Created:** 2026-07-13\n**Updated:** 2026-07-13\n**Sources:** [Authoritative epics](../../research/history/import-2026-07-13/product/03-epics-and-stories.md), [Whole-product roadmap](../../research/history/import-2026-07-13/roadmap.md), [Harness evidence](../../research/history/import-2026-07-13/evidence/harness-latest-report.json)\n\n---\n\n## Story\n\nAs a **external_agent**, I want to **capture, revise, list, and read ideas through an authenticated workspace-scoped Bridge**, so that **external agents can collaborate without creating a second state model or gaining approval authority**.\n\n## Goal\n\nDeliver the observable capability described above through Clark's canonical workspace, with enough evidence to determine whether it is complete.\n\n## Why / Rationale\n\nExternal agents can collaborate without creating a second state model or gaining approval authority. This story is separated from adjacent work so the board can report verified progress without treating an incomplete product epic as finished.\n\n## Functional Requirements\n\n- Bind Streamable HTTP to localhost with bearer material outside renderer and event state.\n- Route Bridge mutations through the same Harness commands as Studio and record client actor metadata.\n\n## Acceptance Criteria\n\n- [ ] Given a scoped Bridge client, when it captures or revises an idea, then Studio shows the same canonical lineage and policy state.\n- [ ] Given a missing bearer, hostile Origin or Host, oversized body, or cross-workspace request, when the request arrives, then it fails without leaking the credential.\n\n## Negative Scenarios\n\n- A failed trust, evidence, compatibility, recovery, or policy check must leave the prior canonical state intact and expose a valid next action.\n\n## Future Scope\n\n- Broader capability beyond this verified slice remains in sibling stories and later releases.\n\n## Do Not Do\n\n- In this story, do not infer completion from UI presence, documents, or mocked fixtures when the acceptance criteria require runtime or human evidence.\n- Do not bypass Clark's event, permission, approval, provenance, or rollback contracts to make the happy path appear complete.\n\n---\n"},{"rel":"epics/E-004-mcp-and-clark-bridge/S-004-003-durable-bridge-tasks-and-client-pairing.md","content":"# Story: Durable Bridge Tasks and Client Pairing\n\n**ID:** S-004-003\n**Project:** clark-pro\n**Epic:** E-004\n**Stage:** Ready\n**Status:** Backlog\n**Priority:** P0\n**Phase:** P-002-03\n**Version:** 1.0\n**Analytics:** AE-004\n**Created:** 2026-07-13\n**Updated:** 2026-07-13\n**Sources:** [Authoritative epics](../../research/history/import-2026-07-13/product/03-epics-and-stories.md), [Whole-product roadmap](../../research/history/import-2026-07-13/roadmap.md)\n\n---\n\n## Story\n\nAs a **external_agent**, I want to **start long-running Clark work, reconnect, observe status, cancel when allowed, and resume creator review**, so that **client disconnects or Mac restarts do not lose work or create ambiguous duplicate mutations**.\n\n## Goal\n\nDeliver the observable capability described above through Clark's canonical workspace, with enough evidence to determine whether it is complete.\n\n## Why / Rationale\n\nClient disconnects or Mac restarts do not lose work or create ambiguous duplicate mutations. This story is separated from adjacent work so the board can report verified progress without treating an incomplete product epic as finished.\n\n## Functional Requirements\n\n- Map negotiated MCP Tasks or Clark job receipts to durable Harness runs with explicit cancellation and reconciliation states.\n- Pair and revoke clients through a Keychain-backed, workspace-scoped flow.\n\n## Acceptance Criteria\n\n- [ ] Given a client disconnects after starting durable work, when it reconnects with the same intent identity, then it receives the existing job rather than creating a duplicate.\n- [ ] Given client access is revoked, when it attempts a new read or mutation, then Clark denies access immediately while the canonical job state remains intact.\n\n## Negative Scenarios\n\n- A failed trust, evidence, compatibility, recovery, or policy check must leave the prior canonical state intact and expose a valid next action.\n\n## Future Scope\n\n- Scope not named in this story remains in sibling stories or a later release; this story does not absorb the full parent epic.\n\n## Do Not Do\n\n- In this story, do not infer completion from UI presence, documents, or mocked fixtures when the acceptance criteria require runtime or human evidence.\n- Do not bypass Clark's event, permission, approval, provenance, or rollback contracts to make the happy path appear complete.\n\n---\n"},{"rel":"epics/E-004-mcp-and-clark-bridge/S-004-004-external-client-examples-and-compatibility.md","content":"# Story: External Client Examples and Compatibility\n\n**ID:** S-004-004\n**Project:** clark-pro\n**Epic:** E-004\n**Stage:** Ready\n**Status:** Backlog\n**Priority:** P1\n**Phase:** P-002-03\n**Version:** 1.0\n**Analytics:** AE-004\n**Created:** 2026-07-13\n**Updated:** 2026-07-13\n**Sources:** [Authoritative epics](../../research/history/import-2026-07-13/product/03-epics-and-stories.md), [Whole-product roadmap](../../research/history/import-2026-07-13/roadmap.md)\n\n---\n\n## Story\n\nAs a **external_agent**, I want to **connect Claude, Codex, Hermes, and another MCP client using documented scope and recovery patterns**, so that **builders can integrate with Clark without reverse-engineering private implementation details**.\n\n## Goal\n\nDeliver the observable capability described above through Clark's canonical workspace, with enough evidence to determine whether it is complete.\n\n## Why / Rationale\n\nBuilders can integrate with Clark without reverse-engineering private implementation details. This story is separated from adjacent work so the board can report verified progress without treating an incomplete product epic as finished.\n\n## Functional Requirements\n\n- Publish example registrations, tool/resource usage, task negotiation, reconnect, and revocation flows.\n- Maintain a versioned compatibility matrix and conformance fixtures for supported clients.\n\n## Acceptance Criteria\n\n- [ ] Given a documented client configuration, when the conformance example runs, then capture-to-review-to-result completes through supported public contracts.\n- [ ] Given a client lacks MCP Tasks, when it starts long work, then the documented Clark receipt fallback preserves status and reconnect behavior.\n\n## Negative Scenarios\n\n- A failed trust, evidence, compatibility, recovery, or policy check must leave the prior canonical state intact and expose a valid next action.\n\n## Future Scope\n\n- Scope not named in this story remains in sibling stories or a later release; this story does not absorb the full parent epic.\n\n## Do Not Do\n\n- In this story, do not infer completion from UI presence, documents, or mocked fixtures when the acceptance criteria require runtime or human evidence.\n- Do not bypass Clark's event, permission, approval, provenance, or rollback contracts to make the happy path appear complete.\n\n---\n"},{"rel":"epics/E-004-mcp-and-clark-bridge/T-004-001-governed-bundled-mcp-capability.md","content":"# Test Plan: Governed Bundled MCP Capability\n\n**ID:** T-004-001\n**Project:** clark-pro\n**Story:** S-004-001\n**Epic:** E-004\n**Stage:** Refinement\n**Version:** 1.0\n**Created:** 2026-07-13\n**Updated:** 2026-07-13\n\n---\n\n## Scope\n\nVerify Governed Bundled MCP Capability end-to-end against every acceptance criterion, its trust-preserving negative path, boundary/idempotency behavior, and the canonical receipt/evidence contract. This plan does not infer story completion from a screen or document alone.\n\n## Prerequisites\n\n- A clean deterministic workspace fixture at the story’s required schema version.\n- Access to clark-pro/mcp-conformance and clark-pro/services/harness and the canonical event/projection/receipt inspection harness.\n- External systems use recorded or sandbox responses; no production mutation is required for routine CI.\n- UI bucket note: product-team labels visible journey cases `Maestro`; Clark’s desktop executor is Playwright Electron with the same before/after evidence contract.\n\n## AC Coverage Map\n\n| AC | Test Cases | Bucket | Coverage |\n|----|-----------|--------|----------|\n| AC-001 | TC-004-001-001 (P0) | Unit / Harness | ✓ |\n| AC-002 | TC-004-001-001 (P0), TC-004-001-002 | Unit / Harness · Unit / Harness | ✓ |\n\n**Bucket totals:** 0 Maestro · 3 Unit / Harness · 0 Code Review. The P0 uses the cheapest bucket that still proves the AC; data and failure predicates remain Harness cases.\n\n---\n\n## Core Test Flow\n\n### TC-004-001-001: Complete acceptance path for Governed Bundled MCP Capability\n\n**Type:** E2E\n**Priority:** P0\n**Automation:** Unit / Harness\n**AC Covered:** AC-001, AC-002\n**Dependencies:** Story dependencies and parent release architecture gate must be satisfied\n\n**Setup:**\n- Use the repository’s deterministic Node/Harness fixtures in clark-pro/mcp-conformance and clark-pro/services/harness.\n- Reset canonical test state and record the starting event/projection/hash snapshot.\n- Stub external providers or use recorded conformance responses; no production credentials.\n\n**Steps:**\n1. Establish: the bundled server starts.\n2. Perform: discovery and invocation complete.\n3. Verify AC-001: the exact two-tool inventory and schemas match the pinned capability contract.\n4. Establish: source, schema, environment, or authority expands.\n5. Perform: validation runs.\n6. Verify AC-002: the invocation is denied before a lease or tool call is issued.\n7. Re-run the same command or fixture identity and assert idempotent behavior with no duplicate mutation.\n\n**Expected Result:**\n- AC-001: Given the bundled server starts, when discovery and invocation complete, then the exact two-tool inventory and schemas match the pinned capability contract.\n- AC-002: Given source, schema, environment, or authority expands, when validation runs, then the invocation is denied before a lease or tool call is issued.\n- Canonical state and evidence match the exact tested revision; no hidden authority, duplicate mutation, or unsupported completion claim is introduced.\n\n**Failure Indicators:**\nAny AC outcome is absent, applies to a different version/actor/scope, bypasses a gate, duplicates state, loses lineage, or relies only on mocked/UI presence where runtime or human evidence is required.\n\n---\n\n## Sub Flows\n\n### TC-004-001-002: Failed gate preserves prior trusted state and exposes recovery\n\n**Type:** Negative\n**Priority:** P1\n**Automation:** Unit / Harness\n**AC Covered:** AC-002\n**Dependencies:** None\n\n**Setup:**\n- Seed one valid prior canonical state and record aggregate version, event count, active revision/authority, asset hashes, and projection snapshot.\n- Configure the relevant trust, evidence, compatibility, recovery, or policy check to fail deterministically.\n\n**Steps:**\n1. Invoke the story action against the failing gate.\n2. Assert no unauthorized provider, filesystem, credential, package, publication, memory, Skill, or canonical mutation occurs.\n3. Compare the post-run snapshot with the recorded trusted state.\n4. Assert a bounded failure receipt identifies the failed gate, owner, and valid retry/rollback/read-only next action.\n5. Restore the valid condition and prove the inverse path can proceed.\n\n**Expected Result:**\nA failed trust, evidence, compatibility, recovery, or policy check must leave the prior canonical state intact and expose a valid next action.\n\n**Failure Indicators:**\nPartial canonical write, lost prior revision, leaked secret/content, silent retry, vague error without next action, or a false “complete” state.\n\n### TC-004-001-003: Boundary, replay, and exact-version regression\n\n**Type:** Edge Case\n**Priority:** P2\n**Automation:** Unit / Harness\n**AC Covered:** AC-001, AC-002\n**Dependencies:** None\n\n**Setup:**\n- Use the smallest deterministic fixture that exercises Pin the server source hash, tool inventory, schemas, environment profile, and structured result envelope. and Record permission, lease, invocation, health, and denial receipts in canonical events..\n- Capture the input identity, schema/revision, actor/scope, event count, and expected output hash/receipt.\n\n**Steps:**\n1. Execute at the lower valid boundary and assert the documented result.\n2. Execute at the upper/expanded/expired/stale or incompatible boundary and assert fail-closed behavior.\n3. Replay the original command, intent, provider response, or recovery checkpoint.\n4. Assert exact-version binding, no duplicate mutation/cost, and deterministic projection state.\n5. Rebuild the relevant projection or reopen the app and confirm the same observable result.\n\n**Expected Result:**\nThe story remains deterministic across boundary input, replay, restart, and projection rebuild; permissions and approvals do not expand or transfer to another revision.\n\n**Failure Indicators:**\nOff-by-one acceptance, replay duplication, stale approval, permission expansion, nondeterministic projection, or output/receipt drift.\n\n---\n\n## Out of Scope\n\n- Broader capability beyond this verified slice remains in sibling stories and later releases.\n- In this story, do not infer completion from UI presence, documents, or mocked fixtures when the acceptance criteria require runtime or human evidence.\n- Do not bypass Clark's event, permission, approval, provenance, or rollback contracts to make the happy path appear complete.\n- Full cross-story journey continuity is tested in TR plans and TF-006/TF-009/TF-015 where applicable, not repeated here.\n\n## Automation Notes\n\n- **Bucket allocation:** 0 Maestro · 3 Unit / Harness · 0 Code Review. The AC are backend/evidence predicates that can be proven without rendering, so Harness is the honest P0.\n- **Desktop UI executor:** implement product-team `Maestro` bucket cases with Playwright Electron under `clark-pro/apps/desktop/tests/e2e/`; retain product-team TC IDs and screenshot labels.\n- **Cheap journey-validating coverage:** TC-004-001-002 and TC-004-001-003 run in CI before any TF journey.\n- **Harness location:** add a focused `node:test` fixture beside clark-pro/mcp-conformance and clark-pro/services/harness; use recorded providers and debug read APIs, not production secrets.\n- **Selector strategy:** stable semantic roles/names first; `data-testid` only when role/name cannot distinguish exact-version state.\n- **Flakiness risks:** OS prompts, signing/notarization, real providers, process death, and media timing require isolated release lanes with recorded receipts.\n- **Automation priority:** Tier 1 = TC-004-001-001 and safety negative; Tier 2 = boundary/replay and analytics; Tier 3 = no source-only pass substitutes for a runtime/human AC.\n\n---\n"},{"rel":"epics/E-004-mcp-and-clark-bridge/T-004-002-scoped-clark-bridge-core.md","content":"# Test Plan: Scoped Clark Bridge Core\n\n**ID:** T-004-002\n**Project:** clark-pro\n**Story:** S-004-002\n**Epic:** E-004\n**Stage:** Refinement\n**Version:** 1.0\n**Created
