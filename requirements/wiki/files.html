** AC-001, AC-002\n**Dependencies:** Story dependencies and parent release architecture gate must be satisfied\n\n**Setup:**\n- Use the repository’s deterministic Node/Harness fixtures in clark-pro/packages/sync, clark-pro/services/worker, relay, and hosted fixtures.\n- Reset canonical test state and record the starting event/projection/hash snapshot.\n- Stub external providers or use recorded conformance responses; no production credentials.\n\n**Steps:**\n1. Establish: a production build.\n2. Perform: release checks run.\n3. Verify AC-001: signing, notarization, privacy, update, rollback, security, and incident-response evidence is attributable and passing.\n4. Establish: the hosted service is unavailable.\n5. Perform: a creator opens Clark.\n6. Verify AC-002: local workspace access and complete export remain usable without cross-tenant exposure.\n7. Re-run the same command or fixture identity and assert idempotent behavior with no duplicate mutation.\n\n**Expected Result:**\n- AC-001: Given a production build, when release checks run, then signing, notarization, privacy, update, rollback, security, and incident-response evidence is attributable and passing.\n- AC-002: Given the hosted service is unavailable, when a creator opens Clark, then local workspace access and complete export remain usable without cross-tenant exposure.\n- Canonical state and evidence match the exact tested revision; no hidden authority, duplicate mutation, or unsupported completion claim is introduced.\n\n**Failure Indicators:**\nAny AC outcome is absent, applies to a different version/actor/scope, bypasses a gate, duplicates state, loses lineage, or relies only on mocked/UI presence where runtime or human evidence is required.\n\n---\n\n## Sub Flows\n\n### TC-009-005-002: Failed gate preserves prior trusted state and exposes recovery\n\n**Type:** Negative\n**Priority:** P1\n**Automation:** Unit / Harness\n**AC Covered:** AC-002\n**Dependencies:** None\n\n**Setup:**\n- Seed one valid prior canonical state and record aggregate version, event count, active revision/authority, asset hashes, and projection snapshot.\n- Configure the relevant trust, evidence, compatibility, recovery, or policy check to fail deterministically.\n\n**Steps:**\n1. Invoke the story action against the failing gate.\n2. Assert no unauthorized provider, filesystem, credential, package, publication, memory, Skill, or canonical mutation occurs.\n3. Compare the post-run snapshot with the recorded trusted state.\n4. Assert a bounded failure receipt identifies the failed gate, owner, and valid retry/rollback/read-only next action.\n5. Restore the valid condition and prove the inverse path can proceed.\n\n**Expected Result:**\nA failed trust, evidence, compatibility, recovery, or policy check must leave the prior canonical state intact and expose a valid next action.\n\n**Failure Indicators:**\nPartial canonical write, lost prior revision, leaked secret/content, silent retry, vague error without next action, or a false “complete” state.\n\n### TC-009-005-003: Boundary, replay, and exact-version regression\n\n**Type:** Edge Case\n**Priority:** P2\n**Automation:** Unit / Harness\n**AC Covered:** AC-001, AC-002\n**Dependencies:** None\n\n**Setup:**\n- Use the smallest deterministic fixture that exercises Complete signing, notarization, privacy, vulnerability response, organization policy, billing, tenant isolation, reliability, and audit evidence. and Verify hosted outage behavior, local workspace access, complete export, and recovery..\n- Capture the input identity, schema/revision, actor/scope, event count, and expected output hash/receipt.\n\n**Steps:**\n1. Execute at the lower valid boundary and assert the documented result.\n2. Execute at the upper/expanded/expired/stale or incompatible boundary and assert fail-closed behavior.\n3. Replay the original command, intent, provider response, or recovery checkpoint.\n4. Assert exact-version binding, no duplicate mutation/cost, and deterministic projection state.\n5. Rebuild the relevant projection or reopen the app and confirm the same observable result.\n\n**Expected Result:**\nThe story remains deterministic across boundary input, replay, restart, and projection rebuild; permissions and approvals do not expand or transfer to another revision.\n\n**Failure Indicators:**\nOff-by-one acceptance, replay duplication, stale approval, permission expansion, nondeterministic projection, or output/receipt drift.\n\n### TC-009-005-004: Analytics — hosted_continuity_verified fires with the documented shape\n\n**Type:** Analytics\n**Priority:** P1\n**Automation:** Analytics\n**AC Covered:** None (AE-009 coverage)\n**Dependencies:** None\n\n**AE reference:** AE-009 — `hosted_continuity_verified`; properties: scenario: \"hosted_outage\" | \"tenant_isolation\" | \"local_export\" | \"rollback\", result: \"pass\" | \"fail\"; trigger: after hosted outage/tenant-isolation/release evidence is persisted.\n\n**Setup:**\n- A debug build with the local product-event projection queryable or a logged-event spy attached after canonical commit.\n\n**Steps:**\n1. Perform the action that reaches this trigger: after hosted outage/tenant-isolation/release evidence is persisted.\n2. Confirm `hosted_continuity_verified` fires exactly once after the trigger, not on render, click intent, retry, replay, or projection rebuild.\n3. Confirm the payload carries only the documented bounded properties: scenario: \"hosted_outage\" | \"tenant_isolation\" | \"local_export\" | \"rollback\", result: \"pass\" | \"fail\".\n4. Exercise each documented enum/boolean path and confirm invalid or unbounded values are rejected.\n5. Confirm no PII, creative/source/memory text, prompt/completion, raw URL/path/name/account, UUID, credential reference, or token appears.\n\n**Expected Result:**\n`hosted_continuity_verified` lands once in the local analytics projection with the exact privacy-safe shape. Remote export remains absent unless explicit opt-in is enabled.\n\n**Failure Indicators:**\nMissing, misnamed, early, double-fired, replay-fired, malformed, unbounded, or privacy-leaking event.\n\n---\n\n## Out of Scope\n\n- Scope not named in this story remains in sibling stories or a later release; this story does not absorb the full parent epic.\n- In this story, do not infer completion from UI presence, documents, or mocked fixtures when the acceptance criteria require runtime or human evidence.\n- Do not bypass Clark's event, permission, approval, provenance, or rollback contracts to make the happy path appear complete.\n- Full cross-story journey continuity is tested in TR plans and TF-006/TF-009/TF-015 where applicable, not repeated here.\n\n## Automation Notes\n\n- **Bucket allocation:** 0 Maestro · 3 Unit / Harness · 0 Code Review · 1 Analytics. The AC are backend/evidence predicates that can be proven without rendering, so Harness is the honest P0.\n- **Desktop UI executor:** implement product-team `Maestro` bucket cases with Playwright Electron under `clark-pro/apps/desktop/tests/e2e/`; retain product-team TC IDs and screenshot labels.\n- **Cheap journey-validating coverage:** TC-009-005-002 and TC-009-005-003 run in CI before any TF journey.\n- **Harness location:** add a focused `node:test` fixture beside clark-pro/packages/sync, clark-pro/services/worker, relay, and hosted fixtures; use recorded providers and debug read APIs, not production secrets.\n- **Selector strategy:** stable semantic roles/names first; `data-testid` only when role/name cannot distinguish exact-version state.\n- **Flakiness risks:** OS prompts, signing/notarization, real providers, process death, and media timing require isolated release lanes with recorded receipts.\n- **Automation priority:** Tier 1 = TC-009-005-001 and safety negative; Tier 2 = boundary/replay and analytics; Tier 3 = no source-only pass substitutes for a runtime/human AC.\n\n---\n"},{"rel":"flows/UF-001-install-and-establish-trust.md","content":"# User Flow: Install and establish trust\n\n**ID:** UF-001\n**Project:** clark-pro\n**Epic:** E-001, E-002, E-003\n**Stage:** Ready\n**Version:** 1.0\n**Created:** 2026-07-13\n**Updated:** 2026-07-13\n**Persona:** The Trust-Conscious Operator\n**Sources:** [Authoritative source flow](../../clark-pro/product/02-user-flows.md), [Product brief](../brief.md)\n\n---\n\n## Overview\n\nA creator establishes a trustworthy local workspace, confirms backup and credential boundaries, imports identity context, and reaches the first actionable Focus state without being forced to connect external services.\n\n## Entry Point\n\n- Launch a signed Clark Studio build for the first time or choose Import Workspace.\n\n## Stories Covered\n\n- S-001-002 — Ground Prototype and Evidence Ledger\n- S-002-003 — Workspace Portability and Backup Recovery\n- S-002-004 — Keychain, Signing, and Safe Updates\n- S-003-001 — Immutable Idea Capture and Revision Lineage\n\n## Flow\n\n```mermaid\nflowchart TD\n    Entry([\"Entry: Launch a signed Clark Studio build for the first time or choose Import Workspace.\"]) --> N_welcome_trust\n    N_welcome_trust[\"Screen: Welcome & Trust\"]\n    N_workspace_setup[\"Screen: Workspace Setup\"]\n    N_safe_recovery[\"Modal: Safe Recovery\"]\n    N_focus[\"Screen: Focus\"]\n    N_welcome_trust -->|\"Create or import\"| N_workspace_setup\n    N_workspace_setup -->|\"Required setup passes\"| N_focus\n    N_workspace_setup -->|\"Signature, migration, Keychain, or checksum fails\"| N_safe_recovery\n    N_safe_recovery -->|\"Retry or roll back\"| N_welcome_trust\n    N_focus --> Success([\"Exit: Focus opens on a verified local workspace with backup and provider state visible.\"])\n    N_welcome_trust -.->|\"Abandon safely\"| Exit([\"Exit: No unapproved mutation\"])\n```\n\n## Screens\n\n### Screen: Welcome & Trust\n\n- **Purpose:** Explain Clark’s local-first ownership and authority model before any setup choice.\n- **Key content:** Signed-build status, local ownership summary, optional remote-call disclosure, memory/credential/Skill/Tool Pack distinctions, diagnostics link, create/import choices.\n- **Primary action:** Choose Create workspace or Import workspace.\n- **Transitions:**\n  - Create workspace → Workspace Setup\n  - Import workspace → Workspace Setup after validation\n  - Unsupported or invalid build → Safe Recovery\n- **Stories:** S-001-002, S-002-003, S-002-004, S-003-001\n\n### Screen: Workspace Setup\n\n- **Purpose:** Create or import the canonical local workspace, backup destination, provider, and Brand Constitution.\n- **Key content:** Workspace identity, storage location, backup recipient, provider connection, Brand Constitution import, optional connector setup, guided template choice.\n- **Primary action:** Complete required local setup and continue to Focus.\n- **Transitions:**\n  - Valid setup → Focus\n  - Import or migration failure → Safe Recovery\n  - Skip optional connector → Focus\n- **Stories:** S-001-002, S-002-003, S-002-004, S-003-001\n\n### Modal: Safe Recovery\n\n- **Purpose:** Explain why setup or launch failed and protect the last trusted workspace state.\n- **Key content:** Failure class, affected operation, last trusted version, diagnostics preview, read-only option, retry, rollback.\n- **Primary action:** Choose retry, roll back, or open read-only.\n- **Transitions:**\n  - Retry → prior screen\n  - Rollback → Welcome & Trust or Recovery Summary\n  - Read-only → Focus with mutation controls disabled\n- **Stories:** S-001-002, S-002-003, S-002-004, S-003-001\n\n### Screen: Focus\n\n- **Purpose:** Present the next creator decision, required inputs, active gates, and resumable work without exposing the whole graph.\n- **Key content:** Inbox count, current project, next decision, run readiness, budget, selected accounts and Brand Constitution, recovery summary, recent activity.\n- **Primary action:** Make the next decision or open the relevant supporting surface.\n- **Transitions:**\n  - Open structure or lineage → Canvas\n  - Open exact-version decision → Review\n  - Approved work → Timeline\n  - Recovered work → remain in Focus with status\n- **Stories:** S-001-002, S-002-003, S-002-004, S-003-001\n\n## Exit Points\n\n- **Success:** Focus opens on a verified local workspace with backup and provider state visible.\n- **Abandon:** The creator can leave before the explicit decision; drafts and verified prior state remain available.\n- **Error:** No failed import or setup operation mutates the last trusted workspace; diagnostics and rollback remain available.\n\n---\n"},{"rel":"flows/UF-002-connect-a-capability.md","content":"# User Flow: Connect a capability\n\n**ID:** UF-002\n**Project:** clark-pro\n**Epic:** E-004, E-008\n**Stage:** Ready\n**Version:** 1.0\n**Created:** 2026-07-13\n**Updated:** 2026-07-13\n**Persona:** The Trust-Conscious Operator\n**Sources:** [Authoritative source flow](../../clark-pro/product/02-user-flows.md), [Product brief](../brief.md)\n\n---\n\n## Overview\n\nA workspace administrator reviews authority before authorizing a capability, keeps secrets behind the credential broker, validates health and schemas, and grants only explicit workspace/action scopes.\n\n## Entry Point\n\n- Connections → Add a connection or select an existing disconnected capability.\n\n## Stories Covered\n\n- S-004-001 — Governed Bundled MCP Capability\n- S-004-003 — Durable Bridge Tasks and Client Pairing\n- S-008-001 — Social Account and Credential Center\n\n## Flow\n\n```mermaid\nflowchart TD\n    Entry([\"Entry: Connections → Add a connection or select an existing disconnected capability.\"]) --> N_connections\n    N_connections[\"Screen: Connections\"]\n    N_capability_trust_review[\"Overlay: Capability Trust Review\"]\n    N_credential_authorization[\"Modal: Credential Authorization\"]\n    N_capability_health[\"Screen: Capability Health\"]\n    N_connections -->|\"Select capability\"| N_capability_trust_review\n    N_capability_trust_review -->|\"Trust gates pass\"| N_credential_authorization\n    N_credential_authorization -->|\"Authorization succeeds\"| N_capability_health\n    N_capability_health -->|\"Finish\"| N_connections\n    N_capability_trust_review -->|\"Deny or conformance fails\"| N_connections\n    N_capability_health --> Success([\"Exit: The capability is healthy, scoped, and available to dry-run planning with an attributable receipt.\"])\n    N_connections -.->|\"Abandon safely\"| Exit([\"Exit: No unapproved mutation\"])\n```\n\n## Screens\n\n### Screen: Connections\n\n- **Purpose:** Manage capabilities, social accounts, MCP clients, Tool Packs, Skills, and their effective workspace authority.\n- **Key content:** Source and trust filters, connection cards, health, scopes, trust states, affected schedules, revoke controls, developer mode.\n- **Primary action:** Select a connection or add a governed capability.\n- **Transitions:**\n  - Select capability → Capability Trust Review\n  - Select Tool Pack → Tool Pack Review\n  - Select Skill → Skill Review\n  - Register client → Client Pairing\n- **Stories:** S-004-001, S-004-003, S-008-001\n\n### Overlay: Capability Trust Review\n\n- **Purpose:** Review publisher identity, transport, scopes, egress, cost behavior, and conformance before granting authority.\n- **Key content:** Publisher, immutable revision, requested permissions, domains, credential scopes, discovery result, health, non-mutating conformance, workspace/action-class grants.\n- **Primary action:** Continue to authorization or deny the capability.\n- **Transitions:**\n  - Authorize → Credential Authorization\n  - Deny → Connections\n  - Conformance failure → remain open with no grant\n- **Stories:** S-004-001, S-004-003, S-008-001\n\n### Modal: Credential Authorization\n\n- **Purpose:** Collect OAuth or API-key authorization through the broker without exposing secret material to renderer state.\n- **Key content:** Provider identity, requested scopes, redirect status, Keychain destination, cancel action, privacy note.\n- **Primary action:** Authorize through the provider or cancel.\n- **Transitions:**\n  - Success → Capability Health\n  - Cancel or denial → Capability Trust Review\n  - Expired scope → remain with actionable error\n- **Stories:** S-004-001, S-004-003, S-008-001\n\n### Screen: Capability Health\n\n- **Purpose:** Confirm discovery, schema, health, scope, and dry-run readiness after connection.\n- **Key content:** Health summary, tool inventory, schema revisions, granted workspaces, action classes, latest conformance receipt, revoke and recheck actions.\n- **Primary action:** Finish or run a non-mutating recheck.\n- **Transitions:**\n  - Finish → Connections\n  - Recheck → remain\n  - Revoke → Connections\n- **Stories:** S-004-001, S-004-003, S-008-001\n\n## Exit Points\n\n- **Success:** The capability is healthy, scoped, and available to dry-run planning with an attributable receipt.\n- **Abandon:** The creator can leave before the explicit decision; drafts and verified prior state remain available.\n- **Error:** Invalid metadata, scope, schema, or credential leaves the capability without execution authority.\n\n---\n"},{"rel":"flows/UF-003-evaluate-and-install-a-tool-pack.md","content":"# User Flow: Evaluate and install a Tool Pack\n\n**ID:** UF-003\n**Project:** clark-pro\n**Epic:** E-006\n**Stage:** Ready\n**Version:** 1.0\n**Created:** 2026-07-13\n**Updated:** 2026-07-13\n**Persona:** The Trust-Conscious Operator\n**Sources:** [Authoritative source flow](../../clark-pro/product/02-user-flows.md), [Product brief](../brief.md)\n\n---\n\n## Overview\n\nA workspace administrator moves an external engine through immutable-source review, the interface ladder, quarantine, conformance, explicit activation, update, and rollback without treating a Git URL as a trusted plugin.\n\n## Entry Point\n\n- Connections → Tool Packs, then choose a candidate or provide an immutable repository/release.\n\n## Stories Covered\n\n- S-006-001 — Tool Pack Quarantine and Trust Gates\n- S-006-002 — Atomic Tool Pack Activation and Rollback\n- S-006-003 — OpenCut Candidate Blocked Upstream\n- S-006-004 — Real Third-Party Acquisition and Execution\n- S-006-005 — Clark Kit SDK and Community Compatibility\n\n## Flow\n\n```mermaid\nflowchart TD\n    Entry([\"Entry: Connections → Tool Packs, then choose a candidate or provide an immutable repository/release.\"]) --> N_tool_pack_library\n    N_tool_pack_library[\"Screen: Tool Pack Library\"]\n    N_tool_pack_review[\"Screen: Tool Pack Review\"]\n    N_activation_decision[\"Modal: Activation Decision\"]\n    N_connections[\"Screen: Connections\"]\n    N_tool_pack_library -->|\"Select candidate\"| N_tool_pack_review\n    N_tool_pack_review -->|\"Eligible and conformance passes\"| N_activation_decision\n    N_tool_pack_review -->|\"Stable interface or evidence missing\"| N_tool_pack_library\n    N_activation_decision -->|\"Activate or roll back\"| N_connections\n    N_activation_decision -->|\"Keep quarantined\"| N_tool_pack_review\n    N_connections --> Success([\"Exit: Only the exact verified adapter and capability revisions become active; a tested prior revision remains available.\"])\n    N_tool_pack_library -.->|\"Abandon safely\"| Exit([\"Exit: No unapproved mutation\"])\n```\n\n## Screens\n\n### Screen: Tool Pack Library\n\n- **Purpose:** Discover reuse-first integration candidates without implying that discovery equals installation or trust.\n- **Key content:** Bundled, verified, community, local, and blocked-upstream candidates; source revision; interface type; compatibility and risk summaries.\n- **Primary action:** Select a candidate for evidence review.\n- **Transitions:**\n  - Select candidate → Tool Pack Review\n  - Add repository or release → Tool Pack Review in discovered state\n- **Stories:** S-006-001, S-006-002, S-006-003, S-006-004, S-006-005\n\n### Screen: Tool Pack Review\n\n- **Purpose:** Inspect immutable source, legal, supply-chain, interface, permission, converter, UI, migration, and rollback evidence.\n- **Key content:** Revision/hash, license, SBOM, vulnerability/provenance, interface ladder, adapter/capability inventory, converters/loss, UI origins, tests, compatibility, migration, rollback.\n- **Primary action:** Acquire to quarantine or keep blocked.\n- **Transitions:**\n  - Eligible and acquire → Activation Decision after conformance\n  - Blocked evidence → remain blocked with zero authority\n  - Back → Tool Pack Library\n- **Stories:** S-006-001, S-006-002, S-006-003, S-006-004, S-006-005\n\n### Modal: Activation Decision\n\n- **Purpose:** Bind activation or rollback to an exact tested Tool Pack revision and explicit creator decision.\n- **Key content:** Revision diff, effective capabilities, workspace scope, permission/egress changes, migration preview, rollback target, evidence receipt.\n- **Primary action:** Activate, limit, reject, or roll back.\n- **Transitions:**\n  - Activate → Connections\n  - Limit → Tool Pack Review\n  - Reject → Tool Pack Review\n  - Rollback → Connections with prior revision\n- **Stories:** S-006-001, S-006-002, S-006-003, S-006-004, S-006-005\n\n### Screen: Connections\n\n- **Purpose:** Manage capabilities, social accounts, MCP clients, Tool Packs, Skills, and their effective workspace authority.\n- **Key content:** Source and trust filters, connection cards, health, scopes, trust states, affected schedules, revoke controls, developer mode.\n- **Primary action:** Select a connection or add a governed capability.\n- **Transitions:**\n  - Select capability → Capability Trust Review\n  - Select Tool Pack → Tool Pack Review\n  - Select Skill → Skill Review\n  - Register client → Client Pairing\n- **Stories:** S-006-001, S-006-002, S-006-003, S-006-004, S-006-005\n\n## Exit Points\n\n- **Success:** Only the exact verified adapter and capability revisions become active; a tested prior revision remains available.\n- **Abandon:** The creator can leave before the explicit decision; drafts and verified prior state remain available.\n- **Error:** Blocked or failed candidates retain zero adapter, capability, Skill, converter, UI, credential, filesystem, network, build, or execution authority.\n\n---\n"},{"rel":"flows/UF-004-install-an-agent-skill.md","content":"# User Flow: Install an Agent Skill\n\n**ID:** UF-004\n**Project:** clark-pro\n**Epic:** E-007\n**Stage:** Ready\n**Version:** 1.0\n**Created:** 2026-07-13\n**Updated:** 2026-07-13\n**Persona:** The Trust-Conscious Operator\n**Sources:** [Authoritative source flow](../../clark-pro/product/02-user-flows.md), [Product brief](../brief.md)\n\n---\n\n## Overview\n\nA workspace administrator validates exact Skill bytes, requested tools, compatibility, fixtures, and the effective permission intersection before promotion, while retaining an exact rollback revision.\n\n## Entry Point\n\n- Connections → Agent Skills, then select a package source or drop a Skill folder.\n\n## Stories Covered\n\n- S-007-001 — Bundled Class A Skill Trust Lifecycle\n- S-007-002 — Skill Update, Expansion Denial, and Rollback\n- S-007-003 — Run-Scoped Skill Invocation and Receipts\n- S-007-004 — Community Skills and Class B/C Sandbox\n\n## Flow\n\n```mermaid\nflowchart TD\n    Entry([\"Entry: Connections → Agent Skills, then select a package source or drop a Skill folder.\"]) --> N_skill_library\n    N_skill_library[\"Screen: Skill Library\"]\n    N_skill_review[\"Screen: Skill Review\"]\n    N_skill_revision_diff[\"Overlay: Skill Revision Diff\"]\n    N_skill_promotion[\"Modal: Skill Promotion\"]\n    N_skill_library -->|\"Select or add Skill\"| N_skill_review\n    N_skill_review -->|\"Review update\"| N_skill_revision_diff\n    N_skill_review -->|\"Review first promotion\"| N_skill_promotion\n    N_skill_revision_diff -->|\"Candidate is eligible\"| N_skill_promotion\n    N_skill_promotion -->|\"Promote or roll back\"| N_skill_library\n    N_skill_promotion -->|\"Reject\"| N_skill_review\n    N_skill_promotion --> Success([\"Exit: An exact Skill revision is promoted within a visible trust ceiling and becomes eligible only for separately approved runs.\"])\n    N_skill_library -.->|\"Abandon safely\"| Exit([\"Exit: No unapproved mutation\"])\n```\n\n## Screens\n\n### Screen: Skill Library\n\n- **Purpose:** Discover bundled and community procedures while preserving trust class, quarantine, and compatibility state.\n- **Key content:** Skill name, source identity, class, requested capabilities, compatibility, state, active revision, available update.\n- **Primary action:** Select a Skill for inspection.\n- **Transitions:**\n  - Select Skill → Skill Review\n  - Drop folder → Skill Review in quarantine\n- **Stories:** S-007-001, S-007-002, S-007-003, S-007-004\n\n### Screen: Skill Review\n\n- **Purpose:** Inspect exact Skill bytes, requested tools, effective permission intersection, compatibility, fixtures, and trust ceiling.\n- **Key content:** Source hash, files, hidden-executable scan, requested tools/domains, installed capabilities, effective permission intersection, fixture results, revision history.\n- **Primary action:** Open promotion decision or compare a revision.\n- **Transitions:**\n  - Promote or limit → Skill Promotion\n  - Compare update → Skill Revision Diff\n  - Reject → Skill Library\n- **Stories:** S-007-001, S-007-002, S-007-003, S-007-004\n\n### Overlay: Skill Revision Diff\n\n- **Purpose:** Compare procedure, tools, permissions, compatibility, fixtures, and recovery behavior between Skill revisions.\n- **Key content:** File diff, manifest diff, capability expansion, permission changes, fixture/regression results, compatibility, rollback target.\n- **Primary action:** Continue to promotion or keep the prior revision.\n- **Transitions:**\n  - Promote candidate → Skill Promotion\n  - Keep prior → Skill Review\n- **Stories:** S-007-001, S-007-002, S-007-003, S-007-004\n\n### Modal: Skill Promotion\n\n- **Purpose:** Record the explicit promotion, limitation, rejection, or rollback decision for an exact Skill revision.\n- **Key content:** Revision, trust class, capability ceiling, workspace scope, fixture summary, regression result, prior rollback revision.\n- **Primary action:** Promote within the shown ceiling, reject, or roll back.\n- **Transitions:**\n  - Promote → Skill Library\n  - Reject → Skill Review\n  - Rollback → Skill Library with prior revision\n- **Stories:** S-007-001, S-007-002, S-007-003, S-007-004\n\n## Exit Points\n\n- **Success:** An exact Skill revision is promoted within a visible trust ceiling and becomes eligible only for separately approved runs.\n- **Abandon:** The creator can leave before the explicit decision; drafts and verified prior state remain available.\n- **Error:** Invalid, incompatible, expanded, or hostile packages remain quarantined and cannot execute.\n\n---\n"},{"rel":"flows/UF-005-quick-capture.md","content":"# User Flow: Quick capture\n\n**ID:** UF-005\n**Project:** clark-pro\n**Epic:** E-003\n**Stage:** Ready\n**Version:** 1.0\n**Created:** 2026-07-13\n**Updated:** 2026-07-13\n**Persona:** The Operator-Creator\n**Sources:** [Authoritative source flow](../../clark-pro/product/02-user-flows.md), [Product brief](../brief.md)\n\n---\n\n## Overview\n\nA creator preserves an original source and enough intent to route it without automatically starting research, generation, or paid work.\n\n## Entry Point\n\n- Global shortcut, Share action, drag/drop, menu-bar command, or Studio Capture action.\n\n## Stories Covered\n\n- S-003-001 — Immutable Idea Capture and Revision Lineage\n- S-003-003 — Source Ingestion and Claim Ledger\n\n## Flow\n\n```mermaid\nflowchart TD\n    Entry([\"Entry: Global shortcut, Share action, drag/drop, menu-bar command, or Studio Capture action.\"]) --> N_quick_capture\n    N_quick_capture[\"Overlay: Quick Capture\"]\n    N_inbox[\"Screen: Inbox\"]\n    N_focus[\"Screen: Focus\"]\n    N_quick_capture -->|\"Save and classify\"| N_focus\n    N_quick_capture -->|\"Save without classification\"| N_inbox\n    N_inbox -->|\"Clarify intent\"| N_focus\n    N_focus --> Success([\"Exit: The immutable original and provenance are available in the selected project or Inbox.\"])\n    N_quick_capture -.->|\"Abandon safely\"| Exit([\"Exit: No unapproved mutation\"])\n```\n\n## Screens\n\n### Overlay: Quick Capture\n\n- **Purpose:** Capture text, URL, screenshot, file, selection, or voice without automatically starting paid research or generation.\n- **Key content:** Source preview, immutable-original notice, workspace/project suggestion, intent note, Inbox option.\n- **Primary action:** Save the original and classification choice.\n- **Transitions:**\n  - Save and classify → Focus\n  - Save to Inbox → Inbox\n  - Cancel → prior application\n- **Stories:** S-003-001, S-003-003\n\n### Screen: Inbox\n\n- **Purpose:** Hold captured originals that need project or intent clarification without losing provenance.\n- **Key content:** Captured item list, source type, captured time, workspace/project suggestion, missing-intent prompts, archive action.\n- **Primary action:** Classify an item or open it in Focus.\n- **Transitions:**\n  - Classify → Focus\n  - Open source → source preview\n  - Archive → remain\n- **Stories:** S-003-001, S-003-003\n\n### Screen: Focus\n\n- **Purpose:** Present the next creator decision, required inputs, active gates, and resumable work without exposing the whole graph.\n- **Key content:** Inbox count, current project, next decision, run readiness, budget, selected accounts and Brand Constitution, recovery summary, recent activity.\n- **Primary action:** Make the next decision or open the relevant supporting surface.\n- **Transitions:**\n  - Open structure or lineage → Canvas\n  - Open exact-version decision → Review\n  - Approved work → Timeline\n  - Recovered work → remain in Focus with status\n- **Stories:** S-003-001, S-003-003\n\n## Exit Points\n\n- **Success:** The immutable original and provenance are available in the selected project or Inbox.\n- **Abandon:** The creator can leave before the explicit decision; drafts and verified prior state remain available.\n- **Error:** A failed append leaves no partial canonical record and offers a retry with the source still available.\n\n---\n"},{"rel":"flows/UF-006-run-the-full-week-loop.md","content":"# User Flow: Run the Full-Week loop\n\n**ID:** UF-006\n**Project:** clark-pro\n**Epic:** E-003, E-005, E-006, E-007, E-008, E-009\n**Stage:** Ready\n**Version:** 1.0\n**Created:** 2026-07-13\n**Updated:** 2026-07-13\n**Persona:** The Operator-Creator\n**Sources:** [Authoritative source flow](../../clark-pro/product/02-user-flows.md), [Product brief](../brief.md)\n\n---\n\n## Overview\n\nThe primary Clark journey moves from inputs and a dry-run plan through evidence, angle choice, bounded parallel creation, exact-version review, and scheduling while preserving memory, Skill, Tool Pack, permission, budget, and lineage receipts.\n\n## Entry Point\n\n- Focus → open a project and choose the Full Week template.\n\n## Stories Covered\n\n- S-003-003 — Source Ingestion and Claim Ledger\n- S-003-004 — Writing, Media, and Platform Variants\n- S-003-005 — Version-Specific Review and Policy Gates\n- S-005-003 — Semantic Retrieval and Reflection Lineage\n- S-006-004 — Real Third-Party Acquisition and Execution\n- S-007-003 — Run-Scoped Skill Invocation and Receipts\n- S-008-002 — Postiz Scheduling and Publication Ledger\n- S-009-004 — Four-Week Whole-Product Proof\n\n## Flow\n\n```mermaid\nflowchart TD\n    Entry([\"Entry: Focus → open a project and choose the Full Week template.\"]) --> N_focus\n    N_focus[\"Screen: Focus\"]\n    N_run_approval[\"Modal: Run Approval\"]\n    N_canvas[\"Screen: Canvas\"]\n    N_review[\"Screen: Review\"]\n    N_timeline[\"Screen: Timeline\"]\n    N_focus -->|\"Check readiness\"| N_run_approval\n    N_run_approval -->|\"Approve exact plan\"| N_canvas\n    N_canvas -->|\"Angle or evidence gate ready\"| N_focus\n    N_focus -->|\"Choose angle and continue\"| N_canvas\n    N_canvas -->|\"Artifacts reach review gate\"| N_review\n    N_review -->|\"Approve exact versions\"| N_timeline\n    N_review -->|\"Request targeted change\"| N_canvas\n    N_timeline --> Success([\"Exit: Approved, lineage-complete artifacts reach Timeline with every external mutation still gated.\"])\n    N_focus -.->|\"Abandon safely\"| Exit([\"Exit: No unapproved mutation\"])\n```\n\n## Screens\n\n### Screen: Focus\n\n- **Purpose:** Present the next creator decision, required inputs, active gates, and resumable work without exposing the whole graph.\n- **Key content:** Inbox count, current project, next decision, run readiness, budget, selected accounts and Brand Constitution, recovery summary, recent activity.\n- **Primary action:** Make the next decision or open the relevant supporting surface.\n- **Transitions:**\n  - Open structure or lineage → Canvas\n  - Open exact-version decision → Review\n  - Approved work → Timeline\n  - Recovered work → remain in Focus with status\n- **Stories:** S-003-003, S-003-004, S-003-005, S-005-003, S-006-004, S-007-003, S-008-002, S-009-004\n\n### Modal: Run Approval\n\n- **Purpose:** Show the compiled run plan, permissions, paid calls, selected revisions, budget, and review gates before execution.\n- **Key content:** Plan hash, inputs, capability and Skill revisions, permission leases, predicted cost/range, checkpoints, approval gates, remote eligibility.\n- **Primary action:** Approve this exact plan, edit inputs, or cancel.\n- **Transitions:**\n  - Approve → Focus then Canvas as run starts\n  - Edit → Focus\n  - Cancel → Focus\n- **Stories:** S-003-003, S-003-004, S-003-005, S-005-003, S-006-004, S-007-003, S-008-002, S-009-004\n\n### Screen: Canvas\n\n- **Purpose:** Expose the typed creative graph, lineage, evidence gaps, decisions, branches, staleness, and run state as an inspectable projection.\n- **Key content:** Lanes, typed nodes, edges, selected-node inspector, evidence readiness, lineage, stale markers, branch controls, keyboard help.\n- **Primary action:** Inspect or change an upstream decision and preview consequences.\n- **Transitions:**\n  - Open review gate → Review\n  - Change decision → Impact Preview\n  - Return to next decision → Focus\n- **Stories:** S-003-003, S-003-004, S-003-005, S-005-003, S-006-004, S-007-003, S-008-002, S-009-004\n\n### Screen: Review\n\n- **Purpose:** Compare exact artifact versions with evidence, policy, cost, lineage, and creator decisions before mutation.\n- **Key content:** Review queue, paired text diff or synchronized media, sources, model/provider, Skill and memory revisions, policies, annotations, cost, approval status.\n- **Primary action:** Select, edit, reject, or request targeted changes.\n- **Transitions:**\n  - Compare versions → Version Comparison\n  - Decide → Approval Decision\n  - Approved for distribution → Timeline\n  - Inspect lineage → Canvas\n- **Stories:** S-003-003, S-003-004, S-003-005, S-005-003, S-006-004, S-007-003, S-008-002, S-009-004\n\n### Screen: Timeline\n\n- **Purpose:** Coordinate approved artifacts, account requirements, schedules, submission, verification, and reconciliation states.\n- **Key content:** Calendar/list modes, artifact and account, approval state, platform requirements, scheduled time, publication state, receipts, affected-account warnings.\n- **Primary action:** Schedule, publish now, reschedule, reconcile, cancel, or export.\n- **Transitions:**\n  - Schedule or publish → Publication Approval\n  - Ambiguous state → Reconciliation\n  - Unavailable connector → Export Package\n  - Open artifact → Review\n- **Stories:** S-003-003, S-003-004, S-003-005, S-005-003, S-006-004, S-007-003, S-008-002, S-009-004\n\n## Exit Points\n\n- **Success:** Approved, lineage-complete artifacts reach Timeline with every external mutation still gated.\n- **Abandon:** The creator can leave before the explicit decision; drafts and verified prior state remain available.\n- **Error:** A failed branch pauses or reconciles without erasing reusable work, approval context, or the creator’s ability to change capabilities.\n\n---\n"},{"rel":"flows/UF-007-change-an-upstream-decision.md","content":"# User Flow: Change an upstream decision\n\n**ID:** UF-007\n**Project:** clark-pro\n**Epic:** E-003, E-008\n**Stage:** Ready\n**Version:** 1.0\n**Created:** 2026-07-13\n**Updated:** 2026-07-13\n**Persona:** The Operator-Creator\n**Sources:** [Authoritative source flow](../../clark-pro/product/02-user-flows.md), [Product brief](../brief.md)\n\n---\n\n## Overview\n\nA creator changes an upstream decision, sees deterministic downstream impact, chooses what to regenerate, and reconciles approvals and schedules before publication.\n\n## Entry Point\n\n- Canvas → edit or promote a different angle, source, or upstream artifact version.\n\n## Stories Covered\n\n- S-003-001 — Immutable Idea Capture and Revision Lineage\n- S-003-002 — Evidence-Honest Idea Inspection and Canvas\n- S-003-005 — Version-Specific Review and Policy Gates\n- S-008-002 — Postiz Scheduling and Publication Ledger\n\n## Flow\n\n```mermaid\nflowchart TD\n    Entry([\"Entry: Canvas → edit or promote a different angle, source, or upstream artifact version.\"]) --> N_canvas\n    N_canvas[\"Screen: Canvas\"]\n    N_impact_preview[\"Overlay: Impact Preview\"]\n    N_review[\"Screen: Review\"]\n    N_timeline[\"Screen: Timeline\"]\n    N_canvas -->|\"Change upstream decision\"| N_impact_preview\n    N_impact_preview -->|\"Regenerate selected branches\"| N_canvas\n    N_impact_preview -->|\"Approval is invalidated\"| N_review\n    N_impact_preview -->|\"Scheduled intent is at risk\"| N_timeline\n    N_review -->|\"Approve replacement\"| N_timeline\n    N_timeline --> Success([\"Exit: New versions append with preserved lineage; stale approvals cannot authorize changed work.\"])\n    N_canvas -.->|\"Abandon safely\"| Exit([\"Exit: No unapproved mutation\"])\n```\n\n## Screens\n\n### Screen: Canvas\n\n- **Purpose:** Expose the typed creative graph, lineage, evidence gaps, decisions, branches, staleness, and run state as an inspectable projection.\n- **Key content:** Lanes, typed nodes, edges, selected-node inspector, evidence readiness, lineage, stale markers, branch controls, keyboard help.\n- **Primary action:** Inspect or change an upstream decision and preview consequences.\n- **Transitions:**\n  - Open review gate → Review\n  - Change decision → Impact Preview\n  - Return to next decision → Focus\n- **Stories:** S-003-001, S-003-002, S-003-005, S-008-002\n\n### Overlay: Impact Preview\n\n- **Purpose:** Show which downstream artifacts, approvals, schedules, costs, and reusable work change after an upstream decision.\n- **Key content:** Changed input, stale artifacts, reusable outputs, invalidated approvals, scheduled-publication risk, estimated regeneration cost, branch selection.\n- **Primary action:** Choose branches to regenerate or preserve manually.\n- **Transitions:**\n  - Confirm regeneration → Canvas\n  - Preserve manually → Canvas with explicit exception\n  - Scheduled risk → Timeline\n- **Stories:** S-003-001, S-003-002, S-003-005, S-008-002\n\n### Screen: Review\n\n- **Purpose:** Compare exact artifact versions with evidence, policy, cost, lineage, and creator decisions before mutation.\n- **Key content:** Review queue, paired text diff or synchronized media, sources, model/provider, Skill and memory revisions, policies, annotations, cost, approval status.\n- **Primary action:** Select, edit, reject, or request targeted changes.\n- **Transitions:**\n  - Compare versions → Version Comparison\n  - Decide → Approval Decision\n  - Approved for distribution → Timeline\n  - Inspect lineage → Canvas\n- **Stories:** S-003-001, S-003-002, S-003-005, S-008-002\n\n### Screen: Timeline\n\n- **Purpose:** Coordinate approved artifacts, account requirements, schedules, submission, verification, and reconciliation states.\n- **Key content:** Calendar/list modes, artifact and account, approval state, platform requirements, scheduled time, publication state, receipts, affected-account warnings.\n- **Primary action:** Schedule, publish now, reschedule, reconcile, cancel, or export.\n- **Transitions:**\n  - Schedule or publish → Publication Approval\n  - Ambiguous state → Reconciliation\n  - Unavailable connector → Export Package\n  - Open artifact → Review\n- **Stories:** S-003-001, S-003-002, S-003-005, S-008-002\n\n## Exit Points\n\n- **Success:** New versions append with preserved lineage; stale approvals cannot authorize changed work.\n- **Abandon:** The creator can leave before the explicit decision; drafts and verified prior state remain available.\n- **Error:** Impact calculation failure blocks regeneration and leaves existing canonical artifacts and schedules inspectable.\n\n---\n"},{"rel":"flows/UF-008-compare-and-approve.md","content":"# User Flow: Compare and approve\n\n**ID:** UF-008\n**Project:** clark-pro\n**Epic:** E-003\n**Stage:** Ready\n**Version:** 1.0\n**Created:** 2026-07-13\n**Updated:** 2026-07-13\n**Persona:** The Operator-Creator\n**Sources:** [Authoritative source flow](../../clark-pro/product/02-user-flows.md), [Product brief](../brief.md)\n\n---\n\n## Overview\n\nA reviewer compares text or media with evidence, provider, Skill, memory, policy, cost, and annotations, then records a decision bound to one exact version.\n\n## Entry Point\n\n- Review → open an item with two or more exact artifact versions.\n\n## Stories Covered\n\n- S-003-002 — Evidence-Honest Idea Inspection and Canvas\n- S-003-005 — Version-Specific Review and Policy Gates\n\n## Flow\n\n```mermaid\nflowchart TD\n    Entry([\"Entry: Review → open an item with two or more exact artifact versions.\"]) --> N_review\n    N_review[\"Screen: Review\"]\n    N_version_comparison[\"Overlay: Version Comparison\"]\n    N_approval_decision[\"Modal: Approval Decision\"]\n    N_review -->|\"Compare versions\"| N_version_comparison\n    N_version_comparison -->|\"Choose candidate\"| N_approval_decision\n    N_approval_decision -->|\"Approve or reject\"| N_review\n    N_approval_decision -->|\"Request targeted changes\"| N_review\n    N_approval_decision --> Success([\"Exit: The canonical decision contains the exact version, alternatives, actor, and reason.\"])\n    N_review -.->|\"Abandon safely\"| Exit([\"Exit: No unapproved mutation\"])\n```\n\n## Screens\n\n### Screen: Review\n\n- **Purpose:** Compare exact artifact versions with evidence, policy, cost, lineage, and creator decisions before mutation.\n- **Key content:** Review queue, paired text diff or synchronized media, sources, model/provider, Skill and memory revisions, policies, annotations, cost, approval status.\n- **Primary action:** Select, edit, reject, or request targeted changes.\n- **Transitions:**\n  - Compare versions → Version Comparison\n  - Decide → Approval Decision\n  - Approved for distribution → Timeline\n  - Inspect lineage → Canvas\n- **Stories:** S-003-002, S-003-005\n\n### Overlay: Version Comparison\n\n- **Purpose:** Compare text or synchronized media versions without losing evidence and technical differences.\n- **Key content:** Side-by-side versions, synchronized playback, diff markers, source/evidence changes, cost, policy and accessibility changes, annotations.\n- **Primary action:** Select a candidate or return without deciding.\n- **Transitions:**\n  - Select candidate → Approval Decision\n  - Close → Review\n- **Stories:** S-003-002, S-003-005\n\n### Modal: Approval Decision\n\n- **Purpose:** Bind approval, rejection, edit, or change request to one exact artifact version and actor.\n- **Key content:** Exact version hash, selected alternative, required gates, reason/note, reversibility, impacted platform adaptations.\n- **Primary action:** Approve, reject, or request changes.\n- **Transitions:**\n  - Approve → Review or Timeline\n  - Reject → Review\n  - Request changes → Focus\n- **Stories:** S-003-002, S-003-005\n\n## Exit Points\n\n- **Success:** The canonical decision contains the exact version, alternatives, actor, and reason.\n- **Abandon:** The creator can leave before the explicit decision; drafts and verified prior state remain available.\n- **Error:** Disputed sources, missing disclosure, policy conflict, unsafe claims, media failure, or upstream staleness prevent approval.\n\n---\n"},{"rel":"flows/UF-009-schedule-and-publish.md","content":"# User Flow: Schedule and publish\n\n**ID:** UF-009\n**Project:** clark-pro\n**Epic:** E-008\n**Stage:** Ready\n**Version:** 1.0\n**Created:** 2026-07-13\n**Updated:** 2026-07-13\n**Persona:** The Operator-Creator\n**Sources:** [Authoritative source flow](../../clark-pro/product/02-user-flows.md), [Product brief](../brief.md)\n\n---\n\n## Overview\n\nA creator validates account and platform requirements, commits an idempotent publication intent, observes the provider outcome, reconciles ambiguity, and falls back to deterministic export when needed.\n\n## Entry Point\n\n- Timeline → select an approved platform artifact and choose Schedule or Publish now.\n\n## Stories Covered\n\n- S-008-001 — Social Account and Credential Center\n- S-008-002 — Postiz Scheduling and Publication Ledger\n- S-008-003 — Assisted Handoff and Deterministic Export\n\n## Flow\n\n```mermaid\nflowchart TD\n    Entry([\"Entry: Timeline → select an approved platform artifact and choose Schedule or Publish now.\"]) --> N_timeline\n    N_timeline[\"Screen: Timeline\"]\n    N_publication_approval[\"Modal: Publication Approval\"]\n    N_reconciliation[\"Overlay: Reconciliation\"]\n    N_export_package[\"Screen: Export Package\"]\n    N_timeline -->|\"Schedule or publish\"| N_publication_approval\n    N_publication_approval -->|\"Submit exact intent\"| N_timeline\n    N_timeline -->|\"Provider result is ambiguous\"| N_reconciliation\n    N_reconciliation -->|\"Verified or terminalized\"| N_timeline\n    N_reconciliation -->|\"Automation unavailable\"| N_export_package\n    N_timeline -->|\"Connector unavailable\"| N_export_package\n    N_export_package -->|\"Export or assisted completion recorded\"| N_timeline\n    N_export_package --> Success([\"Exit: Every intent reaches verified, explicitly failed, cancelled, removed, exported, or needs_reconciliation with receipts.\"])\n    N_timeline -.->|\"Abandon safely\"| Exit([\"Exit: No unapproved mutation\"])\n```\n\n## Screens\n\n### Screen: Timeline\n\n- **Purpose:** Coordinate approved artifacts, account requirements, schedules, submission, verification, and reconciliation states.\n- **Key content:** Calendar/list modes, artifact and account, approval state, platform requirements, scheduled time, publication state, receipts, affected-account warnings.\n- **Primary action:** Schedule, publish now, reschedule, reconcile, cancel, or export.\n- **Transitions:**\n  - Schedule or publish → Publication Approval\n  - Ambiguous state → Reconciliation\n  - Unavailable connector → Export Package\n  - Open artifact → Review\n- **Stories:** S-008-001, S-008-002, S-008-003\n\n### Modal: Publication Approval\n\n- **Purpose:** Confirm platform schema, account health, disclosure, exact artifact version, schedule, cost, and idempotent intent before external mutation.\n- **Key content:** Account and platform, artifact version, schema validation, disclosures, scheduled time, idempotency intent, policy result, fallback.\n- **Primary action:** Submit the exact publication intent or cancel.\n- **Transitions:**\n  - Submit → Timeline in submitting state\n  - Policy block → Review\n  - Cancel → Timeline\n- **Stories:** S-008-001, S-008-002, S-008-003\n\n### Overlay: Reconciliation\n\n- **Purpose:** Resolve ambiguous external mutations and recovered work without blind retry.\n- **Key content:** Intent, last known state, provider receipt, live lookup, possible outcomes, retry safety, operator choices, audit timeline.\n- **Primary action:** Verify, mark failed, continue observing, export, or retry only when safe.\n- **Transitions:**\n  - Verified → Timeline\n  - Continue observing → Timeline\n  - Export → Export Package\n  - Safe retry → Publication Approval\n- **Stories:** S-008-001, S-008-002, S-008-003\n\n### Screen: Export Package\n\n- **Purpose:** Produce a deterministic, platform-valid handoff with complete lineage when automation cannot proceed.\n- **Key content:** Artifact files, copy, metadata, disclosures, technical validation, checksums, platform instructions, lineage manifest, assisted-result recording.\n- **Primary action:** Export the package or record an assisted completion.\n- **Transitions:**\n  - Export → Timeline in exported state\n  - Record assisted result → Timeline\n  - Back → Timeline\n- **Stories:** S-008-001, S-008-002, S-008-003\n\n## Exit Points\n\n- **Success:** Every intent reaches verified, explicitly failed, cancelled, removed, exported, or needs_reconciliation with receipts.\n- **Abandon:** The creator can leave before the explicit decision; drafts and verified prior state remain available.\n- **Error:** No ambiguous external mutation is blind-retried and no connector outage loses an approved artifact.\n\n---\n"},{"rel":"flows/UF-010-observe-outcomes.md","content":"# User Flow: Observe outcomes\n\n**ID:** UF-010\n**Project:** clark-pro\n**Epic:** E-008\n**Stage:** Ready\n**Version:** 1.0\n**Created:** 2026-07-13\n**Updated:** 2026-07-13\n**Persona:** The Operator-Creator\n**Sources:** [Authoritative source flow](../../clark-pro/product/02-user-flows.md), [Product brief](../brief.md)\n\n---\n\n## Overview\n\nA creator reviews platform and manual outcomes with exact lineage, freshness, missingness, sample count, and definition boundaries before any learning proposal is made.\n\n## Entry Point\n\n- Observation loop wakes by policy or creator opens Observation from a publication.\n\n## Stories Covered\n\n- S-008-004 — Observation Ingestion and Evidence Review\n\n## Flow\n\n```mermaid\nflowchart TD\n    Entry([\"Entry: Observation loop wakes by policy or creator opens Observation from a publication.\"]) --> N_observation\n    N_observation[\"Screen: Observation\"]\n    N_manual_observation[\"Overlay: Manual Observation\"]\n    N_review[\"Screen: Review\"]\n    N_observation -->|\"Add qualitative or manual context\"| N_manual_observation\n    N_manual_observation -->|\"Save\"| N_observation\n    N_observation -->|\"Inspect exact publication lineage\"| N_review\n    N_review -->|\"Return to outcomes\"| N_observation\n    N_review --> Success([\"Exit: Observations are linked to publication, artifact, angle, source, and decision lineage with limitations visible.\"])\n    N_observation -.->|\"Abandon safely\"| Exit([\"Exit: No unapproved mutation\"])\n```\n\n## Screens\n\n### Screen: Observation\n\n- **Purpose:** Review quantitative, qualitative, and manual outcomes attached to exact publication lineage.\n- **Key content:** Freshness, missingness, platform definitions, sample counts, cohort controls, ranges, cost, satisfaction, comments, qualitative context.\n- **Primary action:** Inspect evidence or add a manual observation.\n- **Transitions:**\n  - Inspect lineage → Review\n  - Add judgment → Manual Observation\n  - Propose learning → Memory\n- **Stories:** S-008-004\n\n### Overlay: Manual Observation\n\n- **Purpose:** Capture qualitative judgment or manual values with source and uncertainty rather than pretending they came from a connector.\n- **Key content:** Observation type, bounded value or note, source, observed date, freshness, confidence/context, exact publication link.\n- **Primary action:** Save the manual observation.\n- **Transitions:**\n  - Save → Observation\n  - Cancel → Observation\n- **Stories:** S-008-004\n\n### Screen: Review\n\n- **Purpose:** Compare exact artifact versions with evidence, policy, cost, lineage, and creator decisions before mutation.\n- **Key content:** Review queue, paired text diff or synchronized media, sources, model/provider, Skill and memory revisions, policies, annotations, cost, approval status.\n- **Primary action:** Select, edit, reject, or request targeted changes.\n- **Transitions:**\n  - Compare versions → Version Comparison\n  - Decide → Approval Decision\n  - Approved for distribution → Timeline\n  - Inspect lineage → Canvas\n- **Stories:** S-008-004\n\n## Exit Points\n\n- **Success:** Observations are linked to publication, artifact, angle, source, and decision lineage with limitations visible.\n- **Abandon:** The creator can leave before the explicit decision; drafts and verified prior state remain available.\n- **Error:** Unavailable, stale, deleted, or incomparable data remains visibly missing rather than silently merged.\n\n---\n"},{"rel":"flows/UF-011-reflect-and-promote-memory.md","content":"# User Flow: Reflect and promote memory\n\n**ID:** UF-011\n**Project:** clark-pro\n**Epic:** E-005, E-008\n**Stage:** Ready\n**Version:** 1.0\n**Created:** 2026-07-13\n**Updated:** 2026-07-13\n**Persona:** The Operator-Creator\n**Sources:** [Authoritative source flow](../../clark-pro/product/02-user-flows.md), [Product brief](../brief.md)\n\n---\n\n## Overview\n\nA creator inspects a small evidence-linked memory proposal and explicitly promotes, edits, disputes, defers, or rejects it; later influence remains visible.\n\n## Entry Point\n\n- Memory → open a reflection proposal produced from completed evidence and decisions.\n\n## Stories Covered\n\n- S-005-001 — Evidence-Bound Memory Promotion\n- S-005-003 — Semantic Retrieval and Reflection Lineage\n- S-008-005 — Experiment and Strategy Loop\n\n## Flow\n\n```mermaid\nflowchart TD\n    Entry([\"Entry: Memory → open a reflection proposal produced from completed evidence and decisions.\"]) --> N_memory\n    N_memory[\"Screen: Memory\"]\n    N_memory_proposal[\"Overlay: Memory Proposal\"]\n    N_memory_decision[\"Modal: Memory Decision\"]\n    N_review[\"Screen: Review\"]\n    N_memory -->|\"Open proposal\"| N_memory_proposal\n    N_memory_proposal -->|\"Inspect evidence\"| N_review\n    N_review -->|\"Return\"| N_memory_proposal\n    N_memory_proposal -->|\"Decide\"| N_memory_decision\n    N_memory_decision -->|\"Commit decision\"| N_memory\n    N_review --> Success([\"Exit: Only the exact promoted revision becomes retrievable and its later influence is traceable.\"])\n    N_memory -.->|\"Abandon safely\"| Exit([\"Exit: No unapproved mutation\"])\n```\n\n## Screens\n\n### Screen: Memory\n\n- **Purpose:** Inspect active beliefs, proposals, evidence, scope, sensitivity, retrieval history, influence, correction, and forgetting.\n- **Key content:** Memory metrics, search/filter, item list, proposal state, statement, confidence, evidence, contradictions, scope, sensitivity, expiry, retrievals, influenced artifacts.\n- **Primary action:** Review a proposal or inspect/correct an active item.\n- **Transitions:**\n  - Open proposal → Memory Proposal\n  - Open history → Memory History\n  - Forget → Forget Memory\n  - Inspect influenced artifact → Review\n- **Stories:** S-005-001, S-005-003, S-008-005\n\n### Overlay: Memory Proposal\n\n- **Purpose:** Review a small evidence-linked belief proposal before it can influence retrieval.\n- **Key content:** Statement, evidence, contradiction, confidence, sensitivity, scope, expiry, retrieval policy, originating trajectory.\n- **Primary action:** Approve, edit, dispute, defer, or reject.\n- **Transitions:**\n  - Decide → Memory Decision\n  - Inspect evidence → Review\n  - Close → Memory\n- **Stories:** S-005-001, S-005-003, S-008-005\n\n### Modal: Memory Decision\n\n- **Purpose:** Record a revision-specific promote, edit, dispute, defer, or reject decision.\n- **Key content:** Exact revision, final statement, scope, sensitivity, expiry, retrieval policy, reason, actor.\n- **Primary action:** Commit the selected memory decision.\n- **Transitions:**\n  - Promote or edit → Memory\n  - Dispute or reject → Memory\n  - Cancel → Memory Proposal\n- **Stories:** S-005-001, S-005-003, S-008-005\n\n### Screen: Review\n\n- **Purpose:** Compare exact artifact versions with evidence, policy, cost, lineage, and creator decisions before mutation.\n- **Key content:** Review queue, paired text diff or synchronized media, sources, model/provider, Skill and memory revisions, policies, annotations, cost, approval status.\n- **Primary action:** Select, edit, reject, or request targeted changes.\n- **Transitions:**\n  - Compare versions → Version Comparison\n  - Decide → Approval Decision\n  - Approved for distribution → Timeline\n  - Inspect lineage → Canvas\n- **Stories:** S-005-001, S-005-003, S-008-005\n\n## Exit Points\n\n- **Success:** Only the exact promoted revision becomes retrievable and its later influence is traceable.\n- **Abandon:** The creator can leave before the explicit decision; drafts and verified prior state remain available.\n- **Error:** Insufficient, contradictory, or sensitive evidence keeps the proposal inactive.\n\n---\n"},{"rel":"flows/UF-012-learn-or-revise-a-skill.md","content":"# User Flow: Learn or revise a Skill\n\n**ID:** UF-012\n**Project:** clark-pro\n**Epic:** E-007\n**Stage:** Ready\n**Version:** 1.0\n**Created:** 2026-07-13\n**Updated:** 2026-07-13\n**Persona:** The Operator-Creator\n**Sources:** [Authoritative source flow](../../clark-pro/product/02-user-flows.md), [Product brief](../brief.md)\n\n---\n\n## Overview\n\nA creator reviews the extracted procedure, authority, tests, examples, and revision diff before promotion; regression can propose rollback but never rewrite the active Skill silently.\n\n## Entry Point\n\n- A corrected or successful trajectory creates a Skill proposal visible in Skill Review.\n\n## Stories Covered\n\n- S-007-002 — Skill Update, Expansion Denial, and Rollback\n- S-007-005 — Reflection-Driven Skill Proposals and Regression\n\n## Flow\n\n```mermaid\nflowchart TD\n    Entry([\"Entry: A corrected or successful trajectory creates a Skill proposal visible in Skill Review.\"]) --> N_skill_review\n    N_skill_review[\"Screen: Skill Review\"]\n    N_skill_revision_diff[\"Overlay: Skill Revision Diff\"]\n    N_skill_promotion[\"Modal: Skill Promotion\"]\n    N_skill_review -->|\"Open proposed revision\"| N_skill_revision_diff\n    N_skill_revision_diff -->|\"Tests and authority are acceptable\"| N_skill_promotion\n    N_skill_promotion -->|\"Promote or roll back\"| N_skill_review\n    N_skill_promotion -->|\"Reject\"| N_skill_review\n    N_skill_promotion --> Success([\"Exit: The promoted revision is pinned for later runs with exact evidence and rollback.\"])\n    N_skill_review -.->|\"Abandon safely\"| Exit([\"Exit: No unapproved mutation\"])\n```\n\n## Screens\n\n### Screen: Skill Review\n\n- **Purpose:** Inspect exact Skill bytes, requested tools, effective permission intersection, compatibility, fixtures, and trust ceiling.\n- **Key content:** Source hash, files, hidden-executable scan, requested tools/domains, installed capabilities, effective permission intersection, fixture results, revision history.\n- **Primary action:** Open promotion decision or compare a revision.\n- **Transitions:**\n  - Promote or limit → Skill Promotion\n  - Compare update → Skill Revision Diff\n  - Reject → Skill Library\n- **Stories:** S-007-002, S-007-005\n\n### Overlay: Skill Revision Diff\n\n- **Purpose:** Compare procedure, tools, permissions, compatibility, fixtures, and recovery behavior between Skill revisions.\n- **Key content:** File diff, manifest diff, capability expansion, permission changes, fixture/regression results, compatibility, rollback target.\n- **Primary action:** Continue to promotion or keep the prior revision.\n- **Transitions:**\n  - Promote candidate → Skill Promotion\n  - Keep prior → Skill Review\n- **Stories:** S-007-002, S-007-005\n\n### Modal: Skill Promotion\n\n- **Purpose:** Record the explicit promotion, limitation, rejection, or rollback decision for an exact Skill revision.\n- **Key content:** Revision, trust class, capability ceiling, workspace scope, fixture summary, regression result, prior rollback revision.\n- **Primary action:** Promote within the shown ceiling, reject, or roll back.\n- **Transitions:**\n  - Promote → Skill Library\n  - Reject → Skill Review\n  - Rollback → Skill Library with prior revision\n- **Stories:** S-007-002, S-007-005\n\n## Exit Points\n\n- **Success:** The promoted revision is pinned for later runs with exact evidence and rollback.\n- **Abandon:** The creator can leave before the explicit decision; drafts and verified prior state remain available.\n- **Error:** Failed regression, incompatible authority, or missing evidence leaves the proposal quarantined.\n\n---\n"},{"rel":"flows/UF-013-external-agent-uses-clark-bridge.md","content":"# User Flow: External agent uses Clark Bridge\n\n**ID:** UF-013\n**Project:** clark-pro\n**Epic:** E-004\n**Stage:** Ready\n**Version:** 1.0\n**Created:** 2026-07-13\n**Updated:** 2026-07-13\n**Persona:** The Integration Builder\n**Sources:** [Authoritative source flow](../../clark-pro/product/02-user-flows.md), [Product brief](../brief.md)\n\n---\n\n## Overview\n\nAn external agent pairs with explicit scopes, uses Clark’s canonical command layer, reconnects to durable work, waits for creator review, and retrieves results without gaining ambient authority.\n\n## Entry Point\n\n- Connections → register an MCP client, or an already paired client calls a scoped Clark tool.\n\n## Stories Covered\n\n- S-004-002 — Scoped Clark Bridge Core\n- S-004-003 — Durable Bridge Tasks and Client Pairing\n- S-004-004 — External Client Examples and Compatibility\n\n## Flow\n\n```mermaid\nflowchart TD\n    Entry([\"Entry: Connections → register an MCP client, or an already paired client calls a scoped Clark tool.\"]) --> N_connections\n    N_connections[\"Screen: Connections\"]\n    N_client_pairing[\"Modal: Client Pairing\"]\n    N_focus[\"Screen: Focus\"]\n    N_review[\"Screen: Review\"]\n    N_connections -->|\"Register client\"| N_client_pairing\n    N_client_pairing -->|\"Pair with scopes\"| N_connections\n    N_connections -->|\"Client starts scoped work\"| N_focus\n    N_focus -->|\"Creator decision required\"| N_review\n    N_review -->|\"Creator submits decision\"| N_focus\n    N_focus -->|\"Client retrieves result\"| N_connections\n    N_review --> Success([\"Exit: Studio and Bridge converge on identical event, lineage, and policy state; revocation blocks new access.\"])\n    N_connections -.->|\"Abandon safely\"| Exit([\"Exit: No unapproved mutation\"])\n```\n\n## Screens\n\n### Screen: Connections\n\n- **Purpose:** Manage capabilities, social accounts, MCP clients, Tool Packs, Skills, and their effective workspace authority.\n- **Key content:** Source and trust filters, connection cards, health, scopes, trust states, affected schedules, revoke controls, developer mode.\n- **Primary action:** Select a connection or add a governed capability.\n- **Transitions:**\n  - Select capability → Capability Trust Review\n  - Select Tool Pack → Tool Pack Review\n  - Select Skill → Skill Review\n  - Register client → Client Pairing\n- **Stories:** S-004-002, S-004-003, S-004-004\n\n### Modal: Client Pairing\n\n- **Purpose:** Register an MCP client through one-time local pairing and explicit workspace, tool, resource, and job scopes.\n- **Key content:** Client identity, one-time code, allowed workspaces/tools/resources, task support, token storage, expiry, revoke behavior.\n- **Primary action:** Pair the client or cancel.\n- **Transitions:**\n  - Pair → Connections\n  - Cancel → Connections\n  - Invalid/expired code → remain\n- **Stories:** S-004-002, S-004-003, S-004-004\n\n### Screen: Focus\n\n- **Purpose:** Present the next creator decision, required inputs, active gates, and resumable work without exposing the whole graph.\n- **Key content:** Inbox count, current project, next decision, run readiness, budget, selected accounts and Brand Constitution, recovery summary, recent activity.\n- **Primary action:** Make the next decision or open the relevant supporting surface.\n- **Transitions:**\n  - Open structure or lineage → Canvas\n  - Open exact-version decision → Review\n  - Approved work → Timeline\n  - Recovered work → remain in Focus with status\n- **Stories:** S-004-002, S-004-003, S-004-004\n\n### Screen: Review\n\n- **Purpose:** Compare exact artifact versions with evidence, policy, cost, lineage, and creator decisions before mutation.\n- **Key content:** Review queue, paired text diff or synchronized media, sources, model/provider, Skill and memory revisions, policies, annotations, cost, approval status.\n- **Primary action:** Select, edit, reject, or request targeted changes.\n- **Transitions:**\n  - Compare versions → Version Comparison\n  - Decide → Approval Decision\n  - Approved for distribution → Timeline\n  - Inspect lineage → Canvas\n- **Stories:** S-004-002, S-004-003, S-004-004\n\n## Exit Points\n\n- **Success:** Studio and Bridge converge on identical event, lineage, and policy state; revocation blocks new access.\n- **Abandon:** The creator can leave before the explicit decision; drafts and verified prior state remain available.\n- **Error:** Missing or revoked scope, hostile request metadata, or client disconnect preserves canonical work while denying unauthorized access.\n\n---\n"},{"rel":"flows/UF-014-correct-or-forget-personal-data.md","content":"# User Flow: Correct or forget personal data\n\n**ID:** UF-014\n**Project:** clark-pro\n**Epic:** E-005\n**Stage:** Ready\n**Version:** 1.0\n**Created:** 2026-07-13\n**Updated:** 2026-07-13\n**Persona:** The Trust-Conscious Operator\n**Sources:** [Authoritative source flow](../../clark-pro/product/02-user-flows.md), [Product brief](../brief.md)\n\n---\n\n## Overview\n\nA creator inspects statement, revisions, evidence, retrieval, and influenced outputs before editing, disputing, narrowing, expiring, or forgetting personal data.\n\n## Entry Point\n\n- Memory → search for and open an active or historical memory item.\n\n## Stories Covered\n\n- S-005-002 — Scoped Retrieval, Correction, and Forgetting\n- S-005-004 — Physical Erasure and Memory Validation Corpus\n\n## Flow\n\n```mermaid\nflowchart TD\n    Entry([\"Entry: Memory → search for and open an active or historical memory item.\"]) --> N_memory\n    N_memory[\"Screen: Memory\"]\n    N_memory_history[\"Overlay: Memory History\"]\n    N_memory_proposal[\"Overlay: Memory Proposal\"]\n    N_forget_memory[\"Modal: Forget Memory\"]\n    N_memory -->|\"Open item history\"| N_memory_history\n    N_memory_history -->|\"Correct or narrow\"| N_memory_proposal\n    N_memory_history -->|\"Forget\"| N_forget_memory\n    N_forget_memory -->|\"Confirm deletion lifecycle\"| N_memory\n    N_memory_proposal -->|\"Save correction proposal\"| N_memory\n    N_forget_memory --> Success([\"Exit: Forgotten data is removed from retrieval and defined derivatives; remaining retention boundaries are disclosed.\"])\n    N_memory -.->|\"Abandon safely\"| Exit([\"Exit: No unapproved mutation\"])\n```\n\n## Screens\n\n### Screen: Memory\n\n- **Purpose:** Inspect active beliefs, proposals, evidence, scope, sensitivity, retrieval history, influence, correction, and forgetting.\n- **Key content:** Memory metrics, search/filter, item list, proposal state, statement, confidence, evidence, contradictions, scope, sensitivity, expiry, retrievals, influenced artifacts.\n- **Primary action:** Review a proposal or inspect/correct an active item.\n- **Transitions:**\n  - Open proposal → Memory Proposal\n  - Open history → Memory History\n  - Forget → Forget Memory\n  - Inspect influenced artifact → Review\n- **Stories:** S-005-002, S-005-004\n\n### Overlay: Memory History\n\n- **Purpose:** Show revisions, evidence, retrieval history, and influenced outputs before correction or forgetting.\n- **Key content:** Revision timeline, active/disputed/expired state, evidence links, retrieval receipts, influenced artifacts, backup-retention caveat.\n- **Primary action:** Inspect a revision, correct it, or continue to forgetting.\n- **Transitions:**\n  - Correct → Memory Proposal\n  - Forget → Forget Memory\n  - Close → Memory\n- **Stories:** S-005-002, S-005-004\n\n### Overlay: Memory Proposal\n\n- **Purpose:** Review a small evidence-linked belief proposal before it can influence retrieval.\n- **Key content:** Statement, evidence, contradiction, confidence, sensitivity, scope, expiry, retrieval policy, originating trajectory.\n- **Primary action:** Approve, edit, dispute, defer, or reject.\n- **Transitions:**\n  - Decide → Memory Decision\n  - Inspect evidence → Review\n  - Close → Memory\n- **Stories:** S-005-002, S-005-004\n\n### Modal: Forget Memory\n\n- **Purpose:** Confirm logical removal, derivative deletion, audit tombstone, and disclosed backup-retention limits.\n- **Key content:** Exact memory revision, retrieval removal, derivative/index deletion, active storage result, backup and export retention caveats, confirmation.\n- **Primary action:** Forget the memory or cancel.\n- **Transitions:**\n  - Confirm → Memory\n  - Cancel → Memory History\n- **Stories:** S-005-002, S-005-004\n\n## Exit Points\n\n- **Success:** Forgotten data is removed from retrieval and defined derivatives; remaining retention boundaries are disclosed.\n- **Abandon:** The creator can leave before the explicit decision; drafts and verified prior state remain available.\n- **Error:** If physical removal cannot be proven across a defined boundary, Clark reports the remaining copy and blocks unsupported completion claims.\n\n---\n"},{"rel":"flows/UF-015-mac-sleeps-quits-or-crashes.md","content":"# User Flow: Mac sleeps, quits, or crashes\n\n**ID:** UF-015\n**Project:** clark-pro\n**Epic:** E-002, E-004, E-008, E-009\n**Stage:** Ready\n**Version:** 1.0\n**Created:** 2026-07-13\n**Updated:** 2026-07-13\n**Persona:** The Trust-Conscious Operator\n**Sources:** [Authoritative source flow](../../clark-pro/product/02-user-flows.md), [Product brief](../brief.md)\n\n---\n\n## Overview\n\nClark checkpoints where possible, classifies every incomplete step on relaunch, reconnects external jobs, reconciles publication intent before retry, and returns the creator to an honest recovery summary.\n\n## Entry Point\n\n- The Mac sleeps, the renderer or Harness quits, or the process crashes during local or delegated work.\n\n## Stories Covered\n\n- S-002-002 — Durable Event Store and Run Recovery\n- S-004-003 — Durable Bridge Tasks and Client Pairing\n- S-008-002 — Postiz Scheduling and Publication Ledger\n- S-009-003 — Scoped Remote Workers and Schedules\n- S-009-005 — Release, Hosted Continuity, and Tenant Isolation\n\n## Flow\n\n```mermaid\nflowchart TD\n    Entry([\"Entry: The Mac sleeps, the renderer or Harness quits, or the process crashes during local or delegated work.\"]) --> N_recovery_summary\n    N_recovery_summary[\"Screen: Recovery Summary\"]\n    N_reconciliation[\"Overlay: Reconciliation\"]\n    N_focus[\"Screen: Focus\"]\n    N_review[\"Screen: Review\"]\n    N_timeline[\"Screen: Timeline\"]\n    N_recovery_summary -->|\"Resume local decision work\"| N_focus\n    N_recovery_summary -->|\"Approval was waiting\"| N_review\n    N_recovery_summary -->|\"Publication state is ambiguous\"| N_reconciliation\n    N_reconciliation -->|\"Terminal state known\"| N_timeline\n    N_recovery_summary -->|\"Scheduled or remote result returned\"| N_timeline\n    N_focus -->|\"Continue recovered run\"| N_review\n    N_timeline --> Success([\"Exit: Recovered, paused, failed, waiting, reconciled, and externally completed work are distinct and no mutation duplicates.\"])\n    N_recovery_summary -.->|\"Abandon safely\"| Exit([\"Exit: No unapproved mutation\"])\n```\n\n## Screens\n\n### Screen: Recovery Summary\n\n- **Purpose:** Classify incomplete local and delegated work after wake, relaunch, or crash and present safe next actions.\n- **Key content:** Recovered, paused, failed, waiting approval, externally completed, and needs-reconciliation groups; checkpoint; provider identity; affected publication intents.\n- **Primary action:** Resume, inspect, reconcile, or leave paused.\n- **Transitions:**\n  - Resume local → Focus\n  - Review gate → Review\n  - Publication ambiguity → Reconciliation\n  - Scheduled work → Timeline\n- **Stories:** S-002-002, S-004-003, S-008-002, S-009-003, S-009-005\n\n### Overlay: Reconciliation\n\n- **Purpose:** Resolve ambiguous external mutations and recovered work without blind retry.\n- **Key content:** Intent, last known state, provider receipt, live lookup, possible outcomes, retry safety, operator choices, audit timeline.\n- **Primary action:** Verify, mark failed, continue observing, export, or retry only when safe.\n- **Transitions:**\n  - Verified → Timeline\n  - Continue observing → Timeline\n  - Export → Export Package\n  - Safe retry → Publication Approval\n- **Stories:** S-002-002, S-004-003, S-008-002, S-009-003, S-009-005\n\n### Screen: Focus\n\n- **Purpose:** Present the next creator decision, required inputs, active gates, and resumable work without exposing the whole graph.\n- **Key content:** Inbox count, current project, next decision, run readiness, budget, selected accounts and Brand Constitution, recovery summary, recent activity.\n- **Primary action:** Make the next decision or open the relevant supporting surface.\n- **Transitions:**\n  - Open structure or lineage → Canvas\n  - Open exact-version decision → Review\n  - Approved work → Timeline\n  - Recovered work → remain in Focus with status\n- **Stories:** S-002-002, S-004-003, S-008-002, S-009-003, S-009-005\n\n### Screen: Review\n\n- **Purpose:** Compare exact artifact versions with evidence, policy, cost, lineage, and creator decisions before mutation.\n- **Key content:** Review queue, paired text diff or synchronized media, sources, model/provider, Skill and memory revisions, policies, annotations, cost, approval status.\n- **Primary action:** Select, edit, reject, or request targeted changes.\n- **Transitions:**\n  - Compare versions → Version Comparison\n  - Decide → Approval Decision\n  - Approved for distribution → Timeline\n  - Inspect lineage → Canvas\n- **Stories:** S-002-002, S-004-003, S-008-002, S-009-003, S-009-005\n\n### Screen: Timeline\n\n- **Purpose:** Coordinate approved artifacts, account requirements, schedules, submission, verification, and reconciliation states.\n- **Key content:** Calendar/list modes, artifact and account, approval state, platform requirements, scheduled time, publication state, receipts, affected-account warnings.\n- **Primary action:** Schedule, publish now, reschedule, reconcile, cancel, or export.\n- **Transitions:**\n  - Schedule or publish → Publication Approval\n  - Ambiguous state → Reconciliation\n  - Unavailable connector → Export Package\n  - Open artifact → Review\n- **Stories:** S-002-002, S-004-003, S-008-002, S-009-003, S-009-005\n\n## Exit Points\n\n- **Success:** Recovered, paused, failed, waiting, reconciled, and externally completed work are distinct and no mutation duplicates.\n- **Abandon:** The creator can leave before the explicit decision; drafts and verified prior state remain available.\n- **Error:** Unclassifiable work stays paused with diagnostics; local export remains available during hosted failure.\n\n---\n"},{"rel":"qa/qa-testplan.md","content":"# Clark Pro Quality Assurance Plan\n\n**Project:** clark-pro\n**Version:** 1.0\n**Updated:** 2026-07-13\n**Owner:** Quality Engineering with Product, Security, Desktop, Harness, Data, and Platform owners\n\n---\n\n## Quality Objective\n\nShip Clark Pro only when the complete creator cycle is correct, recoverable, inspectable, accessible, portable, privacy-safe, and honest about external/human evidence. Screen presence is not completion. The test system must prove exact versions, authority, lineage, idempotence, recovery, fallback, and decision ownership across the same canonical workspace.\n\n## Coverage Inventory\n\n| Layer | Artifact | Count | Purpose |\n|-------|----------|------:|---------|\n| Contract/unit | JSON Schema, upcaster, domain, repository, policy, adapter, sandbox tests | Existing suites + story additions | Fast predicate and invariant proof |\n| Story | T-NNN-NNN | 42 | Every story AC, negative preservation, boundary/replay, and required analytics |\n| Release | TR-NNN | 3 | Composition and go/no-go for each live release |\n| Evergreen flow | TF-006, TF-009, TF-015 | 3 plans / 9 journeys | Primary creator spine, external mutation, and interruption continuity |\n| Production health | HP-001…HP-010 | 10 | Local/hosted semantic safety net |\n| Human/external evidence | Walkthrough, commercial signoff, VoiceOver, Apple, provider, four-week protocols | Story/release gated | Proof automation cannot legitimately manufacture |\n\n## Verification Buckets and Executors\n\n| product-team bucket | Clark executor | Use | Evidence |\n|----------------|----------------|-----|----------|\n| Maestro | Playwright Electron today; Maestro only for a future mobile surface | Visible pixels, keyboard, navigation, overlays/modals, OS prompts, exact copy/state | Before/after/checkpoint screenshots, trace, video on failure |\n| Unit / Harness | Node `node:test`, repository fixtures, SDK/server harnesses | Contracts, policies, IPC, event append/replay, DB, providers, sync, sandbox, backup | Test log, seed/fixture version, file/commit, receipt snapshot |\n| Code Review | Required security/architecture review with file:line evidence | Only obvious source branches; never substitutes for runtime/OS/content behavior | Reviewer citation and checklist |\n| Analytics | Local product-event projection or logged-event spy | Exact event name, once-after-commit timing, bounded shape, no PII/content, opt-in export | Query/result fixture and canary scan |\n\n## Test Environments\n\n| Environment | Purpose | Data/credentials | Required gates |\n|-------------|---------|------------------|----------------|\n| PR deterministic | Contracts, repositories, policy, UI component, fixtures | Synthetic workspaces, fake/recorded providers, no production secrets | Fast unit/Harness, analytics spy, static security checks |\n| Packaged Mac | Hardened renderer, menus, Keychain/TCC, crash, update, VoiceOver, performance | Dedicated test Keychain and signed fixtures | HP-001, packaged Playwright, code-sign/Gatekeeper, accessibility |\n| Provider sandbox | MCP/model/media/Postiz/social conformance and ambiguity | Broker-owned sandbox credentials | Adapter conformance, schema discovery, revoke, cost, reconciliation/export |\n| Two-device/team | Encrypted sync, conflicts, roles, remote workers | Synthetic personal/team data; scoped worker leases | HP-010, tenant and envelope hostile corpus |\n| Release candidate | All story/release/TF, migration, backup/restore, support bundle | Representative non-production workspace | TR plan, TF suite, all applicable probes, evidence ledger |\n| Production smoke | Exact shipped build and consent-safe checks | Minimum synthetic workspace/account | No destructive mutation; launch, local access, export, controlled publish if approved |\n\n## Test Data and Privacy\n\n- Version every fixture and schema; record the fixture ID in evidence.\n- Use synthetic names/content and credential canaries. Never copy a real creator workspace into CI.\n- Representative Full Week fixture includes text/media, missing/disputed evidence, stale branches, approval waits, ambiguous publication, memory/Skill proposals, and provider failures.\n- Backup, diagnostics, analytics, logs, traces, crash annotations, and outbound network capture all run the ADR-0018/0019 secret/content/path corpus.\n- Destructive/paid tests target recorded providers or sandbox accounts with explicit budget and cleanup.\n\n## Required Suites by Risk\n\n| Risk | Suites | Release blocker |\n|------|--------|-----------------|\n| Contract/schema drift | 18+ schema verification, generated outputs, upcasters, future/unknown rejection | Any failure |\n| Renderer/process authority | IPC sender/origin, navigatio
