var FILES=[{"rel":"brief.md","content":"# Product Brief: Clark Pro\n\n**Project:** clark-pro\n**Project Type:** Product\n**Repo:** https://github.com/shubhamdasdev/Clark-pro\n**Version:** 1.0\n**Updated:** 2026-07-13\n**PM Persona:** pragmatist\n**Sources:** [Product requirements](research/history/import-2026-07-13/product/01-product-description.md), [Vision](research/history/import-2026-07-13/vision.md), [Roadmap](research/history/import-2026-07-13/roadmap.md), [Ground status](research/history/import-2026-07-13/evidence/ground-status.md)\n\n---\n\n## Problem Statement\n\nProfessional operator-creators building across multiple channels lose intent, evidence, approvals, identity, and lessons as work moves between AI chats, research tools, editors, schedulers, and analytics dashboards. Clark Pro is a Mac-first creator operating system that keeps the workflow and the creator model in one inspectable, portable workspace, so automation can add leverage without taking hidden authority or erasing judgment.\n\n## North Star\n\n**North Star:** A creator turns a rough thought into a coordinated body of published work while preserving why it mattered, what evidence supports it, which version was approved, what it cost, what happened afterward, and which lesson deserves to influence future work.\n\n## Goals & Success Metrics\n\n| Goal | Metric | Target |\n|------|--------|--------|\n| Prove whole-product continuity | Representative end-to-end weekly cycles completed | 4 consecutive cycles before Clark Pro 1.0 |\n| Produce useful creative work | Approved artifacts judged publishable with normal editing | At least 80% in the Stratum 3 validation run |\n| Preserve trust in mutations | Paid or mutating actions with complete permission and provenance receipts | 100% |\n| Eliminate ambiguous publishing | Duplicate verified publications and unexplained terminal states | 0 |\n| Preserve local ownership | Backup, restore, migration, and export acceptance runs passing | 100% before external release |\n\n## Roles\n\n| Role | Description |\n|------|-------------|\n| **creator** | Operates personal projects, creates and reviews artifacts, and makes memory, Skill, budget, and publication decisions |\n| **workspace_admin** | Manages credentials, connections, Tool Packs, Skills, policies, backups, clients, and high-authority workspace actions |\n| **reviewer** | Reviews evidence, policy, costs, comparisons, and exact artifact versions before approval |\n| **external_agent** | Uses Clark Bridge through explicitly granted workspace, tool, resource, and job scopes |\n| **team_member** | Participates in shared workspaces through assigned roles, comments, tasks, and approvals |\n\n## Personas\n\n| Persona | Primary Role | Goals | Pain Points |\n|---------|-------------|-------|-------------|\n| **The Operator-Creator** | creator | Turn intent into a coherent weekly body of work across channels while preserving voice and judgment | Repeating context, manual handoffs, opaque automation, and fragmented evidence |\n| **The Trust-Conscious Operator** | workspace_admin | Understand and control every permission, credential, package, memory, cost, and external mutation | Hidden authority, supply-chain risk, irreversible updates, and unclear recovery |\n| **The Integration Builder** | external_agent | Connect agents and mature engines through stable governed contracts | Private APIs, state duplication, weak scoping, and lost long-running work |\n| **The Collaborating Team Lead** | team_member | Coordinate shared production without mixing personal and team identity or losing accountability | Approval ambiguity, offline conflicts, excessive credential sharing, and opaque hosted ownership |\n\n## Product Areas\n\n| Area | Description |\n|------|-------------|\n| Contracts & Product Proof | Versioned contracts, fixtures, threat decisions, evidence, creator validation, and accountable signoff |\n| Native Studio & Harness | Hardened Mac shell, canonical events, assets, durable runs, recovery, portability, and release trust |\n| Idea Foundry & Creation | Capture, research, claims, branches, writing, media, comparisons, policy, and exact-version approval |\n| MCP & Clark Bridge | Governed capability consumption and a scoped canonical MCP surface for external agents |\n| Creator Memory | Evidence-bound memory, retrieval, correction, forgetting, reflection, and influenced-artifact provenance |\n| Tool Packs | Reuse-first integration, quarantine, supply-chain evidence, adapters, converters, safe UI, migration, and rollback |\n| Agent Skills | Package validation, trust ceilings, invocation, sandboxing, regression, evolution, and rollback |\n| Distribution & Observation | Social accounts, scheduling, publishing, reconciliation, export, analytics, evidence review, and experiments |\n| Team & Release | Shared workspaces, sync, remote workers, hosted continuity, tenant isolation, and whole-product release proof |\n\n## Scope\n\n### In Scope (Clark Pro 1.0)\n\n- Signed and notarized Mac application with local canonical event and asset ownership\n- Focus, Canvas, Timeline, Review, Library, Memory, and Connections over one workspace model\n- Durable creation loops from capture through publication, observation, reflection, and improvement\n- Governed MCP capabilities, Clark Bridge, Tool Packs, and Agent Skills with explicit permissions and rollback\n- Postiz-first distribution with direct, assisted, and deterministic export fallbacks\n- Single-user product plus the minimum remote scheduling and workspace boundaries required for safe continuity\n\n### Out of Scope (Clark Pro 1.0)\n\n- Training proprietary foundation models\n- Generic workflow automation unrelated to creator operations\n- Fully autonomous content farming or silent memory, Skill, strategy, or publication decisions\n- Platform-policy circumvention or hidden AI disclosure\n- Mandatory cloud ownership of canonical personal state\n- Direct Clark-owned integrations for every social platform\n\n## Constraints\n\n- Canonical identity, memory, credentials, project history, and approval state remain local-first and portable.\n- Renderer code receives no ambient secrets, shell, raw filesystem, or arbitrary network authority.\n- Models and engines remain replaceable behind stable domain and capability contracts.\n- Every external mutation is idempotent or enters explicit reconciliation; blind retry is not acceptable.\n- Human, commercial, security, migration, rollback, and signing evidence cannot be replaced by passing unit tests.\n- Open-source reuse requires immutable source identity, compatible licensing, supply-chain evidence, stable interfaces, permission review, conformance, and rollback.\n"},{"rel":"epics/E-001-contracts-and-product-proof/E-001.md","content":"# Epic: Contracts and Product Proof\n\n**ID:** E-001\n**Project:** clark-pro\n**Stage:** Ready\n**Version:** 1.0\n**Created:** 2026-07-13\n**Updated:** 2026-07-13\n**Sources:** [Authoritative epics](../../research/history/import-2026-07-13/product/03-epics-and-stories.md), [Whole-product roadmap](../../research/history/import-2026-07-13/roadmap.md)\n\n---\n\n## Outcome\n\nThe Clark team and representative creators can inspect one authoritative product model, verify its executable contracts, and distinguish automated proof from the human and commercial evidence still required to proceed.\n\n## Success Metric\n\n| Metric | Baseline | Target |\n|--------|----------|--------|\n| Contract and migration verification suites passing | 18 schemas and 5 upcaster tests pass | 100% passing on every main-branch change |\n| Open blocking Ground requirements | 24 open requirement-level entries | 0 before Ground signoff |\n\n## Primary Persona\n\nThe Trust-Conscious Operator\n\n## Dependencies\n\n- None\n\n## Stories\n\n| ID | Title | Status | Stage |\n|----|-------|--------|-------|\n| S-001-001 | Versioned Contracts and Upcasters | Done | Ready |\n| S-001-002 | Ground Prototype and Evidence Ledger | QA | Ready |\n| S-001-003 | Representative Creator Validation | Backlog | Ready |\n| S-001-004 | Commercial and Leadership Signoff | Backlog | Ready |\n\n---\n"},{"rel":"epics/E-001-contracts-and-product-proof/S-001-001-versioned-contracts-and-upcasters.md","content":"# Story: Versioned Contracts and Upcasters\n\n**ID:** S-001-001\n**Project:** clark-pro\n**Epic:** E-001\n**Stage:** Ready\n**Status:** Done\n**Priority:** P0\n**Version:** 1.0\n**Created:** 2026-07-13\n**Updated:** 2026-07-13\n**Sources:** [Authoritative epics](../../research/history/import-2026-07-13/product/03-epics-and-stories.md), [Whole-product roadmap](../../research/history/import-2026-07-13/roadmap.md), [Harness evidence](../../research/history/import-2026-07-13/evidence/harness-latest-report.json)\n\n---\n\n## Story\n\nAs a **workspace_admin**, I want to **verify every canonical event and payload against generated, versioned contracts**, so that **implementation drift and unsafe historical data fail closed before they corrupt a workspace**.\n\n## Goal\n\nDeliver the observable capability described above through Clark's canonical workspace, with enough evidence to determine whether it is complete.\n\n## Why / Rationale\n\nImplementation drift and unsafe historical data fail closed before they corrupt a workspace. This story is separated from adjacent work so the board can report verified progress without treating an incomplete product epic as finished.\n\n## Functional Requirements\n\n- Keep the JSON Schema catalog and generated runtime manifest hash-pinned.\n- Reject unknown historical steps, future versions, and invalid upcast destinations.\n\n## Acceptance Criteria\n\n- [ ] Given the contract verification commands run on the current commit, when all fixtures are evaluated, then all 18 schemas and generated outputs pass.\n- [ ] Given an unknown or future event version, when the runtime attempts to load it, then loading fails closed without rewriting history.\n\n## Negative Scenarios\n\n- A failed trust, evidence, compatibility, recovery, or policy check must leave the prior canonical state intact and expose a valid next action.\n\n## Future Scope\n\n- Broader capability beyond this verified slice remains in sibling stories and later releases.\n\n## Do Not Do\n\n- In this story, do not infer completion from UI presence, documents, or mocked fixtures when the acceptance criteria require runtime or human evidence.\n- Do not bypass Clark's event, permission, approval, provenance, or rollback contracts to make the happy path appear complete.\n\n---\n"},{"rel":"epics/E-001-contracts-and-product-proof/S-001-002-ground-prototype-and-evidence-ledger.md","content":"# Story: Ground Prototype and Evidence Ledger\n\n**ID:** S-001-002\n**Project:** clark-pro\n**Epic:** E-001\n**Stage:** Ready\n**Status:** QA\n**Priority:** P0\n**Version:** 1.0\n**Created:** 2026-07-13\n**Updated:** 2026-07-13\n**Sources:** [Authoritative epics](../../research/history/import-2026-07-13/product/03-epics-and-stories.md), [Whole-product roadmap](../../research/history/import-2026-07-13/roadmap.md), [Desktop evidence](../../research/history/import-2026-07-13/evidence/desktop-latest-report.json)\n\n---\n\n## Story\n\nAs a **creator**, I want to **walk through the real Clark surfaces with visible provenance, authority, and evidence state**, so that **product decisions are evaluated against an honest fixture instead of a feature checklist**.\n\n## Goal\n\nDeliver the observable capability described above through Clark's canonical workspace, with enough evidence to determine whether it is complete.\n\n## Why / Rationale\n\nProduct decisions are evaluated against an honest fixture instead of a feature checklist. This story is separated from adjacent work so the board can report verified progress without treating an incomplete product epic as finished.\n\n## Functional Requirements\n\n- Render Focus, Canvas, Review, Timeline, Library, Memory, and Connections from one representative project model.\n- Keep human-evidence, runtime-evidence, and missing-evidence results distinct in the Ground ledger.\n\n## Acceptance Criteria\n\n- [ ] Given the automated prototype checks run, when the project is verified, then all mapped prototype and contract evidence remains internally consistent.\n- [ ] Given a requirement needs observed creator behavior, when only a prototype or document exists, then the ledger keeps that requirement pending rather than marking it verified.\n\n## Negative Scenarios\n\n- A failed trust, evidence, compatibility, recovery, or policy check must leave the prior canonical state intact and expose a valid next action.\n\n## Future Scope\n\n- Scope not named in this story remains in sibling stories or a later release; this story does not absorb the full parent epic.\n\n## Do Not Do\n\n- In this story, do not infer completion from UI presence, documents, or mocked fixtures when the acceptance criteria require runtime or human evidence.\n- Do not bypass Clark's event, permission, approval, provenance, or rollback contracts to make the happy path appear complete.\n\n---\n"},{"rel":"epics/E-001-contracts-and-product-proof/S-001-003-representative-creator-validation.md","content":"# Story: Representative Creator Validation\n\n**ID:** S-001-003\n**Project:** clark-pro\n**Epic:** E-001\n**Stage:** Ready\n**Status:** Backlog\n**Priority:** P0\n**Phase:** P-002-01\n**Version:** 1.0\n**Created:** 2026-07-13\n**Updated:** 2026-07-13\n**Sources:** [Authoritative epics](../../research/history/import-2026-07-13/product/03-epics-and-stories.md), [Whole-product roadmap](../../research/history/import-2026-07-13/roadmap.md)\n\n---\n\n## Story\n\nAs a **creator**, I want to **complete observed Clark workflows with the representative Full-Week fixture**, so that **the team can prove Focus, Canvas, memory, provenance, and authority are understandable before expanding automation**.\n\n## Goal\n\nDeliver the observable capability described above through Clark's canonical workspace, with enough evidence to determine whether it is complete.\n\n## Why / Rationale\n\nThe team can prove Focus, Canvas, memory, provenance, and authority are understandable before expanding automation. This story is separated from adjacent work so the board can report verified progress without treating an incomplete product epic as finished.\n\n## Functional Requirements\n\n- Run five observed walkthroughs using the committed protocol and record assistance, wrong turns, timing, and explanation quality.\n- Redesign and retest every failed critical gate before signoff.\n\n## Acceptance Criteria\n\n- [ ] Given five representative creators complete the protocol, when results are synthesized, then every Canvas and memory comprehension gate has attributable evidence.\n- [ ] Given any critical comprehension gate fails, when Ground status is recalculated, then signoff remains blocked until a redesigned path passes a follow-up run.\n\n## Negative Scenarios\n\n- A failed trust, evidence, compatibility, recovery, or policy check must leave the prior canonical state intact and expose a valid next action.\n\n## Future Scope\n\n- Scope not named in this story remains in sibling stories or a later release; this story does not absorb the full parent epic.\n\n## Do Not Do\n\n- In this story, do not infer completion from UI presence, documents, or mocked fixtures when the acceptance criteria require runtime or human evidence.\n- Do not bypass Clark's event, permission, approval, provenance, or rollback contracts to make the happy path appear complete.\n\n---\n"},{"rel":"epics/E-001-contracts-and-product-proof/S-001-004-commercial-and-leadership-signoff.md","content":"# Story: Commercial and Leadership Signoff\n\n**ID:** S-001-004\n**Project:** clark-pro\n**Epic:** E-001\n**Stage:** Ready\n**Status:** Backlog\n**Priority:** P0\n**Phase:** P-002-01\n**Version:** 1.0\n**Created:** 2026-07-13\n**Updated:** 2026-07-13\n**Sources:** [Authoritative epics](../../research/history/import-2026-07-13/product/03-epics-and-stories.md), [Whole-product roadmap](../../research/history/import-2026-07-13/roadmap.md)\n\n---\n\n## Story\n\nAs a **workspace_admin**, I want to **record accountable owners, capacity, security approval, and a binding replacement signal**, so that **Ground closes only when the project has real organizational and commercial commitment**.\n\n## Goal\n\nDeliver the observable capability described above through Clark's canonical workspace, with enough evidence to determine whether it is complete.\n\n## Why / Rationale\n\nGround closes only when the project has real organizational and commercial commitment. This story is separated from adjacent work so the board can report verified progress without treating an incomplete product epic as finished.\n\n## Functional Requirements\n\n- Assign named primary and backup owners with capacity and dependency commitments.\n- Complete the design-partner and purchase-signal protocols without substituting compliments or hypothetical intent.\n\n## Acceptance Criteria\n\n- [ ] Given all required evidence is present, when each named leadership role signs the ledger, then Ground may transition to closed.\n- [ ] Given any owner, capacity commitment, security proof, or binding purchase signal is absent, when the ledger is verified, then Ground remains open with a precise next action.\n\n## Negative Scenarios\n\n- A failed trust, evidence, compatibility, recovery, or policy check must leave the prior canonical state intact and expose a valid next action.\n\n## Future Scope\n\n- Scope not named in this story remains in sibling stories or a later release; this story does not absorb the full parent epic.\n\n## Do Not Do\n\n- In this story, do not infer completion from UI presence, documents, or mocked fixtures when the acceptance criteria require runtime or human evidence.\n- Do not bypass Clark's event, permission, approval, provenance, or rollback contracts to make the happy path appear complete.\n\n---\n"},{"rel":"epics/E-002-native-studio-and-durable-harness/E-002.md","content":"# Epic: Native Studio and Durable Harness\n\n**ID:** E-002\n**Project:** clark-pro\n**Stage:** Ready\n**Version:** 1.0\n**Created:** 2026-07-13\n**Updated:** 2026-07-13\n**Sources:** [Authoritative epics](../../research/history/import-2026-07-13/product/03-epics-and-stories.md), [Whole-product roadmap](../../research/history/import-2026-07-13/roadmap.md)\n\n---\n\n## Outcome\n\nCreators can operate a local Mac studio whose canonical state, approvals, and active work survive renderer reloads and Harness restarts without granting the renderer ambient authority.\n\n## Success Metric\n\n| Metric | Baseline | Target |\n|--------|----------|--------|\n| Supported interruption scenarios recovered without duplicate mutation | Bounded idea-run and process-death scenarios pass | 100% of supported run states |\n| Release trust gates passing | 0 of signing, notarization, Gatekeeper, and update gates | 100% before external distribution |\n\n## Primary Persona\n\nThe Trust-Conscious Operator\n\n## Dependencies\n\n- E-001 (Contracts and Product Proof)\n\n## Stories\n\n| ID | Title | Status | Stage |\n|----|-------|--------|-------|\n| S-002-001 | Hardened Mac Shell Boundary | Done | Ready |\n| S-002-002 | Durable Event Store and Run Recovery | Done | Ready |\n| S-002-003 | Workspace Portability and Backup Recovery | Backlog | Ready |\n| S-002-004 | Keychain, Signing, and Safe Updates | Backlog | Ready |\n| S-002-005 | Accessibility and Performance Release Evidence | Backlog | Ready |\n\n---\n"},{"rel":"epics/E-002-native-studio-and-durable-harness/S-002-001-hardened-mac-shell-boundary.md","content":"# Story: Hardened Mac Shell Boundary\n\n**ID:** S-002-001\n**Project:** clark-pro\n**Epic:** E-002\n**Stage:** Ready\n**Status:** Done\n**Priority:** P0\n**Version:** 1.0\n**Created:** 2026-07-13\n**Updated:** 2026-07-13\n**Sources:** [Authoritative epics](../../research/history/import-2026-07-13/product/03-epics-and-stories.md), [Whole-product roadmap](../../research/history/import-2026-07-13/roadmap.md), [Desktop evidence](../../research/history/import-2026-07-13/evidence/desktop-latest-report.json)\n\n---\n\n## Story\n\nAs a **creator**, I want to **navigate Clark with native Mac controls while the renderer remains isolated**, so that **the desktop experience feels native without exposing shell, filesystem, secrets, or raw IPC**.\n\n## Goal\n\nDeliver the observable capability described above through Clark's canonical workspace, with enough evidence to determine whether it is complete.\n\n## Why / Rationale\n\nThe desktop experience feels native without exposing shell, filesystem, secrets, or raw IPC. This story is separated from adjacent work so the board can report verified progress without treating an incomplete product epic as finished.\n\n## Functional Requirements\n\n- Keep context isolation, sandboxing, web security, and sender validation enabled.\n- Expose only named preload methods and native menu/view accelerators.\n\n## Acceptance Criteria\n\n- [ ] Given the Electron boundary tests run, when the renderer is inspected, then Node globals, raw IPC, shell, path, and secret access are absent.\n- [ ] Given the creator uses menus or keyboard shortcuts, when a Studio view is selected, then the expected view opens with accessible names and one visible level-one heading.\n\n## Negative Scenarios\n\n- A failed trust, evidence, compatibility, recovery, or policy check must leave the prior canonical state intact and expose a valid next action.\n\n## Future Scope\n\n- Broader capability beyond this verified slice remains in sibling stories and later releases.\n\n## Do Not Do\n\n- In this story, do not infer completion from UI presence, documents, or mocked fixtures when the acceptance criteria require runtime or human evidence.\n- Do not bypass Clark's event, permission, approval, provenance, or rollback contracts to make the happy path appear complete.\n\n---\n"},{"rel":"epics/E-002-native-studio-and-durable-harness/S-002-002-durable-event-store-and-run-recovery.md","content":"# Story: Durable Event Store and Run Recovery\n\n**ID:** S-002-002\n**Project:** clark-pro\n**Epic:** E-002\n**Stage:** Ready\n**Status:** Done\n**Priority:** P0\n**Version:** 1.0\n**Created:** 2026-07-13\n**Updated:** 2026-07-13\n**Sources:** [Authoritative epics](../../research/history/import-2026-07-13/product/03-epics-and-stories.md), [Whole-product roadmap](../../research/history/import-2026-07-13/roadmap.md), [Harness evidence](../../research/history/import-2026-07-13/evidence/harness-latest-report.json)\n\n---\n\n## Story\n\nAs a **creator**, I want to **resume an interrupted idea run from canonical local events**, so that **work, approvals, and exact artifact identity survive process death without duplicate mutation**.\n\n## Goal\n\nDeliver the observable capability described above through Clark's canonical workspace, with enough evidence to determine whether it is complete.\n\n## Why / Rationale\n\nWork, approvals, and exact artifact identity survive process death without duplicate mutation. This story is separated from adjacent work so the board can report verified progress without treating an incomplete product epic as finished.\n\n## Functional Requirements\n\n- Persist immutable workspace events in SQLite WAL mode with per-workspace hash chains and replayable projections.\n- Terminalize interrupted calls, revoke orphaned leases, and retry under fresh authority.\n\n## Acceptance Criteria\n\n- [ ] Given a running step is interrupted by Harness process death, when the supervisor restarts it, then the run returns to its correct durable gate without creating a duplicate artifact.\n- [ ] Given projections are deleted, when events replay, then run, memory, Tool Pack, and Skill projections reproduce the same state.\n\n## Negative Scenarios\n\n- A failed trust, evidence, compatibility, recovery, or policy check must leave the prior canonical state intact and expose a valid next action.\n\n## Future Scope\n\n- Broader capability beyond this verified slice remains in sibling stories and later releases.\n\n## Do Not Do\n\n- In this story, do not infer completion from UI presence, documents, or mocked fixtures when the acceptance criteria require runtime or human evidence.\n- Do not bypass Clark's event, permission, approval, provenance, or rollback contracts to make the happy path appear complete.\n\n---\n"},{"rel":"epics/E-002-native-studio-and-durable-harness/S-002-003-workspace-portability-and-backup-recovery.md","content":"# Story: Workspace Portability and Backup Recovery\n\n**ID:** S-002-003\n**Project:** clark-pro\n**Epic:** E-002\n**Stage:** Ready\n**Status:** Backlog\n**Priority:** P0\n**Phase:** P-002-02\n**Version:** 1.0\n**Created:** 2026-07-13\n**Updated:** 2026-07-13\n**Sources:** [Authoritative epics](../../research/history/import-2026-07-13/product/03-epics-and-stories.md), [Whole-product roadmap](../../research/history/import-2026-07-13/roadmap.md)\n\n---\n\n## Story\n\nAs a **workspace_admin**, I want to **export, restore, and migrate a workspace with its assets and history intact**, so that **local ownership remains useful even after corruption, device change, or hosted-service loss**.\n\n## Goal\n\nDeliver the observable capability described above through Clark's canonical workspace, with enough evidence to determine whether it is complete.\n\n## Why / Rationale\n\nLocal ownership remains useful even after corruption, device change, or hosted-service loss. This story is separated from adjacent work so the board can report verified progress without treating an incomplete product epic as finished.\n\n## Functional Requirements\n\n- Export events, projections, content-addressed assets, checksums, and schema versions in a portable package.\n- Preview migrations and reject corrupt or incompatible imports without altering the active workspace.\n\n## Acceptance Criteria\n\n- [ ] Given a complete workspace export, when it is restored on a clean installation, then event history, artifact versions, hashes, and graph state match the source.\n- [ ] Given a corrupt checksum or incompatible migration, when import is attempted, then the active workspace remains unchanged and the failure is actionable.\n\n## Negative Scenarios\n\n- A failed trust, evidence, compatibility, recovery, or policy check must leave the prior canonical state intact and expose a valid next action.\n\n## Future Scope\n\n- Scope not named in this story remains in sibling stories or a later release; this story does not absorb the full parent epic.\n\n## Do Not Do\n\n- In this story, do not infer completion from UI presence, documents, or mocked fixtures when the acceptance criteria require runtime or human evidence.\n- Do not bypass Clark's event, permission, approval, provenance, or rollback contracts to make the happy path appear complete.\n\n---\n"},{"rel":"epics/E-002-native-studio-and-durable-harness/S-002-004-keychain-signing-and-safe-updates.md","content":"# Story: Keychain, Signing, and Safe Updates\n\n**ID:** S-002-004\n**Project:** clark-pro\n**Epic:** E-002\n**Stage:** Ready\n**Status:** Backlog\n**Priority:** P0\n**Phase:** P-002-02\n**Version:** 1.0\n**Created:** 2026-07-13\n**Updated:** 2026-07-13\n**Sources:** [Authoritative epics](../../research/history/import-2026-07-13/product/03-epics-and-stories.md), [Whole-product roadmap](../../research/history/import-2026-07-13/roadmap.md)\n\n---\n\n## Story\n\nAs a **workspace_admin**, I want to **install and update a trusted Clark build whose credentials stay behind scoped Keychain leases**, so that **the product can leave local development without weakening its security model**.\n\n## Goal\n\nDeliver the observable capability described above through Clark's canonical workspace, with enough evidence to determine whether it is complete.\n\n## Why / Rationale\n\nThe product can leave local development without weakening its security model. This story is separated from adjacent work so the board can report verified progress without treating an incomplete product epic as finished.\n\n## Functional Requirements\n\n- Broker credentials through macOS Keychain without returning token material to the renderer or event log.\n- Ship Developer ID signing, Hardened Runtime entitlements, notarization, stapling, Gatekeeper acceptance, and signed rollback-capable updates.\n\n## Acceptance Criteria\n\n- [ ] Given a release candidate, when strict code-sign and Gatekeeper checks run, then the bundle passes with an attributable Team ID and notarization evidence.\n- [ ] Given a credential is revoked, when dependent work starts or resumes, then Clark blocks it without exposing the stored secret.\n\n## Negative Scenarios\n\n- A failed trust, evidence, compatibility, recovery, or policy check must leave the prior canonical state intact and expose a valid next action.\n\n## Future Scope\n\n- Scope not named in this story remains in sibling stories or a later release; this story does not absorb the full parent epic.\n\n## Do Not Do\n\n- In this story, do not infer completion from UI presence, documents, or mocked fixtures when the acceptance criteria require runtime or human evidence.\n- Do not bypass Clark's event, permission, approval, provenance, or rollback contracts to make the happy path appear complete.\n\n---\n"},{"rel":"epics/E-002-native-studio-and-durable-harness/S-002-005-accessibility-and-performance-release-evidence.md","content":"# Story: Accessibility and Performance Release Evidence\n\n**ID:** S-002-005\n**Project:** clark-pro\n**Epic:** E-002\n**Stage:** Ready\n**Status:** Backlog\n**Priority:** P1\n**Phase:** P-002-02\n**Version:** 1.0\n**Created:** 2026-07-13\n**Updated:** 2026-07-13\n**Sources:** [Authoritative epics](../../research/history/import-2026-07-13/product/03-epics-and-stories.md), [Whole-product roadmap](../../research/history/import-2026-07-13/roadmap.md)\n\n---\n\n## Story\n\nAs a **creator**, I want to **operate the representative workspace with keyboard and VoiceOver at production scale**, so that **native trust and control are available to creators without hidden interaction or performance failures**.\n\n## Goal\n\nDeliver the observable capability described above through Clark's canonical workspace, with enough evidence to determine whether it is complete.\n\n## Why / Rationale\n\nNative trust and control are available to creators without hidden interaction or performance failures. This story is separated from adjacent work so the board can report verified progress without treating an incomplete product epic as finished.\n\n## Functional Requirements\n\n- Run the committed VoiceOver and keyboard tasks with an accessibility expert.\n- Measure Focus and Canvas behavior with the 50-object fixture and retain attributable results.\n\n## Acceptance Criteria\n\n- [ ] Given the representative task set, when it is completed with VoiceOver and keyboard only, then all critical actions and state changes are reachable and announced.\n- [ ] Given the 50-object fixture is loaded, when the creator navigates and changes views, then the agreed responsiveness thresholds pass without losing semantic focus.\n\n## Negative Scenarios\n\n- A failed trust, evidence, compatibility, recovery, or policy check must leave the prior canonical state intact and expose a valid next action.\n\n## Future Scope\n\n- Scope not named in this story remains in sibling stories or a later release; this story does not absorb the full parent epic.\n\n## Do Not Do\n\n- In this story, do not infer completion from UI presence, documents, or mocked fixtures when the acceptance criteria require runtime or human evidence.\n- Do not bypass Clark's event, permission, approval, provenance, or rollback contracts to make the happy path appear complete.\n\n---\n"},{"rel":"epics/E-003-idea-foundry-and-creation-studio/E-003.md","content":"# Epic: Idea Foundry and Creation Studio\n\n**ID:** E-003\n**Project:** clark-pro\n**Stage:** Ready\n**Version:** 1.0\n**Created:** 2026-07-13\n**Updated:** 2026-07-13\n**Sources:** [Authoritative epics](../../research/history/import-2026-07-13/product/03-epics-and-stories.md), [Whole-product roadmap](../../research/history/import-2026-07-13/roadmap.md)\n\n---\n\n## Outcome\n\nCreators can move from rough intent to evidence-linked, versioned, reviewable content while retaining alternatives, upstream lineage, and exact-version approval.\n\n## Success Metric\n\n| Metric | Baseline | Target |\n|--------|----------|--------|\n| Approved artifacts judged publishable with normal editing | No representative weekly baseline yet | At least 80% in the Stratum 3 validation run |\n| Final factual assertions with a source or explicit creator assertion | Bounded thesis slice does not claim factual research | 100% in production creation loops |\n\n## Primary Persona\n\nThe Operator-Creator\n\n## Dependencies\n\n- E-001 (Contracts and Product Proof)\n- E-002 (Native Studio and Durable Harness)\n\n## Stories\n\n| ID | Title | Status | Stage |\n|----|-------|--------|-------|\n| S-003-001 | Immutable Idea Capture and Revision Lineage | Done | Ready |\n| S-003-002 | Evidence-Honest Idea Inspection and Canvas | Done | Ready |\n| S-003-003 | Source Ingestion and Claim Ledger | Backlog | Ready |\n| S-003-004 | Writing, Media, and Platform Variants | Backlog | Ready |\n| S-003-005 | Version-Specific Review and Policy Gates | Backlog | Ready |\n\n---\n"},{"rel":"epics/E-003-idea-foundry-and-creation-studio/S-003-001-immutable-idea-capture-and-revision-lineage.md","content":"# Story: Immutable Idea Capture and Revision Lineage\n\n**ID:** S-003-001\n**Project:** clark-pro\n**Epic:** E-003\n**Stage:** Ready\n**Status:** Done\n**Priority:** P0\n**Version:** 1.0\n**Created:** 2026-07-13\n**Updated:** 2026-07-13\n**Sources:** [Authoritative epics](../../research/history/import-2026-07-13/product/03-epics-and-stories.md), [Whole-product roadmap](../../research/history/import-2026-07-13/roadmap.md), [Harness evidence](../../research/history/import-2026-07-13/evidence/harness-latest-report.json)\n\n---\n\n## Story\n\nAs a **creator**, I want to **capture an idea and create explicit revisions with root and parent lineage**, so that **upstream decisions can change without rewriting history or preserving stale approval**.\n\n## Goal\n\nDeliver the observable capability described above through Clark's canonical workspace, with enough evidence to determine whether it is complete.\n\n## Why / Rationale\n\nUpstream decisions can change without rewriting history or preserving stale approval. This story is separated from adjacent work so the board can report verified progress without treating an incomplete product epic as finished.\n\n## Functional Requirements\n\n- Store each revision as an immutable artifact version with stable logical identity.\n- Atomically cancel superseded runs and invalidate pending exact-version approvals.\n\n## Acceptance Criteria\n\n- [ ] Given an approved or pending idea revision, when the creator requests a revision with a reason, then a new version and run are appended with root and parent lineage.\n- [ ] Given the prior revision had approval authority, when the new revision is created, then the old authority is invalidated and cannot complete the replacement artifact.\n\n## Negative Scenarios\n\n- A failed trust, evidence, compatibility, recovery, or policy check must leave the prior canonical state intact and expose a valid next action.\n\n## Future Scope\n\n- Broader capability beyond this verified slice remains in sibling stories and later releases.\n\n## Do Not Do\n\n- In this story, do not infer completion from UI presence, documents, or mocked fixtures when the acceptance criteria require runtime or human evidence.\n- Do not bypass Clark's event, permission, approval, provenance, or rollback contracts to make the happy path appear complete.\n\n---\n"},{"rel":"epics/E-003-idea-foundry-and-creation-studio/S-003-002-evidence-honest-idea-inspection-and-canvas.md","content":"# Story: Evidence-Honest Idea Inspection and Canvas\n\n**ID:** S-003-002\n**Project:** clark-pro\n**Epic:** E-003\n**Stage:** Ready\n**Status:** Done\n**Priority:** P0\n**Version:** 1.0\n**Created:** 2026-07-13\n**Updated:** 2026-07-13\n**Sources:** [Authoritative epics](../../research/history/import-2026-07-13/product/03-epics-and-stories.md), [Whole-product roadmap](../../research/history/import-2026-07-13/roadmap.md), [Desktop evidence](../../research/history/import-2026-07-13/evidence/desktop-latest-report.json)\n\n---\n\n## Story\n\nAs a **creator**, I want to **inspect thesis structure, open evidence gates, lineage, and the next creator decision in one Canvas**, so that **structural completeness is never confused with market validation or research proof**.\n\n## Goal\n\nDeliver the observable capability described above through Clark's canonical workspace, with enough evidence to determine whether it is complete.\n\n## Why / Rationale\n\nStructural completeness is never confused with market validation or research proof. This story is separated from adjacent work so the board can report verified progress without treating an incomplete product epic as finished.\n\n## Functional Requirements\n\n- Show ten thesis facets, structural completeness, evidence readiness, and five open observed-proof gates from canonical events.\n- Keep Canvas and Focus synchronized through the same projections and exact-version review state.\n\n## Acceptance Criteria\n\n- [ ] Given a structurally complete idea scores ten of ten, when no observed evidence exists, then the UI reports evidence required rather than validated.\n- [ ] Given a revision supersedes a prior run, when Canvas reloads, then lineage, stale authority, and the current review gate remain correct.\n\n## Negative Scenarios\n\n- A failed trust, evidence, compatibility, recovery, or policy check must leave the prior canonical state intact and expose a valid next action.\n\n## Future Scope\n\n- Broader capability beyond this verified slice remains in sibling stories and later releases.\n\n## Do Not Do\n\n- In this story, do not infer completion from UI presence, documents, or mocked fixtures when the acceptance criteria require runtime or human evidence.\n- Do not bypass Clark's event, permission, approval, provenance, or rollback contracts to make the happy path appear complete.\n\n---\n"},{"rel":"epics/E-003-idea-foundry-and-creation-studio/S-003-003-source-ingestion-and-claim-ledger.md","content":"# Story: Source Ingestion and Claim Ledger\n\n**ID:** S-003-003\n**Project:** clark-pro\n**Epic:** E-003\n**Stage:** Ready\n**Status:** Backlog\n**Priority:** P0\n**Phase:** P-002-03\n**Version:** 1.0\n**Created:** 2026-07-13\n**Updated:** 2026-07-13\n**Sources:** [Authoritative epics](../../research/history/import-2026-07-13/product/03-epics-and-stories.md), [Whole-product roadmap](../../research/history/import-2026-07-13/roadmap.md)\n\n---\n\n## Story\n\nAs a **creator**, I want to **bring text, URLs, documents, screenshots, audio, video, and files into a traceable claim workflow**, so that **final assertions retain original evidence and visible uncertainty**.\n\n## Goal\n\nDeliver the observable capability described above through Clark's canonical workspace, with enough evidence to determine whether it is complete.\n\n## Why / Rationale\n\nFinal assertions retain original evidence and visible uncertainty. This story is separated from adjacent work so the board can report verified progress without treating an incomplete product epic as finished.\n\n## Functional Requirements\n\n- Retain original bytes or text, source health, citations, claims, uncertainty, and creator assertions.\n- Support pin, dispute, replace, and saturation review without triggering paid work on capture.\n\n## Acceptance Criteria\n\n- [ ] Given a supported source is captured, when it enters a project, then its original content and provenance remain retrievable without starting research or generation.\n- [ ] Given a final factual assertion is reviewed, when no source or explicit creator assertion supports it, then approval is blocked with the missing evidence visible.\n\n## Negative Scenarios\n\n- A failed trust, evidence, compatibility, recovery, or policy check must leave the prior canonical state intact and expose a valid next action.\n\n## Future Scope\n\n- Scope not named in this story remains in sibling stories or a later release; this story does not absorb the full parent epic.\n\n## Do Not Do\n\n- In this story, do not infer completion from UI presence, documents, or mocked fixtures when the acceptance criteria require runtime or human evidence.\n- Do not bypass Clark's event, permission, approval, provenance, or rollback contracts to make the happy path appear complete.\n\n---\n"},{"rel":"epics/E-003-idea-foundry-and-creation-studio/S-003-004-writing-media-and-platform-variants.md","content":"# Story: Writing, Media, and Platform Variants\n\n**ID:** S-003-004\n**Project:** clark-pro\n**Epic:** E-003\n**Stage:** Ready\n**Status:** Backlog\n**Priority:** P1\n**Phase:** P-002-03\n**Version:** 1.0\n**Created:** 2026-07-13\n**Updated:** 2026-07-13\n**Sources:** [Authoritative epics](../../research/history/import-2026-07-13/product/03-epics-and-stories.md), [Whole-product roadmap](../../research/history/import-2026-07-13/roadmap.md)\n\n---\n\n## Story\n\nAs a **creator**, I want to **produce scripts, long-form work, images, audio, video, reels, carousels, captions, and thumbnails from shared lineage**, so that **one intent can become a coordinated body of platform-ready work without flattening artifacts into text blobs**.\n\n## Goal\n\nDeliver the observable capability described above through Clark's canonical workspace, with enough evidence to determine whether it is complete.\n\n## Why / Rationale\n\nOne intent can become a coordinated body of platform-ready work without flattening artifacts into text blobs. This story is separated from adjacent work so the board can report verified progress without treating an incomplete product epic as finished.\n\n## Functional Requirements\n\n- Represent each output as a typed, versioned artifact with provider, cost, tool revision, and input lineage.\n- Reconnect asynchronous media jobs after restart and validate outputs with isolated media workers.\n\n## Acceptance Criteria\n\n- [ ] Given a reviewed angle, when text and media branches run, then each accepted artifact records its exact inputs, capability revision, cost, and technical metadata.\n- [ ] Given the app restarts during an asynchronous provider job, when it relaunches, then Clark reconnects by provider identity without duplicating the paid job.\n\n## Negative Scenarios\n\n- A failed trust, evidence, compatibility, recovery, or policy check must leave the prior canonical state intact and expose a valid next action.\n\n## Future Scope\n\n- Scope not named in this story remains in sibling stories or a later release; this story does not absorb the full parent epic.\n\n## Do Not Do\n\n- In this story, do not infer completion from UI presence, documents, or mocked fixtures when the acceptance criteria require runtime or human evidence.\n- Do not bypass Clark's event, permission, approval, provenance, or rollback contracts to make the happy path appear complete.\n\n---\n"},{"rel":"epics/E-003-idea-foundry-and-creation-studio/S-003-005-version-specific-review-and-policy-gates.md","content":"# Story: Version-Specific Review and Policy Gates\n\n**ID:** S-003-005\n**Project:** clark-pro\n**Epic:** E-003\n**Stage:** Ready\n**Status:** Backlog\n**Priority:** P0\n**Phase:** P-002-03\n**Version:** 1.0\n**Created:** 2026-07-13\n**Updated:** 2026-07-13\n**Sources:** [Authoritative epics](../../research/history/import-2026-07-13/product/03-epics-and-stories.md), [Whole-product roadmap](../../research/history/import-2026-07-13/roadmap.md)\n\n---\n\n## Story\n\nAs a **reviewer**, I want to **compare versions and approve only the exact artifact that passed evidence, brand, budget, accessibility, disclosure, and confidentiality checks**, so that **no stale or invalid output can publish under a prior approval**.\n\n## Goal\n\nDeliver the observable capability described above through Clark's canonical workspace, with enough evidence to determine whether it is complete.\n\n## Why / Rationale\n\nNo stale or invalid output can publish under a prior approval. This story is separated from adjacent work so the board can report verified progress without treating an incomplete product epic as finished.\n\n## Functional Requirements\n\n- Render platform previews, text or media comparisons, evidence, costs, policy results, and decision alternatives.\n- Bind approvals to exact artifact versions and invalidate them when upstream lineage changes.\n\n## Acceptance Criteria\n\n- [ ] Given two artifact versions, when the reviewer selects one, then Clark records the chosen version, alternatives, actor, reason, and reversibility.\n- [ ] Given an approved artifact becomes stale or violates a required gate, when publication is attempted, then the prior approval cannot authorize the mutation.\n\n## Negative Scenarios\n\n- A failed trust, evidence, compatibility, recovery, or policy check must leave the prior canonical state intact and expose a valid next action.\n\n## Future Scope\n\n- Scope not named in this story remains in sibling stories or a later release; this story does not absorb the full parent epic.\n\n## Do Not Do\n\n- In this story, do not infer completion from UI presence, documents, or mocked fixtures when the acceptance criteria require runtime or human evidence.\n- Do not bypass Clark's event, permission, approval, provenance, or rollback contracts to make the happy path appear complete.\n\n---\n"},{"rel":"epics/E-004-mcp-and-clark-bridge/E-004.md","content":"# Epic: MCP and Clark Bridge\n\n**ID:** E-004\n**Project:** clark-pro\n**Stage:** Ready\n**Version:** 1.0\n**Created:** 2026-07-13\n**Updated:** 2026-07-13\n**Sources:** [Authoritative epics](../../research/history/import-2026-07-13/product/03-epics-and-stories.md), [Whole-product roadmap](../../research/history/import-2026-07-13/roadmap.md)\n\n---\n\n## Outcome\n\nConnected tools and external agents can use Clark through scoped, inspectable contracts while producing the same canonical state and policy decisions as Studio.\n\n## Success Metric\n\n| Metric | Baseline | Target |\n|--------|----------|--------|\n| Hostile MCP conformance cases passing | 36 of 36 Ground cases pass | 100% for every supported transport and release |\n| Studio and Bridge state-equivalence scenarios passing | Bounded capture, revision, list, and get pass | 100% of exposed mutations |\n\n## Primary Persona\n\nThe Integration Builder\n\n## Dependencies\n\n- E-001 (Contracts and Product Proof)\n- E-002 (Native Studio and Durable Harness)\n\n## Stories\n\n| ID | Title | Status | Stage |\n|----|-------|--------|-------|\n| S-004-001 | Governed Bundled MCP Capability | Done | Ready |\n| S-004-002 | Scoped Clark Bridge Core | Done | Ready |\n| S-004-003 | Durable Bridge Tasks and Client Pairing | Backlog | Ready |\n| S-004-004 | External Client Examples and Compatibility | Backlog | Ready |\n\n---\n"},{"rel":"epics/E-004-mcp-and-clark-bridge/S-004-001-governed-bundled-mcp-capability.md","content":"# Story: Governed Bundled MCP Capability\n\n**ID:** S-004-001\n**Project:** clark-pro\n**Epic:** E-004\n**Stage:** Ready\n**Status:** Done\n**Priority:** P0\n**Version:** 1.0\n**Created:** 2026-07-13\n**Updated:** 2026-07-13\n**Sources:** [Authoritative epics](../../research/history/import-2026-07-13/product/03-epics-and-stories.md), [Whole-product roadmap](../../research/history/import-2026-07-13/roadmap.md), [Harness evidence](../../research/history/import-2026-07-13/evidence/harness-latest-report.json)\n\n---\n\n## Story\n\nAs a **workspace_admin**, I want to **register and invoke a pinned MCP capability through exact schemas and short-lived permission leases**, so that **external tool results enter canonical state without inheriting ambient process authority**.\n\n## Goal\n\nDeliver the observable capability described above through Clark's canonical workspace, with enough evidence to determine whether it is complete.\n\n## Why / Rationale\n\nExternal tool results enter canonical state without inheriting ambient process authority. This story is separated from adjacent work so the board can report verified progress without treating an incomplete product epic as finished.\n\n## Functional Requirements\n\n- Pin the server source hash, tool inventory, schemas, environment profile, and structured result envelope.\n- Record permission, lease, invocation, health, and denial receipts in canonical events.\n\n## Acceptance Criteria\n\n- [ ] Given the bundled server starts, when discovery and invocation complete, then the exact two-tool inventory and schemas match the pinned capability contract.\n- [ ] Given source, schema, environment, or authority expands, when validation runs, then the invocation is denied before a lease or tool call is issued.\n\n## Negative Scenarios\n\n- A failed trust, evidence, compatibility, recovery, or policy check must leave the prior canonical state intact and expose a valid next action.\n\n## Future Scope\n\n- Broader capability beyond this verified slice remains in sibling stories and later releases.\n\n## Do Not Do\n\n- In this story, do not infer completion from UI presence, documents, or mocked fixtures when the acceptance criteria require runtime or human evidence.\n- Do not bypass Clark's event, permission, approval, provenance, or rollback contracts to make the happy path appear complete.\n\n---\n"},{"rel":"epics/E-004-mcp-and-clark-bridge/S-004-002-scoped-clark-bridge-core.md","content":"# Story: Scoped Clark Bridge Core\n\n**ID:** S-004-002\n**Project:** clark-pro\n**Epic:** E-004\n**Stage:** Ready\n**Status:** Done\n**Priority:** P0\n**Version:** 1.0\n**Created:** 2026-07-13\n**Updated:** 2026-07-13\n**Sources:** [Authoritative epics](../../research/history/import-2026-07-13/product/03-epics-and-stories.md), [Whole-product roadmap](../../research/history/import-2026-07-13/roadmap.md), [Harness evidence](../../research/history/import-2026-07-13/evidence/harness-latest-report.json)\n\n---\n\n## Story\n\nAs a **external_agent**, I want to **capture, revise, list, and read ideas through an authenticated workspace-scoped Bridge**, so that **external agents can collaborate without creating a second state model or gaining approval authority**.\n\n## Goal\n\nDeliver the observable capability described above through Clark's canonical workspace, with enough evidence to determine whether it is complete.\n\n## Why / Rationale\n\nExternal agents can collaborate without creating a second state model or gaining approval authority. This story is separated from adjacent work so the board can report verified progress without treating an incomplete product epic as finished.\n\n## Functional Requirements\n\n- Bind Streamable HTTP to localhost with bearer material outside renderer and event state.\n- Route Bridge mutations through the same Harness commands as Studio and record client actor metadata.\n\n## Acceptance Criteria\n\n- [ ] Given a scoped Bridge client, when it captures or revises an idea, then Studio shows the same canonical lineage and policy state.\n- [ ] Given a missing bearer, hostile Origin or Host, oversized body, or cross-workspace request, when the request arrives, then it fails without leaking the credential.\n\n## Negative Scenarios\n\n- A failed trust, evidence, compatibility, recovery, or policy check must leave the prior canonical state intact and expose a valid next action.\n\n## Future Scope\n\n- Broader capability beyond this verified slice remains in sibling stories and later releases.\n\n## Do Not Do\n\n- In this story, do not infer completion from UI presence, documents, or mocked fixtures when the acceptance criteria require runtime or human evidence.\n- Do not bypass Clark's event, permission, approval, provenance, or rollback contracts to make the happy path appear complete.\n\n---\n"},{"rel":"epics/E-004-mcp-and-clark-bridge/S-004-003-durable-bridge-tasks-and-client-pairing.md","content":"# Story: Durable Bridge Tasks and Client Pairing\n\n**ID:** S-004-003\n**Project:** clark-pro\n**Epic:** E-004\n**Stage:** Ready\n**Status:** Backlog\n**Priority:** P0\n**Phase:** P-002-03\n**Version:** 1.0\n**Created:** 2026-07-13\n**Updated:** 2026-07-13\n**Sources:** [Authoritative epics](../../research/history/import-2026-07-13/product/03-epics-and-stories.md), [Whole-product roadmap](../../research/history/import-2026-07-13/roadmap.md)\n\n---\n\n## Story\n\nAs a **external_agent**, I want to **start long-running Clark work, reconnect, observe status, cancel when allowed, and resume creator review**, so that **client disconnects or Mac restarts do not lose work or create ambiguous duplicate mutations**.\n\n## Goal\n\nDeliver the observable capability described above through Clark's canonical workspace, with enough evidence to determine whether it is complete.\n\n## Why / Rationale\n\nClient disconnects or Mac restarts do not lose work or create ambiguous duplicate mutations. This story is separated from adjacent work so the board can report verified progress without treating an incomplete product epic as finished.\n\n## Functional Requirements\n\n- Map negotiated MCP Tasks or Clark job receipts to durable Harness runs with explicit cancellation and reconciliation states.\n- Pair and revoke clients through a Keychain-backed, workspace-scoped flow.\n\n## Acceptance Criteria\n\n- [ ] Given a client disconnects after starting durable work, when it reconnects with the same intent identity, then it receives the existing job rather than creating a duplicate.\n- [ ] Given client access is revoked, when it attempts a new read or mutation, then Clark denies access immediately while the canonical job state remains intact.\n\n## Negative Scenarios\n\n- A failed trust, evidence, compatibility, recovery, or policy check must leave the prior canonical state intact and expose a valid next action.\n\n## Future Scope\n\n- Scope not named in this story remains in sibling stories or a later release; this story does not absorb the full parent epic.\n\n## Do Not Do\n\n- In this story, do not infer completion from UI presence, documents, or mocked fixtures when the acceptance criteria require runtime or human evidence.\n- Do not bypass Clark's event, permission, approval, provenance, or rollback contracts to make the happy path appear complete.\n\n---\n"},{"rel":"epics/E-004-mcp-and-clark-bridge/S-004-004-external-client-examples-and-compatibility.md","content":"# Story: External Client Examples and Compatibility\n\n**ID:** S-004-004\n**Project:** clark-pro\n**Epic:** E-004\n**Stage:** Ready\n**Status:** Backlog\n**Priority:** P1\n**Phase:** P-002-03\n**Version:** 1.0\n**Created:** 2026-07-13\n**Updated:** 2026-07-13\n**Sources:** [Authoritative epics](../../research/history/import-2026-07-13/product/03-epics-and-stories.md), [Whole-product roadmap](../../research/history/import-2026-07-13/roadmap.md)\n\n---\n\n## Story\n\nAs a **external_agent**, I want to **connect Claude, Codex, Hermes, and another MCP client using documented scope and recovery patterns**, so that **builders can integrate with Clark without reverse-engineering private implementation details**.\n\n## Goal\n\nDeliver the observable capability described above through Clark's canonical workspace, with enough evidence to determine whether it is complete.\n\n## Why / Rationale\n\nBuilders can integrate with Clark without reverse-engineering private implementation details. This story is separated from adjacent work so the board can report verified progress without treating an incomplete product epic as finished.\n\n## Functional Requirements\n\n- Publish example registrations, tool/resource usage, task negotiation, reconnect, and revocation flows.\n- Maintain a versioned compatibility matrix and conformance fixtures for supported clients.\n\n## Acceptance Criteria\n\n- [ ] Given a documented client configuration, when the conformance example runs, then capture-to-review-to-result completes through supported public contracts.\n- [ ] Given a client lacks MCP Tasks, when it starts long work, then the documented Clark receipt fallback preserves status and reconnect behavior.\n\n## Negative Scenarios\n\n- A failed trust, evidence, compatibility, recovery, or policy check must leave the prior canonical state intact and expose a valid next action.\n\n## Future Scope\n\n- Scope not named in this story remains in sibling stories or a later release; this story does not absorb the full parent epic.\n\n## Do Not Do\n\n- In this story, do not infer completion from UI presence, documents, or mocked fixtures when the acceptance criteria require runtime or human evidence.\n- Do not bypass Clark's event, permission, approval, provenance, or rollback contracts to make the happy path appear complete.\n\n---\n"},{"rel":"epics/E-005-governed-memory/E-005.md","content":"# Epic: Governed Creator Memory\n\n**ID:** E-005\n**Project:** clark-pro\n**Stage:** Ready\n**Version:** 1.0\n**Created:** 2026-07-13\n**Updated:** 2026-07-13\n**Sources:** [Authoritative epics](../../research/history/import-2026-07-13/product/03-epics-and-stories.md), [Whole-product roadmap](../../research/history/import-2026-07-13/roadmap.md)\n\n---\n\n## Outcome\n\nCreators can inspect, promote, retrieve, correct, dispute, expire, export, and forget scoped beliefs without silent learning or cross-workspace leakage.\n\n## Success Metric\n\n| Metric | Baseline | Target |\n|--------|----------|--------|\n| Forgotten or inactive memories returned by retrieval | 0 in the bounded retrieval suite | 0 |\n| Memory proposals accepted, edited, rejected, and corrected | Bounded workflow instrumented; no creator baseline | Establish representative baseline |\n\n## Primary Persona\n\nThe Trust-Conscious Operator\n\n## Dependencies\n\n- E-001 (Contracts and Product Proof)\n- E-002 (Native Studio and Durable Harness)\n\n## Stories\n\n| ID | Title | Status | Stage |\n|----|-------|--------|-------|\n| S-005-001 | Evidence-Bound Memory Promotion | Done | Ready |\n| S-005-002 | Scoped Retrieval, Correction, and Forgetting | Done | Ready |\n| S-005-003 | Semantic Retrieval and Reflection Lineage | Backlog | Ready |\n| S-005-004 | Physical Erasure and Memory Validation Corpus | Backlog | Ready |\n\n---\n"},{"rel":"epics/E-005-governed-memory/S-005-001-evidence-bound-memory-promotion.md","content":"# Story: Evidence-Bound Memory Promotion\n\n**ID:** S-005-001\n**Project:** clark-pro\n**Epic:** E-005\n**Stage:** Ready\n**Status:** Done\n**Priority:** P0\n**Version:** 1.0\n**Created:** 2026-07-13\n**Updated:** 2026-07-13\n**Sources:** [Authoritative epics](../../research/history/import-2026-07-13/product/03-epics-and-stories.md), [Whole-product roadmap](../../research/history/import-2026-07-13/roadmap.md), [Harness evidence](../../research/history/import-2026-07-13/evidence/harness-latest-report.json)\n\n---\n\n## Story\n\nAs a **creator**, I want to **review a memory proposal with exact evidence, scope, confidence, sensitivity, and retrieval policy**, so that **only deliberate creator decisions can make a belief active**.\n\n## Goal\n\nDeliver the observable capability described above through Clark's canonical workspace, with enough evidence to determine whether it is complete.\n\n## Why / Rationale\n\nOnly deliberate creator decisions can make a belief active. This story is separated from adjacent work so the board can report verified progress without treating an incomplete product epic as finished.\n\n## Functional Requirements\n\n- Require exact same-workspace evidence and keep proposals excluded from retrieval until promotion.\n- Record revision-specific creator decisions and trusted retrieval ceilings.\n\n## Acceptance Criteria\n\n- [ ] Given a new memory proposal, when retrieval runs before promotion, then the proposal is absent.\n- [ ] Given the creator promotes the exact proposal revision, when retrieval policy permits it, then the active memory is returned with its evidence and decision lineage.\n\n## Negative Scenarios\n\n- A failed trust, evidence, compatibility, recovery, or policy check must leave the prior canonical state intact and expose a valid next action.\n\n## Future Scope\n\n- Broader capability beyond this verified slice remains in sibling stories and later releases.\n\n## Do Not Do\n\n- In this story, do not infer completion from UI presence, documents, or mocked fixtures when the acceptance criteria require runtime or human evidence.\n- Do not bypass Clark's event, permission, approval, provenance, or rollback contracts to make the happy path appear complete.\n\n---\n"},{"rel":"epics/E-005-governed-memory/S-005-002-scoped-retrieval-correction-and-forgetting.md","content":"# Story: Scoped Retrieval, Correction, and Forgetting\n\n**ID:** S-005-002\n**Project:** clark-pro\n**Epic:** E-005\n**Stage:** Ready\n**Status:** Done\n**Priority:** P0\n**Version:** 1.0\n**Created:** 2026-07-13\n**Updated:** 2026-07-13\n**Sources:** [Authoritative epics](../../research/history/import-2026-07-13/product/03-epics-and-stories.md), [Whole-product roadmap](../../research/history/import-2026-07-13/roadmap.md), [Harness evidence](../../research/history/import-2026-07-13/evidence/harness-latest-report.json)\n\n---\n\n## Story\n\nAs a **creator**, I want to **retrieve memory by task policy and replace, dispute, or forget an active claim**, so that **the creator can correct Clark without hidden residual retrieval behavior**.\n\n## Goal\n\nDeliver the observable capability described above through Clark's canonical workspace, with enough evidence to determine whether it is complete.\n\n## Why / Rationale\n\nThe creator can correct Clark without hidden residual retrieval behavior. This story is separated from adjacent work so the board can report verified progress without treating an incomplete product epic as finished.\n\n## Functional Requirements\n\n- Enforce workspace/project scope, active state, expiry, sensitivity ceilings, and destination send policy.\n- Use append-only correction lineage and logical forgetting with projection redaction and derivative deletion.\n\n## Acceptance Criteria\n\n- [ ] Given an active claim is corrected, when the replacement is promoted, then the prior claim is disputed and excluded while lineage remains inspectable.\n- [ ] Given a memory is forgotten, when fresh or idempotently replayed retrieval runs, then the item is not returned and projected personal text is redacted.\n\n## Negative Scenarios\n\n- A failed trust, evidence, compatibility, recovery, or policy check must leave the prior canonical state intact and expose a valid next action.\n\n## Future Scope\n\n- Broader capability beyond this verified slice remains in sibling stories and later releases.\n\n## Do Not Do\n\n- In this story, do not infer completion from UI presence, documents, or mocked fixtures when the acceptance criteria require runtime or human evidence.\n- Do not bypass Clark's event, permission, approval, provenance, or rollback contracts to make the happy path appear complete.\n\n---\n"},{"rel":"epics/E-005-governed-memory/S-005-003-semantic-retrieval-and-reflection-lineage.md","content":"# Story: Semantic Retrieval and Reflection Lineage\n\n**ID:** S-005-003\n**Project:** clark-pro\n**Epic:** E-005\n**Stage:** Ready\n**Status:** Backlog\n**Priority:** P1\n**Phase:** P-002-03\n**Version:** 1.0\n**Created:** 2026-07-13\n**Updated:** 2026-07-13\n**Sources:** [Authoritative epics](../../research/history/import-2026-07-13/product/03-epics-and-stories.md), [Whole-product roadmap](../../research/history/import-2026-07-13/roadmap.md)\n\n---\n\n## Story\n\nAs a **creator**, I want to **receive small evidence-linked memory proposals from completed trajectories and see when active memory influenced later artifacts**, so that **personalization compounds without turning noisy outcomes into opaque permanent beliefs**.\n\n## Goal\n\nDeliver the observable capability described above through Clark's canonical workspace, with enough evidence to determine whether it is complete.\n\n## Why / Rationale\n\nPersonalization compounds without turning noisy outcomes into opaque permanent beliefs. This story is separated from adjacent work so the board can report verified progress without treating an incomplete product epic as finished.\n\n## Functional Requirements\n\n- Add bounded semantic retrieval with leakage, poisoning, correction, and helpfulness evaluation.\n- Link reflection proposals and influenced artifacts to exact observations, decisions, and memory revisions.\n\n## Acceptance Criteria\n\n- [ ] Given a completed trajectory, when reflection runs, then it returns no change or a small scoped proposal with evidence and uncertainty.\n- [ ] Given an active memory influences a generated artifact, when the creator inspects provenance, then the exact memory revision and retrieval policy receipt are visible.\n\n## Negative Scenarios\n\n- A failed trust, evidence, compatibility, recovery, or policy check must leave the prior canonical state intact and expose a valid next action.\n\n## Future Scope\n\n- Scope not named in this story remains in sibling stories or a later release; this story does not absorb the full parent epic.\n\n## Do Not Do\n\n- In this story, do not infer completion from UI presence, documents, or mocked fixtures when the acceptance criteria require runtime or human evidence.\n- Do not bypass Clark's event, permission, approval, provenance, or rollback contracts to make the happy path appear complete.\n\n---\n"},{"rel":"epics/E-005-governed-memory/S-005-004-physical-erasure-and-memory-validation-corpus.md","content":"# Story: Physical Erasure and Memory Validation Corpus\n\n**ID:** S-005-004\n**Project:** clark-pro\n**Epic:** E-005\n**Stage:** Ready\n**Status:** Backlog\n**Priority:** P0\n**Phase:** P-002-03\n**Version:** 1.0\n**Created:** 2026-07-13\n**Updated:** 2026-07-13\n**Sources:** [Authoritative epics](../../research/history/import-2026-07-13/product/03-epics-and-stories.md), [Whole-product roadmap](../../research/history/import-2026-07-13/roadmap.md)\n\n---\n\n## Story\n\nAs a **workspace_admin**, I want to **prove deletion, backup retention, and retrieval behavior against a representative privacy corpus**, so that **forgetting claims match the physical data lifecycle and regulatory expectations**.\n\n## Goal\n\nDeliver the observable capability described above through Clark's canonical workspace, with enough evidence to determine whether it is complete.\n\n## Why / Rationale\n\nForgetting claims match the physical data lifecycle and regulatory expectations. This story is separated from adjacent work so the board can report verified progress without treating an incomplete product epic as finished.\n\n## Functional Requirements\n\n- Define cryptographic erasure or safe event-log compaction for personal payloads and derived indexes.\n- Maintain a corpus covering leakage, poisoning, expiry, correction, forget, backup, and restore behavior.\n\n## Acceptance Criteria\n\n- [ ] Given a creator completes physical erasure, when active storage, derivatives, exports, and defined backup-retention boundaries are inspected, then deleted payloads are absent or explicitly disclosed under the retention policy.\n- [ ] Given the memory corpus runs on a release candidate, when any leakage, correction, or forget case fails, then release signoff is blocked.\n\n## Negative Scenarios\n\n- A failed trust, evidence, compatibility, recovery, or policy check must leave the prior canonical state intact and expose a valid next action.\n\n## Future Scope\n\n- Scope not named in this story remains in sibling stories or a later release; this story does not absorb the full parent epic.\n\n## Do Not Do\n\n- In this story, do not infer completion from UI presence, documents, or mocked fixtures when the acceptance criteria require runtime or human evidence.\n- Do not bypass Clark's event, permission, approval, provenance, or rollback contracts to make the happy path appear complete.\n\n---\n"},{"rel":"epics/E-006-reuse-first-tool-packs/E-006.md","content":"# Epic: Reuse-First Tool Packs\n\n**ID:** E-006\n**Project:** clark-pro\n**Stage:** Ready\n**Version:** 1.0\n**Created:** 2026-07-13\n**Updated:** 2026-07-13\n**Sources:** [Authoritative epics](../../research/history/import-2026-07-13/product/03-epics-and-stories.md), [Whole-product roadmap](../../research/history/import-2026-07-13/roadmap.md)\n\n---\n\n## Outcome\n\nCreators can reuse mature external engines only through immutable, licensed, tested, permission-bounded, reversible Tool Packs while Clark retains canonical workflow and provenance truth.\n\n## Success Metric\n\n| Metric | Baseline | Target |\n|--------|----------|--------|\n| Activated third-party Tool Packs with complete trust evidence | 0 real third-party packs | At least 1 before the production creation gate |\n| Permission expansion accepted without explicit creator decision | 0 | 0 |\n\n## Primary Persona\n\nThe Trust-Conscious Operator\n\n## Dependencies\n\n- E-001 (Contracts and Product Proof)\n- E-004 (MCP and Clark Bridge)\n\n## Stories\n\n| ID | Title | Status | Stage |\n|----|-------|--------|-------|\n| S-006-001 | Tool Pack Quarantine and Trust Gates | Done | Ready |\n| S-006-002 | Atomic Tool Pack Activation and Rollback | Done | Ready |\n| S-006-003 | OpenCut Candidate Blocked Upstream | Done | Ready |\n| S-006-004 | Real Third-Party Acquisition and Execution | Backlog | Ready |\n| S-006-005 | Clark Kit SDK and Community Compatibility | Backlog | Ready |\n\n---\n"},{"rel":"epics/E-006-reuse-first-tool-packs/S-006-001-tool-pack-quarantine-and-trust-gates.md","content":"# Story: Tool Pack Quarantine and Trust Gates\n\n**ID:** S-006-001\n**Project:** clark-pro\n**Epic:** E-006\n**Stage:** Ready\n**Status:** Done\n**Priority:** P0\n**Version:** 1.0\n**Created:** 2026-07-13\n**Updated:** 2026-07-13\n**Sources:** [Authoritative epics](../../research/history/import-2026-07-13/product/03-epics-and-stories.md), [Whole-product roadmap](../../research/history/import-2026-07-13/roadmap.md), [Harness evidence](../../research/history/import-2026-07-13/evidence/harness-latest-report.json)\n\n---\n\n## Story\n\nAs a **workspace_admin**, I want to **inspect a pinned Tool Pack revision, its interface, license, supply chain, permissions, converters, UI boundary, migration, and rollback evidence**, so that **untrusted packages cannot gain capability authority by appearing installed**.\n\n## Goal\n\nDeliver the observable capability described above through Clark's canonical workspace, with enough evidence to determine whether it is complete.\n\n## Why / Rationale\n\nUntrusted packages cannot gain capability authority by appearing installed. This story is separated from adjacent work so the board can report verified progress without treating an incomplete product epic as finished.\n\n## Functional Requirements\n\n- Track immutable source and artifact identity plus eleven independently visible activation and rollback gates.\n- Separate installed retention, quarantine state, and active execution authority.\n\n## Acceptance Criteria\n\n- [ ] Given a Tool Pack lacks any required interface, legal, SBOM, vulnerability, provenance, adapter, capability, test, migration, or rollback evidence, when activation is requested, then it remains inactive.\n- [ ] Given projections rebuild, when package events replay, then exact manifests, gates, decisions, and runtime state are reproduced.\n\n## Negative Scenarios\n\n- A failed trust, evidence, compatibility, recovery, or policy check must leave the prior canonical state intact and expose a valid next action.\n\n## Future Scope\n\n- Broader capability beyond this verified slice remains in sibling stories and later releases.\n\n## Do Not Do\n\n- In this story, do not infer completion from UI presence, documents, or mocked fixtures when the acceptance criteria require runtime or human evidence.\n- Do not bypass Clark's event, permission, approval, provenance, or rollback contracts to make the happy path appear complete.\n\n---\n"},{"rel":"epics/E-006-reuse-first-tool-packs/S-006-002-atomic-tool-pack-activation-and-rollback.md","content":"# Story: Atomic Tool Pack Activation and Rollback\n\n**ID:** S-006-002\n**Project:** clark-pro\n**Epic:** E-006\n**Stage:** Ready\n**Status:** Done\n**Priority:** P0\n**Version:** 1.0\n**Created:** 2026-07-13\n**Updated:** 2026-07-13\n**Sources:** [Authoritative epics](../../research/history/import-2026-07-13/product/03-epics-and-stories.md), [Whole-product roadmap](../../research/history/import-2026-07-13/roadmap.md), [Harness evidence](../../research/history/import-2026-07-13/evidence/harness-latest-report.json)\n\n---\n\n## Story\n\nAs a **workspace_admin**, I want to **activate, update, suspend, and roll back an eligible Tool Pack revision atomically**, so that **a bad update cannot strand the workspace or silently retain superseded authority**.\n\n## Goal\n\nDeliver the observable capability described above through Clark's canonical workspace, with enough evidence to determine whether it is complete.\n\n## Why / Rationale\n\nA bad update cannot strand the workspace or silently retain superseded authority. This story is separated from adjacent work so the board can report verified progress without treating an incomplete product epic as finished.\n\n## Functional Requirements\n\n- Require explicit creator decisions for activation and rollback.\n- Retain the tested prior revision and atomically replace current capability authority.\n\n## Acceptance Criteria\n\n- [ ] Given an eligible quarantined revision, when the creator activates it, then only its verified adapter and capability revisions become current.\n- [ ] Given a verified update fails or the creator rolls back, when the decision commits, then the new authority is removed and the exact retained prior revision is restored atomically.\n\n## Negative Scenarios\n\n- A failed trust, evidence, compatibility, recovery, or policy check must leave the prior canonical state intact and expose a valid next action.\n\n## Future Scope\n\n- Broader capability beyond this verified slice remains in sibling stories and later releases.\n\n## Do Not Do\n\n- In this story, do not infer completion from UI presence, documents, or mocked fixtures when the acceptance criteria require runtime or human evidence.\n- Do not bypass Clark's event, permission, approval, provenance, or rollback contracts to make the happy path appear complete.\n\n---\n"},{"rel":"epics/E-006-reuse-first-tool-packs/S-006-003-opencut-candidate-blocked-upstream.md","content":"# Story: OpenCut Candidate Blocked Upstream\n\n**ID:** S-006-003\n**Project:** clark-pro\n**Epic:** E-006\n**Stage:** Ready\n**Status:** Done\n**Priority:** P1\n**Version:** 1.0\n**Created:** 2026-07-13\n**Updated:** 2026-07-13\n**Sources:** [Authoritative epics](../../research/history/import-2026-07-13/product/03-epics-and-stories.md), [Whole-product roadmap](../../research/history/import-2026-07-13/roadmap.md), [Harness evidence](../../research/history/import-2026-07-13/evidence/harness-latest-report.json)\n\n---\n\n## Story\n\nAs a **workspace_admin**, I want to **evaluate OpenCut at an immutable revision against the reuse-first boundary ladder**, so that **Clark does not fork or embed a promising editor before a stable supported integration surface exists**.\n\n## Goal\n\nDeliver the observable capability described above through Clark's canonical workspace, with enough evidence to determine whether it is complete.\n\n## Why / Rationale\n\nClark does not fork or embed a promising editor before a stable supported integration surface exists. This story is separated from adjacent work so the board can report verified progress without treating an incomplete product epic as finished.\n\n## Functional Requirements\n\n- Pin the reviewed OpenCut source and manifest hashes and record the preferred interface ladder result.\n- Grant no adapter, capability, skill, converter, UI, credential, filesystem, network, build, or execution authority while blocked.\n\n## Acceptance Criteria\n\n- [ ] Given the pinned OpenCut candidate exposes no supported MCP, CLI, API, library, WASM, sidecar, or typed-file boundary, when evaluated, then it remains blocked_upstream.\n- [ ] Given the creator opens Connections, when OpenCut is inspected, then the exact failed gates and zero executable capabilities are visible.\n\n## Negative Scenarios\n\n- A failed trust, evidence, compatibility, recovery, or policy check must leave the prior canonical state intact and expose a valid next action.\n\n## Future Scope\n\n- Broader capability beyond this verified slice remains in sibling stories and later releases.\n\n## Do Not Do\n\n- In this story, do not infer completion from UI presence, documents, or mocked fixtures when the acceptance criteria require runtime or human evidence.\n- Do not bypass Clark's event, permission, approval, provenance, or rollback contracts to make the happy path appear complete.\n\n---\n"},{"rel":"epics/E-006-reuse-first-tool-packs/S-006-004-real-third-party-acquisition-and-execution.md","content":"# Story: Real Third-Party Acquisition and Execution\n\n**ID:** S-006-004\n**Project:** clark-pro\n**Epic:** E-006\n**Stage:** Ready\n**Status:** Backlog\n**Priority:** P0\n**Phase:** P-002-03\n**Version:** 1.0\n**Created:** 2026-07-13\n**Updated:** 2026-07-13\n**Sources:** [Authoritative epics](../../research/history/import-2026-07-13/product/03-epics-and-stories.md), [Whole-product roadmap](../../research/history/import-2026-07-13/roadmap.md)\n\n---\n\n## Story\n\nAs a **workspace_admin**, I want to **acquire, verify, unpack, build when permitted, activate, execute, update, and roll back one supported external Tool Pack**, so that **the reuse-first strategy is proven against a real maintained engine rather than a synthetic package**.\n\n## Goal\n\nDeliver the observable capability described above through Clark's canonical workspace, with enough evidence to determine whether it is complete.\n\n## Why / Rationale\n\nThe reuse-first strategy is proven against a real maintained engine rather than a synthetic package. This story is separated from adjacent work so the board can report verified progress without treating an incomplete product epic as finished.\n\n## Functional Requirements\n\n- Implement safe archive acquisition, traversal protection, signature/hash checks, dependency controls, supervised build, and isolated runtime boundaries.\n- Select a candidate with a stable supported interface and complete legal, compatibility, migration, and rollback evidence.\n\n## Acceptance Criteria\n\n- [ ] Given a valid external package, when it is acquired, then source and artifact identity are verified before unpack or build and no file escapes quarantine.\n- [ ] Given the activated capability runs in a creator loop, when it completes or fails, then inputs, outputs, timing, cost, permission receipt, and rollback state are canonical and inspectable.\n\n## Negative Scenarios\n\n- A failed trust, evidence, compatibility, recovery, or policy check must leave the prior canonical state intact and expose a valid next action.\n\n## Future Scope\n\n- Scope not named in this story remains in sibling stories or a later release; this story does not absorb the full parent epic.\n\n## Do Not Do\n\n- In this story, do not infer completion from UI presence, documents, or mocked fixtures when the acceptance criteria require runtime or human evidence.\n- Do not bypass Clark's event, permission, approval, provenance, or rollback contracts to make the happy path appear complete.\n\n---\n"},{"rel":"epics/E-006-re
