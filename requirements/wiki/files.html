cord the starting event/projection/hash snapshot.\n- Stub external providers or use recorded conformance responses; no production credentials.\n\n**Steps:**\n1. Establish: a community Skill has mutable identity, failed signature, known blocked advisory, or undeclared executable content.\n2. Perform: acquired.\n3. Verify AC-001: it cannot enter trusted execution.\n4. Establish: a hostile Class B/C fixture attempts an undeclared resource.\n5. Perform: executed.\n6. Verify AC-002: the sandbox denies it and records the attempted boundary crossing.\n7. Re-run the same command or fixture identity and assert idempotent behavior with no duplicate mutation.\n\n**Expected Result:**\n- AC-001: Given a community Skill has mutable identity, failed signature, known blocked advisory, or undeclared executable content, when acquired, then it cannot enter trusted execution.\n- AC-002: Given a hostile Class B/C fixture attempts an undeclared resource, when executed, then the sandbox denies it and records the attempted boundary crossing.\n- Canonical state and evidence match the exact tested revision; no hidden authority, duplicate mutation, or unsupported completion claim is introduced.\n\n**Failure Indicators:**\nAny AC outcome is absent, applies to a different version/actor/scope, bypasses a gate, duplicates state, loses lineage, or relies only on mocked/UI presence where runtime or human evidence is required.\n\n---\n\n## Sub Flows\n\n### TC-007-004-002: Failed gate preserves prior trusted state and exposes recovery\n\n**Type:** Negative\n**Priority:** P1\n**Automation:** Unit / Harness\n**AC Covered:** AC-002\n**Dependencies:** None\n\n**Setup:**\n- Seed one valid prior canonical state and record aggregate version, event count, active revision/authority, asset hashes, and projection snapshot.\n- Configure the relevant trust, evidence, compatibility, recovery, or policy check to fail deterministically.\n\n**Steps:**\n1. Invoke the story action against the failing gate.\n2. Assert no unauthorized provider, filesystem, credential, package, publication, memory, Skill, or canonical mutation occurs.\n3. Compare the post-run snapshot with the recorded trusted state.\n4. Assert a bounded failure receipt identifies the failed gate, owner, and valid retry/rollback/read-only next action.\n5. Restore the valid condition and prove the inverse path can proceed.\n\n**Expected Result:**\nA failed trust, evidence, compatibility, recovery, or policy check must leave the prior canonical state intact and expose a valid next action.\n\n**Failure Indicators:**\nPartial canonical write, lost prior revision, leaked secret/content, silent retry, vague error without next action, or a false “complete” state.\n\n### TC-007-004-003: Boundary, replay, and exact-version regression\n\n**Type:** Edge Case\n**Priority:** P2\n**Automation:** Unit / Harness\n**AC Covered:** AC-001, AC-002\n**Dependencies:** None\n\n**Setup:**\n- Use the smallest deterministic fixture that exercises Add community source identity, signatures, advisories, compatibility, and revocation checks. and Implement the production Class B/C sandbox with declared filesystem, network, process, and capability ceilings..\n- Capture the input identity, schema/revision, actor/scope, event count, and expected output hash/receipt.\n\n**Steps:**\n1. Execute at the lower valid boundary and assert the documented result.\n2. Execute at the upper/expanded/expired/stale or incompatible boundary and assert fail-closed behavior.\n3. Replay the original command, intent, provider response, or recovery checkpoint.\n4. Assert exact-version binding, no duplicate mutation/cost, and deterministic projection state.\n5. Rebuild the relevant projection or reopen the app and confirm the same observable result.\n\n**Expected Result:**\nThe story remains deterministic across boundary input, replay, restart, and projection rebuild; permissions and approvals do not expand or transfer to another revision.\n\n**Failure Indicators:**\nOff-by-one acceptance, replay duplication, stale approval, permission expansion, nondeterministic projection, or output/receipt drift.\n\n---\n\n## Out of Scope\n\n- Scope not named in this story remains in sibling stories or a later release; this story does not absorb the full parent epic.\n- In this story, do not infer completion from UI presence, documents, or mocked fixtures when the acceptance criteria require runtime or human evidence.\n- Do not bypass Clark's event, permission, approval, provenance, or rollback contracts to make the happy path appear complete.\n- Full cross-story journey continuity is tested in TR plans and TF-006/TF-009/TF-015 where applicable, not repeated here.\n\n## Automation Notes\n\n- **Bucket allocation:** 0 Maestro · 3 Unit / Harness · 0 Code Review. The AC are backend/evidence predicates that can be proven without rendering, so Harness is the honest P0.\n- **Desktop UI executor:** implement product-team `Maestro` bucket cases with Playwright Electron under `clark-pro/apps/desktop/tests/e2e/`; retain product-team TC IDs and screenshot labels.\n- **Cheap journey-validating coverage:** TC-007-004-002 and TC-007-004-003 run in CI before any TF journey.\n- **Harness location:** add a focused `node:test` fixture beside clark-pro/services/harness, clark-pro/skills-sandbox, and clark-pro/packages/skills; use recorded providers and debug read APIs, not production secrets.\n- **Selector strategy:** stable semantic roles/names first; `data-testid` only when role/name cannot distinguish exact-version state.\n- **Flakiness risks:** OS prompts, signing/notarization, real providers, process death, and media timing require isolated release lanes with recorded receipts.\n- **Automation priority:** Tier 1 = TC-007-004-001 and safety negative; Tier 2 = boundary/replay and analytics; Tier 3 = no source-only pass substitutes for a runtime/human AC.\n\n---\n"},{"rel":"epics/E-007-governed-agent-skills/T-007-005-reflection-driven-skill-proposals-and-regression.md","content":"# Test Plan: Reflection-Driven Skill Proposals and Regression\n\n**ID:** T-007-005\n**Project:** clark-pro\n**Story:** S-007-005\n**Epic:** E-007\n**Stage:** Refinement\n**Version:** 1.0\n**Created:** 2026-07-13\n**Updated:** 2026-07-13\n\n---\n\n## Scope\n\nVerify Reflection-Driven Skill Proposals and Regression end-to-end against every acceptance criterion, its trust-preserving negative path, boundary/idempotency behavior, and the AE-007 product event. This plan does not infer story completion from a screen or document alone.\n\n## Prerequisites\n\n- A clean deterministic workspace fixture at the story’s required schema version.\n- Access to clark-pro/services/harness, clark-pro/skills-sandbox, and clark-pro/packages/skills and the canonical event/projection/receipt inspection harness.\n- External systems use recorded or sandbox responses; no production mutation is required for routine CI.\n- UI bucket note: product-team labels visible journey cases `Maestro`; Clark’s desktop executor is Playwright Electron with the same before/after evidence contract.\n\n## AC Coverage Map\n\n| AC | Test Cases | Bucket | Coverage |\n|----|-----------|--------|----------|\n| AC-001 | TC-007-005-001 (P0) | Maestro | ✓ |\n| AC-002 | TC-007-005-001 (P0), TC-007-005-002 | Maestro · Unit / Harness | ✓ |\n| AE-007 | TC-007-005-004 | Analytics | ✓ |\n\n**Bucket totals:** 1 Maestro · 2 Unit / Harness · 0 Code Review · 1 Analytics. The P0 uses the cheapest bucket that still proves the AC; data and failure predicates remain Harness cases.\n\n---\n\n## Core Test Flow\n\n### TC-007-005-001: Complete acceptance path for Reflection-Driven Skill Proposals and Regression\n\n**Type:** E2E\n**Priority:** P0\n**Automation:** Maestro\n**AC Covered:** AC-001, AC-002\n**Dependencies:** Story dependencies and parent release architecture gate must be satisfied\n\n**Captures:**\n| Label | Screen | State |\n|-------|--------|-------|\n| before | DS-skill-revision-diff | default |\n| after | DS-skill-revision-diff | verified |\n\n**Preconditions:**\n- A release-candidate Clark build is open on Overlay: Skill Revision Diff with the story’s required canonical fixture and permissions.\n- The tester can inspect Harness events/receipts after the UI journey.\n\n**Steps:**\n1. Establish: a trajectory produces a stable procedure.\n2. Perform: reflection proposes a Skill.\n3. Verify AC-001: the proposal cites exact evidence and remains inactive.\n4. Establish: an active Skill fails its regression threshold.\n5. Perform: monitoring evaluates it.\n6. Verify AC-002: rollback is proposed and no silent revision is installed.\n7. Inspect the resulting canonical event, exact version, actor, permission/provenance receipt, and retained recovery state from Overlay: Skill Revision Diff.\n\n**Expected Result:**\n- AC-001: Given a trajectory produces a stable procedure, when reflection proposes a Skill, then the proposal cites exact evidence and remains inactive.\n- AC-002: Given an active Skill fails its regression threshold, when monitoring evaluates it, then rollback is proposed and no silent revision is installed.\n- Canonical state and evidence match the exact tested revision; no hidden authority, duplicate mutation, or unsupported completion claim is introduced.\n\n**Failure Indicators:**\nAny AC outcome is absent, applies to a different version/actor/scope, bypasses a gate, duplicates state, loses lineage, or relies only on mocked/UI presence where runtime or human evidence is required.\n\n---\n\n## Sub Flows\n\n### TC-007-005-002: Failed gate preserves prior trusted state and exposes recovery\n\n**Type:** Negative\n**Priority:** P1\n**Automation:** Unit / Harness\n**AC Covered:** AC-002\n**Dependencies:** None\n\n**Setup:**\n- Seed one valid prior canonical state and record aggregate version, event count, active revision/authority, asset hashes, and projection snapshot.\n- Configure the relevant trust, evidence, compatibility, recovery, or policy check to fail deterministically.\n\n**Steps:**\n1. Invoke the story action against the failing gate.\n2. Assert no unauthorized provider, filesystem, credential, package, publication, memory, Skill, or canonical mutation occurs.\n3. Compare the post-run snapshot with the recorded trusted state.\n4. Assert a bounded failure receipt identifies the failed gate, owner, and valid retry/rollback/read-only next action.\n5. Restore the valid condition and prove the inverse path can proceed.\n\n**Expected Result:**\nA failed trust, evidence, compatibility, recovery, or policy check must leave the prior canonical state intact and expose a valid next action.\n\n**Failure Indicators:**\nPartial canonical write, lost prior revision, leaked secret/content, silent retry, vague error without next action, or a false “complete” state.\n\n### TC-007-005-003: Boundary, replay, and exact-version regression\n\n**Type:** Edge Case\n**Priority:** P2\n**Automation:** Unit / Harness\n**AC Covered:** AC-001, AC-002\n**Dependencies:** None\n\n**Setup:**\n- Use the smallest deterministic fixture that exercises Extract procedure, inputs, outputs, tools, permissions, compatibility, recovery, and examples from exact trajectory evidence. and Require quarantine fixtures and regression results before creator promotion; allow monitoring to propose rollback only..\n- Capture the input identity, schema/revision, actor/scope, event count, and expected output hash/receipt.\n\n**Steps:**\n1. Execute at the lower valid boundary and assert the documented result.\n2. Execute at the upper/expanded/expired/stale or incompatible boundary and assert fail-closed behavior.\n3. Replay the original command, intent, provider response, or recovery checkpoint.\n4. Assert exact-version binding, no duplicate mutation/cost, and deterministic projection state.\n5. Rebuild the relevant projection or reopen the app and confirm the same observable result.\n\n**Expected Result:**\nThe story remains deterministic across boundary input, replay, restart, and projection rebuild; permissions and approvals do not expand or transfer to another revision.\n\n**Failure Indicators:**\nOff-by-one acceptance, replay duplication, stale approval, permission expansion, nondeterministic projection, or output/receipt drift.\n\n### TC-007-005-004: Analytics — skill_regression_evaluated fires with the documented shape\n\n**Type:** Analytics\n**Priority:** P1\n**Automation:** Analytics\n**AC Covered:** None (AE-007 coverage)\n**Dependencies:** None\n\n**AE reference:** AE-007 — `skill_regression_evaluated`; properties: result: \"pass\" | \"fail\", action: \"none\" | \"rollback_proposed\", source: \"scheduled\" | \"trajectory_correction\"; trigger: after the active revision regression suite is persisted.\n\n**Setup:**\n- A debug build with the local product-event projection queryable or a logged-event spy attached after canonical commit.\n\n**Steps:**\n1. Perform the action that reaches this trigger: after the active revision regression suite is persisted.\n2. Confirm `skill_regression_evaluated` fires exactly once after the trigger, not on render, click intent, retry, replay, or projection rebuild.\n3. Confirm the payload carries only the documented bounded properties: result: \"pass\" | \"fail\", action: \"none\" | \"rollback_proposed\", source: \"scheduled\" | \"trajectory_correction\".\n4. Exercise each documented enum/boolean path and confirm invalid or unbounded values are rejected.\n5. Confirm no PII, creative/source/memory text, prompt/completion, raw URL/path/name/account, UUID, credential reference, or token appears.\n\n**Expected Result:**\n`skill_regression_evaluated` lands once in the local analytics projection with the exact privacy-safe shape. Remote export remains absent unless explicit opt-in is enabled.\n\n**Failure Indicators:**\nMissing, misnamed, early, double-fired, replay-fired, malformed, unbounded, or privacy-leaking event.\n\n---\n\n## Out of Scope\n\n- Scope not named in this story remains in sibling stories or a later release; this story does not absorb the full parent epic.\n- In this story, do not infer completion from UI presence, documents, or mocked fixtures when the acceptance criteria require runtime or human evidence.\n- Do not bypass Clark's event, permission, approval, provenance, or rollback contracts to make the happy path appear complete.\n- Full cross-story journey continuity is tested in TR plans and TF-006/TF-009/TF-015 where applicable, not repeated here.\n\n## Automation Notes\n\n- **Bucket allocation:** 1 Maestro · 2 Unit / Harness · 0 Code Review · 1 Analytics. The visible exact-state journey stays in the UI bucket; failure and replay predicates run cheaply in Harness.\n- **Desktop UI executor:** implement product-team `Maestro` bucket cases with Playwright Electron under `clark-pro/apps/desktop/tests/e2e/`; retain product-team TC IDs and screenshot labels.\n- **Cheap journey-validating coverage:** TC-007-005-002 and TC-007-005-003 run in CI before any TF journey.\n- **Harness location:** add a focused `node:test` fixture beside clark-pro/services/harness, clark-pro/skills-sandbox, and clark-pro/packages/skills; use recorded providers and debug read APIs, not production secrets.\n- **Selector strategy:** stable semantic roles/names first; `data-testid` only when role/name cannot distinguish exact-version state.\n- **Flakiness risks:** OS prompts, signing/notarization, real providers, process death, and media timing require isolated release lanes with recorded receipts.\n- **Automation priority:** Tier 1 = TC-007-005-001 and safety negative; Tier 2 = boundary/replay and analytics; Tier 3 = no source-only pass substitutes for a runtime/human AC.\n\n---\n"},{"rel":"epics/E-008-distribution-and-observation/AE-008.md","content":"# Analytics: E-008 — Distribution and Observation\n\n**ID:** AE-008\n**Project:** clark-pro\n**Epic:** E-008\n**Version:** 1.0\n**Updated:** 2026-07-13\n\n---\n\n**Success Metric (from epic):**\n\n| Duplicate verified publications in chaos testing | No production publishing path yet | 0 |\n| Publication intents left without an explicit terminal or reconciliation state | No production publishing path yet | 0 |\n\n---\n\n## Events\n\n| Event | Story | Trigger | Key Properties |\n|-------|-------|---------|----------------|\n| `publication_terminalized` | S-008-002 | after a publication intent reaches a terminal or explicit reconciliation state | route: \"postiz\" \\| \"direct\" \\| \"assisted\" \\| \"export\", state: \"verified\" \\| \"failed\" \\| \"cancelled\" \\| \"removed\" \\| \"exported\" \\| \"needs_reconciliation\", duplicate_detected: boolean |\n| `observation_reviewed` | S-008-004 | after the creator opens a lineage-linked outcome review | source: \"postiz\" \\| \"direct\" \\| \"manual\" \\| \"qualitative\", freshness: \"fresh\" \\| \"stale\" \\| \"missing\" \\| \"deleted\", comparable: boolean |\n| `strategy_proposal_decided` | S-008-005 | after an evidence-linked experiment/strategy proposal decision commits | decision: \"accepted\" \\| \"edited\" \\| \"deferred\" \\| \"rejected\", evidence_band: \"single\" \\| \"small\" \\| \"representative\", new_evidence: boolean |\n\n**Property rules:** only the bounded enums/booleans above. User/time are implicit. No raw IDs, URLs, paths, account names, source/artifact/memory text, prompts, credentials, or free-form notes.\n\n**Notes**\n\n- Fire once after the stated canonical commit or completed inspection, not on button click, mount, retry, replay, or projection rebuild.\n- The event supports the epic metric by measuring the outcome boundary, not each implementation step.\n- Export remains local unless the user explicitly opts into the privacy-safe analytics sink.\n"},{"rel":"epics/E-008-distribution-and-observation/E-008.md","content":"# Epic: Distribution and Observation\n\n**ID:** E-008\n**Project:** clark-pro\n**Stage:** Ready\n**Version:** 1.0\n**Created:** 2026-07-13\n**Updated:** 2026-07-13\n**Sources:** [Authoritative epics](../../research/history/import-2026-07-13/product/03-epics-and-stories.md), [Whole-product roadmap](../../research/history/import-2026-07-13/roadmap.md)\n\n---\n\n## Outcome\n\nCreators can publish approved artifacts across real channels, reconcile every external mutation, collect lineage-linked outcomes, and review evidence without unsupported causal claims.\n\n## Success Metric\n\n| Metric | Baseline | Target |\n|--------|----------|--------|\n| Duplicate verified publications in chaos testing | No production publishing path yet | 0 |\n| Publication intents left without an explicit terminal or reconciliation state | No production publishing path yet | 0 |\n\n## Primary Persona\n\nThe Operator-Creator\n\n## Dependencies\n\n- E-002 (Native Studio and Durable Harness)\n- E-003 (Idea Foundry and Creation Studio)\n- E-004 (MCP and Clark Bridge)\n\n## Stories\n\n| ID | Title | Status | Stage |\n|----|-------|--------|-------|\n| S-008-001 | Social Account and Credential Center | Backlog | Ready |\n| S-008-002 | Postiz Scheduling and Publication Ledger | Backlog | Ready |\n| S-008-003 | Assisted Handoff and Deterministic Export | Backlog | Ready |\n| S-008-004 | Observation Ingestion and Evidence Review | Backlog | Ready |\n| S-008-005 | Experiment and Strategy Loop | Backlog | Ready |\n\n---\n"},{"rel":"epics/E-008-distribution-and-observation/S-008-001-social-account-and-credential-center.md","content":"# Story: Social Account and Credential Center\n\n**ID:** S-008-001\n**Project:** clark-pro\n**Epic:** E-008\n**Stage:** Ready\n**Status:** Backlog\n**Priority:** P0\n**Phase:** P-003-01\n**Version:** 1.0\n**Created:** 2026-07-13\n**Updated:** 2026-07-13\n**Sources:** [Authoritative epics](../../research/history/import-2026-07-13/product/03-epics-and-stories.md), [Whole-product roadmap](../../research/history/import-2026-07-13/roadmap.md)\n\n---\n\n## Story\n\nAs a **workspace_admin**, I want to **connect, scope, inspect, and revoke social accounts without exposing credentials**, so that **publishing authority remains visible and workspace-specific**.\n\n## Goal\n\nDeliver the observable capability described above through Clark's canonical workspace, with enough evidence to determine whether it is complete.\n\n## Why / Rationale\n\nPublishing authority remains visible and workspace-specific. This story is separated from adjacent work so the board can report verified progress without treating an incomplete product epic as finished.\n\n## Functional Requirements\n\n- Support OAuth or provider flows through the Keychain broker with scopes, leases, health, revocation, and workspace grants.\n- Show affected schedules and capabilities when account health or grants change.\n\n## Acceptance Criteria\n\n- [ ] Given an account is connected, when the creator inspects it, then publisher identity, scopes, workspace grants, health, and revocation controls are visible without token material.\n- [ ] Given an account is revoked, when dependent work starts, then Clark blocks it and identifies affected scheduled intents.\n\n## Negative Scenarios\n\n- A failed trust, evidence, compatibility, recovery, or policy check must leave the prior canonical state intact and expose a valid next action.\n\n## Future Scope\n\n- Scope not named in this story remains in sibling stories or a later release; this story does not absorb the full parent epic.\n\n## Do Not Do\n\n- In this story, do not infer completion from UI presence, documents, or mocked fixtures when the acceptance criteria require runtime or human evidence.\n- Do not bypass Clark's event, permission, approval, provenance, or rollback contracts to make the happy path appear complete.\n\n---\n"},{"rel":"epics/E-008-distribution-and-observation/S-008-002-postiz-scheduling-and-publication-ledger.md","content":"# Story: Postiz Scheduling and Publication Ledger\n\n**ID:** S-008-002\n**Project:** clark-pro\n**Epic:** E-008\n**Stage:** Ready\n**Status:** Backlog\n**Priority:** P0\n**Phase:** P-003-01\n**Version:** 1.0\n**Analytics:** AE-008\n**Created:** 2026-07-13\n**Updated:** 2026-07-13\n**Sources:** [Authoritative epics](../../research/history/import-2026-07-13/product/03-epics-and-stories.md), [Whole-product roadmap](../../research/history/import-2026-07-13/roadmap.md)\n\n---\n\n## Story\n\nAs a **creator**, I want to **schedule or publish through Postiz with idempotent intent, receipt, verification, and reconciliation**, so that **every external mutation ends in a known, reviewable state without blind retry**.\n\n## Goal\n\nDeliver the observable capability described above through Clark's canonical workspace, with enough evidence to determine whether it is complete.\n\n## Why / Rationale\n\nEvery external mutation ends in a known, reviewable state without blind retry. This story is separated from adjacent work so the board can report verified progress without treating an incomplete product epic as finished.\n\n## Functional Requirements\n\n- Discover current platform schemas and validate media, copy, disclosure, account health, and approval before submission.\n- Track intent, scheduled, submitted, verified, failed, cancelled, removed, exported, and reconciliation states distinctly.\n\n## Acceptance Criteria\n\n- [ ] Given an approved platform artifact, when it is submitted, then Clark records an idempotency key and provider receipt before observing verification.\n- [ ] Given the submission outcome is ambiguous, when recovery runs, then Clark enters reconciliation and does not issue a blind duplicate retry.\n\n## Negative Scenarios\n\n- A failed trust, evidence, compatibility, recovery, or policy check must leave the prior canonical state intact and expose a valid next action.\n\n## Future Scope\n\n- Scope not named in this story remains in sibling stories or a later release; this story does not absorb the full parent epic.\n\n## Do Not Do\n\n- In this story, do not infer completion from UI presence, documents, or mocked fixtures when the acceptance criteria require runtime or human evidence.\n- Do not bypass Clark's event, permission, approval, provenance, or rollback contracts to make the happy path appear complete.\n\n---\n"},{"rel":"epics/E-008-distribution-and-observation/S-008-003-assisted-handoff-and-deterministic-export.md","content":"# Story: Assisted Handoff and Deterministic Export\n\n**ID:** S-008-003\n**Project:** clark-pro\n**Epic:** E-008\n**Stage:** Ready\n**Status:** Backlog\n**Priority:** P1\n**Phase:** P-003-01\n**Version:** 1.0\n**Created:** 2026-07-13\n**Updated:** 2026-07-13\n**Sources:** [Authoritative epics](../../research/history/import-2026-07-13/product/03-epics-and-stories.md), [Whole-product roadmap](../../research/history/import-2026-07-13/roadmap.md)\n\n---\n\n## Story\n\nAs a **creator**, I want to **complete publication through a human handoff or platform-valid export when automation is unavailable**, so that **connector outages do not strand approved work or force unsafe platform bypasses**.\n\n## Goal\n\nDeliver the observable capability described above through Clark's canonical workspace, with enough evidence to determine whether it is complete.\n\n## Why / Rationale\n\nConnector outages do not strand approved work or force unsafe platform bypasses. This story is separated from adjacent work so the board can report verified progress without treating an incomplete product epic as finished.\n\n## Functional Requirements\n\n- Generate deterministic export packages with all required media, copy, metadata, disclosures, and instructions.\n- Record assisted final action separately from direct verified publication.\n\n## Acceptance Criteria\n\n- [ ] Given a connector is unavailable, when the creator chooses export, then Clark produces a complete platform-valid package without losing artifact lineage.\n- [ ] Given a human completes an assisted handoff, when they record the result, then Clark preserves the distinct assisted state and any live URL or external receipt.\n\n## Negative Scenarios\n\n- A failed trust, evidence, compatibility, recovery, or policy check must leave the prior canonical state intact and expose a valid next action.\n\n## Future Scope\n\n- Scope not named in this story remains in sibling stories or a later release; this story does not absorb the full parent epic.\n\n## Do Not Do\n\n- In this story, do not infer completion from UI presence, documents, or mocked fixtures when the acceptance criteria require runtime or human evidence.\n- Do not bypass Clark's event, permission, approval, provenance, or rollback contracts to make the happy path appear complete.\n\n---\n"},{"rel":"epics/E-008-distribution-and-observation/S-008-004-observation-ingestion-and-evidence-review.md","content":"# Story: Observation Ingestion and Evidence Review\n\n**ID:** S-008-004\n**Project:** clark-pro\n**Epic:** E-008\n**Stage:** Ready\n**Status:** Backlog\n**Priority:** P1\n**Phase:** P-003-01\n**Version:** 1.0\n**Analytics:** AE-008\n**Created:** 2026-07-13\n**Updated:** 2026-07-13\n**Sources:** [Authoritative epics](../../research/history/import-2026-07-13/product/03-epics-and-stories.md), [Whole-product roadmap](../../research/history/import-2026-07-13/roadmap.md)\n\n---\n\n## Story\n\nAs a **creator**, I want to **review quantitative, qualitative, and manual outcomes against exact publication and decision lineage**, so that **performance data informs judgment without merging incompatible platform semantics**.\n\n## Goal\n\nDeliver the observable capability described above through Clark's canonical workspace, with enough evidence to determine whether it is complete.\n\n## Why / Rationale\n\nPerformance data informs judgment without merging incompatible platform semantics. This story is separated from adjacent work so the board can report verified progress without treating an incomplete product epic as finished.\n\n## Functional Requirements\n\n- Ingest supported analytics and manual judgment with freshness, missingness, deletion, platform definition, and sample count.\n- Present cohorts, ranges, cost, and creator satisfaction without unsupported causal language.\n\n## Acceptance Criteria\n\n- [ ] Given an observation arrives, when it is stored, then it links to the exact publication, artifact, angle, source, and decision lineage.\n- [ ] Given evidence is missing, stale, deleted, or not comparable, when Review renders it, then the limitation remains visible and the metrics are not silently merged.\n\n## Negative Scenarios\n\n- A failed trust, evidence, compatibility, recovery, or policy check must leave the prior canonical state intact and expose a valid next action.\n\n## Future Scope\n\n- Scope not named in this story remains in sibling stories or a later release; this story does not absorb the full parent epic.\n\n## Do Not Do\n\n- In this story, do not infer completion from UI presence, documents, or mocked fixtures when the acceptance criteria require runtime or human evidence.\n- Do not bypass Clark's event, permission, approval, provenance, or rollback contracts to make the happy path appear complete.\n\n---\n"},{"rel":"epics/E-008-distribution-and-observation/S-008-005-experiment-and-strategy-loop.md","content":"# Story: Experiment and Strategy Loop\n\n**ID:** S-008-005\n**Project:** clark-pro\n**Epic:** E-008\n**Stage:** Ready\n**Status:** Backlog\n**Priority:** P1\n**Phase:** P-003-01\n**Version:** 1.0\n**Analytics:** AE-008\n**Created:** 2026-07-13\n**Updated:** 2026-07-13\n**Sources:** [Authoritative epics](../../research/history/import-2026-07-13/product/03-epics-and-stories.md), [Whole-product roadmap](../../research/history/import-2026-07-13/roadmap.md)\n\n---\n\n## Story\n\nAs a **creator**, I want to **turn reviewed outcomes into scoped experiments, follow-ups, and optional memory proposals**, so that **future work changes only through visible, reversible decisions with new evidence**.\n\n## Goal\n\nDeliver the observable capability described above through Clark's canonical workspace, with enough evidence to determine whether it is complete.\n\n## Why / Rationale\n\nFuture work changes only through visible, reversible decisions with new evidence. This story is separated from adjacent work so the board can report verified progress without treating an incomplete product epic as finished.\n\n## Functional Requirements\n\n- Generate no change or a small set of evidence-linked experiment and strategy proposals.\n- Keep rejected proposals inactive unless genuinely new evidence is attached.\n\n## Acceptance Criteria\n\n- [ ] Given a review has sufficient evidence, when the strategy loop runs, then each proposal names observations, sample size, uncertainty, and the decision it could change.\n- [ ] Given a proposal is rejected, when future reflection runs without new evidence, then the rejected proposal does not silently return.\n\n## Negative Scenarios\n\n- A failed trust, evidence, compatibility, recovery, or policy check must leave the prior canonical state intact and expose a valid next action.\n\n## Future Scope\n\n- Scope not named in this story remains in sibling stories or a later release; this story does not absorb the full parent epic.\n\n## Do Not Do\n\n- In this story, do not infer completion from UI presence, documents, or mocked fixtures when the acceptance criteria require runtime or human evidence.\n- Do not bypass Clark's event, permission, approval, provenance, or rollback contracts to make the happy path appear complete.\n\n---\n"},{"rel":"epics/E-008-distribution-and-observation/T-008-001-social-account-and-credential-center.md","content":"# Test Plan: Social Account and Credential Center\n\n**ID:** T-008-001\n**Project:** clark-pro\n**Story:** S-008-001\n**Epic:** E-008\n**Stage:** Refinement\n**Version:** 1.0\n**Created:** 2026-07-13\n**Updated:** 2026-07-13\n\n---\n\n## Scope\n\nVerify Social Account and Credential Center end-to-end against every acceptance criterion, its trust-preserving negative path, boundary/idempotency behavior, and the canonical receipt/evidence contract. This plan does not infer story completion from a screen or document alone.\n\n## Prerequisites\n\n- A clean deterministic workspace fixture at the story’s required schema version.\n- Access to clark-pro/packages/connectors and clark-pro/services/harness publication fixtures and the canonical event/projection/receipt inspection harness.\n- External systems use recorded or sandbox responses; no production mutation is required for routine CI.\n- UI bucket note: product-team labels visible journey cases `Maestro`; Clark’s desktop executor is Playwright Electron with the same before/after evidence contract.\n\n## AC Coverage Map\n\n| AC | Test Cases | Bucket | Coverage |\n|----|-----------|--------|----------|\n| AC-001 | TC-008-001-001 (P0) | Maestro | ✓ |\n| AC-002 | TC-008-001-001 (P0), TC-008-001-002 | Maestro · Unit / Harness | ✓ |\n\n**Bucket totals:** 1 Maestro · 2 Unit / Harness · 0 Code Review. The P0 uses the cheapest bucket that still proves the AC; data and failure predicates remain Harness cases.\n\n---\n\n## Core Test Flow\n\n### TC-008-001-001: Complete acceptance path for Social Account and Credential Center\n\n**Type:** E2E\n**Priority:** P0\n**Automation:** Maestro\n**AC Covered:** AC-001, AC-002\n**Dependencies:** Story dependencies and parent release architecture gate must be satisfied\n\n**Captures:**\n| Label | Screen | State |\n|-------|--------|-------|\n| before | DS-connections | default |\n| after | DS-connections | verified |\n\n**Preconditions:**\n- A release-candidate Clark build is open on Screen: Connections with the story’s required canonical fixture and permissions.\n- The tester can inspect Harness events/receipts after the UI journey.\n\n**Steps:**\n1. Establish: an account is connected.\n2. Perform: the creator inspects it.\n3. Verify AC-001: publisher identity, scopes, workspace grants, health, and revocation controls are visible without token material.\n4. Establish: an account is revoked.\n5. Perform: dependent work starts.\n6. Verify AC-002: Clark blocks it and identifies affected scheduled intents.\n7. Inspect the resulting canonical event, exact version, actor, permission/provenance receipt, and retained recovery state from Screen: Connections.\n\n**Expected Result:**\n- AC-001: Given an account is connected, when the creator inspects it, then publisher identity, scopes, workspace grants, health, and revocation controls are visible without token material.\n- AC-002: Given an account is revoked, when dependent work starts, then Clark blocks it and identifies affected scheduled intents.\n- Canonical state and evidence match the exact tested revision; no hidden authority, duplicate mutation, or unsupported completion claim is introduced.\n\n**Failure Indicators:**\nAny AC outcome is absent, applies to a different version/actor/scope, bypasses a gate, duplicates state, loses lineage, or relies only on mocked/UI presence where runtime or human evidence is required.\n\n---\n\n## Sub Flows\n\n### TC-008-001-002: Failed gate preserves prior trusted state and exposes recovery\n\n**Type:** Negative\n**Priority:** P1\n**Automation:** Unit / Harness\n**AC Covered:** AC-002\n**Dependencies:** None\n\n**Setup:**\n- Seed one valid prior canonical state and record aggregate version, event count, active revision/authority, asset hashes, and projection snapshot.\n- Configure the relevant trust, evidence, compatibility, recovery, or policy check to fail deterministically.\n\n**Steps:**\n1. Invoke the story action against the failing gate.\n2. Assert no unauthorized provider, filesystem, credential, package, publication, memory, Skill, or canonical mutation occurs.\n3. Compare the post-run snapshot with the recorded trusted state.\n4. Assert a bounded failure receipt identifies the failed gate, owner, and valid retry/rollback/read-only next action.\n5. Restore the valid condition and prove the inverse path can proceed.\n\n**Expected Result:**\nA failed trust, evidence, compatibility, recovery, or policy check must leave the prior canonical state intact and expose a valid next action.\n\n**Failure Indicators:**\nPartial canonical write, lost prior revision, leaked secret/content, silent retry, vague error without next action, or a false “complete” state.\n\n### TC-008-001-003: Boundary, replay, and exact-version regression\n\n**Type:** Edge Case\n**Priority:** P2\n**Automation:** Unit / Harness\n**AC Covered:** AC-001, AC-002\n**Dependencies:** None\n\n**Setup:**\n- Use the smallest deterministic fixture that exercises Support OAuth or provider flows through the Keychain broker with scopes, leases, health, revocation, and workspace grants. and Show affected schedules and capabilities when account health or grants change..\n- Capture the input identity, schema/revision, actor/scope, event count, and expected output hash/receipt.\n\n**Steps:**\n1. Execute at the lower valid boundary and assert the documented result.\n2. Execute at the upper/expanded/expired/stale or incompatible boundary and assert fail-closed behavior.\n3. Replay the original command, intent, provider response, or recovery checkpoint.\n4. Assert exact-version binding, no duplicate mutation/cost, and deterministic projection state.\n5. Rebuild the relevant projection or reopen the app and confirm the same observable result.\n\n**Expected Result:**\nThe story remains deterministic across boundary input, replay, restart, and projection rebuild; permissions and approvals do not expand or transfer to another revision.\n\n**Failure Indicators:**\nOff-by-one acceptance, replay duplication, stale approval, permission expansion, nondeterministic projection, or output/receipt drift.\n\n---\n\n## Out of Scope\n\n- Scope not named in this story remains in sibling stories or a later release; this story does not absorb the full parent epic.\n- In this story, do not infer completion from UI presence, documents, or mocked fixtures when the acceptance criteria require runtime or human evidence.\n- Do not bypass Clark's event, permission, approval, provenance, or rollback contracts to make the happy path appear complete.\n- Full cross-story journey continuity is tested in TR plans and TF-006/TF-009/TF-015 where applicable, not repeated here.\n\n## Automation Notes\n\n- **Bucket allocation:** 1 Maestro · 2 Unit / Harness · 0 Code Review. The visible exact-state journey stays in the UI bucket; failure and replay predicates run cheaply in Harness.\n- **Desktop UI executor:** implement product-team `Maestro` bucket cases with Playwright Electron under `clark-pro/apps/desktop/tests/e2e/`; retain product-team TC IDs and screenshot labels.\n- **Cheap journey-validating coverage:** TC-008-001-002 and TC-008-001-003 run in CI before any TF journey.\n- **Harness location:** add a focused `node:test` fixture beside clark-pro/packages/connectors and clark-pro/services/harness publication fixtures; use recorded providers and debug read APIs, not production secrets.\n- **Selector strategy:** stable semantic roles/names first; `data-testid` only when role/name cannot distinguish exact-version state.\n- **Flakiness risks:** OS prompts, signing/notarization, real providers, process death, and media timing require isolated release lanes with recorded receipts.\n- **Automation priority:** Tier 1 = TC-008-001-001 and safety negative; Tier 2 = boundary/replay and analytics; Tier 3 = no source-only pass substitutes for a runtime/human AC.\n\n---\n"},{"rel":"epics/E-008-distribution-and-observation/T-008-002-postiz-scheduling-and-publication-ledger.md","content":"# Test Plan: Postiz Scheduling and Publication Ledger\n\n**ID:** T-008-002\n**Project:** clark-pro\n**Story:** S-008-002\n**Epic:** E-008\n**Stage:** Refinement\n**Version:** 1.0\n**Created:** 2026-07-13\n**Updated:** 2026-07-13\n\n---\n\n## Scope\n\nVerify Postiz Scheduling and Publication Ledger end-to-end against every acceptance criterion, its trust-preserving negative path, boundary/idempotency behavior, and the AE-00 e the prior canonical state intact and expose a valid next action.\n\n**Failure Indicators:**\nPartial canonical write, lost prior revision, leaked secret/content, silent retry, vague error without next action, or a false “complete” state.\n\n### TC-008-003-003: Boundary, replay, and exact-version regression\n\n**Type:** Edge Case\n**Priority:** P2\n**Automation:** Unit / Harness\n**AC Covered:** AC-001, AC-002\n**Dependencies:** None\n\n**Setup:**\n- Use the smallest deterministic fixture that exercises Generate deterministic export packages with all required media, copy, metadata, disclosures, and instructions. and Record assisted final action separately from direct verified publication..\n- Capture the input identity, schema/revision, actor/scope, event count, and expected output hash/receipt.\n\n**Steps:**\n1. Execute at the lower valid boundary and assert the documented result.\n2. Execute at the upper/expanded/expired/stale or incompatible boundary and assert fail-closed behavior.\n3. Replay the original command, intent, provider response, or recovery checkpoint.\n4. Assert exact-version binding, no duplicate mutation/cost, and deterministic projection state.\n5. Rebuild the relevant projection or reopen the app and confirm the same observable result.\n\n**Expected Result:**\nThe story remains deterministic across boundary input, replay, restart, and projection rebuild; permissions and approvals do not expand or transfer to another revision.\n\n**Failure Indicators:**\nOff-by-one acceptance, replay duplication, stale approval, permission expansion, nondeterministic projection, or output/receipt drift.\n\n---\n\n## Out of Scope\n\n- Scope not named in this story remains in sibling stories or a later release; this story does not absorb the full parent epic.\n- In this story, do not infer completion from UI presence, documents, or mocked fixtures when the acceptance criteria require runtime or human evidence.\n- Do not bypass Clark's event, permission, approval, provenance, or rollback contracts to make the happy path appear complete.\n- Full cross-story journey continuity is tested in TR plans and TF-006/TF-009/TF-015 where applicable, not repeated here.\n\n## Automation Notes\n\n- **Bucket allocation:** 1 Maestro · 2 Unit / Harness · 0 Code Review. The visible exact-state journey stays in the UI bucket; failure and replay predicates run cheaply in Harness.\n- **Desktop UI executor:** implement product-team `Maestro` bucket cases with Playwright Electron under `clark-pro/apps/desktop/tests/e2e/`; retain product-team TC IDs and screenshot labels.\n- **Cheap journey-validating coverage:** TC-008-003-002 and TC-008-003-003 run in CI before any TF journey.\n- **Harness location:** add a focused `node:test` fixture beside clark-pro/packages/connectors and clark-pro/services/harness publication fixtures; use recorded providers and debug read APIs, not production secrets.\n- **Selector strategy:** stable semantic roles/names first; `data-testid` only when role/name cannot distinguish exact-version state.\n- **Flakiness risks:** OS prompts, signing/notarization, real providers, process death, and media timing require isolated release lanes with recorded receipts.\n- **Automation priority:** Tier 1 = TC-008-003-001 and safety negative; Tier 2 = boundary/replay and analytics; Tier 3 = no source-only pass substitutes for a runtime/human AC.\n\n---\n"},{"rel":"epics/E-008-distribution-and-observation/T-008-004-observation-ingestion-and-evidence-review.md","content":"# Test Plan: Observation Ingestion and Evidence Review\n\n**ID:** T-008-004\n**Project:** clark-pro\n**Story:** S-008-004\n**Epic:** E-008\n**Stage:** Refinement\n**Version:** 1.0\n**Created:** 2026-07-13\n**Updated:** 2026-07-13\n\n---\n\n## Scope\n\nVerify Observation Ingestion and Evidence Review end-to-end against every acceptance criterion, its trust-preserving negative path, boundary/idempotency behavior, and the AE-008 product event. This plan does not infer story completion from a screen or document alone.\n\n## Prerequisites\n\n- A clean deterministic workspace fixture at the story’s required schema version.\n- Access to clark-pro/packages/connectors and clark-pro/services/harness publication fixtures and the canonical event/projection/receipt inspection harness.\n- External systems use recorded or sandbox responses; no production mutation is required for routine CI.\n- UI bucket note: product-team labels visible journey cases `Maestro`; Clark’s desktop executor is Playwright Electron with the same before/after evidence contract.\n\n## AC Coverage Map\n\n| AC | Test Cases | Bucket | Coverage |\n|----|-----------|--------|----------|\n| AC-001 | TC-008-004-001 (P0) | Maestro | ✓ |\n| AC-002 | TC-008-004-001 (P0), TC-008-004-002 | Maestro · Unit / Harness | ✓ |\n| AE-008 | TC-008-004-004 | Analytics | ✓ |\n\n**Bucket totals:** 1 Maestro · 2 Unit / Harness · 0 Code Review · 1 Analytics. The P0 uses the cheapest bucket that still proves the AC; data and failure predicates remain Harness cases.\n\n---\n\n## Core Test Flow\n\n### TC-008-004-001: Complete acceptance path for Observation Ingestion and Evidence Review\n\n**Type:** E2E\n**Priority:** P0\n**Automation:** Maestro\n**AC Covered:** AC-001, AC-002\n**Dependencies:** Story dependencies and parent release architecture gate must be satisfied\n\n**Captures:**\n| Label | Screen | State |\n|-------|--------|-------|\n| before | DS-observation | default |\n| after | DS-observation | verified |\n\n**Preconditions:**\n- A release-candidate Clark build is open on Screen: Observation with the story’s required canonical fixture and permissions.\n- The tester can inspect Harness events/receipts after the UI journey.\n\n**Steps:**\n1. Establish: an observation arrives.\n2. Perform: it is stored.\n3. Verify AC-001: it links to the exact publication, artifact, angle, source, and decision lineage.\n4. Establish: evidence is missing, stale, deleted, or not comparable.\n5. Perform: Review renders it.\n6. Verify AC-002: the limitation remains visible and the metrics are not silently merged.\n7. Inspect the resulting canonical event, exact version, actor, permission/provenance receipt, and retained recovery state from Screen: Observation.\n\n**Expected Result:**\n- AC-001: Given an observation arrives, when it is stored, then it links to the exact publication, artifact, angle, source, and decision lineage.\n- AC-002: Given evidence is missing, stale, deleted, or not comparable, when Review renders it, then the limitation remains visible and the metrics are not silently merged.\n- Canonical state and evidence match the exact tested revision; no hidden authority, duplicate mutation, or unsupported completion claim is introduced.\n\n**Failure Indicators:**\nAny AC outcome is absent, applies to a different version/actor/scope, bypasses a gate, duplicates state, loses lineage, or relies only on mocked/UI presence where runtime or human evidence is required.\n\n---\n\n## Sub Flows\n\n### TC-008-004-002: Failed gate preserves prior trusted state and exposes recovery\n\n**Type:** Negative\n**Priority:** P1\n**Automation:** Unit / Harness\n**AC Covered:** AC-002\n**Dependencies:** None\n\n**Setup:**\n- Seed one valid prior canonical state and record aggregate version, event count, active revision/authority, asset hashes, and projection snapshot.\n- Configure the relevant trust, evidence, compatibility, recovery, or policy check to fail deterministically.\n\n**Steps:**\n1. Invoke the story action against the failing gate.\n2. Assert no unauthorized provider, filesystem, credential, package, publication, memory, Skill, or canonical mutation occurs.\n3. Compare the post-run snapshot with the recorded trusted state.\n4. Assert a bounded failure receipt identifies the failed gate, owner, and valid retry/rollback/read-only next action.\n5. Restore the valid condition and prove the inverse path can proceed.\n\n**Expected Result:**\nA failed trust, evidence, compatibility, recovery, or policy check must leave the prior canonical state intact and expose a valid next action.\n\n**Failure Indicators:**\nPartial canonical write, lost prior revision, leaked secret/content, silent retry, vague error without next action, or a false “complete” state.\n\n### TC-008-004-003: Boundary, replay, and exact-version regression\n\n**Type:** Edge Case\n**Priority:** P2\n**Automation:** Unit / Harness\n**AC Covered:** AC-001, AC-002\n**Dependencies:** None\n\n**Setup:**\n- Use the smallest deterministic fixture that exercises Ingest supported analytics and manual judgment with freshness, missingness, deletion, platform definition, and sample count. and Present cohorts, ranges, cost, and creator satisfaction without unsupported causal language..\n- Capture the input identity, schema/revision, actor/scope, event count, and expected output hash/receipt.\n\n**Steps:**\n1. Execute at the lower valid boundary and assert the documented result.\n2. Execute at the upper/expanded/expired/stale or incompatible boundary and assert fail-closed behavior.\n3. Replay the original command, intent, provider response, or recovery checkpoint.\n4. Assert exact-version binding, no duplicate mutation/cost, and deterministic projection state.\n5. Rebuild the relevant projection or reopen the app and confirm the same observable result.\n\n**Expected Result:**\nThe story remains deterministic across boundary input, replay, restart, and projection rebuild; permissions and approvals do not expand or transfer to another revision.\n\n**Failure Indicators:**\nOff-by-one acceptance, replay duplication, stale approval, permission expansion, nondeterministic projection, or output/receipt drift.\n\n### TC-008-004-004: Analytics — observation_reviewed fires with the documented shape\n\n**Type:** Analytics\n**Priority:** P1\n**Automation:** Analytics\n**AC Covered:** None (AE-008 coverage)\n**Dependencies:** None\n\n**AE reference:** AE-008 — `observation_reviewed`; properties: source: \"postiz\" | \"direct\" | \"manual\" | \"qualitative\", freshness: \"fresh\" | \"stale\" | \"missing\" | \"deleted\", comparable: boolean; trigger: after the creator opens a lineage-linked outcome review.\n\n**Setup:**\n- A debug build with the local product-event projection queryable or a logged-event spy attached after canonical commit.\n\n**Steps:**\n1. Perform the action that reaches this trigger: after the creator opens a lineage-linked outcome review.\n2. Confirm `observation_reviewed` fires exactly once after the trigger, not on render, click intent, retry, replay, or projection rebuild.\n3. Confirm the payload carries only the documented bounded properties: source: \"postiz\" | \"direct\" | \"manual\" | \"qualitative\", freshness: \"fresh\" | \"stale\" | \"missing\" | \"deleted\", comparable: boolean.\n4. Exercise each documented enum/boolean path and confirm invalid or unbounded values are rejected.\n5. Confirm no PII, creative/source/memory text, prompt/completion, raw URL/path/name/account, UUID, credential reference, or token appears.\n\n**Expected Result:**\n`observation_reviewed` lands once in the local analytics projection with the exact privacy-safe shape. Remote export remains absent unless explicit opt-in is enabled.\n\n**Failure Indicators:**\nMissing, misnamed, early, double-fired, replay-fired, malformed, unbounded, or privacy-leaking event.\n\n---\n\n## Out of Scope\n\n- Scope not named in this story remains in sibling stories or a later release; this story does not absorb the full parent epic.\n- In this story, do not infer completion from UI presence, documents, or mocked fixtures when the acceptance criteria require runtime or human evidence.\n- Do not bypass Clark's event, permission, approval, provenance, or rollback contracts to make the happy path appear complete.\n- Full cross-story journey continuity is tested in TR plans and TF-006/TF-009/TF-015 where applicable, not repeated here.\n\n## Automation Notes\n\n- **Bucket allocation:** 1 inuity_verified` | S-009-005 | after hosted outage/tenant-isolation/release evidence is persisted | scenario: \"hosted_outage\" \\| \"tenant_isolation\" \\| \"local_export\" \\| \"rollback\", result: \"pass\" \\| \"fail\" |\n\n**Property rules:** only the bounded enums/booleans above. User/time are implicit. No raw IDs, URLs, paths, account names, source/artifact/memory text, prompts, credentials, or free-form notes.\n\n**Notes**\n\n- Fire once after the stated canonical commit or completed inspection, not on button click, mount, retry, replay, or projection rebuild.\n- The event supports the epic metric by measuring the outcome boundary, not each implementation step.\n- Export remains local unless the user explicitly opts into the privacy-safe analytics sink.\n"},{"rel":"epics/E-009-team-and-whole-product-release/E-009.md","content":"# Epic: Team and Whole-Product Release\n\n**ID:** E-009\n**Project:** clark-pro\n**Stage:** Ready\n**Version:** 1.0\n**Created:** 2026-07-13\n**Updated:** 2026-07-13\n**Sources:** [Authoritative epics](../../research/history/import-2026-07-13/product/03-epics-and-stories.md), [Whole-product roadmap](../../research/history/import-2026-07-13/roadmap.md)\n\n---\n\n## Outcome\n\nCreators and teams can coordinate, sync, and delegate bounded work while retaining local canonical ownership, tenant isolation, and a complete usable export during hosted outages.\n\n## Success Metric\n\n| Metric | Baseline | Target |\n|--------|----------|--------|\n| Representative full weekly cycles completed end to end | 0 | 4 before Clark Pro 1.0 |\n| Offline conflicts resolved through last-write-wins data loss | No team sync implementation yet | 0 |\n\n## Primary Persona\n\nThe Collaborating Team Lead\n\n## Dependencies\n\n- E-002 (Native Studio and Durable Harness)\n- E-003 (Idea Foundry and Creation Studio)\n- E-008 (Distribution and Observation)\n\n## Stories\n\n| ID | Title | Status | Stage |\n|----|-------|--------|-------|\n| S-009-001 | Shared Workspaces, Roles, and Approval | Backlog | Ready |\n| S-009-002 | Encrypted Event Sync and Asset Mirror | Backlog | Ready |\n| S-009-003 | Scoped Remote Workers and Schedules | Backlog | Ready |\n| S-009-004 | Four-Week Whole-Product Proof | Backlog | Ready |\n| S-009-005 | Release, Hosted Continuity, and Tenant Isolation | Backlog | Ready |\n\n---\n"},{"rel":"epics/E-009-team-and-whole-product-release/S-009-001-shared-workspaces-roles-and-approval.md","content":"# Story: Shared Workspaces, Roles, and Approval\n\n**ID:** S-009-001\n**Project:** clark-pro\n**Epic:** E-009\n**Stage:** Ready\n**Status:** Backlog\n**Priority:** P1\n**Phase:** P-003-02\n**Version:** 1.0\n**Created:** 2026-07-13\n**Updated:** 2026-07-13\n**Sources:** [Authoritative epics](../../research/history/import-2026-07-13/product/03-epics-and-stories.md), [Whole-product roadmap](../../research/history/import-2026-07-13/roadmap.md)\n\n---\n\n## Story\n\nAs a **team_member**, I want to **coordinate assignments, comments, decisions, and approval under workspace roles**, so that **teams can collaborate without collapsing personal and shared authority**.\n\n## Goal\n\nDeliver the observable capability described above through Clark's canonical workspace, with enough evidence to determine whether it is complete.\n\n## Why / Rationale\n\nTeams can collaborate without collapsing personal and shared authority. This story is separated from adjacent work so the board can report verified progress without treating an incomplete product epic as finished.\n\n## Functional Requirements\n\n- Define roles and authorization for every aggregate, read, mutation, assignment, comment, and approval.\n- Keep personal creator memory separate unless an explicit share decision is recorded.\n\n## Acceptance Criteria\n\n- [ ] Given a team member lacks a required workspace role, when they attempt a protected mutation, then Clark denies it and records the authorization result.\n- [ ] Given a personal memory has not been shared, when team context compiles, then the memory remains unavailable.\n\n## Negative Scenarios\n\n- A failed trust, evidence, compatibility, recovery, or policy check must leave the prior canonical state intact and expose a valid next action.\n\n## Future Scope\n\n- Scope not named in this story remains in sibling stories or a later release; this story does not absorb the full parent epic.\n\n## Do Not Do\n\n- In this story, do not infer completion from UI presence, documents, or mocked fixtures when the acceptance criteria require runtime or human evidence.\n- Do not bypass Clark's event, permission, approval, provenance, or rollback contracts to make the happy path appear complete.\n\n---\n"},{"rel":"epics/E-009-team-and-whole-product-release/S-009-002-encrypted-event-sync-and-asset-mirror.md","content":"# Story: Encrypted Event Sync and Asset Mirror\n\n**ID:** S-009-002\n**Project:** clark-pro\n**Epic:** E-009\n**Stage:** Ready\n**Status:** Backlog\n**Priority:** P0\n**Phase:** P-003-02\n**Version:** 1.0\n**Analytics:** AE-009\n**Created:** 2026-07-13\n**Updated:** 2026-07-13\n**Sources:** [Authoritative epics](../../research/history/import-2026-07-13/product/03-epics-and-stories.md), [Whole-product roadmap](../../research/history/import-2026-07-13/roadmap.md)\n\n---\n\n## Story\n\nAs a **team_member**, I want to **work offline and reconcile events and assets without losing concurrent changes**, so that **local-first collaboration remains deterministic across devices**.\n\n## Goal\n\nDeliver the observable capability described above through Clark's canonical workspace, with enough evidence to determine whether it is complete.\n\n## Why / Rationale\n\nLocal-first collaboration remains deterministic across devices. This story is separated from adjacent work so the board can report verified progress without treating an incomplete product epic as finished.\n\n## Functional Requirements\n\n- Synchronize encrypted event envelopes and content-addressed assets with explicit ordering and conflict semantics.\n- Avoid last-write-wins replacement of canonical decisions, approvals, or artifact versions.\n\n## Acceptance Criteria\n\n- [ ] Given two offline Macs append non-conflicting events, when they reconnect, then both histories converge with valid ordering and hash integrity.\n- [ ] Given concurrent commands conflict, when sync resolves them, then Clark preserves both evidence trails and requires an explicit domain decision where necessary.\n\n## Negative Scenarios\n\n- A failed trust, evidence, compatibility, recovery, or policy check must leave the prior canonical state intact and expose a valid next action.\n\n## Future Scope\n\n- Scope not named in this story remains in sibling stories or a later release; this story does not absorb the full parent epic.\n\n## Do Not Do\n\n- In this story, do not infer completion from UI presence, documents, or mocked fixtures when the acceptance criteria require runtime or human evidence.\n- Do not bypass Clark's event, permission, approval, provenance, or rollback contracts to make the happy path appear complete.\n\n---\n"},{"rel":"epics/E-009-team-and-whole-product-release/S-009-003-scoped-remote-workers-and-schedules.md","content":"# Story: Scoped Remote Workers and Schedules\n\n**ID:** S-009-003\n**Project:** clark-pro\n**Epic:** E-009\n**Stage:** Ready\n**Status:** Backlog\n**Priority:** P1\n**Phase:** P-003-02\n**Version:** 1.0\n**Created:** 2026-07-13\n**Updated:** 2026-07-13\n**Sources:** [Authoritative epics](../../research/history/import-2026-07-13/product/03-epics-and-stories.md), [Whole-product roadmap](../../research/history/import-2026-07-13/roadmap.md)\n\n---\n\n## Story\n\nAs a **workspace_admin**, I want to **delegate long jobs and schedules through revocable, sensitivity-bounded remote envelopes**, so that **work can continue while the Mac sleeps without copying broad personal authority to the cloud**.\n\n## Goal\n\nDeliver the observable capability described above through Clark's canonical workspace, with enough evidence to determine whether it is complete.\n\n## Why / Rationale\n\nWork can continue while the Mac sleeps without copying broad personal authority to the cloud. This story is separated from adjacent work so the board can report verified progress without treating an incomplete product epic as finished.\n\n## Functional Requirements\n\n- Use signed job envelopes, device identity, scoped credential delegation, sensitivity policy, expiry, and revocation.\n- Reconcile remote results through the canonical local event model and preserve offline access.\n\n## Acceptance Criteria\n\n- [ ] Given a job is delegated, when the remote worker runs it, then it can access only the named workspace, inputs, credentials, capabilities, and time window.\n- [ ] Given the worker is compromised or revoked, when it attempts unrelated memory or credential access, then the request fails and local export remains available.\n\n## Negative Scenarios\n\n- A failed trust, evidence, compatibility, recovery, or policy check must leave the prior canonical state intact and expose a valid next action.\n\n## Future Scope\n\n- Scope not named in this story remains in sibling stories or a later release; this story does not absorb the full parent epic.\n\n## Do Not Do\n\n- In this story, do not infer completion from UI presence, documents, or mocked fixtures when the acceptance criteria require runtime or human evidence.\n- Do not bypass Clark's event, permission, approval, provenance, or rollback contracts to make the happy path appear complete.\n\n---\n"},{"rel":"epics/E-009-team-and-whole-product-release/S-009-004-four-week-whole-product-proof.md","content":"# Story: Four-Week Whole-Product Proof\n\n**ID:** S-009-004\n**Project:** clark-pro\n**Epic:** E-009\n**Stage:** Ready\n**Status:** Backlog\n**Priority:** P0\n**Phase:** P-003-02\n**Version:** 1.0\n**Analytics:** AE-009\n**Created:** 2026-07-13\n**Updated:** 2026-07-13\n**Sources:** [Authoritative epics](../../research/history/import-2026-07-13/product/03-epics-and-stories.md), [Whole-product roadmap](../../research/history/import-2026-07-13/roadmap.md)\n\n---\n\n## Story\n\nAs a **creator**, I want to **operate the complete capture-to-learning cycle for four representative weeks**, so that **Clark Pro 1.0 is judged by real continuity, recovery, publishability, and learning rather than screen completion**.\n\n## Goal\n\nDeliver the observable capability described above through Clark's canonical workspace, with enough evidence to determine whether it is complete.\n\n## Why / Rationale\n\nClark Pro 1.0 is judged by real continuity, recovery, publishability, and learning rather than screen completion. This story is separated from adjacent work so the board can report verified progress without treating an incomplete product epic as finished.\n\n## Functional Requirements\n\n- Run capture, understand, create, review, distribute, observe, reflect, and improve across the creator's actual channels.\n- Record provenance, interruptions, publications, fallbacks, time, cost, creator judgment, memory changes, and skill changes.\n\n## Acceptance Criteria\n\n- [ ] Given four consecutive weekly cycles finish, when evidence is audited, then every required action, artifact, publication, observation, memory, and Skill revision has complete lineage.\n- [ ] Given any duplicate publication, unexplained state, failed restore, silent learning, or missing fallback occurs, when the exit gate is evaluated, then Clark Pro 1.0 remains blocked.\n\n## Negative Scenarios\n\n- A failed trust, evidence, compatibility, recovery, or policy check must leave the prior canonical state intact and expose a valid next action.\n\n## Future Scope\n\n- Scope not named in this story remains in sibling stories or a later release; this story does not absorb the full parent epic.\n\n## Do Not Do\n\n- In this story, do not infer completion from UI presence, documents, or mocked fixtures when the acceptance criteria require runtime or human evidence.\n- Do not bypass Clark's event, permission, approval, provenance, or rollback contracts to make the happy path appear complete.\n\n---\n"},{"rel":"epics/E-009-team-and-whole-product-release/S-009-005-release-hosted-continuity-and-tenant-isolation.md","content":"# Story: Release, Hosted Continuity, and Tenant Isolation\n\n**ID:** S-009-005\n**Project:** clark-pro\n**Epic:** E-009\n**Stage:** Ready\n**Status:** Backlog\n**Priority:** P0\n**Phase:** P-003-02\n**Version:** 1.0\n**Analytics:** AE-009\n**Created:** 2026-07-13\n**Updated:** 2026-07-13\n**Sources:** [Authoritative epics](../../research/history/import-2026-07-13/product/03-epics-and-stories.md), [Whole-product roadmap](../../research/history/import-2026-07-13/roadmap.md)\n\n---\n\n## Story\n\nAs a **workspace_admin**, I want to **install a signed production release and retain complete local access during hosted failure**, so that **a managed offering adds elasticity without becoming the owner of canonical creator state**.\n\n## Goal\n\nDeliver the observable capability described above through Clark's canonical workspace, with enough evidence to determine whether it is complete.\n\n## Why / Rationale\n\nA managed offering adds elasticity without becoming the owner of canonical creator state. This story is separated from adjacent work so the board can report verified progress without treating an incomplete product epic as finished.\n\n## Functional Requirements\n\n- Complete signing, notarization, privacy, vulnerability response, organization policy, billing, tenant isolation, reliability, and audit evidence.\n- Verify hosted outage behavior, local workspace access, complete export, and recovery.\n\n## Acceptance Criteria\n\n- [ ] Given a production build, when release checks run, then signing, notarization, privacy, update, rollback, security, and incident-response evidence is attributable and passing.\n- [ ] Given the hosted service is unavailable, when a creator opens Clark, then local workspace access and complete export remain usable without cross-tenant exposure.\n\n## Negative Scenarios\n\n- A failed trust, evidence, compatibility, recovery, or policy check must leave the prior canonical state intact and expose a valid next action.\n\n## Future Scope\n\n- Scope not named in this story remains in sibling stories or a later release; this story does not absorb the full parent epic.\n\n## Do Not Do\n\n- In this story, do not infer completion from UI presence, documents, or mocked fixtures when the acceptance criteria require runtime or human evidence.\n- Do not bypass Clark's event, permission, approval, provenance, or rollback contracts to make the happy path appear complete.\n\n---\n"},{"rel":"epics/E-009-team-and-whole-product-release/T-009-001-shared-workspaces-roles-and-approval.md","content":"# Test Plan: Shared Workspaces, Roles, and Approval\n\n**ID:** T-009-001\n**Project:** clark-pro\n**Story:** S-009-001\n**Epic:** E-009\n**Stage:** Refinement\n**Version:** 1.0\n**Created:** 2026-07-13\n**Updated:** 2026-07-13\n\n---\n\n## Scope\n\nVerify Shared Workspaces, Roles, and Approval end-to-end against every acceptance criterion, its trust-preserving negative path, boundary/idempotency behavior, and the canonical receipt/evidence contract. This plan does not infer story completion from a screen or document alone.\n\n## Prerequisites\n\n- A clean deterministic workspace fixture at the story’s required schema version.\n- Access to clark-pro/packages/sync, clark-pro/services/worker, relay, and hosted fixtures and the canonical event/projection/receipt inspection harness.\n- External systems use recorded or sandbox responses; no production mutation is required for routine CI.\n- UI bucket note: product-team labels visible journey cases `Maestro`; Clark’s desktop executor is Playwright Electron with the same before/after evidence contract.\n\n## AC Coverage Map\n\n| AC | Test Cases | Bucket | Coverage |\n|----|-----------|--------|----------|\n| AC-001 | TC-009-001-001 (P0) | Maestro | ✓ |\n| AC-002 | TC-009-001-001 (P0), TC-009-001-002 | Maestro · Unit / Harness | ✓ |\n\n**Bucket totals:** 1 Maestro · 2 Unit / Harness · 0 Code Review. The P0 uses the cheapest bucket that still proves the AC; data and failure predicates remain Harness cases.\n\n---\n\n## Core Test Flow\n\n### TC-009-001-001: Complete acceptance path for Shared Workspaces, Roles, and Approval\n\n**Type:** E2E\n**Priority:** P0\n**Automation:** Maestro\n**AC Covered:** AC-001, AC-002\n**Dependencies:** Story dependencies and parent release architecture gate must be satisfied\n\n**Captures:**\n| Label | Screen | State |\n|-------|--------|-------|\n| before | DS-review | default |\n| after | DS-review | verified |\n\n**Preconditions:**\n- A release-candidate Clark build is open on Screen: Review with the story’s required canonical fixture and permissions.\n- The tester can inspect Harness events/receipts after the UI journey.\n\n**Steps:**\n1. Establish: a team member lacks a required workspace role.\n2. Perform: they attempt a protected mutation.\n3. Verify AC-001: Clark denies it and records the authorization result.\n4. Establish: a personal memory has not been shared.\n5. Perform: team context compiles.\n6. Verify AC-002: the memory remains unavailable.\n7. Inspect the resulting canonical event, exact version, actor, permission/provenance receipt, and retained recovery state from Screen: Review.\n\n**Expected Result:**\n- AC-001: Given a team member lacks a required workspace role, when they attempt a protected mutation, then Clark denies it and records the authorization result.\n- AC-002: Given a personal memory has not been shared, when team context compiles, then the memory remains unavailable.\n- Canonical state and evidence match the exact tested revision; no hidden authority, duplicate mutation, or unsupported completion claim is introduced.\n\n**Failure Indicators:**\nAny AC outcome is absent, applies to a different version/actor/scope, bypasses a gate, duplicates state, loses lineage, or relies only on mocked/UI presence where runtime or human evidence is required.\n\n---\n\n## Sub Flows\n\n### TC-009-001-002: Failed gate preserves prior trusted state and exposes recovery\n\n**Type:** Negative\n**Priority:** P1\n**Automation:** Unit / Harness\n**AC Covered:** AC-002\n**Dependencies:** None\n\n**Setup:**\n- Seed one valid prior canonical state and record aggregate version, event count, active revision/authority, asset hashes, and projection snapshot.\n- Configure the relevant trust, evidence, compatibility, recovery, or policy check to fail deterministically.\n\n**Steps:**\n1. Invoke the story action against the failing gate.\n2. Assert no unauthorized provider, filesystem, credential, package, publication, memory, Skill, or canonical mutation occurs.\n3. Compare the post-run snapshot with the recorded trusted state.\n4. Assert a bounded failure receipt identifies the failed gate, owner, and valid retry/rollback/read-only next action.\n5. Restore the valid condition and prove the inverse path can proceed.\n\n**Expected Result:**\nA failed trust, evidence, compatibility, recovery, or policy check must leave the prior canonical state intact and expose a valid next action.\n\n**Failure Indicators:**\nPartial canonical write, lost prior revision, leaked secret/content, silent retry, vague error without next action, or a false “complete” state.\n\n### TC-009-001-003: Boundary, replay, and exact-version regression\n\n**Type:** Edge Case\n**Priority:** P2\n**Automation:** Unit / Harness\n**AC Covered:** AC-001, AC-002\n**Dependencies:** None\n\n**Setup:**\n- Use the smallest deterministic fixture that exercises Define roles and authorization for every aggregate, read, mutation, assignment, comment, and approval. and Keep personal creator memory separate unless an explicit share decision is recorded..\n- Capture the input identity, schema/revision, actor/scope, event count, and expected output hash/receipt.\n\n**Steps:**\n1. Execute at the lower valid boundary and assert the documented result.\n2. Execute at the upper/expanded/expired/stale or incompatible boundary and assert fail-closed behavior.\n3. Replay the original command, intent, provider response, or recovery checkpoint.\n4. Assert exact-version binding, no duplicate mutation/cost, and deterministic projection state.\n5. Rebuild the relevant projection or reopen the app and confirm the same observable result.\n\n**Expected Result:**\nThe story remains deterministic across boundary input, replay, restart, and projection rebuild; permissions and approvals do not expand or transfer to another revision.\n\n**Failure Indicators:**\nOff-by-one acceptance, replay duplication, stale approval, permission expansion, nondeterministic projection, or output/receipt drift.\n\n---\n\n## Out of Scope\n\n- Scope not named in this story remains in sibling stories or a later release; this story does not absorb the full parent epic.\n- In this story, do not infer completion from UI presence, documents, or mocked fixtures when the acceptance criteria require runtime or human evidence.\n- Do not bypass Clark's event, permission, approval, provenance, or rollback contracts to make the happy path appear complete.\n- Full cross-story journey continuity is tested in TR plans and TF-006/TF-009/TF-015 where applicable, not repeated here.\n\n## Automation Notes\n\n- **Bucket allocation:** 1 Maestro · 2 Unit / Harness · 0 Code Review. The visible exact-state journey stays in the UI bucket; failure and replay predicates run cheaply in Harness.\n- **Desktop UI executor:** implement product-team `Maestro` bucket cases with Playwright Electron under `clark-pro/apps/desktop/tests/e2e/`; retain product-team TC IDs and screenshot labels.\n- **Cheap journey-validating coverage:** TC-009-001-002 and TC-009-001-003 run in CI before any TF journey.\n- **Harness location:** add a focused `node:test` fixture beside clark-pro/packages/sync, clark-pro/services/worker, relay, and hosted fixtures; use recorded providers and debug read APIs, not production secrets.\n- **Selector strategy:** stable semantic roles/names first; `data-testid` only when role/name cannot distinguish exact-version state.\n- **Flakiness risks:** OS prompts, signing/notarization, real providers, process death, and media timing require isolated release lanes with recorded receipts.\n- **Automation priority:** Tier 1 = TC-009-001-001 and safety negative; Tier 2 = boundary/replay and analytics; Tier 3 = no source-only pass substitutes for a runtime/human AC.\n\n---\n"},{"rel":"epics/E-009-team-and-whole-product-release/T-009-002-encrypted-event-sync-and-asset-mirror.md","content":"# Test Plan: Encrypted Event Sync and Asset Mirror\n\n**ID:** T-009-002\n**Project:** clark-pro\n**Story:** S-009-002\n**Epic:** E-009\n**Stage:** Refinement\n**Version:** 1.0\n**Created:** 2026-07-13\n**Updated:** 2026-07-13\n\n---\n\n## Scope\n\nVerify Encrypted Event Sync and Asset Mirror end-to-end against every acceptance criterion, its trust-preserving negative path, boundary/idempotency behavior, and the AE-009 product event. This plan does not infer story completion from a screen or document alone.\n\n## Prerequisites\n\n- A clean deterministic workspace fixture at the story’s required schema version.\n- Access to clark-pro/packages/sync, clark-pro/services/worker, relay, and hosted fixtures and the canonical event/projection/receipt inspection harness.\n- External systems use recorded or sandbox responses; no production mutation is required for routine CI.\n- UI bucket note: product-team labels visible journey cases `Maestro`; Clark’s desktop executor is Playwright Electron with the same before/after evidence contract.\n\n## AC Coverage Map\n\n| AC | Test Cases | Bucket | Coverage |\n|----|-----------|--------|----------|\n| AC-001 | TC-009-002-001 (P0) | Unit / Harness | ✓ |\n| AC-002 | TC-009-002-001 (P0), TC-009-002-002 | Unit / Harness · Unit / Harness | ✓  state, loses lineage, or relies only on mocked/UI presence where runtime or human evidence is required.\n\n---\n\n## Sub Flows\n\n### TC-009-002-002: Failed gate preserves prior trusted state and exposes recovery\n\n**Type:** Negative\n**Priority:** P1\n**Automation:** Unit / Harness\n**AC Covered:** AC-002\n**Dependencies:** None\n\n**Setup:**\n- Seed one valid prior canonical state and record aggregate version, event count, active revision/authority, asset hashes, and projection snapshot.\n- Configure the relevant trust, evidence, compatibility, recovery, or policy check to fail deterministically.\n\n**Steps:**\n1. Invoke the story action against the failing gate.\n2. Assert no unauthorized provider, filesystem, credential, package, publication, memory, Skill, or canonical mutation occurs.\n3. Compare the post-run snapshot with the recorded trusted state.\n4. Assert a bounded failure receipt identifies the failed gate, owner, and valid retry/rollback/read-only next action.\n5. Restore the valid condition and prove the inverse path can proceed.\n\n**Expected Result:**\nA failed trust, evidence, compatibility, recovery, or policy check must leave the prior canonical state intact and expose a valid next action.\n\n**Failure Indicators:**\nPartial canonical write, lost prior revision, leaked secret/content, silent retry, vague error without next action, or a false “complete” state.\n\n### TC-009-002-003: Boundary, replay, and exact-version regression\n\n**Type:** Edge Case\n**Priority:** P2\n**Automation:** Unit / Harness\n**AC Covered:** AC-001, AC-002\n**Dependencies:** None\n\n**Setup:**\n- Use the smallest deterministic fixture that exercises Synchronize encrypted event envelopes and content-addressed assets with explicit ordering and conflict semantics. and Avoid last-write-wins replacement of canonical decisions, approvals, or artifact versions..\n- Capture the input identity, schema/revision, actor/scope, event count, and expected output hash/receipt.\n\n**Steps:**\n1. Execute at the lower valid boundary and assert the documented result.\n2. Execute at the upper/expanded/expired/stale or incompatible boundary and assert fail-closed behavior.\n3. Replay the original command, intent, provider response, or recovery checkpoint.\n4. Assert exact-version binding, no duplicate mutation/cost, and deterministic projection state.\n5. Rebuild the relevant projection or reopen the app and confirm the same observable result.\n\n**Expected Result:**\nThe story remains deterministic across boundary input, replay, restart, and projection rebuild; permissions and approvals do not expand or transfer to another revision.\n\n**Failure Indicators:**\nOff-by-one acceptance, replay duplication, stale approval, permission expansion, nondeterministic projection, or output/receipt drift.\n\n### TC-009-002-004: Analytics — workspace_sync_converged fires with the documented shape\n\n**Type:** Analytics\n**Priority:** P1\n**Automation:** Analytics\n**AC Covered:** None (AE-009 coverage)\n**Dependencies:** None\n\n**AE reference:** AE-009 — `workspace_sync_converged`; properties: topology: \"two_device\" | \"team\", conflict: \"none\" | \"auto_nonconflicting\" | \"explicit_decision\", result: \"converged\" | \"blocked\"; trigger: after replicas verify ordering, hash integrity, assets, and conflict disposition.\n\n**Setup:**\n- A debug build with the local product-event projection queryable or a logged-event spy attached after canonical commit.\n\n**Steps:**\n1. Perform the action that reaches this trigger: after replicas verify ordering, hash integrity, assets, and conflict disposition.\n2. Confirm `workspace_sync_converged` fires exactly once after the trigger, not on render, click intent, retry, replay, or projection rebuild.\n3. Confirm the payload carries only the documented bounded properties: topology: \"two_device\" | \"team\", conflict: \"none\" | \"auto_nonconflicting\" | \"explicit_decision\", result: \"converged\" | \"blocked\".\n4. Exerci
