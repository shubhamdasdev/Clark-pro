ion and Learning |  |  | Verified publication-to-reflection loop | Accounts, Postiz, export, observations, and experiments |\n| P-003-02 | Team and Release Proof |  |  | Clark Pro 1.0 exit evidence | Shared workspaces, sync, remote workers, four-week proof, and release continuity |\n\n## Evidence Alignment\n\n| Layer | Required artifacts / evidence |\n|-------|-------------------------------|\n| Flows | UF-009 through UF-011 plus UF-015; TF-009 and TF-015; TF-006 reruns for whole-product continuity |\n| Design | Timeline, Publication Approval, Reconciliation, Export Package, Observation, Memory, Recovery Summary, team authority states |\n| Architecture | ARCH-002 through ARCH-004 and AT-003-001 through AT-003-003 |\n| Metrics | AE-008 and AE-009 plus North Star and trust dashboards |\n| QA | 10 story plans, TR-003, publication chaos, sync/tenant/worker corpus, hosted outage/local export, four real weekly cycles |\n| Exit | No duplicate/unexplained publications, deterministic team convergence, scoped remote work, tenant isolation, local continuity, attributable 1.0 evidence |\n\n## Out of Scope\n\n- Broad enterprise administration beyond the minimum safe team model\n- Direct Clark connectors for every social platform\n\n## Dependencies\n\n- R-002 must deliver the complete single-user creator loop.\n- Postiz and selected platform accounts must pass capability and policy conformance.\n\n## Definition of Done\n\n- All stories in scope are `Status: Done`.\n- Required automated, human, migration, recovery, security, and release evidence is attributable and linked.\n- Product Team validation has no blocking errors and the static board export matches the committed requirements.\n\n## developer Handoff\n\n1. Load the `` skill and pull the latest main branch.\n2. Read this release, then the story files below in dependency order.\n3. Set a story to `In Progress` when picked up and `QA` only after self-testing every acceptance criterion.\n4. File a Change Request instead of silently changing approved requirements.\n\n### Pickup Order\n\n- `requirements/epics/E-008-distribution-and-observation/S-008-001-social-account-and-credential-center.md` — Social Account and Credential Center\n- `requirements/epics/E-008-distribution-and-observation/S-008-002-postiz-scheduling-and-publication-ledger.md` — Postiz Scheduling and Publication Ledger\n- `requirements/epics/E-008-distribution-and-observation/S-008-003-assisted-handoff-and-deterministic-export.md` — Assisted Handoff and Deterministic Export\n- `requirements/epics/E-008-distribution-and-observation/S-008-004-observation-ingestion-and-evidence-review.md` — Observation Ingestion and Evidence Review\n- `requirements/epics/E-008-distribution-and-observation/S-008-005-experiment-and-strategy-loop.md` — Experiment and Strategy Loop\n- `requirements/epics/E-009-team-and-whole-product-release/S-009-001-shared-workspaces-roles-and-approval.md` — Shared Workspaces, Roles, and Approval\n- `requirements/epics/E-009-team-and-whole-product-release/S-009-002-encrypted-event-sync-and-asset-mirror.md` — Encrypted Event Sync and Asset Mirror\n- `requirements/epics/E-009-team-and-whole-product-release/S-009-003-scoped-remote-workers-and-schedules.md` — Scoped Remote Workers and Schedules\n- `requirements/epics/E-009-team-and-whole-product-release/S-009-004-four-week-whole-product-proof.md` — Four-Week Whole-Product Proof\n- `requirements/epics/E-009-team-and-whole-product-release/S-009-005-release-hosted-continuity-and-tenant-isolation.md` — Release, Hosted Continuity, and Tenant Isolation\n\n### Preservation Rules\n\n- Keep canonical state, exact versions, permission receipts, and provenance on every path.\n- Do not convert missing human, provider, or release evidence into an implementation claim.\n- Keep external mutations idempotent or explicitly reconciling; do not blind-retry.\n\n---\n"},{"rel":"releases/TR-001-local-trust-core.md","content":"# Release Test Plan: Local Trust Core\n\n**ID:** TR-001\n**Project:** clark-pro\n**Release:** R-001\n**Version:** 1.0\n**Created:** 2026-07-13\n**Updated:** 2026-07-13\n\n---\n\n## Release Goal\n\nValidate the already-implemented local trust core as one bounded release: generated contracts, hardened desktop/Harness boundaries, evidence-honest Idea Foundry, governed MCP and Bridge, governed memory, Tool Pack lifecycle, and Class A Skill trust.\n\n## Coverage Summary\n\n| Story | Title | Test Plan | P0 | P1 | P2 | Gap |\n|-------|-------|-----------|----|----|----|-----|\n| S-001-001 | Versioned Contracts and Upcasters | T-001-001 ✓ | 1 | 1 | 1 | — |\n| S-001-002 | Ground Prototype and Evidence Ledger | T-001-002 ✓ | 1 | 1 | 1 + A | — |\n| S-002-001 | Hardened Mac Shell Boundary | T-002-001 ✓ | 1 | 1 | 1 | — |\n| S-002-002 | Durable Event Store and Run Recovery | T-002-002 ✓ | 1 | 1 | 1 + A | — |\n| S-003-001 | Immutable Idea Capture and Revision Lineage | T-003-001 ✓ | 1 | 1 | 1 + A | — |\n| S-003-002 | Evidence-Honest Idea Inspection and Canvas | T-003-002 ✓ | 1 | 1 | 1 | — |\n| S-004-001 | Governed Bundled MCP Capability | T-004-001 ✓ | 1 | 1 | 1 | — |\n| S-004-002 | Scoped Clark Bridge Core | T-004-002 ✓ | 1 | 1 | 1 + A | — |\n| S-005-001 | Evidence-Bound Memory Promotion | T-005-001 ✓ | 1 | 1 | 1 + A | — |\n| S-005-002 | Scoped Retrieval, Correction, and Forgetting | T-005-002 ✓ | 1 | 1 | 1 + A | — |\n| S-006-001 | Tool Pack Quarantine and Trust Gates | T-006-001 ✓ | 1 | 1 | 1 + A | — |\n| S-006-002 | Atomic Tool Pack Activation and Rollback | T-006-002 ✓ | 1 | 1 | 1 + A | — |\n| S-006-003 | OpenCut Candidate Blocked Upstream | T-006-003 ✓ | 1 | 1 | 1 | — |\n| S-007-001 | Bundled Class A Skill Trust Lifecycle | T-007-001 ✓ | 1 | 1 | 1 + A | — |\n| S-007-002 | Skill Update, Expansion Denial, and Rollback | T-007-002 ✓ | 1 | 1 | 1 | — |\n\n**Total:** 15 P0, 15 P1 safety, 15 P2 boundary/replay, and 9 Analytics cases across 15 stories. No documentation-coverage gaps; execution evidence remains pending where story status is not Done.\n\n## Integration Test Cases\n\n> product-team’s `Automation: Maestro` UI bucket is executed with Playwright Electron for this Mac desktop product, retaining ITC IDs, semantic assertions, and evidence screenshots.\n\n### ITC-001-001: Verified local core survives restart\n\n**Stories Covered:** S-001-001, S-002-001, S-002-002, S-003-001, S-003-002\n**Priority:** P1\n**Automation:** Maestro\n\n**Preconditions:**\n- All listed stories and architecture tasks for R-001 are implemented in the release-candidate environment.\n- Deterministic fixtures and only approved sandbox/provider credentials are available.\n\n**Steps:**\n1. Start from the clean release fixture and record the build, schema, workspace, event offset, and consent state.\n2. Run contract verification, capture/revise an idea, kill Harness, relaunch, and confirm exact Canvas/review lineage without duplicate artifacts.\n3. Inspect exact actor, version, permission, cost, provenance, recovery, and external receipt evidence at each story boundary.\n4. Interrupt once at the highest-risk boundary and resume through the documented recovery or reconciliation path.\n5. Export the final QA evidence bundle and compare canonical state with the expected release fixture.\n\n**Expected Result:**\nThe full scenario reaches the release goal without bypass, duplicate mutation, lost lineage, silent learning, ambiguous publication, or unsupported evidence claim.\n\n**Failure Indicators:**\nA story passes alone but composition loses scope, version, authority, receipt, recoverability, accessibility, or terminal-state honesty.\n\n### ITC-001-002: Studio and Bridge converge on governed state\n\n**Stories Covered:** S-004-001, S-004-002, S-005-001, S-005-002\n**Priority:** P2\n**Automation:** Maestro\n\n**Preconditions:**\n- All listed stories and architecture tasks for R-001 are implemented in the release-candidate environment.\n- Deterministic fixtures and only approved sandbox/provider credentials are available.\n\n**Steps:**\n1. Start from the clean release fixture and record the build, schema, workspace, event offset, and consent state.\n2. Capture/revise through Bridge, inspect in Studio, promote/correct/forget memory, and confirm scope/revocation and projection replay.\n3. Inspect exact actor, version, permission, cost, provenance, recovery, and external receipt evidence at each story boundary.\n4. Interrupt once at the highest-risk boundary and resume through the documented recovery or reconciliation path.\n5. Export the final QA evidence bundle and compare canonical state with the expected release fixture.\n\n**Expected Result:**\nThe full scenario reaches the release goal without bypass, duplicate mutation, lost lineage, silent learning, ambiguous publication, or unsupported evidence claim.\n\n**Failure Indicators:**\nA story passes alone but composition loses scope, version, authority, receipt, recoverability, accessibility, or terminal-state honesty.\n\n### ITC-001-003: Blocked and trusted extensions retain honest authority\n\n**Stories Covered:** S-006-001, S-006-002, S-006-003, S-007-001, S-007-002\n**Priority:** P2\n**Automation:** Maestro\n\n**Preconditions:**\n- All listed stories and architecture tasks for R-001 are implemented in the release-candidate environment.\n- Deterministic fixtures and only approved sandbox/provider credentials are available.\n\n**Steps:**\n1. Start from the clean release fixture and record the build, schema, workspace, event offset, and consent state.\n2. Evaluate OpenCut as blocked, activate/rollback eligible fixtures, update a Skill with expansion denial, and verify exact prior authority remains.\n3. Inspect exact actor, version, permission, cost, provenance, recovery, and external receipt evidence at each story boundary.\n4. Interrupt once at the highest-risk boundary and resume through the documented recovery or reconciliation path.\n5. Export the final QA evidence bundle and compare canonical state with the expected release fixture.\n\n**Expected Result:**\nThe full scenario reaches the release goal without bypass, duplicate mutation, lost lineage, silent learning, ambiguous publication, or unsupported evidence claim.\n\n**Failure Indicators:**\nA story passes alone but composition loses scope, version, authority, receipt, recoverability, accessibility, or terminal-state honesty.\n\n## Go / No-Go Criteria\n\n- [ ] Every story P0 and P1 case passes; P2 exceptions have a named owner, risk acceptance, and expiry.\n- [ ] Every ITC passes on the exact release candidate, including one interruption/recovery branch.\n- [ ] All 9 required Analytics cases prove exact once-after-commit, bounded properties, no PII/content, and opt-in export behavior.\n- [ ] Architecture Gate is open where present; every AT acceptance criterion has attributable evidence.\n- [ ] All included stories are Status Done and no P0/P1 defect or security/privacy/duplicate-publication/restore/tenant-isolation defect remains open.\n- [ ] Contract, migration, conformance, hostile, accessibility, performance, backup, packaging, and health-probe evidence required by this release is linked.\n- [ ] Human, provider, commercial, and four-week evidence is not replaced by mocked or automated proof.\n\n## Risk Register\n\n| Risk | Likelihood | Impact | Mitigation |\n|------|------------|--------|------------|\n| Real provider/platform behavior differs from recorded fixtures | Medium | High | Contract discovery, sandbox smoke, schema/freshness visibility, deterministic export fallback |\n| Process interruption exposes replay/duplicate bugs | Medium | Critical | HP-003/HP-007 chaos, exact intent/job identities, TF-015 |\n| OS signing, Keychain, VoiceOver, or update behavior passes source tests but fails packaged Mac | Medium | High | Isolated packaged release lane on oldest supported Mac; observed evidence |\n| Telemetry/support evidence leaks creator content or secrets | Low | Critical | ADR-0018 allowlist, canary corpus, preview and opt-in, outbound capture |\n| Planned open-source integration lacks a stable boundary | High | Medium | Keep blocked_upstream; select another supported engine; never fork by default |\n\n## Known Gaps\n\n- Calendar/performance/SLO targets remain baseline-first until representative measurements and named capacity exist.\n- Production provider, Apple, hosted, commercial, and representative-creator evidence must be collected in execution; this test plan does not claim it now.\n- UI cases use Playwright Electron rather than mobile Maestro while preserving product-team’s UI-bucket traceability contract.\n\n---\n"},{"rel":"releases/TR-002-single-user-creator-alpha.md","content":"# Release Test Plan: Single-User Creator Alpha\n\n**ID:** TR-002\n**Project:** clark-pro\n**Release:** R-002\n**Version:** 1.0\n**Created:** 2026-07-13\n**Updated:** 2026-07-13\n\n---\n\n## Release Goal\n\nComplete the remaining local single-user creator system and trust boundaries needed before real multi-channel distribution begins.\n\n## Coverage Summary\n\n| Story | Title | Test Plan | P0 | P1 | P2 | Gap |\n|-------|-------|-----------|----|----|----|-----|\n| S-001-003 | Representative Creator Validation | T-001-003 ✓ | 1 | 1 | 1 + A | — |\n| S-001-004 | Commercial and Leadership Signoff | T-001-004 ✓ | 1 | 1 | 1 + A | — |\n| S-002-003 | Workspace Portability and Backup Recovery | T-002-003 ✓ | 1 | 1 | 1 + A | — |\n| S-002-004 | Keychain, Signing, and Safe Updates | T-002-004 ✓ | 1 | 1 | 1 + A | — |\n| S-002-005 | Accessibility and Performance Release Evidence | T-002-005 ✓ | 1 | 1 | 1 | — |\n| S-003-003 | Source Ingestion and Claim Ledger | T-003-003 ✓ | 1 | 1 | 1 | — |\n| S-003-004 | Writing, Media, and Platform Variants | T-003-004 ✓ | 1 | 1 | 1 + A | — |\n| S-003-005 | Version-Specific Review and Policy Gates | T-003-005 ✓ | 1 | 1 | 1 + A | — |\n| S-004-003 | Durable Bridge Tasks and Client Pairing | T-004-003 ✓ | 1 | 1 | 1 + A | — |\n| S-004-004 | External Client Examples and Compatibility | T-004-004 ✓ | 1 | 1 | 1 + A | — |\n| S-005-003 | Semantic Retrieval and Reflection Lineage | T-005-003 ✓ | 1 | 1 | 1 + A | — |\n| S-005-004 | Physical Erasure and Memory Validation Corpus | T-005-004 ✓ | 1 | 1 | 1 | — |\n| S-006-004 | Real Third-Party Acquisition and Execution | T-006-004 ✓ | 1 | 1 | 1 + A | — |\n| S-006-005 | Clark Kit SDK and Community Compatibility | T-006-005 ✓ | 1 | 1 | 1 | — |\n| S-007-003 | Run-Scoped Skill Invocation and Receipts | T-007-003 ✓ | 1 | 1 | 1 + A | — |\n| S-007-004 | Community Skills and Class B/C Sandbox | T-007-004 ✓ | 1 | 1 | 1 | — |\n| S-007-005 | Reflection-Driven Skill Proposals and Regression | T-007-005 ✓ | 1 | 1 | 1 + A | — |\n\n**Total:** 17 P0, 17 P1 safety, 17 P2 boundary/replay, and 12 Analytics cases across 17 stories. No documentation-coverage gaps; execution evidence remains pending where story status is not Done.\n\n## Integration Test Cases\n\n> product-team’s `Automation: Maestro` UI bucket is executed with Playwright Electron for this Mac desktop product, retaining ITC IDs, semantic assertions, and evidence screenshots.\n\n### ITC-002-001: Install, restore, create, and approve one production-contract body of work\n\n**Stories Covered:** S-002-003, S-002-004, S-002-005, S-003-003, S-003-004, S-003-005\n**Priority:** P1\n**Automation:** Maestro\n\n**Preconditions:**\n- All listed stories and architecture tasks for R-002 are implemented in the release-candidate environment.\n- Deterministic fixtures and only approved sandbox/provider credentials are available.\n\n**Steps:**\n1. Start from the clean release fixture and record the build, schema, workspace, event offset, and consent state.\n2. Install the release-trusted build, restore/import a workspace, run the evidence-to-variant loop with keyboard/VoiceOver, and approve one exact version.\n3. Inspect exact actor, version, permission, cost, provenance, recovery, and external receipt evidence at each story boundary.\n4. Interrupt once at the highest-risk boundary and resume through the documented recovery or reconciliation path.\n5. Export the final QA evidence bundle and compare canonical state with the expected release fixture.\n\n**Expected Result:**\nThe full scenario reaches the release goal without bypass, duplicate mutation, lost lineage, silent learning, ambiguous publication, or unsupported evidence claim.\n\n**Failure Indicators:**\nA story passes alone but composition loses scope, version, authority, receipt, recoverability, accessibility, or terminal-state honesty.\n\n### ITC-002-002: External capability, Tool Pack, Skill, and Bridge execute under one run policy\n\n**Stories Covered:** S-004-003, S-004-004, S-006-004, S-006-005, S-007-003, S-007-004\n**Priority:** P2\n**Automation:** Maestro\n\n**Preconditions:**\n- All listed stories and architecture tasks for R-002 are implemented in the release-candidate environment.\n- Deterministic fixtures and only approved sandbox/provider credentials are available.\n\n**Steps:**\n1. Start from the clean release fixture and record the build, schema, workspace, event offset, and consent state.\n2. Pair a client, acquire a supported pack/community Skill, execute under the four-way permission intersection, disconnect/reconnect, and inspect receipts/rollback.\n3. Inspect exact actor, version, permission, cost, provenance, recovery, and external receipt evidence at each story boundary.\n4. Interrupt once at the highest-risk boundary and resume through the documented recovery or reconciliation path.\n5. Export the final QA evidence bundle and compare canonical state with the expected release fixture.\n\n**Expected Result:**\nThe full scenario reaches the release goal without bypass, duplicate mutation, lost lineage, silent learning, ambiguous publication, or unsupported evidence claim.\n\n**Failure Indicators:**\nA story passes alone but composition loses scope, version, authority, receipt, recoverability, accessibility, or terminal-state honesty.\n\n### ITC-002-003: Evidence becomes governed memory/Skill without silent learning\n\n**Stories Covered:** S-005-003, S-005-004, S-007-005, S-001-003, S-001-004\n**Priority:** P2\n**Automation:** Maestro\n\n**Preconditions:**\n- All listed stories and architecture tasks for R-002 are implemented in the release-candidate environment.\n- Deterministic fixtures and only approved sandbox/provider credentials are available.\n\n**Steps:**\n1. Start from the clean release fixture and record the build, schema, workspace, event offset, and consent state.\n2. Complete a representative creator trajectory, inspect memory/Skill proposals, exercise correction/forget/regression, and retain Ground blocks until human/commercial evidence signs.\n3. Inspect exact actor, version, permission, cost, provenance, recovery, and external receipt evidence at each story boundary.\n4. Interrupt once at the highest-risk boundary and resume through the documented recovery or reconciliation path.\n5. Export the final QA evidence bundle and compare canonical state with the expected release fixture.\n\n**Expected Result:**\nThe full scenario reaches the release goal without bypass, duplicate mutation, lost lineage, silent learning, ambiguous publication, or unsupported evidence claim.\n\n**Failure Indicators:**\nA story passes alone but composition loses scope, version, authority, receipt, recoverability, accessibility, or terminal-state honesty.\n\n## Go / No-Go Criteria\n\n- [ ] Every story P0 and P1 case passes; P2 exceptions have a named owner, risk acceptance, and expiry.\n- [ ] Every ITC passes on the exact release candidate, including one interruption/recovery branch.\n- [ ] All 12 required Analytics cases prove exact once-after-commit, bounded properties, no PII/content, and opt-in export behavior.\n- [ ] Architecture Gate is open where present; every AT acceptance criterion has attributable evidence.\n- [ ] All included stories are Status Done and no P0/P1 defect or security/privacy/duplicate-publication/restore/tenant-isolation defect remains open.\n- [ ] Contract, migration, conformance, hostile, accessibility, performance, backup, packaging, and health-probe evidence required by this release is linked.\n- [ ] Human, provider, commercial, and four-week evidence is not replaced by mocked or automated proof.\n\n## Risk Register\n\n| Risk | Likelihood | Impact | Mitigation |\n|------|------------|--------|------------|\n| Real provider/platform behavior differs from recorded fixtures | Medium | High | Contract discovery, sandbox smoke, schema/freshness visibility, deterministic export fallback |\n| Process interruption exposes replay/duplicate bugs | Medium | Critical | HP-003/HP-007 chaos, exact intent/job identities, TF-015 |\n| OS signing, Keychain, VoiceOver, or update behavior passes source tests but fails packaged Mac | Medium | High | Isolated packaged release lane on oldest supported Mac; observed evidence |\n| Telemetry/support evidence leaks creator content or secrets | Low | Critical | ADR-0018 allowlist, canary corpus, preview and opt-in, outbound capture |\n| Planned open-source integration lacks a stable boundary | High | Medium | Keep blocked_upstream; select another supported engine; never fork by default |\n\n## Known Gaps\n\n- Calendar/performance/SLO targets remain baseline-first until representative measurements and named capacity exist.\n- Production provider, Apple, hosted, commercial, and representative-creator evidence must be collected in execution; this test plan does not claim it now.\n- UI cases use Playwright Electron rather than mobile Maestro while preserving product-team’s UI-bucket traceability contract.\n\n---\n"},{"rel":"releases/TR-003-whole-product-beta.md","content":"# Release Test Plan: Whole-Product Beta\n\n**ID:** TR-003\n**Project:** clark-pro\n**Release:** R-003\n**Version:** 1.0\n**Created:** 2026-07-13\n**Updated:** 2026-07-13\n\n---\n\n## Release Goal\n\nRun the complete creator cycle on real channels, then prove collaboration, remote continuity, an nt offset, and consent state.\n2. Connect account, submit exact intent, verify or export/reconcile, review fresh/missing evidence, and decide a bounded strategy proposal.\n3. Inspect exact actor, version, permission, cost, provenance, recovery, and external receipt evidence at each story boundary.\n4. Interrupt once at the highest-risk boundary and resume through the documented recovery or reconciliation path.\n5. Export the final QA evidence bundle and compare canonical state with the expected release fixture.\n\n**Expected Result:**\nThe full scenario reaches the release goal without bypass, duplicate mutation, lost lineage, silent learning, ambiguous publication, or unsupported evidence claim.\n\n**Failure Indicators:**\nA story passes alone but composition loses scope, version, authority, receipt, recoverability, accessibility, or terminal-state honesty.\n\n### ITC-003-002: Offline team work converges and scoped remote execution continues\n\n**Stories Covered:** S-009-001, S-009-002, S-009-003\n**Priority:** P2\n**Automation:** Maestro\n\n**Preconditions:**\n- All listed stories and architecture tasks for R-003 are implemented in the release-candidate environment.\n- Deterministic fixtures and only approved sandbox/provider credentials are available.\n\n**Steps:**\n1. Start from the clean release fixture and record the build, schema, workspace, event offset, and consent state.\n2. Create concurrent offline work, sync without last-write-wins loss, delegate one signed scoped job, revoke it, and confirm personal/team memory separation.\n3. Inspect exact actor, version, permission, cost, provenance, recovery, and external receipt evidence at each story boundary.\n4. Interrupt once at the highest-risk boundary and resume through the documented recovery or reconciliation path.\n5. Export the final QA evidence bundle and compare canonical state with the expected release fixture.\n\n**Expected Result:**\nThe full scenario reaches the release goal without bypass, duplicate mutation, lost lineage, silent learning, ambiguous publication, or unsupported evidence claim.\n\n**Failure Indicators:**\nA story passes alone but composition loses scope, version, authority, receipt, recoverability, accessibility, or terminal-state honesty.\n\n### ITC-003-003: Four-week proof survives hosted outage and production rollback\n\n**Stories Covered:** S-009-004, S-009-005\n**Priority:** P2\n**Automation:** Maestro\n\n**Preconditions:**\n- All listed stories and architecture tasks for R-003 are implemented in the release-candidate environment.\n- Deterministic fixtures and only approved sandbox/provider credentials are available.\n\n**Steps:**\n1. Start from the clean release fixture and record the build, schema, workspace, event offset, and consent state.\n2. Complete four representative weekly evidence records, disable hosted services, preserve local access/export, test tenant isolation, and roll back a production candidate.\n3. Inspect exact actor, version, permission, cost, provenance, recovery, and external receipt evidence at each story boundary.\n4. Interrupt once at the highest-risk boundary and resume through the documented recovery or reconciliation path.\n5. Export the final QA evidence bundle and compare canonical state with the expected release fixture.\n\n**Expected Result:**\nThe full scenario reaches the release goal without bypass, duplicate mutation, lost lineage, silent learning, ambiguous publication, or unsupported evidence claim.\n\n**Failure Indicators:**\nA story passes alone but composition loses scope, version, authority, receipt, recoverability, accessibility, or terminal-state honesty.\n\n## Go / No-Go Criteria\n\n- [ ] Every story P0 and P1 case passes; P2 exceptions have a named owner, risk acceptance, and expiry.\n- [ ] Every ITC passes on the exact release candidate, including one interruption/recovery branch.\n- [ ] All 6 required Analytics cases prove exact once-after-commit, bounded properties, no PII/content, and opt-in export behavior.\n- [ ] Architecture Gate is open where present; every AT acceptance criterion has attributable evidence.\n- [ ] All included stories are Status Done and no P0/P1 defect or security/privacy/duplicate-publication/restore/tenant-isolation defect remains open.\n- [ ] Contract, migration, conformance, hostile, accessibility, performance, backup, packaging, and health-probe evidence required by this release is linked.\n- [ ] Human, provider, commercial, and four-week evidence is not replaced by mocked or automated proof.\n\n## Risk Register\n\n| Risk | Likelihood | Impact | Mitigation |\n|------|------------|--------|------------|\n| Real provider/platform behavior differs from recorded fixtures | Medium | High | Contract discovery, sandbox smoke, schema/freshness visibility, deterministic export fallback |\n| Process interruption exposes replay/duplicate bugs | Medium | Critical | HP-003/HP-007 chaos, exact intent/job identities, TF-015 |\n| OS signing, Keychain, VoiceOver, or update behavior passes source tests but fails packaged Mac | Medium | High | Isolated packaged release lane on oldest supported Mac; observed evidence |\n| Telemetry/support evidence leaks creator content or secrets | Low | Critical | ADR-0018 allowlist, canary corpus, preview and opt-in, outbound capture |\n| Planned open-source integration lacks a stable boundary | High | Medium | Keep blocked_upstream; select another supported engine; never fork by default |\n\n## Known Gaps\n\n- Calendar/performance/SLO targets remain baseline-first until representative measurements and named capacity exist.\n- Production provider, Apple, hosted, commercial, and representative-creator evidence must be collected in execution; this test plan does not claim it now.\n- UI cases use Playwright Electron rather than mobile Maestro while preserving product-team’s UI-bucket traceability contract.\n\n---\n"}];
var showRaw=false;
var activeIdx=-1;

// Build tree
function buildTree(files){
  var root={children:{},files:[]};
  files.forEach(function(f,i){
    var parts=f.rel.split('/');
    var node=root;
    for(var j=0;j<parts.length-1;j++){
      if(!node.children[parts[j]])node.children[parts[j]]={children:{},files:[]};
      node=node.children[parts[j]];
    }
    node.files.push({name:parts[parts.length-1],idx:i});
  });
  return root;
}

function renderTree(node,container,depth){
  // Sort folders first, then files
  var folders=Object.keys(node.children).sort();
  var fileItems=node.files.sort(function(a,b){return a.name.localeCompare(b.name);});

  folders.forEach(function(fname){
    var folder=document.createElement('div');
    folder.className='tree-folder';
    var label=document.createElement('div');
    label.className='tree-folder-label';
    label.style.paddingLeft=(depth*14+8)+'px';
    var arrow=document.createElement('span');
    arrow.className='arrow open';
    arrow.textContent='▶';
    label.appendChild(arrow);
    var text=document.createTextNode(' '+fname);
    label.appendChild(text);
    folder.appendChild(label);

    var children=document.createElement('div');
    children.className='tree-children';
    renderTree(node.children[fname],children,depth+1);
    folder.appendChild(children);

    label.onclick=function(){
      var collapsed=children.classList.toggle('collapsed');
      arrow.classList.toggle('open',!collapsed);
    };
    container.appendChild(folder);
  });

  fileItems.forEach(function(f){
    var el=document.createElement('div');
    el.className='tree-file';
    el.textContent=f.name;
    el.style.paddingLeft=(depth*14+28)+'px';
    el.dataset.idx=f.idx;
    el.onclick=function(){selectFile(f.idx);};
    container.appendChild(el);
  });
}

function selectFile(idx){
  activeIdx=idx;
  // Update active state
  document.querySelectorAll('.tree-file').forEach(function(el){
    el.classList.toggle('active',parseInt(el.dataset.idx)===idx);
  });
  renderContent();
}

function renderContent(){
  if(activeIdx<0)return;
  var f=FILES[activeIdx];
  var content=document.getElementById('content');
  content.innerHTML='';

  var pathEl=document.createElement('div');
  pathEl.style.display='flex';
  pathEl.style.alignItems='center';
  pathEl.style.gap='8px';
  pathEl.style.marginBottom='16px';
  var pathText=document.createElement('span');
  pathText.id='file-path';
  pathText.textContent=f.rel;
  pathEl.appendChild(pathText);
  var toggle=document.createElement('button');
  toggle.id='raw-toggle';
  toggle.textContent=showRaw?'rendered':'raw';
  toggle.onclick=function(){showRaw=!showRaw;renderContent();};
  pathEl.appendChild(toggle);
  content.appendChild(pathEl);

  var body=document.createElement('div');
  if(showRaw){
    body.className='raw';
    body.textContent=f.content;
  }else{
    body.className='rendered';
    body.innerHTML=marked.parse(f.content);
  }
  content.appendChild(body);
}

// Init
var tree=buildTree(FILES);
var sidebar=document.getElementById('sidebar');
renderTree(tree,sidebar,0);

// Auto-select first file
if(FILES.length>0)selectFile(0);
</script>
