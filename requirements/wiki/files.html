vent count, and expected output hash/receipt.\n\n**Steps:**\n1. Execute at the lower valid boundary and assert the documented result.\n2. Execute at the upper/expanded/expired/stale or incompatible boundary and assert fail-closed behavior.\n3. Replay the original command, intent, provider response, or recovery checkpoint.\n4. Assert exact-version binding, no duplicate mutation/cost, and deterministic projection state.\n5. Rebuild the relevant projection or reopen the app and confirm the same observable result.\n\n**Expected Result:**\nThe story remains deterministic across boundary input, replay, restart, and projection rebuild; permissions and approvals do not expand or transfer to another revision.\n\n**Failure Indicators:**\nOff-by-one acceptance, replay duplication, stale approval, permission expansion, nondeterministic projection, or output/receipt drift.\n\n---\n\n## Out of Scope\n\n- Scope not named in this story remains in sibling stories or a later release; this story does not absorb the full parent epic.\n- In this story, do not infer completion from UI presence, documents, or mocked fixtures when the acceptance criteria require runtime or human evidence.\n- Do not bypass Clark's event, permission, approval, provenance, or rollback contracts to make the happy path appear complete.\n- Full cross-story journey continuity is tested in TR plans and TF-006/TF-009/TF-015 where applicable, not repeated here.\n\n## Automation Notes\n\n- **Bucket allocation:** 0 Maestro · 3 Unit / Harness · 0 Code Review. The AC are backend/evidence predicates that can be proven without rendering, so Harness is the honest P0.\n- **Desktop UI executor:** implement product-team `Maestro` bucket cases with Playwright Electron under `clark-pro/apps/desktop/tests/e2e/`; retain product-team TC IDs and screenshot labels.\n- **Cheap journey-validating coverage:** TC-005-004-002 and TC-005-004-003 run in CI before any TF journey.\n- **Harness location:** add a focused `node:test` fixture beside clark-pro/services/harness memory repositories and fixtures; use recorded providers and debug read APIs, not production secrets.\n- **Selector strategy:** stable semantic roles/names first; `data-testid` only when role/name cannot distinguish exact-version state.\n- **Flakiness risks:** OS prompts, signing/notarization, real providers, process death, and media timing require isolated release lanes with recorded receipts.\n- **Automation priority:** Tier 1 = TC-005-004-001 and safety negative; Tier 2 = boundary/replay and analytics; Tier 3 = no source-only pass substitutes for a runtime/human AC.\n\n---\n"},{"rel":"epics/E-006-reuse-first-tool-packs/AE-006.md","content":"# Analytics: E-006 — Reuse-First Tool Packs\n\n**ID:** AE-006\n**Project:** clark-pro\n**Epic:** E-006\n**Version:** 1.0\n**Updated:** 2026-07-13\n\n---\n\n**Success Metric (from epic):**\n\n| Activated third-party Tool Packs with complete trust evidence | 0 real third-party packs | At least 1 before the production creation gate |\n| Permission expansion accepted without explicit creator decision | 0 | 0 |\n\n---\n\n## Events\n\n| Event | Story | Trigger | Key Properties |\n|-------|-------|---------|----------------|\n| `tool_pack_evaluated` | S-006-001 | after all available trust gates for one immutable revision are persisted | source_class: \"bundled\" \\| \"verified\" \\| \"community\" \\| \"local\", result: \"eligible\" \\| \"quarantined\" \\| \"blocked_upstream\" \\| \"rejected\", interface: \"mcp\" \\| \"cli\" \\| \"http\" \\| \"library\" \\| \"wasm\" \\| \"sidecar\" \\| \"file\" \\| \"browser\" \\| \"fork\" \\| \"none\" |\n| `tool_pack_revision_activated` | S-006-002 | after atomic activation or rollback commits | decision: \"activated\" \\| \"rolled_back\", permission_changed: boolean, migration_required: boolean |\n| `external_tool_pack_run_completed` | S-006-004 | after a real third-party capability call terminalizes and its receipt is canonical | interface: \"mcp\" \\| \"cli\" \\| \"http\" \\| \"library\" \\| \"wasm\" \\| \"sidecar\" \\| \"file\", outcome: \"completed\" \\| \"failed\" \\| \"cancelled\", rollback_available: boolean |\n\n**Property rules:** only the bounded enums/booleans above. User/time are implicit. No raw IDs, URLs, paths, account names, source/artifact/memory text, prompts, credentials, or free-form notes.\n\n**Notes**\n\n- Fire once after the stated canonical commit or completed inspection, not on button click, mount, retry, replay, or projection rebuild.\n- The event supports the epic metric by measuring the outcome boundary, not each implementation step.\n- Export remains local unless the user explicitly opts into the privacy-safe analytics sink.\n"},{"rel":"epics/E-006-reuse-first-tool-packs/E-006.md","content":"# Epic: Reuse-First Tool Packs\n\n**ID:** E-006\n**Project:** clark-pro\n**Stage:** Ready\n**Version:** 1.0\n**Created:** 2026-07-13\n**Updated:** 2026-07-13\n**Sources:** [Authoritative epics](../../research/history/import-2026-07-13/product/03-epics-and-stories.md), [Whole-product roadmap](../../research/history/import-2026-07-13/roadmap.md)\n\n---\n\n## Outcome\n\nCreators can reuse mature external engines only through immutable, licensed, tested, permission-bounded, reversible Tool Packs while Clark retains canonical workflow and provenance truth.\n\n## Success Metric\n\n| Metric | Baseline | Target |\n|--------|----------|--------|\n| Activated third-party Tool Packs with complete trust evidence | 0 real third-party packs | At least 1 before the production creation gate |\n| Permission expansion accepted without explicit creator decision | 0 | 0 |\n\n## Primary Persona\n\nThe Trust-Conscious Operator\n\n## Dependencies\n\n- E-001 (Contracts and Product Proof)\n- E-004 (MCP and Clark Bridge)\n\n## Stories\n\n| ID | Title | Status | Stage |\n|----|-------|--------|-------|\n| S-006-001 | Tool Pack Quarantine and Trust Gates | Done | Ready |\n| S-006-002 | Atomic Tool Pack Activation and Rollback | Done | Ready |\n| S-006-003 | OpenCut Candidate Blocked Upstream | Done | Ready |\n| S-006-004 | Real Third-Party Acquisition and Execution | Backlog | Ready |\n| S-006-005 | Clark Kit SDK and Community Compatibility | Backlog | Ready |\n\n---\n"},{"rel":"epics/E-006-reuse-first-tool-packs/S-006-001-tool-pack-quarantine-and-trust-gates.md","content":"# Story: Tool Pack Quarantine and Trust Gates\n\n**ID:** S-006-001\n**Project:** clark-pro\n**Epic:** E-006\n**Stage:** Ready\n**Status:** Done\n**Priority:** P0\n**Version:** 1.0\n**Analytics:** AE-006\n**Created:** 2026-07-13\n**Updated:** 2026-07-13\n**Sources:** [Authoritative epics](../../research/history/import-2026-07-13/product/03-epics-and-stories.md), [Whole-product roadmap](../../research/history/import-2026-07-13/roadmap.md), [Harness evidence](../../research/history/import-2026-07-13/evidence/harness-latest-report.json)\n\n---\n\n## Story\n\nAs a **workspace_admin**, I want to **inspect a pinned Tool Pack revision, its interface, license, supply chain, permissions, converters, UI boundary, migration, and rollback evidence**, so that **untrusted packages cannot gain capability authority by appearing installed**.\n\n## Goal\n\nDeliver the observable capability described above through Clark's canonical workspace, with enough evidence to determine whether it is complete.\n\n## Why / Rationale\n\nUntrusted packages cannot gain capability authority by appearing installed. This story is separated from adjacent work so the board can report verified progress without treating an incomplete product epic as finished.\n\n## Functional Requirements\n\n- Track immutable source and artifact identity plus eleven independently visible activation and rollback gates.\n- Separate installed retention, quarantine state, and active execution authority.\n\n## Acceptance Criteria\n\n- [ ] Given a Tool Pack lacks any required interface, legal, SBOM, vulnerability, provenance, adapter, capability, test, migration, or rollback evidence, when activation is requested, then it remains inactive.\n- [ ] Given projections rebuild, when package events replay, then exact manifests, gates, decisions, and runtime state are reproduced.\n\n## Negative Scenarios\n\n- A failed trust, evidence, compatibility, recovery, or policy check must leave the prior canonical state intact and expose a valid next action.\n\n## Future Scope\n\n- Broader capability beyond this verified slice remains in sibling stories and later releases.\n\n## Do Not Do\n\n- In this story, do not infer completion from UI presence, documents, or mocked fixtures when the acceptance criteria require runtime or human evidence.\n- Do not bypass Clark's event, permission, approval, provenance, or rollback contracts to make the happy path appear complete.\n\n---\n"},{"rel":"epics/E-006-reuse-first-tool-packs/S-006-002-atomic-tool-pack-activation-and-rollback.md","content":"# Story: Atomic Tool Pack Activation and Rollback\n\n**ID:** S-006-002\n**Project:** clark-pro\n**Epic:** E-006\n**Stage:** Ready\n**Status:** Done\n**Priority:** P0\n**Version:** 1.0\n**Analytics:** AE-006\n**Created:** 2026-07-13\n**Updated:** 2026-07-13\n**Sources:** [Authoritative epics](../../research/history/import-2026-07-13/product/03-epics-and-stories.md), [Whole-product roadmap](../../research/history/import-2026-07-13/roadmap.md), [Harness evidence](../../research/history/import-2026-07-13/evidence/harness-latest-report.json)\n\n---\n\n## Story\n\nAs a **workspace_admin**, I want to **activate, update, suspend, and roll back an eligible Tool Pack revision atomically**, so that **a bad update cannot strand the workspace or silently retain superseded authority**.\n\n## Goal\n\nDeliver the observable capability described above through Clark's canonical workspace, with enough evidence to determine whether it is complete.\n\n## Why / Rationale\n\nA bad update cannot strand the workspace or silently retain superseded authority. This story is separated from adjacent work so the board can report verified progress without treating an incomplete product epic as finished.\n\n## Functional Requirements\n\n- Require explicit creator decisions for activation and rollback.\n- Retain the tested prior revision and atomically replace current capability authority.\n\n## Acceptance Criteria\n\n- [ ] Given an eligible quarantined revision, when the creator activates it, then only its verified adapter and capability revisions become current.\n- [ ] Given a verified update fails or the creator rolls back, when the decision commits, then the new authority is removed and the exact retained prior revision is restored atomically.\n\n## Negative Scenarios\n\n- A failed trust, evidence, compatibility, recovery, or policy check must leave the prior canonical state intact and expose a valid next action.\n\n## Future Scope\n\n- Broader capability beyond this verified slice remains in sibling stories and later releases.\n\n## Do Not Do\n\n- In this story, do not infer completion from UI presence, documents, or mocked fixtures when the acceptance criteria require runtime or human evidence.\n- Do not bypass Clark's event, permission, approval, provenance, or rollback contracts to make the happy path appear complete.\n\n---\n"},{"rel":"epics/E-006-reuse-first-tool-packs/S-006-003-opencut-candidate-blocked-upstream.md","content":"# Story: OpenCut Candidate Blocked Upstream\n\n**ID:** S-006-003\n**Project:** clark-pro\n**Epic:** E-006\n**Stage:** Ready\n**Status:** Done\n**Priority:** P1\n**Version:** 1.0\n**Created:** 2026-07-13\n**Updated:** 2026-07-13\n**Sources:** [Authoritative epics](../../research/history/import-2026-07-13/product/03-epics-and-stories.md), [Whole-product roadmap](../../research/history/import-2026-07-13/roadmap.md), [Harness evidence](../../research/history/import-2026-07-13/evidence/harness-latest-report.json)\n\n---\n\n## Story\n\nAs a **workspace_admin**, I want to **evaluate OpenCut at an immutable revision against the reuse-first boundary ladder**, so that **Clark does not fork or embed a promising editor before a stable supported integration surface exists**.\n\n## Goal\n\nDeliver the observable capability described above through Clark's canonical workspace, with enough evidence to determine whether it is complete.\n\n## Why / Rationale\n\nClark does not fork or embed a promising editor before a stable supported integration surface exists. This story is separated from adjacent work so the board can report verified progress without treating an incomplete product epic as finished.\n\n## Functional Requirements\n\n- Pin the reviewed OpenCut source and manifest hashes and record the preferred interface ladder result.\n- Grant no adapter, capability, skill, converter, UI, credential, filesystem, network, build, or execution authority while blocked.\n\n## Acceptance Criteria\n\n- [ ] Given the pinned OpenCut candidate exposes no supported MCP, CLI, API, library, WASM, sidecar, or typed-file boundary, when evaluated, then it remains blocked_upstream.\n- [ ] Given the creator opens Connections, when OpenCut is inspected, then the exact failed gates and zero executable capabilities are visible.\n\n## Negative Scenarios\n\n- A failed trust, evidence, compatibility, recovery, or policy check must leave the prior canonical state intact and expose a valid next action.\n\n## Future Scope\n\n- Broader capability beyond this verified slice remains in sibling stories and later releases.\n\n## Do Not Do\n\n- In this story, do not infer completion from UI presence, documents, or mocked fixtures when the acceptance criteria require runtime or human evidence.\n- Do not bypass Clark's event, permission, approval, provenance, or rollback contracts to make the happy path appear complete.\n\n---\n"},{"rel":"epics/E-006-reuse-first-tool-packs/S-006-004-real-third-party-acquisition-and-execution.md","content":"# Story: Real Third-Party Acquisition and Execution\n\n**ID:** S-006-004\n**Project:** clark-pro\n**Epic:** E-006\n**Stage:** Ready\n**Status:** Backlog\n**Priority:** P0\n**Phase:** P-002-03\n**Version:** 1.0\n**Analytics:** AE-006\n**Created:** 2026-07-13\n**Updated:** 2026-07-13\n**Sources:** [Authoritative epics](../../research/history/import-2026-07-13/product/03-epics-and-stories.md), [Whole-product roadmap](../../research/history/import-2026-07-13/roadmap.md)\n\n---\n\n## Story\n\nAs a **workspace_admin**, I want to **acquire, verify, unpack, build when permitted, activate, execute, update, and roll back one supported external Tool Pack**, so that **the reuse-first strategy is proven against a real maintained engine rather than a synthetic package**.\n\n## Goal\n\nDeliver the observable capability described above through Clark's canonical workspace, with enough evidence to determine whether it is complete.\n\n## Why / Rationale\n\nThe reuse-first strategy is proven against a real maintained engine rather than a synthetic package. This story is separated from adjacent work so the board can report verified progress without treating an incomplete product epic as finished.\n\n## Functional Requirements\n\n- Implement safe archive acquisition, traversal protection, signature/hash checks, dependency controls, supervised build, and isolated runtime boundaries.\n- Select a candidate with a stable supported interface and complete legal, compatibility, migration, and rollback evidence.\n\n## Acceptance Criteria\n\n- [ ] Given a valid external package, when it is acquired, then source and artifact identity are verified before unpack or build and no file escapes quarantine.\n- [ ] Given the activated capability runs in a creator loop, when it completes or fails, then inputs, outputs, timing, cost, permission receipt, and rollback state are canonical and inspectable.\n\n## Negative Scenarios\n\n- A failed trust, evidence, compatibility, recovery, or policy check must leave the prior canonical state intact and expose a valid next action.\n\n## Future Scope\n\n- Scope not named in this story remains in sibling stories or a later release; this story does not absorb the full parent epic.\n\n## Do Not Do\n\n- In this story, do not infer completion from UI presence, documents, or mocked fixtures when the acceptance criteria require runtime or human evidence.\n- Do not bypass Clark's event, permission, approval, provenance, or rollback contracts to make the happy path appear complete.\n\n---\n"},{"rel":"epics/E-006-reuse-first-tool-packs/S-006-005-clark-kit-sdk-and-community-compatibility.md","content":"# Story: Clark Kit SDK and Community Compatibility\n\n**ID:** S-006-005\n**Project:** clark-pro\n**Epic:** E-006\n**Stage:** Ready\n**Status:** Backlog\n**Priority:** P1\n**Phase:** P-002-03\n**Version:** 1.0\n**Created:** 2026-07-13\n**Updated:** 2026-07-13\n**Sources:** [Authoritative epics](../../research/history/import-2026-07-13/product/03-epics-and-stories.md), [Whole-product roadmap](../../research/history/import-2026-07-13/roadmap.md)\n\n---\n\n## Story\n\nAs a **external_agent**, I want to **build and validate Tool Packs without changing Clark core**, so that **the ecosystem can add engines while respecting one canonical model and upgrade contract**.\n\n## Goal\n\nDeliver the observable capability described above through Clark's canonical workspace, with enough evidence to determine whether it is complete.\n\n## Why / Rationale\n\nThe ecosystem can add engines while respecting one canonical model and upgrade contract. This story is separated from adjacent work so the board can report verified progress without treating an incomplete product epic as finished.\n\n## Functional Requirements\n\n- Publish manifests, adapter/capability interfaces, converter loss declarations, isolated UI contracts, fixtures, validation CLI, and compatibility matrix.\n- Support signed or verified package channels with migration preview and tested rollback.\n\n## Acceptance Criteria\n\n- [ ] Given a third-party developer uses Clark Kit, when their package passes conformance, then it can install in quarantine without a core-code change.\n- [ ] Given a package attempts undeclared authority or canonical-model replacement, when validation runs, then activation is denied with an actionable report.\n\n## Negative Scenarios\n\n- A failed trust, evidence, compatibility, recovery, or policy check must leave the prior canonical state intact and expose a valid next action.\n\n## Future Scope\n\n- Scope not named in this story remains in sibling stories or a later release; this story does not absorb the full parent epic.\n\n## Do Not Do\n\n- In this story, do not infer completion from UI presence, documents, or mocked fixtures when the acceptance criteria require runtime or human evidence.\n- Do not bypass Clark's event, permission, approval, provenance, or rollback contracts to make the happy path appear complete.\n\n---\n"},{"rel":"epics/E-006-reuse-first-tool-packs/T-006-001-tool-pack-quarantine-and-trust-gates.md","content":"# Test Plan: Tool Pack Quarantine and Trust Gates\n\n**ID:** T-006-001\n**Project:** clark-pro\n**Story:** S-006-001\n**Epic:** E-006\n**Stage:** Refinement\n**Version:** 1.0\n**Created:** 2026-07-13\n**Updated:** 2026-07-13\n\n---\n\n## Scope\n\nVerify Tool Pack Quarantine and Trust Gates end-to-end against every acceptance criterion, its trust-preserving negative path, boundary/idempotency behavior, and the AE-006 product event. This plan does not infer story completion from a screen or document alone.\n\n## Prerequisites\n\n- A clean deterministic workspace fixture at the story’s required schema version.\n- Access to clark-pro/services/harness, clark-pro/tool-packages, and clark-pro/packages/plugin-sdk and the canonical event/projection/receipt inspection harness.\n- External systems use recorded or sandbox responses; no production mutation is required for routine CI.\n- UI bucket note: product-team labels visible journey cases `Maestro`; Clark’s desktop executor is Playwright Electron with the same before/after evidence contract.\n\n## AC Coverage Map\n\n| AC | Test Cases | Bucket | Coverage |\n|----|-----------|--------|----------|\n| AC-001 | TC-006-001-001 (P0) | Maestro | ✓ |\n| AC-002 | TC-006-001-001 (P0), TC-006-001-002 | Maestro · Unit / Harness | ✓ |\n| AE-006 | TC-006-001-004 | Analytics | ✓ |\n\n**Bucket totals:** 1 Maestro · 2 Unit / Harness · 0 Code Review · 1 Analytics. The P0 uses the cheapest bucket that still proves the AC; data and failure predicates remain Harness cases.\n\n---\n\n## Core Test Flow\n\n### TC-006-001-001: Complete acceptance path for Tool Pack Quarantine and Trust Gates\n\n**Type:** E2E\n**Priority:** P0\n**Automation:** Maestro\n**AC Covered:** AC-001, AC-002\n**Dependencies:** Story dependencies and parent release architecture gate must be satisfied\n\n**Captures:**\n| Label | Screen | State |\n|-------|--------|-------|\n| before | DS-tool-pack-review | default |\n| after | DS-tool-pack-review | verified |\n\n**Preconditions:**\n- A release-candidate Clark build is open on Screen: Tool Pack Review with the story’s required canonical fixture and permissions.\n- The tester can inspect Harness events/receipts after the UI journey.\n\n**Steps:**\n1. Establish: a Tool Pack lacks any required interface, legal, SBOM, vulnerability, provenance, adapter, capability, test, migration, or rollback evidence.\n2. Perform: activation is requested.\n3. Verify AC-001: it remains inactive.\n4. Establish: projections rebuild.\n5. Perform: package events replay.\n6. Verify AC-002: exact manifests, gates, decisions, and runtime state are reproduced.\n7. Inspect the resulting canonical event, exact version, actor, permission/provenance receipt, and retained recovery state from Screen: Tool Pack Review.\n\n**Expected Result:**\n- AC-001: Given a Tool Pack lacks any required interface, legal, SBOM, vulnerability, provenance, adapter, capability, test, migration, or rollback evidence, when activation is requested, then it remains inactive.\n- AC-002: Given projections rebuild, when package events replay, then exact manifests, gates, decisions, and runtime state are reproduced.\n- Canonical state and evidence match the exact tested revision; no hidden authority, duplicate mutation, or unsupported completion claim is introduced.\n\n**Failure Indicators:**\nAny AC outcome is absent, applies to a different version/actor/scope, bypasses a gate, duplicates state, loses lineage, or relies only on mocked/UI presence where runtime or human evidence is required.\n\n---\n\n## Sub Flows\n\n### TC-006-001-002: Failed gate preserves prior trusted state and exposes recovery\n\n**Type:** Negative\n**Priority:** P1\n**Automation:** Unit / Harness\n**AC Covered:** AC-002\n**Dependencies:** None\n\n**Setup:**\n- Seed one valid prior canonical state and record aggregate version, event count, active revision/authority, asset hashes, and projection snapshot.\n- Configure the relevant trust, evidence, compatibility, recovery, or policy check to fail deterministically.\n\n**Steps:**\n1. Invoke the story action against the failing gate.\n2. Assert no unauthorized provider, filesystem, credential, package, publication, memory, Skill, or canonical mutation occurs.\n3. Compare the post-run snapshot with the recorded trusted state.\n4. Assert a bounded failure receipt identifies the failed gate, owner, and valid retry/rollback/read-only next action.\n5. Restore the valid condition and prove the inverse path can proceed.\n\n**Expected Result:**\nA failed trust, evidence, compatibility, recovery, or policy check must leave the prior canonical state intact and expose a valid next action.\n\n**Failure Indicators:**\nPartial canonical write, lost prior revision, leaked secret/content, silent retry, vague error without next action, or a false “complete” state.\n\n### TC-006-001-003: Boundary, replay, and exact-version regression\n\n**Type:** Edge Case\n**Priority:** P2\n**Automation:** Unit / Harness\n**AC Covered:** AC-001, AC-002\n**Dependencies:** None\n\n**Setup:**\n- Use the smallest deterministic fixture that exercises Track immutable source and artifact identity plus eleven independently visible activation and rollback gates. and Separate installed retention, quarantine state, and active execution authority..\n- Capture the input identity, schema/revision, actor/scope, event count, and expected output hash/receipt.\n\n**Steps:**\n1. Execute at the lower valid boundary and assert the documented result.\n2. Execute at the upper/expanded/expired/stale or incompatible boundary and assert fail-closed behavior.\n3. Replay the original command, intent, provider response, or recovery checkpoint.\n4. Assert exact-version binding, no duplicate mutation/cost, and deterministic projection state.\n5. Rebuild the relevant projection or reopen the app and confirm the same observable result.\n\n**Expected Result:**\nThe story remains deterministic across boundary input, replay, restart, and projection rebuild; permissions and approvals do not expand or transfer to another revision.\n\n**Failure Indicators:**\nOff-by-one acceptance, replay duplication, stale approval, permission expansion, nondeterministic projection, or output/receipt drift.\n\n### TC-006-001-004: Analytics — tool_pack_evaluated fires with the documented shape\n\n**Type:** Analytics\n**Priority:** P1\n**Automation:** Analytics\n**AC Covered:** None (AE-006 coverage)\n**Dependencies:** None\n\n**AE reference:** AE-006 — `tool_pack_evaluated`; properties: source_class: \"bundled\" | \"verified\" | \"community\" | \"local\", result: \"eligible\" | \"quarantined\" | \"blocked_upstream\" | \"rejected\", interface: \"mcp\" | \"cli\" | \"http\" | \"library\" | \"wasm\" | \"sidecar\" | \"file\" | \"browser\" | \"fork\" | \"none\"; trigger: after all available trust gates for one immutable revision are persisted.\n\n**Setup:**\n- A debug build with the local product-event projection queryable or a logged-event spy attached after canonical commit.\n\n**Steps:**\n1. Perform the action that reaches this trigger: after all available trust gates for one immutable revision are persisted.\n2. Confirm `tool_pack_evaluated` fires exactly once after the trigger, not on render, click intent, retry, replay, or projection rebuild.\n3. Confirm the payload carries only the documented bounded properties: source_class: \"bundled\" | \"verified\" | \"community\" | \"local\", result: \"eligible\" | \"quarantined\" | \"blocked_upstream\" | \"rejected\", interface: \"mcp\" | \"cli\" | \"http\" | \"library\" | \"wasm\" | \"sidecar\" | \"file\" | \"browser\" | \"fork\" | \"none\".\n4. Exercise each documented enum/boolean path and confirm invalid or unbounded values are rejected.\n5. Confirm no PII, creative/source/memory text, prompt/completion, raw URL/path/name/account, UUID, credential reference, or token appears.\n\n**Expected Result:**\n`tool_pack_evaluated` lands once in the local analytics projection with the exact privacy-safe shape. Remote export remains absent unless explicit opt-in is enabled.\n\n**Failure Indicators:**\nMissing, misnamed, early, double-fired, replay-fired, malformed, unbounded, or privacy-leaking event.\n\n---\n\n## Out of Scope\n\n- Broader capability beyond this verified slice remains in sibling stories and later releases.\n- In this story, do not infer completion from UI presence, documents, or mocked fixtures when the acceptance criteria require runtime or human evidence.\n- Do not bypass Clark's event, permission, approval, provenance, or rollback contracts to make the happy path appear complete.\n- Full cross-story journey continuity is tested in TR plans and TF-006/TF-009/TF-015 where applicable, not repeated here.\n\n## Automation Notes\n\n- **Bucket allocation:** 1 Maestro · 2 Unit / Harness · 0 Code Review · 1 Analytics. The visible exact-state journey stays in the UI bucket; failure and replay predicates run cheaply in Harness.\n- **Desktop UI executor:** implement product-team `Maestro` bucket cases with Playwright Electron under `clark-pro/apps/desktop/tests/e2e/`; retain product-team TC IDs and screenshot labels.\n- **Cheap journey-validating coverage:** TC-006-001-002 and TC-006-001-003 run in CI before any TF journey.\n- **Harness location:** add a focused `node:test` fixture beside clark-pro/services/harness, clark-pro/tool-packages, and clark-pro/packages/plugin-sdk; use recorded providers and debug read APIs, not production secrets.\n- **Selector strategy:** stable semantic roles/names first; `data-testid` only when role/name cannot distinguish exact-version state.\n- **Flakiness risks:** OS prompts, signing/notarization, real providers, process death, and media timing require isolated release lanes with recorded receipts.\n- **Automation priority:** Tier 1 = TC-006-001-001 and safety negative; Tier 2 = boundary/replay and analytics; Tier 3 = no source-only pass substitutes for a runtime/human AC.\n\n---\n"},{"rel":"epics/E-006-reuse-first-tool-packs/T-006-002-atomic-tool-pack-activation-and-rollback.md","content":"# Test Plan: Atomic Tool Pack Activation and Rollback\n\n**ID:** T-006-002\n**Project:** clark-pro\n**Story:** S-006-002\n**Epic:** E-006\n**Stage:** Refinement\n**Version:** 1.0\n**Created:** 2026-07-13\n**Updated:** 2026-07-13\n\n---\n\n## Scope\n\nVerify Atomic Tool Pack Activation and Rollback end-to-end against every acceptance criterion, its trust-preserving negative path, boundary/idempotency behavior, and the AE-006 product event. This plan does not infer story completion from a screen or document alone.\n\n## Prerequisites\n\n- A clean deterministic workspace fixture at the story’s required schema version.\n- Access to clark-pro/services/harness, clark-pro/tool-packages, and clark-pro/packages/plugin-sdk and the canonical event/projection/receipt inspection harness.\n- External systems use recorded or sandbox responses; no production mutation is required for routine CI.\n- UI bucket note: product-team labels visible journey cases `Maestro`; Clark’s desktop e receipt.\n\n**Steps:**\n1. Execute at the lower valid boundary and assert the documented result.\n2. Execute at the upper/expanded/expired/stale or incompatible boundary and assert fail-closed behavior.\n3. Replay the original command, intent, provider response, or recovery checkpoint.\n4. Assert exact-version binding, no duplicate mutation/cost, and deterministic projection state.\n5. Rebuild the relevant projection or reopen the app and confirm the same observable result.\n\n**Expected Result:**\nThe story remains deterministic across boundary input, replay, restart, and projection rebuild; permissions and approvals do not expand or transfer to another revision.\n\n**Failure Indicators:**\nOff-by-one acceptance, replay duplication, stale approval, permission expansion, nondeterministic projection, or output/receipt drift.\n\n---\n\n## Out of Scope\n\n- Scope not named in this story remains in sibling stories or a later release; this story does not absorb the full parent epic.\n- In this story, do not infer completion from UI presence, documents, or mocked fixtures when the acceptance criteria require runtime or human evidence.\n- Do not bypass Clark's event, permission, approval, provenance, or rollback contracts to make the happy path appear complete.\n- Full cross-story journey continuity is tested in TR plans and TF-006/TF-009/TF-015 where applicable, not repeated here.\n\n## Automation Notes\n\n- **Bucket allocation:** 0 Maestro · 3 Unit / Harness · 0 Code Review. The AC are backend/evidence predicates that can be proven without rendering, so Harness is the honest P0.\n- **Desktop UI executor:** implement product-team `Maestro` bucket cases with Playwright Electron under `clark-pro/apps/desktop/tests/e2e/`; retain product-team TC IDs and screenshot labels.\n- **Cheap journey-validating coverage:** TC-006-005-002 and TC-006-005-003 run in CI before any TF journey.\n- **Harness location:** add a focused `node:test` fixture beside clark-pro/services/harness, clark-pro/tool-packages, and clark-pro/packages/plugin-sdk; use recorded providers and debug read APIs, not production secrets.\n- **Selector strategy:** stable semantic roles/names first; `data-testid` only when role/name cannot distinguish exact-version state.\n- **Flakiness risks:** OS prompts, signing/notarization, real providers, process death, and media timing require isolated release lanes with recorded receipts.\n- **Automation priority:** Tier 1 = TC-006-005-001 and safety negative; Tier 2 = boundary/replay and analytics; Tier 3 = no source-only pass substitutes for a runtime/human AC.\n\n---\n"},{"rel":"epics/E-007-governed-agent-skills/AE-007.md","content":"# Analytics: E-007 — Governed Agent Skills\n\n**ID:** AE-007\n**Project:** clark-pro\n**Epic:** E-007\n**Version:** 1.0\n**Updated:** 2026-07-13\n\n---\n\n**Success Metric (from epic):**\n\n| Skill revisions receiving undeclared capability authority | 0 | 0 |\n| Production Skill invocations with complete receipts | 0; invocation is intentionally absent | 100% after invocation ships |\n\n---\n\n## Events\n\n| Event | Story | Trigger | Key Properties |\n|-------|-------|---------|----------------|\n| `skill_revision_decided` | S-007-001 | after an exact Skill revision promotion, limitation, rejection, or rollback decision commits | decision: \"promoted\" \\| \"limited\" \\| \"rejected\" \\| \"rolled_back\", trust_class: \"a\" \\| \"b\" \\| \"c\", capability_expansion: boolean |\n| `skill_invocation_completed` | S-007-003 | after run-scoped invocation and all capability receipts terminalize | outcome: \"completed\" \\| \"denied\" \\| \"failed\", trust_class: \"a\" \\| \"b\" \\| \"c\", capability_calls_band: \"zero\" \\| \"one\" \\| \"multiple\" |\n| `skill_regression_evaluated` | S-007-005 | after the active revision regression suite is persisted | result: \"pass\" \\| \"fail\", action: \"none\" \\| \"rollback_proposed\", source: \"scheduled\" \\| \"trajectory_correction\" |\n\n**Property rules:** only the bounded enums/booleans above. User/time are implicit. No raw IDs, URLs, paths, account names, source/artifact/memory text, prompts, credentials, or free-form notes.\n\n**Notes**\n\n- Fire once after the stated canonical commit or completed inspection, not on button click, mount, retry, replay, or projection rebuild.\n- The event supports the epic metric by measuring the outcome boundary, not each implementation step.\n- Export remains local unless the user explicitly opts into the privacy-safe analytics sink.\n"},{"rel":"epics/E-007-governed-agent-skills/E-007.md","content":"# Epic: Governed Agent Skills\n\n**ID:** E-007\n**Project:** clark-pro\n**Stage:** Ready\n**Version:** 1.0\n**Created:** 2026-07-13\n**Updated:** 2026-07-13\n**Sources:** [Authoritative epics](../../research/history/import-2026-07-13/product/03-epics-and-stories.md), [Whole-product roadmap](../../research/history/import-2026-07-13/roadmap.md)\n\n---\n\n## Outcome\n\nCreators can trust, invoke, revise, and roll back reusable procedures through explicit capability ceilings and evidence without allowing a Skill package to self-promote or expand authority.\n\n## Success Metric\n\n| Metric | Baseline | Target |\n|--------|----------|--------|\n| Skill revisions receiving undeclared capability authority | 0 | 0 |\n| Production Skill invocations with complete receipts | 0; invocation is intentionally absent | 100% after invocation ships |\n\n## Primary Persona\n\nThe Trust-Conscious Operator\n\n## Dependencies\n\n- E-004 (MCP and Clark Bridge)\n- E-005 (Governed Creator Memory)\n\n## Stories\n\n| ID | Title | Status | Stage |\n|----|-------|--------|-------|\n| S-007-001 | Bundled Class A Skill Trust Lifecycle | Done | Ready |\n| S-007-002 | Skill Update, Expansion Denial, and Rollback | Done | Ready |\n| S-007-003 | Run-Scoped Skill Invocation and Receipts | Backlog | Ready |\n| S-007-004 | Community Skills and Class B/C Sandbox | Backlog | Ready |\n| S-007-005 | Reflection-Driven Skill Proposals and Regression | Backlog | Ready |\n\n---\n"},{"rel":"epics/E-007-governed-agent-skills/S-007-001-bundled-class-a-skill-trust-lifecycle.md","content":"# Story: Bundled Class A Skill Trust Lifecycle\n\n**ID:** S-007-001\n**Project:** clark-pro\n**Epic:** E-007\n**Stage:** Ready\n**Status:** Done\n**Priority:** P0\n**Version:** 1.0\n**Analytics:** AE-007\n**Created:** 2026-07-13\n**Updated:** 2026-07-13\n**Sources:** [Authoritative epics](../../research/history/import-2026-07-13/product/03-epics-and-stories.md), [Whole-product roadmap](../../research/history/import-2026-07-13/roadmap.md), [Harness evidence](../../research/history/import-2026-07-13/evidence/harness-latest-report.json)\n\n---\n\n## Story\n\nAs a **workspace_admin**, I want to **inspect exact Skill bytes, requested tools, effective permissions, compatibility, and tests before promotion**, so that **a readable Skill package cannot execute merely because it was discovered or installed**.\n\n## Goal\n\nDeliver the observable capability described above through Clark's canonical workspace, with enough evidence to determine whether it is complete.\n\n## Why / Rationale\n\nA readable Skill package cannot execute merely because it was discovered or installed. This story is separated from adjacent work so the board can report verified progress without treating an incomplete product epic as finished.\n\n## Functional Requirements\n\n- Verify SKILL.md and package file hashes, Class A non-executable mode, fixtures, compatibility, and installed capabilities.\n- Install into quarantine with zero trusted scopes until an explicit creator promotion.\n\n## Acceptance Criteria\n\n- [ ] Given the bundled Skill is registered, when its exact bytes and manifest are evaluated, then all trust gates are visible while it remains quarantined.\n- [ ] Given a manifest falsely claims active state or bytes drift after quarantine, when evaluation or promotion runs, then trust is denied or revoked.\n\n## Negative Scenarios\n\n- A failed trust, evidence, compatibility, recovery, or policy check must leave the prior canonical state intact and expose a valid next action.\n\n## Future Scope\n\n- Broader capability beyond this verified slice remains in sibling stories and later releases.\n\n## Do Not Do\n\n- In this story, do not infer completion from UI presence, documents, or mocked fixtures when the acceptance criteria require runtime or human evidence.\n- Do not bypass Clark's event, permission, approval, provenance, or rollback contracts to make the happy path appear complete.\n\n---\n"},{"rel":"epics/E-007-governed-agent-skills/S-007-002-skill-update-expansion-denial-and-rollback.md","content":"# Story: Skill Update, Expansion Denial, and Rollback\n\n**ID:** S-007-002\n**Project:** clark-pro\n**Epic:** E-007\n**Stage:** Ready\n**Status:** Done\n**Priority:** P0\n**Version:** 1.0\n**Created:** 2026-07-13\n**Updated:** 2026-07-13\n**Sources:** [Authoritative epics](../../research/history/import-2026-07-13/product/03-epics-and-stories.md), [Whole-product roadmap](../../research/history/import-2026-07-13/roadmap.md), [Harness evidence](../../research/history/import-2026-07-13/evidence/harness-latest-report.json)\n\n---\n\n## Story\n\nAs a **workspace_admin**, I want to **review Skill revision diffs and retain a tested prior revision for rollback**, so that **updates cannot silently add tools or break the last trusted procedure**.\n\n## Goal\n\nDeliver the observable capability described above through Clark's canonical workspace, with enough evidence to determine whether it is complete.\n\n## Why / Rationale\n\nUpdates cannot silently add tools or break the last trusted procedure. This story is separated from adjacent work so the board can report verified progress without treating an incomplete product epic as finished.\n\n## Functional Requirements\n\n- Suspend the prior active revision only when an eligible update activates atomically.\n- Deny unavailable capability expansion and retain revision-specific trust ceilings.\n\n## Acceptance Criteria\n\n- [ ] Given an update requests an unavailable provider capability, when evaluated, then it stays quarantined and the prior active revision remains active.\n- [ ] Given the creator rolls back a verified revision, when the decision commits, then the exact retained prior revision and trust ceiling become current atomically.\n\n## Negative Scenarios\n\n- A failed trust, evidence, compatibility, recovery, or policy check must leave the prior canonical state intact and expose a valid next action.\n\n## Future Scope\n\n- Broader capability beyond this verified slice remains in sibling stories and later releases.\n\n## Do Not Do\n\n- In this story, do not infer completion from UI presence, documents, or mocked fixtures when the acceptance criteria require runtime or human evidence.\n- Do not bypass Clark's event, permission, approval, provenance, or rollback contracts to make the happy path appear complete.\n\n---\n"},{"rel":"epics/E-007-governed-agent-skills/S-007-003-run-scoped-skill-invocation-and-receipts.md","content":"# Story: Run-Scoped Skill Invocation and Receipts\n\n**ID:** S-007-003\n**Project:** clark-pro\n**Epic:** E-007\n**Stage:** Ready\n**Status:** Backlog\n**Priority:** P0\n**Phase:** P-002-03\n**Version:** 1.0\n**Analytics:** AE-007\n**Created:** 2026-07-13\n**Updated:** 2026-07-13\n**Sources:** [Authoritative epics](../../research/history/import-2026-07-13/product/03-epics-and-stories.md), [Whole-product roadmap](../../research/history/import-2026-07-13/roadmap.md)\n\n---\n\n## Story\n\nAs a **creator**, I want to **invoke a trusted Skill only inside an approved run and capability intersection**, so that **promotion remains a trust decision rather than implicit authorization to act**.\n\n## Goal\n\nDeliver the observable capability described above through Clark's canonical workspace, with enough evidence to determine whether it is complete.\n\n## Why / Rationale\n\nPromotion remains a trust decision rather than implicit authorization to act. This story is separated from adjacent work so the board can report verified progress without treating an incomplete product epic as finished.\n\n## Functional Requirements\n\n- Enforce the intersection of package request, creator trust ceiling, workspace policy, and run grant.\n- Record Skill revision, inputs, outputs, capability calls, cost, timing, and permission receipts without exposing a generic renderer invocation method.\n\n## Acceptance Criteria\n\n- [ ] Given a promoted Skill lacks a run grant, when invocation is attempted, then no code or capability executes.\n- [ ] Given all four permission layers allow invocation, when the Skill runs, then every capability call is bounded and the complete revision-specific receipt is linked to the artifact lineage.\n\n## Negative Scenarios\n\n- A failed trust, evidence, compatibility, recovery, or policy check must leave the prior canonical state intact and expose a valid next action.\n\n## Future Scope\n\n- Scope not named in this story remains in sibling stories or a later release; this story does not absorb the full parent epic.\n\n## Do Not Do\n\n- In this story, do not infer completion from UI presence, documents, or mocked fixtures when the acceptance criteria require runtime or human evidence.\n- Do not bypass Clark's event, permission, approval, provenance, or rollback contracts to make the happy path appear complete.\n\n---\n"},{"rel":"epics/E-007-governed-agent-skills/S-007-004-community-skills-and-class-b-c-sandbox.md","content":"# Story: Community Skills and Class B/C Sandbox\n\n**ID:** S-007-004\n**Project:** clark-pro\n**Epic:** E-007\n**Stage:** Ready\n**Status:** Backlog\n**Priority:** P0\n**Phase:** P-002-03\n**Version:** 1.0\n**Created:** 2026-07-13\n**Updated:** 2026-07-13\n**Sources:** [Authoritative epics](../../research/history/import-2026-07-13/product/03-epics-and-stories.md), [Whole-product roadmap](../../research/history/import-2026-07-13/roadmap.md)\n\n---\n\n## Story\n\nAs a **workspace_admin**, I want to **acquire signed community Skills and execute higher-risk classes in production isolation**, so that **extensible procedures cannot escape filesystem, network, process, or capability policy**.\n\n## Goal\n\nDeliver the observable capability described above through Clark's canonical workspace, with enough evidence to determine whether it is complete.\n\n## Why / Rationale\n\nExtensible procedures cannot escape filesystem, network, process, or capability policy. This story is separated from adjacent work so the board can report verified progress without treating an incomplete product epic as finished.\n\n## Functional Requirements\n\n- Add community source identity, signatures, advisories, compatibility, and revocation checks.\n- Implement the production Class B/C sandbox with declared filesystem, network, process, and capability ceilings.\n\n## Acceptance Criteria\n\n- [ ] Given a community Skill has mutable identity, failed signature, known blocked advisory, or undeclared executable content, when acquired, then it cannot enter trusted execution.\n- [ ] Given a hostile Class B/C fixture attempts an undeclared resource, when executed, then the sandbox denies it and records the attempted boundary crossing.\n\n## Negative Scenarios\n\n- A failed trust, evidence, compatibility, recovery, or policy check must leave the prior canonical state intact and expose a valid next action.\n\n## Future Scope\n\n- Scope not named in this story remains in sibling stories or a later release; this story does not absorb the full parent epic.\n\n## Do Not Do\n\n- In this story, do not infer completion from UI presence, documents, or mocked fixtures when the acceptance criteria require runtime or human evidence.\n- Do not bypass Clark's event, permission, approval, provenance, or rollback contracts to make the happy path appear complete.\n\n---\n"},{"rel":"epics/E-007-governed-agent-skills/S-007-005-reflection-driven-skill-proposals-and-regressio does not absorb the full parent epic.\n\n## Do Not Do\n\n- In this story, do not infer completion from UI presence, documents, or mocked fixtures when the acceptance criteria require runtime or human evidence.\n- Do not bypass Clark's event, permission, approval, provenance, or rollback contracts to make the happy path appear complete.\n\n---\n"},{"rel":"epics/E-007-governed-agent-skills/T-007-001-bundled-class-a-skill-trust-lifecycle.md","content":"# Test Plan: Bundled Class A Skill Trust Lifecycle\n\n**ID:** T-007-001\n**Project:** clark-pro\n**Story:** S-007-001\n**Epic:** E-007\n**Stage:** Refinement\n**Version:** 1.0\n**Created:** 2026-07-13\n**Updated:** 2026-07-13\n\n---\n\n## Scope\n\nVerify Bundled Class A Skill Trust Lifecycle end-to-end against every acceptance criterion, its trust-preserving negative path, boundary/idempotency behavior, and the AE-007 product event. This plan does not infer story completion from a screen or document alone.\n\n## Prerequisites\n\n- A clean deterministic workspace fixture at the story’s required schema version.\n- Access to clark-pro/services/harness, clark-pro/skills-sandbox, and clark-pro/packages/skills and the canonical event/projection/receipt inspection harness.\n- External systems use recorded or sandbox responses; no production mutation is required for routine CI.\n- UI bucket note: product-team labels visible journey cases `Maestro`; Clark’s desktop executor is Playwright Electron with the same before/after evidence contract.\n\n## AC Coverage Map\n\n| AC | Test Cases | Bucket | Coverage |\n|----|-----------|--------|----------|\n| AC-001 | TC-007-001-001 (P0) | Maestro | ✓ |\n| AC-002 | TC-007-001-001 (P0), TC-007-001-002 | Maestro · Unit / Harness | ✓ |\n| AE-007 | TC-007-001-004 | Analytics | ✓ |\n\n**Bucket totals:** 1 Maestro · 2 Unit / Harness · 0 Code Review · 1 Analytics. The P0 uses the cheapest bucket that still proves the AC; data and failure predicates remain Harness cases.\n\n---\n\n## Core Test Flow\
