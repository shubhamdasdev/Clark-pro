/ blocked / destructive | `#422424` | `color.danger` | Must include retained-state and recovery copy |\n| stale / revoked | `#2E263D` | `#C2A8FF` | Never reuse prior approval/authority |\n"},{"rel":"reference/design/design.md","content":"# Design Brief — Clark Pro\n\n**Project:** clark-pro\n**Version:** 1.0\n**Updated:** 2026-07-13\n**Sources:** [Current desktop tokens](../../../clark-pro/apps/desktop/src/renderer/app.css), [Verified prototype](../../../clark-pro/prototype/index.html), [Authoritative flows](../../flows/)\n\n---\n\n## Design Philosophy\n\n| # | Principle | Derived from |\n|---|-----------|-------------|\n| 1 | Focus before graph — show the next consequential decision first, with Canvas one action away. | Operator-Creator pain: opaque automation and fragmented evidence |\n| 2 | Authority is visible before action — permissions, exact revisions, cost, evidence, and reversibility precede every mutation. | Trust-Conscious Operator goal and 100% mutation-receipt metric |\n| 3 | Evidence and uncertainty stay distinct — structural completeness, observed proof, preference, and hypothesis never share one status. | North Star and Ground evidence requirements |\n| 4 | Recovery is a first-class state — every interrupted path names what recovered, paused, failed, reconciles, or needs a creator. | Durable Harness and publication invariants |\n| 5 | Dense, calm, keyboard-first Mac craft — professional information density without hiding labels, focus, or state in decoration. | Native Studio scope, accessibility story, current shell evidence |\n\n---\n\n## Visual Language\n\nThe production direction extends the implemented Clark Studio dark shell. The older light prototype remains evidence for information architecture, not a competing token source.\n\n| Token | Value | Notes |\n|-------|-------|-------|\n| Background | `#111318` | Current Electron shell `--bg` |\n| Surface | `#181B21` | Panels and cards |\n| Surface raised | `#20242C` | Selected rows, overlays, inspectors |\n| Border / divider | `#313641` | Increase to `#737B89` under increased contrast |\n| Text primary | `#F5F3ED` | Warm white; WCAG AA on Background |\n| Text secondary | `#9AA3B2` | Secondary labels; avoid below 12px for long copy |\n| Brand / primary action | `#FF6B35` | Creator decision and active selection |\n| Brand soft | `#3A241D` | Selection halo and low-emphasis accent surface |\n| Focus ring | `#7AB8FF` | 3px visible keyboard focus |\n| Success | `#63D297` | Always paired with state text/icon |\n| Warning | `#E7B85D` | Pending, quarantine, reconciliation |\n| Destructive | `#F1A4A4` on `#321D1D` | Forget, revoke, destructive rollback |\n| Font family | Inter, ui-sans-serif, -apple-system, BlinkMacSystemFont, “SF Pro Text”, sans-serif | Matches current shell |\n| Monospace | ui-monospace, SFMono-Regular, Menlo, monospace | Hashes, schemas, receipts, code |\n| Base font size | 13px application density; 16px minimum for long-form editor content | Dense Mac tool, readable content |\n| Spacing unit | 4px grid | Existing shell values normalize to 4/8/12/16/20/24 |\n| Radius | 8px controls, 12px panels, 999px pills | Current shell |\n\n---\n\n## Component Library & Framework\n\n| Concern | Decision | Notes |\n|---------|----------|-------|\n| Styling framework | Tokenized CSS Modules plus shared CSS custom properties | Extend current `app.css`; no utility framework or parallel theme system |\n| Component library | Clark-owned semantic React components listed below | Trust and evidence states are domain-specific; build on native HTML semantics |\n| Graph | React Flow custom nodes and lanes | Canonical state remains in Harness projections |\n| Icon set | Lucide, bundled locally | Already used in the verified prototype; no runtime CDN |\n| Animation | CSS transitions for state and layout; React Flow motion only where it preserves orientation | Respect reduced motion; no decorative blocking animation |\n| Form handling | Controlled React forms with schema validation through typed IPC | Do not duplicate canonical schema logic in renderer |\n\n### Component Inventory\n\n| Component | Contract | Used for |\n|-----------|----------|----------|\n| ClarkAppShell | Window-safe page shell with titlebar spacing, command routing, landmark structure, and durable loading boundary. | All full-screen Studio surfaces |\n| ClarkRailNav | Keyboard-operable primary rail for Focus, Canvas, Timeline, Review, Library, Memory, Connections, and Observation. | Primary navigation |\n| ClarkViewHeading | Eyebrow, one H1, supporting copy, primary action, and state badge. | Every screen header |\n| ClarkPanel | Bordered surface container with semantic heading and optional actions. | Lists, summaries, inspectors |\n| ClarkMetricCard | Value, definition, freshness, comparison context, and missingness state. | Observation and operational summaries |\n| ClarkNodeCard | Typed Canvas object card with selection, authority, evidence, and stale states. | Canvas only |\n| ClarkStateBadge | Text-plus-color state indicator using bounded domain enums. | Runs, trust gates, publications, packages |\n| ClarkActionButton | Primary, secondary, quiet, and destructive action with pending/disabled states. | All actionable surfaces |\n| ClarkFormField | Label, description, control, validation, and sensitivity hint. | Setup, capture, decisions |\n| ClarkDataTable | Keyboard-readable table with sticky headings, sorting, empty/error states, and row actions. | Evidence, receipts, compatibility |\n| ClarkTrustGate | Named trust/evidence gate with pass, pending, block, reason, and remediation. | Connections, approvals, packages, Skills |\n| ClarkInspector | Contextual detail pane preserving selected object identity across refresh. | Canvas, Review, Memory, package review |\n| ClarkDialog | Blocking, focus-trapped confirmation for authority, destructive action, or external mutation. | All Modal units |\n| ClarkOverlay | Dismissible slide-over that preserves parent context and unsaved-change protection. | All Overlay units |\n| ClarkTimelineRow | Artifact/account/time/state row with receipt and reconciliation affordances. | Timeline |\n| ClarkDiffViewer | Text diff or synchronized media comparison with evidence and annotation rails. | Review and revision diffs |\n| ClarkLineageList | Revision/evidence/influence timeline with stable links and redaction states. | Memory and provenance |\n| ClarkEmptyState | Reason-specific empty state with one recovery or creation action. | Lists and first-run screens |\n| ClarkToast | Non-blocking success or recoverable-error notice; never used for irreversible decisions. | Cross-surface feedback |\n\n---\n\n## Navigation Patterns\n\n| Concern | Decision | Notes |\n|---------|----------|-------|\n| Primary navigation | Persistent left rail: Focus, Canvas, Timeline, Review, Library, Memory, Connections; Observation is contextual from verified publications | Focus remains default; Command Palette exposes every surface |\n| Screen transitions | Same-window route/projection switch; preserve project, selected object, scroll, and keyboard focus | No web-style full-page reload |\n| Back navigation | Native Mac menu/shortcut plus explicit Back where an inspection path has history | Escape dismisses topmost overlay only |\n| Deep linking | `clark://` links to workspace-safe object references after scope validation | Never embed bearer material |\n| Modal presentation | Modal for authority/destructive/external mutation; Overlay for comparison, inspection, and contextual editing | Exact distinctions are encoded in UF docs |\n| Quick capture | Global shortcut and Share entry open a compact overlay independent of current surface | Capture never starts paid work |\n\n---\n\n## Authentication Gates\n\nClark is local-first and has no mandatory product account for personal work. Authentication is capability- and workspace-scoped rather than a global sign-in wall.\n\n| Action | Authorization Required | Rationale |\n|--------|:---:|-----------|\n| Open personal local workspace and inspect canonical state | No | Local ownership remains usable offline and during hosted failure |\n| Connect provider, social account, or MCP client | Yes — provider/pairing flow | Grants external or client authority |\n| Start paid or capability-using run | Yes — exact run approval | Binds permission, budget, revisions, and intent |\n| Promote memory, Skill, or Tool Pack | Yes — explicit creator/admin decision | Trust promotion cannot be implicit |\n| Publish, schedule, revoke, forget, or change shared authority | Yes — exact mutation decision | Irreversible or externally visible consequence |\n| Access a shared/team workspace | Yes — workspace role and device identity | Personal and team authority must remain separate |\n\n---\n\n## Key UX Patterns\n\n### Empty States\nEvery list or work surface explains why it is empty, whether that is safe/expected, and offers one relevant action. Empty must not be confused with failed loading or filtered-out sensitive data.\n\n### Loading & Skeletons\nRender the durable local shell and last verified state first. Use skeletons for local projections, per-source freshness for external data, and explicit progress rows for long jobs. A spinner never hides the identity of the exact version or intent being processed.\n\n### Error Handling\nInline validation handles correctable input. A persistent gate row handles policy, trust, schema, and evidence blocks. A toast is limited to non-blocking feedback. Recovery, reconciliation, and destructive failures use their named screen or modal because they change authority.\n\n### Confirmation Dialogs\nRequire `ClarkDialog` for publication, promotion, revocation, forgetting, activation, rollback, and exact-version approval. The primary action names the mutation; Cancel is always available before commit.\n\n### Provenance and Staleness\nEvery generated artifact can reveal inputs, provider/model, Skill, memory, Tool Pack/capability revisions, run/step, cost, and human edit. Stale status is text plus icon/color and invalidates approval visibly.\n\n### Recovery and Reconciliation\nInterrupted local work routes through Recovery Summary. Ambiguous external mutations route through Reconciliation. Neither uses blind retry, generic “something went wrong” copy, or optimistic terminal status.\n\n---\n\n## Accessibility\n\n| Concern | Standard | Notes |\n|---------|---------|-------|\n| Color contrast | WCAG 2.2 AA; 4.5:1 normal text, 3:1 large text and non-text indicators | State never relies on color alone |\n| Pointer targets | 44×44 CSS px minimum for primary actions; dense rows expose a full-row target | Mac pointer precision does not remove accessibility requirements |\n| Keyboard | All actions reachable; logical tab order; arrows within composite widgets; Escape dismisses one layer | Shortcuts appear in menus and help |\n| Screen reader | One visible H1 per view, landmarks, live-region status for runs, labeled icon-only buttons | VoiceOver evidence required before external release |\n| Dynamic text | Layout survives 200% zoom and increased macOS text/contrast settings | Canvas inspector reflows; no clipped gates |\n| Motion | Respect reduced motion; state changes remain understandable with animation removed | No auto-playing media with audio |\n| Data visualization | Tables accompany charts; freshness, sample size, and missingness are textual | Applies to Observation and diagnostics |\n\n---\n\n## Tone & Voice\n\n| Rule | Source | Example |\n|------|--------|---------|\n| Calm, precise, and accountable; say what Clark knows, what it does not know, and what changed. | Brief constraints and evidence-honest product positioning | “Evidence is still required” not “Validated” |\n| Name the actor and exact object for authority decisions. | Provenance and approval invariants | “Approve artifact version 4” not “Approve” |\n| Explain recovery in operational language with a next action. | Durable Harness and reconciliation rules | “Publication result is unknown; check provider state before retrying.” |\n| Never market a planned or blocked integration as available. | Tool Pack/OpenCut decision | “Blocked upstream — no executable capability” |\n\n---\n\n## Copy & Strings\n\nAll new UI copy is canonical in `requirements/locales/en.json`. During the current framework-light shell, the renderer may consume the same JSON through a small typed loader; the accepted React renderer should use i18next. DS Copy tables mirror these exact values.\n\n- Keys are nested by visual-unit slug or shared namespace.\n- Interpolation uses `{{variable}}`; no source content, secrets, or raw identifiers appear in translation keys.\n- Visible state terms use the canonical domain enum plus plain-language explanation.\n- developers add the string key before using the copy; hardcoded user-visible strings are not accepted.\n\n---\n\n## Implementation Notes\n\n1. Use the Clark component contracts above and the tokens in `design-tokens.md`; do not introduce a second component library or theme.\n2. Use exact copy from `locales/en.json` and the linked DS spec.\n3. Enforce the authorization decision in Harness/typed IPC; the renderer may present a gate but cannot grant itself authority.\n4. Implement every DS state, including loading, empty where applicable, error, stale, quarantined, and needs-reconciliation variants.\n5. Preserve keyboard focus and the selected exact object across projection refresh, overlay dismissal, and recovery.\n6. Validate state with canonical schemas at the preload and Harness boundary; do not pass executable command strings.\n\n---\n"},{"rel":"reference/design/screens/DS-activation-decision.md","content":"# Design Spec — Activation Decision\n\n**ID:** DS-activation-decision\n**Project:** clark-pro\n**Flow:** UF-003\n**Screen:** Modal: Activation Decision\n**Stage:** Ready\n**Version:** 1.0\n**Created:** 2026-07-13\n**Updated:** 2026-07-13\n**Stories:** S-006-001, S-006-002, S-006-003, S-006-004, S-006-005\n**Components:** ClarkDialog, ClarkTrustGate, ClarkDataTable, ClarkActionButton\n\n---\n\n## Modal: Activation Decision\n\nBind activation or rollback to an exact tested Tool Pack revision and explicit creator decision.\n\n**Layout & Hierarchy**\n\n1. Primary: Revision diff.\n2. Secondary: The exact state, evidence, authority, and next-action controls needed for this decision.\n3. Tertiary: Provenance, diagnostics, and navigation that preserve context without competing with the primary action.\n\n**Components**\n\n| Component | Usage | Source |\n|-----------|-------|--------|\n| ClarkDialog | All Modal units | `reference/design/design.md` |\n| ClarkTrustGate | Connections, approvals, packages, Skills | `reference/design/design.md` |\n| ClarkDataTable | Evidence, receipts, compatibility | `reference/design/design.md` |\n| ClarkActionButton | All actionable surfaces | `reference/design/design.md` |\n\n**Copy**\n\n| Element | Copy |\n|---------|------|\n| Heading | Activate this exact revision? |\n| Primary CTA | Activate revision |\n| Secondary CTA | Keep in quarantine |\n| Rollback CTA | Restore prior revision |\n\n**States**\n\n- **Default:** Revision diff, effective capabilities, workspace scope, permission/egress changes, migration preview, rollback target, evidence receipt.\n- **Loading:** No loading; decision is available only after conformance finishes.\n- **Error:** Atomic failure leaves the previous active revision unchanged.\n\n---\n\n## Implementation Notes\n\n1. Use only the listed Clark components and values from `design-tokens.md`.\n2. Source every visible string from `locales/en.json` under `activation_decision`.\n3. Preserve the modal semantics from the linked flow: trap focus and require an explicit decision or cancel.\n4. Implement every state above and keep prior trusted canonical state visible when a check fails.\n\n---\n"},{"rel":"reference/design/screens/DS-approval-decision.md","content":"# Design Spec — Approval Decision\n\n**ID:** DS-approval-decision\n**Project:** clark-pro\n**Flow:** UF-008\n**Screen:** Modal: Approval Decision\n**Stage:** Ready\n**Version:** 1.0\n**Created:** 2026-07-13\n**Updated:** 2026-07-13\n**Stories:** S-003-002, S-003-005\n**Components:** ClarkDialog, ClarkTrustGate, ClarkFormField, ClarkActionButton\n\n---\n\n## Modal: Approval Decision\n\nBind approval, rejection, edit, or change request to one exact artifact version and actor.\n\n**Layout & Hierarchy**\n\n1. Primary: Exact version hash.\n2. Secondary: The exact state, evidence, authority, and next-action controls needed for this decision.\n3. Tertiary: Provenance, diagnostics, and navigation that preserve context without competing with the primary action.\n\n**Components**\n\n| Component | Usage | Source |\n|-----------|-------|--------|\n| ClarkDialog | All Modal units | `reference/design/design.md` |\n| ClarkTrustGate | Connections, approvals, packages, Skills | `reference/design/design.md` |\n| ClarkFormField | Setup, capture, decisions | `reference/design/design.md` |\n| ClarkActionButton | All actionable surfaces | `reference/design/design.md` |\n\n**Copy**\n\n| Element | Copy |\n|---------|------|\n| Heading | Record this exact-version decision |\n| Primary CTA | Approve version |\n| Secondary CTA | Request changes |\n| Reject CTA | Reject version |\n\n**States**\n\n- **Default:** Exact version hash, selected alternative, required gates, reason/note, reversibility, impacted platform adaptations.\n- **Loading:** No loading; decisions only open against fully identified versions.\n- **Error:** Leave the version unapproved and retain the entered note for retry.\n\n---\n\n## Implementation Notes\n\n1. Use only the listed Clark components and values from `design-tokens.md`.\n2. Source every visible string from `locales/en.json` under `approval_decision`.\n3. Preserve the modal semantics from the linked flow: trap focus and require an explicit decision or cancel.\n4. Implement every state above and keep prior trusted canonical state visible when a check fails.\n\n---\n"},{"rel":"reference/design/screens/DS-canvas.md","content":"# Design Spec — Canvas\n\n**ID:** DS-canvas\n**Project:** clark-pro\n**Flow:** UF-006, UF-007\n**Screen:** Screen: Canvas\n**Stage:** Ready\n**Version:** 1.0\n**Created:** 2026-07-13\n**Updated:** 2026-07-13\n**Stories:** S-003-001, S-003-002, S-003-003, S-003-004, S-003-005, S-005-003, S-006-004, S-007-003, S-008-002, S-009-004\n**Components:** ClarkAppShell, ClarkRailNav, ClarkViewHeading, ClarkNodeCard, ClarkInspector, ClarkStateBadge\n\n---\n\n## Screen: Canvas\n\nExpose the typed creative graph, lineage, evidence gaps, decisions, branches, staleness, and run state as an inspectable projection.\n\n**Layout & Hierarchy**\n\n1. Primary: Lanes.\n2. Secondary: The exact state, evidence, authority, and next-action controls needed for this decision.\n3. Tertiary: Provenance, diagnostics, and navigation that preserve context without competing with the primary action.\n\n**Components**\n\n| Component | Usage | Source |\n|-----------|-------|--------|\n| ClarkAppShell | All full-screen Studio surfaces | `reference/design/design.md` |\n| ClarkRailNav | Primary navigation | `reference/design/design.md` |\n| ClarkViewHeading | Every screen header | `reference/design/design.md` |\n| ClarkNodeCard | Canvas only | `reference/design/design.md` |\n| ClarkInspector | Canvas, Review, Memory, package review | `reference/design/design.md` |\n| ClarkStateBadge | Runs, trust gates, publications, packages | `reference/design/design.md` |\n\n**Copy**\n\n| Element | Copy |\n|---------|------|\n| Heading | Canvas |\n| Primary CTA | Preview downstream impact |\n| Empty state | The graph will appear after the first capture. |\n| Evidence warning | Evidence is still required. |\n\n**States**\n\n- **Default:** Lanes, typed nodes, edges, selected-node inspector, evidence readiness, lineage, stale markers, branch controls, keyboard help.\n- **Loading:** Render the stable viewport and node skeletons; keep keyboard focus predictable.\n- **Empty:** Offer capture and template entry points.\n- **Error:** Keep the last durable projection visible with a rebuild action.\n\n---\n\n## Implementation Notes\n\n1. Use only the listed Clark components and values from `design-tokens.md`.\n2. Source every visible string from `locales/en.json` under `canvas`.\n3. Preserve the screen semantics from the linked flow: maintain one visible H1 and keyboard-restorable navigation state.\n4. Implement every state above and keep prior trusted canonical state visible when a check fails.\n\n---\n"},{"rel":"reference/design/screens/DS-capability-health.md","content":"# Design Spec — Capability Health\n\n**ID:** DS-capability-health\n**Project:** clark-pro\n**Flow:** UF-002\n**Screen:** Screen: Capability Health\n**Stage:** Ready\n**Version:** 1.0\n**Created:** 2026-07-13\n**Updated:** 2026-07-13\n**Stories:** S-004-001, S-004-003, S-008-001\n**Components:** ClarkAppShell, ClarkViewHeading, ClarkPanel, ClarkDataTable, ClarkStateBadge\n\n---\n\n## Screen: Capability Health\n\nConfirm discovery, schema, health, scope, and dry-run readiness after connection.\n\n**Layout & Hierarchy**\n\n1. Primary: Health summary.\n2. Secondary: The exact state, evidence, authority, and next-action controls needed for this decision.\n3. Tertiary: Provenance, diagnostics, and navigation that preserve context without competing with the primary action.\n\n**Components**\n\n| Component | Usage | Source |\n|-----------|-------|--------|\n| ClarkAppShell | All full-screen Studio surfaces | `reference/design/design.md` |\n| ClarkViewHeading | Every screen header | `reference/design/design.md` |\n| ClarkPanel | Lists, summaries, inspectors | `reference/design/design.md` |\n| ClarkDataTable | Evidence, receipts, compatibility | `reference/design/design.md` |\n| ClarkStateBadge | Runs, trust gates, publications, packages | `reference/design/design.md` |\n\n**Copy**\n\n| Element | Copy |\n|------ n/hash, license, SBOM, vulnerability/provenance, interface ladder, adapter/capability inventory, converters/loss, UI origins, tests, compatibility, migration, rollback.\n- **Loading:** Each evidence gate has an independent pending state.\n- **Error:** Display exact gate failure and the retained prior trusted revision.\n\n---\n\n## Implementation Notes\n\n1. Use only the listed Clark components and values from `design-tokens.md`.\n2. Source every visible string from `locales/en.json` under `tool_pack_review`.\n3. Preserve the screen semantics from the linked flow: maintain one visible H1 and keyboard-restorable navigation state.\n4. Implement every state above and keep prior trusted canonical state visible when a check fails.\n\n---\n"},{"rel":"reference/design/screens/DS-version-comparison.md","content":"# Design Spec — Version Comparison\n\n**ID:** DS-version-comparison\n**Project:** clark-pro\n**Flow:** UF-008\n**Screen:** Overlay: Version Comparison\n**Stage:** Ready\n**Version:** 1.0\n**Created:** 2026-07-13\n**Updated:** 2026-07-13\n**Stories:** S-003-002, S-003-005\n**Components:** ClarkOverlay, ClarkDiffViewer, ClarkDataTable, ClarkActionButton\n\n---\n\n## Overlay: Version Comparison\n\nCompare text or synchronized media versions without losing evidence and technical differences.\n\n**Layout & Hierarchy**\n\n1. Primary: Side-by-side versions.\n2. Secondary: The exact state, evidence, authority, and next-action controls needed for this decision.\n3. Tertiary: Provenance, diagnostics, and navigation that preserve context without competing with the primary action.\n\n**Components**\n\n| Component | Usage | Source |\n|-----------|-------|--------|\n| ClarkOverlay | All Overlay units | `reference/design/design.md` |\n| ClarkDiffViewer | Review and revision diffs | `reference/design/design.md` |\n| ClarkDataTable | Evidence, receipts, compatibility | `reference/design/design.md` |\n| ClarkActionButton | All actionable surfaces | `reference/design/design.md` |\n\n* der | `reference/design/design.md` |\n| ClarkTrustGate | Connections, approvals, packages, Skills | `reference/design/design.md` |\n| ClarkActionButton | All actionable surfaces | `reference/design/design.md` |\n| ClarkPanel | Lists, summaries, inspectors | `reference/design/design.md` |\n\n**Copy**\n\n| Element | Copy |\n|---------|------|\n| Heading | Your work stays yours |\n| Primary CTA | Create a workspace |\n| Secondary CTA | Import a workspace |\n| Safety link | View build and privacy details |\n\n**States**\n\n- **Default:** Signed-build status, local ownership summary, optional remote-call disclosure, memory/credential/Skill/Tool Pack distinctions, diagnostics link, create/import choices.\n- **Loading:** Verify signature and local prerequisites without blocking access to diagnostics.\n- **Error:** Show the failed trust check, preserve read-only diagnostics, and offer Safe Recovery.\n\n---\n\n## Implementation Notes\n\n1. Use only the listed Clark components and values from `design-tokens.md`.\n2. Source every visible string from `locales/en.json` under `welcome_and_trust`.\n3. Preserve the screen semantics from the linked flow: maintain one visible H1 and keyboard-restorable navigation state.\n4. Implement every state above and keep prior trusted canonical state visible when a check fails.\n\n---\n"},{"rel":"reference/design/screens/DS-workspace-setup.md","content":"# Design Spec — Workspace Setup\n\n**ID:** DS-workspace-setup\n**Project:** clark-pro\n**Flow:** UF-001\n**Screen:** Screen: Workspace Setup\n**Stage:** Ready\n**Version:** 1.0\n**Created:** 2026-07-13\n**Updated:** 2026-07-13\n**Stories:** S-001-002, S-002-003, S-002-004, S-003-001\n**Components:** ClarkAppShell, ClarkViewHeading, ClarkFormField, ClarkActionButton, ClarkTrustGate\n\n---\n\n## Screen: Workspace Setup\n\nCreate or import the canonical local workspace, backup destination, provider, and Brand Constitution.\n\n**Layout & Hierarchy**\n\n1. Primary: Workspace identity.\n2. Secondary: The exact state, evidence, authority, and next-action controls needed for this decision.\n3. Tertiary: Provenance, diagnostics, and navigation that preserve context without competing with the primary action.\n\n**Components**\n\n| Component | Usage | Source |\n|-----------|-------|--------|\n| ClarkAppShell | All full-screen Studio surfaces | `reference/design/design.md` |\n| ClarkViewHeading | Every screen header | `reference/design/design.md` |\n| ClarkFormField | Setup, capture, decisions | `reference/design/design.md` |\n| ClarkActionButton | All actionable surfaces | `reference/design/design.md` |\n| ClarkTrustGate | Connections, approvals, packages, Skills | `reference/design/design.md` |\n\n**Copy**\n\n| Element | Copy |\n|---------|------|\n| Heading | Set up your Clark workspace |\n| Primary CTA | Open Focus |\n| Optional action | Set up connections later |\n| Error | Clark could not verify this workspace. Nothing was imported. |\n\n**States**\n\n- **Default:** Workspace identity, storage location, backup recipient, provider connection, Brand Constitution import, optional connector setup, guided template choice.\n- **Loading:** Show step-local progress; never hide which local operation is running.\n- **Empty:** New workspace begins with a guided Full Week template.\n- **Error:** Keep the active workspace unchanged and show diagnostics plus rollback.\n\n---\n\n## Implementation Notes\n\n1. Use only the listed Clark components and values from `design-tokens.md`.\n2. Source every visible string from `locales/en.json` under `workspace_setup`.\n3. Preserve the screen semantics from the linked flow: maintain one visible H1 and keyboard-restorable navigation state.\n4. Implement every state above and keep prior trusted canonical state visible when a check fails.\n\n---\n"},{"rel":"reference/health-probes.md","content":"# Health Probe Registry — Clark Pro\n\n**Project:** clark-pro\n**Version:** 1.0\n**Updated:** 2026-07-13\n\n---\n\n| ID | Critical path | Probe | Signal / pass rule | Cadence | Owner | Bound flow tests |\n|----|---------------|-------|--------------------|---------|-------|------------------|\n| HP-001 | Launch and Harness handshake | Start packaged app with a verified fixture and query typed health | Focus interactive; Harness contract version matches; no renderer authority regression | release + nightly packaged smoke | Desktop / Harness | TF-015 |\n| HP-002 | Event append and projections | Append idempotent fixture command, verify hash chain/checkpoint, rebuild projection | One event for command; aggregate version valid; rebuilt snapshot identical | every PR + nightly | Domain / Data | TF-006, TF-015 |\n| HP-003 | Run recovery | Kill Harness at each supported state and relaunch | Correct durable gate; orphan lease revoked; no duplicate artifact/tool intent | nightly chaos + release | Harness / QA | TF-006, TF-015 |\n| HP-004 | Credential boundary | Revoke fixture credential while dependent work is queued | Work blocks before provider call; secret absent from renderer/events/logs | every PR boundary suite | Security / Connect | TF-006, TF-009 |\n| HP-005 | Bridge and client scope | Run hostile Origin/Host/body/workspace and reconnect fixtures | Unauthorized requests denied; same intent reconnects to existing job | nightly conformance | Bridge / Security | TF-015 |\n| HP-006 | Tool Pack and Skill isolation | Execute acquisition, hostile archive/sandbox, permission-expansion, update/rollback corpus | Escape/expansion denied; prior active revision preserved; receipt complete | every PR + release | Ecosystem / Security | TF-006 |\n| HP-007 | Publication reconciliation | Simulate response loss after provider commit and restart | Intent enters reconciliation; provider observation finds one outcome; no blind retry/duplicate | nightly + pre-ship | Distribution | TF-009, TF-015 |\n| HP-008 | Observation freshness | Load fresh, stale, deleted, missing, and incomparable provider fixtures | Each limitation is visible and no incompatible metrics merge | nightly | Data / Product | TF-006 |\n| HP-009 | Backup and restore | Encrypt representative workspace, corrupt variants, restore on clean fixture | Valid archive matches hashes/history; invalid archive never mutates active workspace | release + weekly | Data / Security | TF-015 |\n| HP-010 | Relay, remote worker, and tenant isolation | Replay/expire/revoke/cross-tenant envelope corpus; disable hosted services | Unauthorized envelope denied; valid result reconciles; local access/export remain usable | R-003 CI + production synthetic | Platform / Security | TF-015 |\n\n## Evidence Contract\n\nEach run records probe ID, app/schema version, environment, fixture version, start/end, bounded result class, evidence artifact path, and owner. Probe output must exclude creative content, raw identifiers, credentials, absolute paths, and provider payloads. A failing safety/integrity probe blocks the applicable release; a baseline performance probe opens a measured follow-up rather than inventing a threshold.\n"},{"rel":"reference/observability.md","content":"# Observability Plan — Clark Pro\n\n**Project:** clark-pro\n**Version:** 1.0\n**Updated:** 2026-07-13\n\n> Operational telemetry for performance, stability, debugging, audit, recovery, and hosted health. Product-behaviour measurement lives in `analytics.md`. No telemetry leaves the Mac without the consent defined by ADR-0018.\n\n---\n\n## Recommended Stack\n\n| Concern | Tool / Service | Library / SDK | Native or 3rd-party | Notes / rationale |\n|---------|----------------|---------------|---------------------|-------------------|\n| Structured logging | Clark local JSONL/SQLite diagnostics projection | `pino` with a Clark allowlist serializer | local/native | Fast structured Node logging; rotating local files, correlation IDs, release/process tags, user-previewed export |\n| Error & crash tracking | Electron Crashpad local store | Electron `crashReporter` with `uploadToServer: false` | native | Confidential minidumps stay local; explicit reviewed support upload only |\n| Metrics & monitoring | Clark Diagnostics projection and embedded dashboard | `@opentelemetry/api`, `@opentelemetry/sdk-metrics` | local/native | Manual allowlisted instruments; no broad automatic HTTP/DB/AI capture |\n| Tracing / APM | OpenTelemetry manual spans → local OTLP file/collector | `@opentelemetry/sdk-node`, OTLP exporter only after opt-in | vendor-neutral | Run/step/tool/publication correlation; optional customer-managed collector |\n| Health / synthetic | Harness probe runner plus optional hosted probe service in R-003 | Node test runner + `health-probes.md` registry | local first | Desktop critical paths are semantic probes, not a fake “website uptime” check |\n| Audit / security logging | Hash-chained domain events + append-only audit projection; cloud-native audit logs after provider selection | Clark domain contracts | native | Captures actor, action, target, decision, before/after refs; never raw secret values |\n| Optional remote error backend | Sentry only after explicit opt-in and privacy canary approval | `@sentry/electron` with deny-by-default event processor | optional 3rd-party | Upgrade only when local/support bundles cannot meet MTTR needs; no automatic minidump/content upload |\n\n## Structured Logging Standard\n\n- **Format:** one JSON object per line with `timestamp`, `level`, `message_code`, `correlation_id`, `trace_id`, `process_type`, `app_version`, `schema_version`, `capability_class`, `result_class`, and bounded duration/count fields.\n- **Aggregation:** local rotating diagnostics under the Clark application-support directory plus a queryable local projection. Hosted logs are a separate opt-in/export sink.\n- **Retention:** local ordinary logs 14 days by default; crash dumps 7 days; security/audit events follow canonical workspace retention and export policy. Users can clear diagnostics without deleting canonical project history.\n- **PII/content redaction:** never log artifact text/media, prompts/completions, source excerpts, memory statements, raw URLs/query strings, absolute paths, file/account names, email/IP, credential references, tokens, clipboard, or local filenames. Unknown attributes are dropped.\n- **Correlation:** one correlation ID crosses renderer request → main/preload → Harness command → run/step → capability/tool receipt → provider observation. Publication intent and external job IDs are locally joined but not exported as raw high-cardinality analytics properties.\n\n## Key Metrics to Surface\n\nTargets are baseline-first unless they are completeness/safety invariants already accepted in the brief.\n\n### Performance\n\n| Metric | Source | Target |\n|--------|--------|--------|\n| Cold launch to interactive Focus p50/p95/p99 | manual OTel spans | Establish baseline on oldest supported Mac |\n| Renderer → Harness command latency p50/p95/p99 by command class | OTel spans | Establish baseline |\n| Projection rebuild duration and events/sec | Harness metrics | Establish baseline; deterministic result required |\n| Canvas initial render and interaction latency for 50-object fixture | renderer performance marks | Establish baseline before S-002-005 review |\n| Asset import/hash/preview duration by coarse size bucket | worker spans | Establish baseline |\n| Provider/tool latency by capability class and result class | capability spans | Establish baseline; no provider payload attributes |\n\n### Stability\n\n| Metric | Source | Target |\n|--------|--------|--------|\n| Crash-free local sessions | Crashpad metadata + clean shutdown marker | Establish baseline; no remote upload by default |\n| Supported interruption recoveries without duplicate mutation | recovery audit events | 100% of declared supported states |\n| Projection integrity/replay pass rate | deterministic Harness probe | 100% |\n| Publication intents with explicit terminal or reconciliation state | publication projection | 100% |\n| Tool Pack/Skill sandbox escape attempts denied | sandbox receipt metrics | 100% of hostile corpus |\n| Backup restore verification pass rate | backup probe receipts | 100% before external release |\n\n### Debugging\n\n| Capability | Source | Status |\n|------------|--------|--------|\n| End-to-end correlation IDs across process boundaries | pino + OTel | Planned in AT-002-004 |\n| Grouped error classes with release, process, and bounded breadcrumbs | local error projection | Planned in AT-002-004 |\n| Source-map/symbol metadata without automatic upload | packaged build manifest | Planned in AT-002-001 |\n| User-previewed diagnostics bundle with canary redaction scan | diagnostics exporter | Planned in AT-002-004 |\n| Run/step/tool/publication trace viewer | local Diagnostics screen | Planned in AT-002-004 |\n\n### Other — Security, Cost, Saturation\n\n| Metric | Source | Target |\n|--------|--------|--------|\n| Privileged/mutating actions with actor, policy, permission, provenance receipt | application audit projection | 100% |\n| Credential denial/revocation enforcement | broker audit events | 100% of conformance cases |\n| Run budget reservation vs reconciled cost by bounded class | tool receipts | Establish baseline; unexplained cost = 0 |\n| Harness memory/CPU/event-loop lag and worker queue depth | OTel metrics | Establish baseline on representative fixtures |\n| Remote envelope rejection by class | relay/worker audit logs | Establish baseline; all hostile corpus requests denied |\n| Telemetry canary leaks | outbound capture test | 0 |\n\n## Audit & Security Logging\n\n| Layer | What is captured | Where it lands | Retention | On today? |\n|-------|------------------|----------------|-----------|-----------|\n| Local platform/process audit | app launch, signature/update status, crash marker, broker operation result class | local diagnostics; Keychain/security APIs | 14 days except release evidence | Partial — bounded shell evidence exists |\n| Application audit trail | actor, command, target refs, policy result, decision, permission receipt, before/after version refs | hash-chained canonical events + audit projection | workspace retention/export policy | Yes for bounded canonical events; expand per story |\n| Auth/client events | client pair/revoke, scope denial, token lifecycle result, role decision | local audit projection; hosted platform audit later | security retention policy | Partial |\n| Hosted platform audit | organization admin, relay/worker deploy, key access, tenant policy, operator access | cloud-native immutable audit sink selected in R-003 | minimum 1 year for production security audit unless policy sets longer | Not selected; AT-003-003 must enable default-off data-access logs |\n| Diagnostic upload receipts | user choice, categories, destination, retention disclosure, dump included/excluded, result | local canonical receipt | workspace audit retention | Not implemented |\n\n## Alerts & SLOs\n\n| Critical path | SLI | SLO | Alert condition | Severity | Routing | Runbook |\n|---------------|-----|-----|-----------------|----------|---------|---------|\n| Local launch + Harness handshake | successful interactive launch and probe | Establish baseline, then set release SLO | Two failed launches for one install or HP-001 hard fail | local critical + support ticket | creator/admin; QA on shared evidence | Verify signature, disk, migration, Harness crash receipt |\n| Canonical event append + projection | integrity and latency | 100% integrity; latency baseline first | HP-002 integrity failure | block mutation/release | local admin + engineering incident | Stop writes, preserve DB, export diagnostics, run read-only verification |\n| Run recovery | no duplicate + correct durable gate | 100% supported scenarios | HP-003 fails or duplicate intent detected | release-blocking/page for hosted | QA / on-call | Inspect exact run plan, checkpoint, orphan lease, provider identity |\n| Publication | explicit terminal/reconciliation state | 100% intents classified | ambiguous state outside policy window or duplicate verified | page for live publication | distribution on-call + creator | Freeze retry, inspect intent/receipt/provider live state |\n| Backup/restore | authenticated verified restore | 100% release fixture pass | HP-009 failure | release-blocking | QA + security | Quarantine import; compare manifest, key, hashes, migration |\n| Hosted relay / tenant boundary | authorized availability and isolation | Establish baseline; isolation invariant 100% | HP-010 isolation failure or fast error-budget burn | immediate page | security/on-call | Revoke worker/tenant keys, isolate relay, preserve local access/export |\n\n## Dashboards\n\n### Local Diagnostics\n\n**Controls:** time range (15m, 1h, 24h, 7d), process, release, workspace-safe pseudonymous scope, capability class, result class, refresh/last updated.\n\n**Display order:** launch/Harness health → crash-free and error-class scorecards → command/run/provider latency trends → active/paused/orphan/reconciliation counts → projection/DB/asset health → cost reconciliation → audit coverage → recent trace list. Every tile reads an allowlisted local metric or audit projection.\n\n### Hosted Operations — R-003 only\n\n**Controls:** environment, region, release, tenant-safe cohort, worker class, 15m–30d range, last updated. **Displays:** availability/error-budget burn, relay/worker latency and saturation, queue age, sync lag, rejected envelopes, tenant-isolation probes, audit-log coverage, cost anomaly. No creative content or raw tenant identifier appears.\n\n## Implementation Work\n\n| Type | ID | What |\n|------|----|------|\n| AT | AT-002-004 | Create the local privacy-safe observability package, crash store, diagnostics projection, redaction corpus, dashboard, and support-bundle contract. |\n| Story | S-002-002 | Emit recovery, projection, DB health, and duplicate-prevention signals. |\n| Story | S-002-005 | Establish accessibility and performance baselines on representative fixtures. |\n| Story | S-004-003 | Trace Bridge jobs, pairing, reconnect, cancellation, and revocation. |\n| Story | S-008-002 | Instrument publication state, provider latency, reconciliation age, and duplicate prevention. |\n| AT | AT-003-003 | Provision hosted monitoring, platform audit logs, tenant-safe telemetry, SLO dashboards, and alert routing after provider selection. |\n| Story | S-009-005 | Verify hosted outage, local continuity, tenant isolation, incident response, and audit export. |\n"},{"rel":"reference/sitemap.md","content":"# Clark Pro Screen Sitemap\n\n**Project:** clark-pro\n**Version:** 1.0\n**Updated:** 2026-07-13\n\n---\n\n```mermaid\nflowchart LR\n  subgraph Trust[\"Trust and setup\"]\n    Welcome[\"Screen: Welcome & Trust\"] --> Setup[\"Screen: Workspace Setup\"] --> Focus[\"Screen: Focus\"]\n    Recovery[\"Screen: Recovery Summary\"] --> Focus\n  end\n  subgraph Create[\"Create and decide\"]\n    Inbox[\"Screen: Inbox\"] --> Focus --> Canvas[\"Screen: Canvas\"] --> Review[\"Screen: Review\"] --> Timeline[\"Screen: Timeline\"]\n    Timeline --> Observation[\"Screen: Observation\"] --> Memory[\"Screen: Memory\"]\n  end\n  subgraph Govern[\"Govern extensions and access\"]\n    Connections[\"Screen: Connections\"] --> ToolLibrary[\"Screen: Tool Pack Library\"] --> ToolReview[\"Screen: Tool Pack Review\"]\n    Connections --> SkillLibrary[\"Screen: Skill Library\"] --> SkillReview[\"Screen: Skill Review\"]\n    Timeline --> Export[\"Screen: Export Package\"]\n  end\n  Focus --> Connections\n  Memory --> Review\n```\n\n## Navigation Contract\n\n- Focus is the first operational destination and the return point after setup or recovery.\n- Canvas explains structure and impact; Review owns exact-version decisions; Timeline owns external intent state.\n- Connections governs capabilities, accounts, clients, Tool Packs, and Skills.\n- Observation and Memory close the evidence-to-learning loop without silent promotion.\n"},{"rel":"releases/AT-002-001-release-security-keychain-and-update-pipeline.md","content":"# Architecture Task: Release Security, Keychain, and Update Pipeline\n\n**ID:** AT-002-001\n**Project:** clark-pro\n**Release:** R-002\n**Phase:** P-002-02\n**Stage:** Ready\n**Status:** Backlog\n**Version:** 1.0\n**Created:** 2026-07-13\n**Updated:** 2026-07-13\n**Extends:** None\n**Depends On:** None\n\n---\n\n## What\n\nEstablish the production Mac release substrate shared by credential, signing, notarization, Gatekeeper, update, rollback, and packaged-evidence stories before feature branches depend on an unsigned development shell.\n\n## Artifact Location\n\n- `clark-pro/apps/desktop/build/entitlements.mac.plist`\n- `clark-pro/apps/desktop/electron-builder.yml or equivalent checked-in build config`\n- `clark-pro/packages/credentials/`\n- `clark-pro/apps/desktop/scripts/release-evidence/`\n\n## Invariants\n\n| Key | Value |\n|-----|-------|\n| Bundle identifier | com.clarkpro.studio |\n| Credential storage | macOS Keychain; opaque references outside broker |\n| Renderer secret access | None |\n| Release surface | Signed/notarized Developer ID DMG with rollback-capable signed update |\n\n## Goals\n\n- A clean release checkout produces a Hardened Runtime build whose designated requirement and Team ID are attributable.\n- Notarization, stapling, Gatekeeper, packaged smoke, update, failed-update rollback, and credential-revocation evidence are machine-readable.\n- Credential material never appears in renderer state, canonical events, logs, diagnostics bundles, or model context.\n\n## Steps\n\n1. `[User]` Provide the Apple Developer Team/Developer ID certificate access and approved update-channel signing destination outside the repository. Tell me when this is done.\n2. `[Agent]` Establish the broker package, entitlements, reproducible packaging, notarization/stapling, update signature, rollback, and evidence pipeline.\n3. `[Agent]` Run secret canaries, strict codesign/Gatekeeper checks, packaged smoke, revoked-credential, failed-update, and rollback fixtures.\n\n## Acceptance Criteria\n\n- [ ] Release candidate passes strict codesign, Hardened Runtime, notarization, stapling, Gatekeeper, and packaged launch checks with attributable evidence.\n- [ ] Renderer/preload/event/log/diagnostics canary scans contain zero raw credential material.\n- [ ] A revoked credential blocks dependent execution before provider access while the secret remains unreadable.\n- [ ] A bad or interrupted update restores the last verified build and preserves workspace compatibility.\n\n## Depends On\n\nNone\n\n---\n"},{"rel":"releases/AT-002-002-portable-encrypted-backup-and-migration-substrate.md","content":"# Architecture Task: Portable Encrypted Backup and Migration Substrate\n\n**ID:** AT-002-002\n**Project:** clark-pro\n**Release:** R-002\n**Phase:** P-002-02\n**Stage:** Ready\n**Status:** Backlog\n**Version:** 1.0\n**Created:** 2026-07-13\n**Updated:** 2026-07-13\n**Extends:** None\n**Depends On:** None\n\n---\n\n## What\n\nCreate the shared deterministic export, age-v1 encryption, quarantine restore, schema migration preview, and restore-evidence substrate required by workspace portability, privacy, and release recovery.\n\n## Artifact Location\n\n- `clark-pro/packages/backup/`\n- `clark-pro/packages/domain/src/migrations/`\n- `clark-pro/services/harness/src/backup/`\n- `clark-pro/fixtures/backups/`\n\n## Invariants\n\n| Key | Value |\n|-----|-------|\n| Encryption container | age v1 |\n| Default recipients | Per-install X25519 identity plus optional user-held recovery identity |\n| Raw secrets in archive | Forbidden |\n| Canonical mutation during validation | Forbidden until full quarantine validation passes |\n\n## Goals\n\n- Export events, schemas, policies, Skills, assets, hashes, and restore metadata deterministically without raw secrets.\n- Stream encryption before destination write and commit the encrypted file atomically.\n- Restore on a clean Mac after authentication, manifest, path, size, hash, schema, signature, and migration validation.\n\n## Steps\n\n1. `[Agent]` Define the deterministic manifest, recipient metadata, streaming archive, quarantine restore, migration preview, and atomic commit contracts.\n2. `[Agent]` Add interoperability, corruption, truncation, wrong-key, malicious-path, oversized-asset, schema, disk-full, and interrupted-write fixtures.\n3. `[Agent]` Prove new-Mac recovery with only user-held recovery material and independent age tooling.\n\n## Acceptance Criteria\n\n- [ ] A representative workspace round-trip preserves event history, artifact versions, assets, hashes, graph state, memory/Skill metadata, and lineage.\n- [ ] Corrupt, incompatible, malicious, or incomplete imports leave the active workspace byte-for-byte unchanged and produce an actionable report.\n- [ ] Decrypted archives and staging traces contain no raw credentials, tokens, leases, crash dumps, or provider secrets.\n- [ ] At least two independent age implementations decrypt the fixture archive.\n\n## Depends On\n\nNone\n\n---\n"},{"rel":"releases/AT-002-003-isolated-media-tool-pack-and-skill-execution-substrate.md","content":"# Architecture Task: Isolated Media, Tool Pack, and Skill Execution Substrate\n\n**ID:** AT-002-003\n**Project:** clark-pro\n**Release:** R-002\n**Phase:** P-002-03\n**Stage:** Ready\n**Status:** Backlog\n**Version:** 1.0\n**Created:** 2026-07-13\n**Updated:** 2026-07-13\n**Extends:** None\n**Depends On:** AT-002-001\n\n---\n\n## What\n\nBuild the common supervised process/sandbox, acquisition quarantine, resource ceilings, egress policy, converter boundary, and canonical receipt plumbing needed before real external Tool Packs, media jobs, and Class B/C Skills execute.\n\n## Artifact Location\n\n- `clark-pro/packages/plugin-sdk/`\n- `clark-pro/packages/media/`\n- `clark-pro/packages/skills/`\n- `clark-pro/services/harness/src/supervision/`\n- `clark-pro/tool-packages/`\n\n## Invariants\n\n| Key | Value |\n|-----|-------|\n| Integration preference | MCP → CLI → HTTP → library → WASM → sidecar → typed file → isolated browser → fork |\n| Execution grant | Declaration ∩ trust ceiling ∩ workspace policy ∩ run grant |\n| Blocked candidate authority | Zero |\n| Update behavior | Return to quarantine; retain verified rollback revision |\n\n## Goals\n\n- Verify source/artifact identity before unpack/build and reject archive, symlink, path, signature, substitution, and dependency attacks.\n- Run media and external execution under time, memory, filesystem, process, network, credential, and capability ceilings.\n- Record exact inputs, outputs, revisions, timing, cost, permissions, failure class, converter loss, migration, and rollback receipts.\n\n## Steps\n\n1. `[Agent]` Implement provider-neutral supervisors, quarantine storage, acquisition verification, sandbox policy, converter loss contract, and lifecycle receipts.\n2. `[Agent]` Integrate the existing WASM hostile corpus and add acquisition, UI-origin, media, migration, upgrade, and rollback fixtures.\n3. `[Agent]` Activate one supported real Tool Pack only after legal, supply-chain, compatibility, conformance, migration, and rollback evidence pass.\n\n## Acceptance Criteria\n\n- [ ] No hostile fixture escapes its declared filesystem, network, process, credential, capability, time, or memory boundary.\n- [ ] OpenCut remains blocked with zero executable components until a stable reviewed upstream interface exists.\n- [ ] A real supported Tool Pack completes one creator-loop capability call with a complete canonical receipt and verified rollback.\n- [ ] A failed update or activation leaves the exact prior trusted revision active and workspace data compatible.\n\n## Depends On\n\nAT-002-001\n\n---\n"},{"rel":"releases/AT-002-004-privacy-safe-observability-and-diagnostics.md","content":"# Architecture Task: Privacy-Safe Observability and Diagnostics\n\n**ID:** AT-002-004\n**Project:** clark-pro\n**Release:** R-002\n**Phase:** P-002-02\n**Stage:** Ready\n**Status:** Backlog\n**Version:** 1.0\n**Created:** 2026-07-13\n**Updated:** 2026-07-13\n**Extends:** None\n**Depends On:** AT-002-001\n\n---\n\n## What\n\nCreate the local-first structured logging, manual OpenTelemetry, Crashpad-local, diagnostics projection, health-probe, dashboard, alert, and user-previewed support-bundle substrate defined in reference/observability.md.\n\n## Artifact Location\n\n- `clark-pro/packages/observability/`\n- `clark-pro/apps/desktop/src/diagnostics/`\n- `clark-pro/services/harness/src/observability/`\n- `clark-pro/fixtures/telemetry-canaries/`\n\n## Invariants\n\n| Key | Value |\n|-----|-------|\n| Remote telemetry default | Off |\n| Crash upload default | Off; local Crashpad only |\n| Attribute policy | Allowlist; unknown attributes dropped |\n| Forbidden telemetry | Creative/memory/prompt content, raw URL/path/name/account/IP/email, credential ref/token |\n\n## Goals\n\n- Correlate renderer request, Harness command, run/step, capability receipt, publication intent, and recovery classification without sensitive attributes.\n- Surface launch, crash, latency, projection, queue, cost, audit, recovery, publication, and sandbox health locally.\n- Export a diagnostics bundle only after preview, canary redaction, destination/retention disclosure, and explicit consent.\n\n## Steps\n\n1. `[Agent]` Implement the allowlist schema, pino serializer, manual OTel spans/metrics, local storage/retention, Crashpad-local configuration, and diagnostics projection.\n2. `[Agent]` Implement HP-001 through HP-009, local dashboards, error grouping, source-map metadata, and release-blocking safety probes.\n3. `[Agent]` Run the content/secret/path canary corpus across logs, spans, metrics, crash annotations, bundles, and outbound capture.\n\n## Acceptance Criteria\n\n- [ ] Fresh install emits no telemetry or crash upload before explicit opt-in/action.\n- [ ] Canary corpus yields zero forbidden fields across every telemetry surface and outbound capture.\n- [ ] Local Diagnostics traces a failed run or publication from UI request to exact error/reconciliation receipt using correlation IDs.\n- [ ] Turning export off stops future remote emission without disabling local workspace operation.\n\n## Depends On\n\nAT-002-001\n\n---\n"},{"rel":"releases/AT-003-001-distribution-adapter-and-reconciliation-infrastructure.md","content":"# Architecture Task: Distribution Adapter and Reconciliation Infrastructure\n\n**ID:** AT-003-001\n**Project:** clark-pro\n**Release:** R-003\n**Phase:** P-003-01\n**Stage:** Ready\n**Status:** Backlog\n**Version:** 1.0\n**Created:** 2026-07-13\n**Updated:** 2026-07-13\n**Extends:** None\n**Depends On:** None\n\n---\n\n## What\n\nEstablish the shared Postiz/direct/assisted distribution adapter boundary, account broker integration, platform schema registry, idempotent publication intent store, observation scheduler, and reconciliation worker before distribution stories implement UI behavior.\n\n## Artifact Location\n\n- `clark-pro/packages/connectors/postiz/`\n- `clark-pro/packages/connectors/social/`\n- `clark-pro/packages/policy/src/publication/`\n- `clark-pro/services/harness/src/publications/`\n- `clark-pro/fixtures/publications/`\n\n## Invariants\n\n| Key | Value |\n|-----|-------|\n| Canonical state | Clark publication intent and receipt ledger |\n| Retry from needs_reconciliation | Forbidden until prior outcome disproved |\n| Credential material | Keychain reference/lease only |\n| Fallback | Deterministic export remains available |\n\n## Goals\n\n- Discover/validate current platform schemas and account health before mutation.\n- Submit with intent/idempotency identity, persist provider receipt, observe to verified live or explicit reconciliation.\n- Ingest supported outcomes with definition, freshness, missingness, deletion, and exact publication lineage.\n\n## Steps\n\n1. `[User]` Provision approved Postiz test/production workspaces and representative social accounts through the credential broker; do not commit secrets. Tell me when this is done.\n2. `[Agent]` Implement the adapter lifecycle, schema registry, account health, intent ledger, observer/reconciler, export fallback, and recorded provider fixtures.\n3. `[Agent]` Run duplicate-response, response-loss-after-commit, revoked-account, provider-schema-change, outage/export, delete, and observation-missingness chaos cases.\n\n## Acceptance Criteria\n\n- [ ] Every publication intent reaches verified, failed, cancelled, removed, exported, or needs_reconciliation with attributable receipts.\n- [ ] Ambiguous response/restart scenarios create no blind retry or duplicate verified publication.\n- [ ] Revoked accounts immediately block dependent scheduled work and identify affected intents.\n- [ ] Connector outage produces a platform-valid deterministic export without losing artifact lineage.\n\n## Depends On\n\nNone\n\n---\n"},{"rel":"releases/AT-003-002-encrypted-relay-sync-asset-mirror-and-worker-envelopes.md","content":"# Architecture Task: Encrypted Relay, Sync, Asset Mirror, and Worker Envelopes\n\n**ID:** AT-003-002\n**Project:** clark-pro\n**Release:** R-003\n**Phase:** P-003-02\n**Stage:** Ready\n**Status:** Backlog\n**Version:** 1.0\n**Created:** 2026-07-13\n**Updated:** 2026-07-13\n**Extends:** None\n**Depends On:** AT-003-001\n\n---\n\n## What\n\nBuild the provider-neutral encrypted relay contract, device identity, ordered workspace event synchronization, content-addressed asset mirror, explicit conflict resolution, and signed scoped remote-worker envelope substrate.\n\n## Artifact Location\n\n- `clark-pro/packages/sync/`\n- `clark-pro/packages/remote-envelope/`\n- `clark-pro/services/relay/`\n- `clark-pro/services/worker/`\n- `clark-pro/fixtures/sync/`\n\n## Invariants\n\n| Key | Value |\n|-----|-------|\n| Personal local replica | Remains usable and canonical for personal work |\n| Conflict policy | Aggregate/version/domain decision; never raw last-write-wins |\n| Envelope | Signed, expiring, replay-protected, workspace/input/capability/credential scoped |\n| Credential delegation | Short-lived lease; never wholesale Keychain copy |\n\n## Goals\n\n- Synchronize encrypted workspace-scoped events and content-addressed assets with deterministic ordering and integrity.\n- Preserve both evidence trails on conflicting commands and require an explicit domain decision where necessary.\n- Run delegated jobs using only named inputs, credentials, capabilities, sensitivity level, and time window; validate signed results locally.\n\n## Steps\n\n1. `[Agent]` Define provider-neutral relay, device, envelope, ordering, conflict, asset, revocation, and reconciliation contracts before choosing cloud-specific deployment details.\n2. `[Agent]` Implement two-device offline convergence, replay, expiry, revoked-device, malicious-envelope, asset-corruption, concurrent-decision, and hosted-outage fixtures.\n3. `[Agent]` Prove local workspace read/export and personal/team memory separation with relay and worker unavailable.\n\n## Acceptance Criteria\n\n- [ ] Two offline replicas converge with valid ordering/hash integrity and no loss of non-conflicting events or assets.\n- [ ] Conflicting decisions/approvals preserve both evidence trails and never resolve through last-write-wins replacement.\n- [ ] A compromised, expired, replayed, or revoked worker envelope cannot access unrelated workspace, memory, credentials, capabilities, or time.\n- [ ] Hosted outage leaves complete local access and export usable.\n\n## Depends On\n\nAT-003-001\n\n---\n"},{"rel":"releases/AT-003-003-hosted-tenant-audit-monitoring-and-release-controls.md","content":"# Architecture Task: Hosted Tenant, Audit, Monitoring, and Release Controls\n\n**ID:** AT-003-003\n**Project:** clark-pro\n**Release:** R-003\n**Phase:** P-003-02\n**Stage:** Ready\n**Status:** Backlog\n**Version:** 1.0\n**Created:** 2026-07-13\n**Updated:** 2026-07-13\n**Extends:** None\n**Depends On:** AT-003-002\n\n---\n\n## What\n\nAfter the relay/worker provider is selected, provision tenant-isolated environments, organization identity/policy, managed keys/secrets, platform audit logs, privacy-safe telemetry, SLO dashboards, alert routing, incident evidence, deployment, rollback, and local-continuity drills.\n\n## Artifact Location\n\n- `clark-pro/infra/`\n- `clark-pro/services/relay/deploy/`\n- `clark-pro/services/worker/deploy/`\n- `clark-pro/runbooks/`\n- `clark-pro/evidence/hosted/`\n\n## Invariants\n\n| Key | Value |\n|-----|-------|\n| Tenant boundary | Workspace/organization scoped and tested |\n| Platform data-access audit logs | Explicitly enabled; default-off state is not accepted |\n| Remote telemetry | Allowlist and consent/tenant policy governed |\n| Hosted dependency | May not block local workspace access or complete export |\n\n## Goals\n\n- Deploy reproducibly with environment separation, least-privilege service identities, encryption, backup/restore, audit retention, vulnerability/incident ownership, and rollback.\n- Page only on user-facing SLO burn or isolation failure; ticket leading saturation/cost indicators.\n- Prove tenant isolation, hosted outage, local continuity/export, release rollback, and audit export on the production candidate.\n\n## Steps\n\n1. `[User]` Select and approve the hosted provider, regions, retention, incident routing, billing owner, and production organization identity. Tell me when this is done.\n2. `[Agent]` Provision environments, tenant identity/policy, managed keys, platform audit logging, deployment/rollback, monitoring, SLO dashboards, alerts, and runbooks as code.\n3. `[Agent]` Execute tenant-crossing, compromised worker, audit completeness, outage/local continuity, restore, cost anomaly, vulnerability response, and rollback drills.\n\n## Acceptance Criteria\n\n- [ ] Cross-tenant requests, logs, traces, assets, events, and worker envelopes are denied and recorded without exposing another tenant’s identifiers/content.\n- [ ] Platform admin and data-access audit logs plus Clark application audit events cover 100% of privileged paths.\n- [ ] Hosted outage and rollback drills preserve local workspace operation and complete export.\n- [ ] Production SLO/alert routes have an owner and runbook; privacy canary and secret scans pass.\n\n## Depends On\n\nAT-003-002\n\n---\n"},{"rel":"releases/R-001-local-trust-core.md","content":"# Release: Local Trust Core\n\n**ID:** R-001\n**Project:** clark-pro\n**Stage:** Ready\n**Status:** QA\n**Version:** 1.0\n**Created:** 2026-07-13\n**Updated:** 2026-07-13\n\n---\n\n## Goal\n\nValidate the already-implemented local trust core as one bounded release: generated contracts, hardened desktop/Harness boundaries, evidence-honest Idea Foundry, governed MCP and Bridge, governed memory, Tool Pack lifecycle, and Class A Skill trust.\n\n## Stories in Scope\n\n| Story | Title | Epic | Stage | Status |\n|-------|-------|------|-------|--------|\n| S-001-001 | Versioned Contracts and Upcasters | E-001 | Ready | Done |\n| S-001-002 | Ground Prototype and Evidence Ledger | E-001 | Ready | QA |\n| S-002-001 | Hardened Mac Shell Boundary | E-002 | Ready | Done |\n| S-002-002 | Durable Event Store and Run Recovery | E-002 | Ready | Done |\n| S-003-001 | Immutable Idea Capture and Revision Lineage | E-003 | Ready | Done |\n| S-003-002 | Evidence-Honest Idea Inspection and Canvas | E-003 | Ready | Done |\n| S-004-001 | Governed Bundled MCP Capability | E-004 | Ready | Done |\n| S-004-002 | Scoped Clark Bridge Core | E-004 | Ready | Done |\n| S-005-001 | Evidence-Bound Memory Promotion | E-005 | Ready | Done |\n| S-005-002 | Scoped Retrieval, Correction, and Forgetting | E-005 | Ready | Done |\n| S-006-001 | Tool Pack Quarantine and Trust Gates | E-006 | Ready | Done |\n| S-006-002 | Atomic Tool Pack Activation and Rollback | E-006 | Ready | Done |\n| S-006-003 | OpenCut Candidate Blocked Upstream | E-006 | Ready | Done |\n| S-007-001 | Bundled Class A Skill Trust Lifecycle | E-007 | Ready | Done |\n| S-007-002 | Skill Update, Expansion Denial, and Rollback | E-007 | Ready | Done |\n\n## Out of Scope\n\n- Representative creator and commercial Ground signoff\n- Production signing, Keychain, social publishing, community Skill execution, and real third-party Tool Pack execution\n\n## Dependencies\n\n- Required human Ground walkthroughs and named signoff remain outside this release and block product-level Ground closure.\n\n## Definition of Done\n\n- All stories in scope are `Status: Done`.\n- Required automated, human, migration, recovery, security, and release evidence is attributable and linked.\n- Product Team validation has no blocking errors and the static board export matches the committed requirements.\n\n## developer Handoff\n\n1. Load the `` skill and pull the latest main branch.\n2. Read this release, then the story files below in dependency order.\n3. Set a story to `In Progress` when picked up and `QA` only after self-testing every acceptance criterion.\n4. File a Change Request instead of silently changing approved requirements.\n\n### Pickup Order\n\n- `requirements/epics/E-001-contracts-and-product-proof/S-001-001-versioned-contracts-and-upcasters.md` — Versioned Contracts and Upcasters\n- `requirements/epics/E-001-contracts-and-product-proof/S-001-002-ground-prototype-and-evidence-ledger.md` — Ground Prototype and Evidence Ledger\n- `requirements/epics/E-002-native-studio-and-durable-harness/S-002-001-hardened-mac-shell-boundary.md` — Hardened Mac Shell Boundary\n- `requirements/epics/E-002-native-studio-and-durable-harness/S-002-002-durable-event-store-and-run-recovery.md` — Durable Event Store and Run Recovery\n- `requirements/epics/E-003-idea-foundry-and-creation-studio/S-003-001-immutable-idea-capture-and-revision-lineage.md` — Immutable Idea Capture and Revision Lineage\n- `requirements/epics/E-003-idea-foundry-and-creation-studio/S-003-002-evidence-honest-idea-inspection-and-canvas.md` — Evidence-Honest Idea Inspection and Canvas\n- `requirements/epics/E-004-mcp-and-clark-bridge/S-004-001-governed-bundled-mcp-capability.md` — Governed Bundled MCP Capability\n- `requirements/epics/E-004-mcp-and-clark-bridge/S-004-002-scoped-clark-bridge-core.md` — Scoped Clark Bridge Core\n- `requirements/epics/E-005-governed-memory/S-005-001-evidence-bound-memory-promotion.md` — Evidence-Bound Memory Promotion\n- `requirements/epics/E-005-governed-memory/S-005-002-scoped-retrieval-correction-and-forgetting.md` — Scoped Retrieval, Correction, and Forgetting\n- `requirements/epics/E-006-reuse-first-tool-packs/S-006-001-tool-pack-quarantine-and-trust-gates.md` — Tool Pack Quarantine and Trust Gates\n- `requirements/epics/E-006-reuse-first-tool-packs/S-006-002-atomic-tool-pack-activation-and-rollback.md` — Atomic Tool Pack Activation and Rollback\n- `requirements/epics/E-006-reuse-first-tool-packs/S-006-003-opencut-candidate-blocked-upstream.md` — OpenCut Candidate Blocked Upstream\n- `requirements/epics/E-007-governed-agent-skills/S-007-001-bundled-class-a-skill-trust-lifecycle.md` — Bundled Class A Skill Trust Lifecycle\n- `requirements/epics/E-007-governed-agent-skills/S-007-002-skill-update-expansion-denial-and-rollback.md` — Skill Update, Expansion Denial, and Rollback\n\n### Preservation Rules\n\n- Keep canonical state, exact versions, permission receipts, and provenance on every path.\n- Do not convert missing human, provider, or release evidence into an implementation claim.\n- Keep external mutations idempotent or explicitly reconciling; do not blind-retry.\n\n---\n"},{"rel":"releases/R-002-single-user-creator-alpha.md","content":"# Release: Single-User Creator Alpha\n\n**ID:** R-002\n**Project:** clark-pro\n**Stage:** Draft\n**Status:** Backlog\n**Version:** 1.0\n**Created:** 2026-07-13\n**Updated:** 2026-07-13\n\n---\n\n## Architecture Gate\n\n**Gate:** Closed\n\n| AT | Title | Stage | Status | Phase |\n|----|-------|-------|--------|-------|\n| AT-002-001 | Release Security, Keychain, and Update Pipeline | Ready | Backlog | P-002-02 |\n| AT-002-002 | Portable Encrypted Backup and Migration Substrate | Ready | Backlog | P-002-02 |\n| AT-002-003 | Isolated Media, Tool Pack, and Skill Execution Substrate | Ready | Backlog | P-002-03 |\n| AT-002-004 | Privacy-Safe Observability and Diagnostics | Ready | Backlog | P-002-02 |\n\nCoding may begin only after each task is Done and the architect opens this gate.\n\n## Goal\n\nComplete the remaining local single-user creator system and trust boundaries needed before real multi-channel distribution begins.\n\n## Stories in Scope\n\n| Story | Title | Epic | Stage | Status |\n|-------|-------|------|-------|--------|\n| S-001-003 | Representative Creator Validation | E-001 | Ready | Backlog |\n| S-001-004 | Commercial and Leadership Signoff | E-001 | Ready | Backlog |\n| S-002-003 | Workspace Portability and Backup Recovery | E-002 | Ready | Backlog |\n| S-002-004 | Keychain, Signing, and Safe Updates | E-002 | Ready | Backlog |\n| S-002-005 | Accessibility and Performance Release Evidence | E-002 | Ready | Backlog |\n| S-003-003 | Source Ingestion and Claim Ledger | E-003 | Ready | Backlog |\n| S-003-004 | Writing, Media, and Platform Variants | E-003 | Ready | Backlog |\n| S-003-005 | Version-Specific Review and Policy Gates | E-003 | Ready | Backlog |\n| S-004-003 | Durable Bridge Tasks and Client Pairing | E-004 | Ready | Backlog |\n| S-004-004 | External Client Examples and Compatibility | E-004 | Ready | Backlog |\n| S-005-003 | Semantic Retrieval and Reflection Lineage | E-005 | Ready | Backlog |\n| S-005-004 | Physical Erasure and Memory Validation Corpus | E-005 | Ready | Backlog |\n| S-006-004 | Real Third-Party Acquisition and Execution | E-006 | Ready | Backlog |\n| S-006-005 | Clark Kit SDK and Community Compatibility | E-006 | Ready | Backlog |\n| S-007-003 | Run-Scoped Skill Invocation and Receipts | E-007 | Ready | Backlog |\n| S-007-004 | Community Skills and Class B/C Sandbox | E-007 | Ready | Backlog |\n| S-007-005 | Reflection-Driven Skill Proposals and Regression | E-007 | Ready | Backlog |\n| AT-002-001 | Release Security, Keychain, and Update Pipeline | Architecture | Ready | Backlog |\n| AT-002-002 | Portable Encrypted Backup and Migration Substrate | Architecture | Ready | Backlog |\n| AT-002-003 | Isolated Media, Tool Pack, and Skill Execution Substrate | Architecture | Ready | Backlog |\n| AT-002-004 | Privacy-Safe Observability and Diagnostics | Architecture | Ready | Backlog |\n\n## Phases\n\n| ID | Name | Start | End | Milestone | Summary |\n|----|------|-------|-----|-----------|---------|\n| P-002-01 | Ground Signoff |  |  | Ground closed | Representative human, commercial, security, and ownership evidence |\n| P-002-02 | Native Runtime Completion |  |  | Release-trusted Mac build | Portability, Keychain, signing, updater, accessibility, and performance |\n| P-002-03 | Creation and Ecosystem Completion |  |  | Complete single-user creator loop | Research, media, review, durable Bridge, memory, Tool Packs, and Skill execution |\n\n## Evidence Alignment\n\n| Layer | Required artifacts / evidence |\n|-------|-------------------------------|\n| Flows | UF-001 through UF-008 and UF-011 through UF-014; TF-006 protects the primary creation spine |\n| Design | design.md, design-tokens.md, sitemap, and all linked DS screens/states/copy |\n| Architecture | ARCH-001 through ARCH-003 and AT-002-001 through AT-002-004 |\n| Metrics | AE-001 through AE-007; local-first analytics dashboard; no export before opt-in |\n| QA | 17 story plans, TR-002, HP-001 through HP-009, conformance/chaos/migration/accessibility/human evidence |\n| Exit | Ground signoff, production-trusted Mac build, portable restore, complete single-user loop, one real supported Tool Pack, run-scoped Skill receipts |\n\n## Out of Scope\n\n- Live social scheduling and publication\n- Observation ingestion across real platforms\n- Team synchronization and hosted operations\n\n## Dependencies\n\n- R-001 Local Trust Core must complete QA.\n- Representative providers and a supported real Tool Pack candidate must be selected.\n\n## Definition of Done\n\n- All stories in scope are `Status: Done`.\n- Required automated, human, migration, recovery, security, and release evidence is attributable and linked.\n- Product Team validation has no blocking errors and the static board export matches the committed requirements.\n\n## developer Handoff\n\n1. Load the `` skill and pull the latest main branch.\n2. Read this release, then the story files below in dependency order.\n3. Set a story to `In Progress` when picked up and `QA` only after self-testing every acceptance criterion.\n4. File a Change Request instead of silently changing approved requirements.\n\n### Pickup Order\n\n- `requirements/epics/E-001-contracts-and-product-proof/S-001-003-representative-creator-validation.md` — Representative Creator Validation\n- `requirements/epics/E-001-contracts-and-product-proof/S-001-004-commercial-and-leadership-signoff.md` — Commercial and Leadership Signoff\n- `requirements/epics/E-002-native-studio-and-durable-harness/S-002-003-workspace-portability-and-backup-recovery.md` — Workspace Portability and Backup Recovery\n- `requirements/epics/E-002-native-studio-and-durable-harness/S-002-004-keychain-signing-and-safe-updates.md` — Keychain, Signing, and Safe Updates\n- `requirements/epics/E-002-native-studio-and-durable-harness/S-002-005-accessibility-and-performance-release-evidence.md` — Accessibility and Performance Release Evidence\n- `requirements/epics/E-003-idea-foundry-and-creation-studio/S-003-003-source-ingestion-and-claim-ledger.md` — Source Ingestion and Claim Ledger\n- `requirements/epics/E-003-idea-foundry-and-creation-studio/S-003-004-writing-media-and-platform-variants.md` — Writing, Media, and Platform Variants\n- `requirements/epics/E-003-idea-foundry-and-creation-studio/S-003-005-version-specific-review-and-policy-gates.md` — Version-Specific Review and Policy Gates\n- `requirements/epics/E-004-mcp-and-clark-bridge/S-004-003-durable-bridge-tasks-and-client-pairing.md` — Durable Bridge Tasks and Client Pairing\n- `requirements/epics/E-004-mcp-and-clark-bridge/S-004-004-external-client-examples-and-compatibility.md` — External Client Examples and Compatibility\n- `requirements/epics/E-005-governed-memory/S-005-003-semantic-retrieval-and-reflection-lineage.md` — Semantic Retrieval and Reflection Lineage\n- `requirements/epics/E-005-governed-memory/S-005-004-physical-erasure-and-memory-validation-corpus.md` — Physical Erasure and Memory Validation Corpus\n- `requirements/epics/E-006-reuse-first-tool-packs/S-006-004-real-third-party-acquisition-and-execution.md` — Real Third-Party Acquisition and Execution\n- `requirements/epics/E-006-reuse-first-tool-packs/S-006-005-clark-kit-sdk-and-community-compatibility.md` — Clark Kit SDK and Community Compatibility\n- `requirements/epics/E-007-governed-agent-skills/S-007-003-run-scoped-skill-invocation-and-receipts.md` — Run-Scoped Skill Invocation and Receipts\n- `requirements/epics/E-007-governed-agent-skills/S-007-004-community-skills-and-class-b-c-sandbox.md` — Community Skills and Class B/C Sandbox\n- `requirements/epics/E-007-governed-agent-skills/S-007-005-reflection-driven-skill-proposals-and-regression.md` — Reflection-Driven Skill Proposals and Regression\n\n### Preservation Rules\n\n- Keep canonical state, exact versions, permission receipts, and provenance on every path.\n- Do not convert missing human, provider, or release evidence into an implementation claim.\n- Keep external mutations idempotent or explicitly reconciling; do not blind-retry.\n\n---\n"},{"rel":"releases/R-003-whole-product-beta.md","content":"# Release: Whole-Product Beta\n\n**ID:** R-003\n**Project:** clark-pro\n**Stage:** Draft\n**Status:** Backlog\n**Version:** 1.0\n**Created:** 2026-07-13\n**Updated:** 2026-07-13\n\n---\n\n## Architecture Gate\n\n**Gate:** Closed\n\n| AT | Title | Stage | Status |
