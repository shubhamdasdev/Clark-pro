use-first-tool-packs/S-006-005-clark-kit-sdk-and-community-compatibility.md","content":"# Story: Clark Kit SDK and Community Compatibility\n\n**ID:** S-006-005\n**Project:** clark-pro\n**Epic:** E-006\n**Stage:** Ready\n**Status:** Backlog\n**Priority:** P1\n**Phase:** P-002-03\n**Version:** 1.0\n**Created:** 2026-07-13\n**Updated:** 2026-07-13\n**Sources:** [Authoritative epics](../../research/history/import-2026-07-13/product/03-epics-and-stories.md), [Whole-product roadmap](../../research/history/import-2026-07-13/roadmap.md)\n\n---\n\n## Story\n\nAs a **external_agent**, I want to **build and validate Tool Packs without changing Clark core**, so that **the ecosystem can add engines while respecting one canonical model and upgrade contract**.\n\n## Goal\n\nDeliver the observable capability described above through Clark's canonical workspace, with enough evidence to determine whether it is complete.\n\n## Why / Rationale\n\nThe ecosystem can add engines while respecting one canonical model and upgrade contract. This story is separated from adjacent work so the board can report verified progress without treating an incomplete product epic as finished.\n\n## Functional Requirements\n\n- Publish manifests, adapter/capability interfaces, converter loss declarations, isolated UI contracts, fixtures, validation CLI, and compatibility matrix.\n- Support signed or verified package channels with migration preview and tested rollback.\n\n## Acceptance Criteria\n\n- [ ] Given a third-party developer uses Clark Kit, when their package passes conformance, then it can install in quarantine without a core-code change.\n- [ ] Given a package attempts undeclared authority or canonical-model replacement, when validation runs, then activation is denied with an actionable report.\n\n## Negative Scenarios\n\n- A failed trust, evidence, compatibility, recovery, or policy check must leave the prior canonical state intact and expose a valid next action.\n\n## Future Scope\n\n- Scope not named in this story remains in sibling stories or a later release; this story does not absorb the full parent epic.\n\n## Do Not Do\n\n- In this story, do not infer completion from UI presence, documents, or mocked fixtures when the acceptance criteria require runtime or human evidence.\n- Do not bypass Clark's event, permission, approval, provenance, or rollback contracts to make the happy path appear complete.\n\n---\n"},{"rel":"epics/E-007-governed-agent-skills/E-007.md","content":"# Epic: Governed Agent Skills\n\n**ID:** E-007\n**Project:** clark-pro\n**Stage:** Ready\n**Version:** 1.0\n**Created:** 2026-07-13\n**Updated:** 2026-07-13\n**Sources:** [Authoritative epics](../../research/history/import-2026-07-13/product/03-epics-and-stories.md), [Whole-product roadmap](../../research/history/import-2026-07-13/roadmap.md)\n\n---\n\n## Outcome\n\nCreators can trust, invoke, revise, and roll back reusable procedures through explicit capability ceilings and evidence without allowing a Skill package to self-promote or expand authority.\n\n## Success Metric\n\n| Metric | Baseline | Target |\n|--------|----------|--------|\n| Skill revisions receiving undeclared capability authority | 0 | 0 |\n| Production Skill invocations with complete receipts | 0; invocation is intentionally absent | 100% after invocation ships |\n\n## Primary Persona\n\nThe Trust-Conscious Operator\n\n## Dependencies\n\n- E-004 (MCP and Clark Bridge)\n- E-005 (Governed Creator Memory)\n\n## Stories\n\n| ID | Title | Status | Stage |\n|----|-------|--------|-------|\n| S-007-001 | Bundled Class A Skill Trust Lifecycle | Done | Ready |\n| S-007-002 | Skill Update, Expansion Denial, and Rollback | Done | Ready |\n| S-007-003 | Run-Scoped Skill Invocation and Receipts | Backlog | Ready |\n| S-007-004 | Community Skills and Class B/C Sandbox | Backlog | Ready |\n| S-007-005 | Reflection-Driven Skill Proposals and Regression | Backlog | Ready |\n\n---\n"},{"rel":"epics/E-007-governed-agent-skills/S-007-001-bundled-class-a-skill-trust-lifecycle.md","content":"# Story: Bundled Class A Skill Trust Lifecycle\n\n**ID:** S-007-001\n**Project:** clark-pro\n**Epic:** E-007\n**Stage:** Ready\n**Status:** Done\n**Priority:** P0\n**Version:** 1.0\n**Created:** 2026-07-13\n**Updated:** 2026-07-13\n**Sources:** [Authoritative epics](../../research/history/import-2026-07-13/product/03-epics-and-stories.md), [Whole-product roadmap](../../research/history/import-2026-07-13/roadmap.md), [Harness evidence](../../research/history/import-2026-07-13/evidence/harness-latest-report.json)\n\n---\n\n## Story\n\nAs a **workspace_admin**, I want to **inspect exact Skill bytes, requested tools, effective permissions, compatibility, and tests before promotion**, so that **a readable Skill package cannot execute merely because it was discovered or installed**.\n\n## Goal\n\nDeliver the observable capability described above through Clark's canonical workspace, with enough evidence to determine whether it is complete.\n\n## Why / Rationale\n\nA readable Skill package cannot execute merely because it was discovered or installed. This story is separated from adjacent work so the board can report verified progress without treating an incomplete product epic as finished.\n\n## Functional Requirements\n\n- Verify SKILL.md and package file hashes, Class A non-executable mode, fixtures, compatibility, and installed capabilities.\n- Install into quarantine with zero trusted scopes until an explicit creator promotion.\n\n## Acceptance Criteria\n\n- [ ] Given the bundled Skill is registered, when its exact bytes and manifest are evaluated, then all trust gates are visible while it remains quarantined.\n- [ ] Given a manifest falsely claims active state or bytes drift after quarantine, when evaluation or promotion runs, then trust is denied or revoked.\n\n## Negative Scenarios\n\n- A failed trust, evidence, compatibility, recovery, or policy check must leave the prior canonical state intact and expose a valid next action.\n\n## Future Scope\n\n- Broader capability beyond this verified slice remains in sibling stories and later releases.\n\n## Do Not Do\n\n- In this story, do not infer completion from UI presence, documents, or mocked fixtures when the acceptance criteria require runtime or human evidence.\n- Do not bypass Clark's event, permission, approval, provenance, or rollback contracts to make the happy path appear complete.\n\n---\n"},{"rel":"epics/E-007-governed-agent-skills/S-007-002-skill-update-expansion-denial-and-rollback.md","content":"# Story: Skill Update, Expansion Denial, and Rollback\n\n**ID:** S-007-002\n**Project:** clark-pro\n**Epic:** E-007\n**Stage:** Ready\n**Status:** Done\n**Priority:** P0\n**Version:** 1.0\n**Created:** 2026-07-13\n**Updated:** 2026-07-13\n**Sources:** [Authoritative epics](../../research/history/import-2026-07-13/product/03-epics-and-stories.md), [Whole-product roadmap](../../research/history/import-2026-07-13/roadmap.md), [Harness evidence](../../research/history/import-2026-07-13/evidence/harness-latest-report.json)\n\n---\n\n## Story\n\nAs a **workspace_admin**, I want to **review Skill revision diffs and retain a tested prior revision for rollback**, so that **updates cannot silently add tools or break the last trusted procedure**.\n\n## Goal\n\nDeliver the observable capability described above through Clark's canonical workspace, with enough evidence to determine whether it is complete.\n\n## Why / Rationale\n\nUpdates cannot silently add tools or break the last trusted procedure. This story is separated from adjacent work so the board can report verified progress without treating an incomplete product epic as finished.\n\n## Functional Requirements\n\n- Suspend the prior active revision only when an eligible update activates atomically.\n- Deny unavailable capability expansion and retain revision-specific trust ceilings.\n\n## Acceptance Criteria\n\n- [ ] Given an update requests an unavailable provider capability, when evaluated, then it stays quarantined and the prior active revision remains active.\n- [ ] Given the creator rolls back a verified revision, when the decision commits, then the exact retained prior revision and trust ceiling become current atomically.\n\n## Negative Scenarios\n\n- A failed trust, evidence, compatibility, recovery, or policy check must leave the prior canonical state intact and expose a valid next action.\n\n## Future Scope\n\n- Broader capability beyond this verified slice remains in sibling stories and later releases.\n\n## Do Not Do\n\n- In this story, do not infer completion from UI presence, documents, or mocked fixtures when the acceptance criteria require runtime or human evidence.\n- Do not bypass Clark's event, permission, approval, provenance, or rollback contracts to make the happy path appear complete.\n\n---\n"},{"rel":"epics/E-007-governed-agent-skills/S-007-003-run-scoped-skill-invocation-and-receipts.md","content":"# Story: Run-Scoped Skill Invocation and Receipts\n\n**ID:** S-007-003\n**Project:** clark-pro\n**Epic:** E-007\n**Stage:** Ready\n**Status:** Backlog\n**Priority:** P0\n**Phase:** P-002-03\n**Version:** 1.0\n**Created:** 2026-07-13\n**Updated:** 2026-07-13\n**Sources:** [Authoritative epics](../../research/history/import-2026-07-13/product/03-epics-and-stories.md), [Whole-product roadmap](../../research/history/import-2026-07-13/roadmap.md)\n\n---\n\n## Story\n\nAs a **creator**, I want to **invoke a trusted Skill only inside an approved run and capability intersection**, so that **promotion remains a trust decision rather than implicit authorization to act**.\n\n## Goal\n\nDeliver the observable capability described above through Clark's canonical workspace, with enough evidence to determine whether it is complete.\n\n## Why / Rationale\n\nPromotion remains a trust decision rather than implicit authorization to act. This story is separated from adjacent work so the board can report verified progress without treating an incomplete product epic as finished.\n\n## Functional Requirements\n\n- Enforce the intersection of package request, creator trust ceiling, workspace policy, and run grant.\n- Record Skill revision, inputs, outputs, capability calls, cost, timing, and permission receipts without exposing a generic renderer invocation method.\n\n## Acceptance Criteria\n\n- [ ] Given a promoted Skill lacks a run grant, when invocation is attempted, then no code or capability executes.\n- [ ] Given all four permission layers allow invocation, when the Skill runs, then every capability call is bounded and the complete revision-specific receipt is linked to the artifact lineage.\n\n## Negative Scenarios\n\n- A failed trust, evidence, compatibility, recovery, or policy check must leave the prior canonical state intact and expose a valid next action.\n\n## Future Scope\n\n- Scope not named in this story remains in sibling stories or a later release; this story does not absorb the full parent epic.\n\n## Do Not Do\n\n- In this story, do not infer completion from UI presence, documents, or mocked fixtures when the acceptance criteria require runtime or human evidence.\n- Do not bypass Clark's event, permission, approval, provenance, or rollback contracts to make the happy path appear complete.\n\n---\n"},{"rel":"epics/E-007-governed-agent-skills/S-007-004-community-skills-and-class-b-c-sandbox.md","content":"# Story: Community Skills and Class B/C Sandbox\n\n**ID:** S-007-004\n**Project:** clark-pro\n**Epic:** E-007\n**Stage:** Ready\n**Status:** Backlog\n**Priority:** P0\n**Phase:** P-002-03\n**Version:** 1.0\n**Created:** 2026-07-13\n**Updated:** 2026-07-13\n**Sources:** [Authoritative epics](../../research/history/import-2026-07-13/product/03-epics-and-stories.md), [Whole-product roadmap](../../research/history/import-2026-07-13/roadmap.md)\n\n---\n\n## Story\n\nAs a **workspace_admin**, I want to **acquire signed community Skills and execute higher-risk classes in production isolation**, so that **extensible procedures cannot escape filesystem, network, process, or capability policy**.\n\n## Goal\n\nDeliver the observable capability described above through Clark's canonical workspace, with enough evidence to determine whether it is complete.\n\n## Why / Rationale\n\nExtensible procedures cannot escape filesystem, network, process, or capability policy. This story is separated from adjacent work so the board can report verified progress without treating an incomplete product epic as finished.\n\n## Functional Requirements\n\n- Add community source identity, signatures, advisories, compatibility, and revocation checks.\n- Implement the production Class B/C sandbox with declared filesystem, network, process, and capability ceilings.\n\n## Acceptance Criteria\n\n- [ ] Given a community Skill has mutable identity, failed signature, known blocked advisory, or undeclared executable content, when acquired, then it cannot enter trusted execution.\n- [ ] Given a hostile Class B/C fixture attempts an undeclared resource, when executed, then the sandbox denies it and records the attempted boundary crossing.\n\n## Negative Scenarios\n\n- A failed trust, evidence, compatibility, recovery, or policy check must leave the prior canonical state intact and expose a valid next action.\n\n## Future Scope\n\n- Scope not named in this story remains in sibling stories or a later release; this story does not absorb the full parent epic.\n\n## Do Not Do\n\n- In this story, do not infer completion from UI presence, documents, or mocked fixtures when the acceptance criteria require runtime or human evidence.\n- Do not bypass Clark's event, permission, approval, provenance, or rollback contracts to make the happy path appear complete.\n\n---\n"},{"rel":"epics/E-007-governed-agent-skills/S-007-005-reflection-driven-skill-proposals-and-regression.md","content":"# Story: Reflection-Driven Skill Proposals and Regression\n\n**ID:** S-007-005\n**Project:** clark-pro\n**Epic:** E-007\n**Stage:** Ready\n**Status:** Backlog\n**Priority:** P1\n**Phase:** P-002-03\n**Version:** 1.0\n**Created:** 2026-07-13\n**Updated:** 2026-07-13\n**Sources:** [Authoritative epics](../../research/history/import-2026-07-13/product/03-epics-and-stories.md), [Whole-product roadmap](../../research/history/import-2026-07-13/roadmap.md)\n\n---\n\n## Story\n\nAs a **creator**, I want to **turn a successful or corrected trajectory into a reviewable Skill proposal with tests**, so that **reliable procedures compound without silent self-modification**.\n\n## Goal\n\nDeliver the observable capability described above through Clark's canonical workspace, with enough evidence to determine whether it is complete.\n\n## Why / Rationale\n\nReliable procedures compound without silent self-modification. This story is separated from adjacent work so the board can report verified progress without treating an incomplete product epic as finished.\n\n## Functional Requirements\n\n- Extract procedure, inputs, outputs, tools, permissions, compatibility, recovery, and examples from exact trajectory evidence.\n- Require quarantine fixtures and regression results before creator promotion; allow monitoring to propose rollback only.\n\n## Acceptance Criteria\n\n- [ ] Given a trajectory produces a stable procedure, when reflection proposes a Skill, then the proposal cites exact evidence and remains inactive.\n- [ ] Given an active Skill fails its regression threshold, when monitoring evaluates it, then rollback is proposed and no silent revision is installed.\n\n## Negative Scenarios\n\n- A failed trust, evidence, compatibility, recovery, or policy check must leave the prior canonical state intact and expose a valid next action.\n\n## Future Scope\n\n- Scope not named in this story remains in sibling stories or a later release; this story does not absorb the full parent epic.\n\n## Do Not Do\n\n- In this story, do not infer completion from UI presence, documents, or mocked fixtures when the acceptance criteria require runtime or human evidence.\n- Do not bypass Clark's event, permission, approval, provenance, or rollback contracts to make the happy path appear complete.\n\n---\n"},{"rel":"epics/E-008-distribution-and-observation/E-008.md","content":"# Epic: Distribution and Observation\n\n**ID:** E-008\n**Project:** clark-pro\n**Stage:** Ready\n**Version:** 1.0\n**Created:** 2026-07-13\n**Updated:** 2026-07-13\n**Sources:** [Authoritative epics](../../research/history/import-2026-07-13/product/03-epics-and-stories.md), [Whole-product roadmap](../../research/history/import-2026-07-13/roadmap.md)\n\n---\n\n## Outcome\n\nCreators can publish approved artifacts across real channels, reconcile every external mutation, collect lineage-linked outcomes, and review evidence without unsupported causal claims.\n\n## Success Metric\n\n| Metric | Baseline | Target |\n|--------|----------|--------|\n| Duplicate verified publications in chaos testing | No production publishing path yet | 0 |\n| Publication intents left without an explicit terminal or reconciliation state | No production publishing path yet | 0 |\n\n## Primary Persona\n\nThe Operator-Creator\n\n## Dependencies\n\n- E-002 (Native Studio and Durable Harness)\n- E-003 (Idea Foundry and Creation Studio)\n- E-004 (MCP and Clark Bridge)\n\n## Stories\n\n| ID | Title | Status | Stage |\n|----|-------|--------|-------|\n| S-008-001 | Social Account and Credential Center | Backlog | Ready |\n| S-008-002 | Postiz Scheduling and Publication Ledger | Backlog | Ready |\n| S-008-003 | Assisted Handoff and Deterministic Export | Backlog | Ready |\n| S-008-004 | Observation Ingestion and Evidence Review | Backlog | Ready |\n| S-008-005 | Experiment and Strategy Loop | Backlog | Ready |\n\n---\n"},{"rel":"epics/E-008-distribution-and-observation/S-008-001-social-account-and-credential-center.md","content":"# Story: Social Account and Credential Center\n\n**ID:** S-008-001\n**Project:** clark-pro\n**Epic:** E-008\n**Stage:** Ready\n**Status:** Backlog\n**Priority:** P0\n**Phase:** P-003-01\n**Version:** 1.0\n**Created:** 2026-07-13\n**Updated:** 2026-07-13\n**Sources:** [Authoritative epics](../../research/history/import-2026-07-13/product/03-epics-and-stories.md), [Whole-product roadmap](../../research/history/import-2026-07-13/roadmap.md)\n\n---\n\n## Story\n\nAs a **workspace_admin**, I want to **connect, scope, inspect, and revoke social accounts without exposing credentials**, so that **publishing authority remains visible and workspace-specific**.\n\n## Goal\n\nDeliver the observable capability described above through Clark's canonical workspace, with enough evidence to determine whether it is complete.\n\n## Why / Rationale\n\nPublishing authority remains visible and workspace-specific. This story is separated from adjacent work so the board can report verified progress without treating an incomplete product epic as finished.\n\n## Functional Requirements\n\n- Support OAuth or provider flows through the Keychain broker with scopes, leases, health, revocation, and workspace grants.\n- Show affected schedules and capabilities when account health or grants change.\n\n## Acceptance Criteria\n\n- [ ] Given an account is connected, when the creator inspects it, then publisher identity, scopes, workspace grants, health, and revocation controls are visible without token material.\n- [ ] Given an account is revoked, when dependent work starts, then Clark blocks it and identifies affected scheduled intents.\n\n## Negative Scenarios\n\n- A failed trust, evidence, compatibility, recovery, or policy check must leave the prior canonical state intact and expose a valid next action.\n\n## Future Scope\n\n- Scope not named in this story remains in sibling stories or a later release; this story does not absorb the full parent epic.\n\n## Do Not Do\n\n- In this story, do not infer completion from UI presence, documents, or mocked fixtures when the acceptance criteria require runtime or human evidence.\n- Do not bypass Clark's event, permission, approval, provenance, or rollback contracts to make the happy path appear complete.\n\n---\n"},{"rel":"epics/E-008-distribution-and-observation/S-008-002-postiz-scheduling-and-publication-ledger.md","content":"# Story: Postiz Scheduling and Publication Ledger\n\n**ID:** S-008-002\n**Project:** clark-pro\n**Epic:** E-008\n**Stage:** Ready\n**Status:** Backlog\n**Priority:** P0\n**Phase:** P-003-01\n**Version:** 1.0\n**Created:** 2026-07-13\n**Updated:** 2026-07-13\n**Sources:** [Authoritative epics](../../research/history/import-2026-07-13/product/03-epics-and-stories.md), [Whole-product roadmap](../../research/history/import-2026-07-13/roadmap.md)\n\n---\n\n## Story\n\nAs a **creator**, I want to **schedule or publish through Postiz with idempotent intent, receipt, verification, and reconciliation**, so that **every external mutation ends in a known, reviewable state without blind retry**.\n\n## Goal\n\nDeliver the observable capability described above through Clark's canonical workspace, with enough evidence to determine whether it is complete.\n\n## Why / Rationale\n\nEvery external mutation ends in a known, reviewable state without blind retry. This story is separated from adjacent work so the board can report verified progress without treating an incomplete product epic as finished.\n\n## Functional Requirements\n\n- Discover current platform schemas and validate media, copy, disclosure, account health, and approval before submission.\n- Track intent, scheduled, submitted, verified, failed, cancelled, removed, exported, and reconciliation states distinctly.\n\n## Acceptance Criteria\n\n- [ ] Given an approved platform artifact, when it is submitted, then Clark records an idempotency key and provider receipt before observing verification.\n- [ ] Given the submission outcome is ambiguous, when recovery runs, then Clark enters reconciliation and does not issue a blind duplicate retry.\n\n## Negative Scenarios\n\n- A failed trust, evidence, compatibility, recovery, or policy check must leave the prior canonical state intact and expose a valid next action.\n\n## Future Scope\n\n- Scope not named in this story remains in sibling stories or a later release; this story does not absorb the full parent epic.\n\n## Do Not Do\n\n- In this story, do not infer completion from UI presence, documents, or mocked fixtures when the acceptance criteria require runtime or human evidence.\n- Do not bypass Clark's event, permission, approval, provenance, or rollback contracts to make the happy path appear complete.\n\n---\n"},{"rel":"epics/E-008-distribution-and-observation/S-008-003-assisted-handoff-and-deterministic-export.md","content":"# Story: Assisted Handoff and Deterministic Export\n\n**ID:** S-008-003\n**Project:** clark-pro\n**Epic:** E-008\n**Stage:** Ready\n**Status:** Backlog\n**Priority:** P1\n**Phase:** P-003-01\n**Version:** 1.0\n**Created:** 2026-07-13\n**Updated:** 2026-07-13\n**Sources:** [Authoritative epics](../../research/history/import-2026-07-13/product/03-epics-and-stories.md), [Whole-product roadmap](../../research/history/import-2026-07-13/roadmap.md)\n\n---\n\n## Story\n\nAs a **creator**, I want to **complete publication through a human handoff or platform-valid export when automation is unavailable**, so that **connector outages do not strand approved work or force unsafe platform bypasses**.\n\n## Goal\n\nDeliver the observable capability described above through Clark's canonical workspace, with enough evidence to determine whether it is complete.\n\n## Why / Rationale\n\nConnector outages do not strand approved work or force unsafe platform bypasses. This story is separated from adjacent work so the board can report verified progress without treating an incomplete product epic as finished.\n\n## Functional Requirements\n\n- Generate deterministic export packages with all required media, copy, metadata, disclosures, and instructions.\n- Record assisted final action separately from direct verified publication.\n\n## Acceptance Criteria\n\n- [ ] Given a connector is unavailable, when the creator chooses export, then Clark produces a complete platform-valid package without losing artifact lineage.\n- [ ] Given a human completes an assisted handoff, when they record the result, then Clark preserves the distinct assisted state and any live URL or external receipt.\n\n## Negative Scenarios\n\n- A failed trust, evidence, compatibility, recovery, or policy check must leave the prior canonical state intact and expose a valid next action.\n\n## Future Scope\n\n- Scope not named in this story remains in sibling stories or a later release; this story does not absorb the full parent epic.\n\n## Do Not Do\n\n- In this story, do not infer completion from UI presence, documents, or mocked fixtures when the acceptance criteria require runtime or human evidence.\n- Do not bypass Clark's event, permission, approval, provenance, or rollback contracts to make the happy path appear complete.\n\n---\n"},{"rel":"epics/E-008-distribution-and-observation/S-008-004-observation-ingestion-and-evidence-review.md","content":"# Story: Observation Ingestion and Evidence Review\n\n**ID:** S-008-004\n**Project:** clark-pro\n**Epic:** E-008\n**Stage:** Ready\n**Status:** Backlog\n**Priority:** P1\n**Phase:** P-003-01\n**Version:** 1.0\n**Created:** 2026-07-13\n**Updated:** 2026-07-13\n**Sources:** [Authoritative epics](../../research/history/import-2026-07-13/product/03-epics-and-stories.md), [Whole-product roadmap](../../research/history/import-2026-07-13/roadmap.md)\n\n---\n\n## Story\n\nAs a **creator**, I want to **review quantitative, qualitative, and manual outcomes against exact publication and decision lineage**, so that **performance data informs judgment without merging incompatible platform semantics**.\n\n## Goal\n\nDeliver the observable capability described above through Clark's canonical workspace, with enough evidence to determine whether it is complete.\n\n## Why / Rationale\n\nPerformance data informs judgment without merging incompatible platform semantics. This story is separated from adjacent work so the board can report verified progress without treating an incomplete product epic as finished.\n\n## Functional Requirements\n\n- Ingest supported analytics and manual judgment with freshness, missingness, deletion, platform definition, and sample count.\n- Present cohorts, ranges, cost, and creator satisfaction without unsupported causal language.\n\n## Acceptance Criteria\n\n- [ ] Given an observation arrives, when it is stored, then it links to the exact publication, artifact, angle, source, and decision lineage.\n- [ ] Given evidence is missing, stale, deleted, or not comparable, when Review renders it, then the limitation remains visible and the metrics are not silently merged.\n\n## Negative Scenarios\n\n- A failed trust, evidence, compatibility, recovery, or policy check must leave the prior canonical state intact and expose a valid next action.\n\n## Future Scope\n\n- Scope not named in this story remains in sibling stories or a later release; this story does not absorb the full parent epic.\n\n## Do Not Do\n\n- In this story, do not infer completion from UI presence, documents, or mocked fixtures when the acceptance criteria require runtime or human evidence.\n- Do not bypass Clark's event, permission, approval, provenance, or rollback contracts to make the happy path appear complete.\n\n---\n"},{"rel":"epics/E-008-distribution-and-observation/S-008-005-experiment-and-strategy-loop.md","content":"# Story: Experiment and Strategy Loop\n\n**ID:** S-008-005\n**Project:** clark-pro\n**Epic:** E-008\n**Stage:** Ready\n**Status:** Backlog\n**Priority:** P1\n**Phase:** P-003-01\n**Version:** 1.0\n**Created:** 2026-07-13\n**Updated:** 2026-07-13\n**Sources:** [Authoritative epics](../../research/history/import-2026-07-13/product/03-epics-and-stories.md), [Whole-product roadmap](../../research/history/import-2026-07-13/roadmap.md)\n\n---\n\n## Story\n\nAs a **creator**, I want to **turn reviewed outcomes into scoped experiments, follow-ups, and optional memory proposals**, so that **future work changes only through visible, reversible decisions with new evidence**.\n\n## Goal\n\nDeliver the observable capability described above through Clark's canonical workspace, with enough evidence to determine whether it is complete.\n\n## Why / Rationale\n\nFuture work changes only through visible, reversible decisions with new evidence. This story is separated from adjacent work so the board can report verified progress without treating an incomplete product epic as finished.\n\n## Functional Requirements\n\n- Generate no change or a small set of evidence-linked experiment and strategy proposals.\n- Keep rejected proposals inactive unless genuinely new evidence is attached.\n\n## Acceptance Criteria\n\n- [ ] Given a review has sufficient evidence, when the strategy loop runs, then each proposal names observations, sample size, uncertainty, and the decision it could change.\n- [ ] Given a proposal is rejected, when future reflection runs without new evidence, then the rejected proposal does not silently return.\n\n## Negative Scenarios\n\n- A failed trust, evidence, compatibility, recovery, or policy check must leave the prior canonical state intact and expose a valid next action.\n\n## Future Scope\n\n- Scope not named in this story remains in sibling stories or a later release; this story does not absorb the full parent epic.\n\n## Do Not Do\n\n- In this story, do not infer completion from UI presence, documents, or mocked fixtures when the acceptance criteria require runtime or human evidence.\n- Do not bypass Clark's event, permission, approval, provenance, or rollback contracts to make the happy path appear complete.\n\n---\n"},{"rel":"epics/E-009-team-and-whole-product-release/E-009.md","content":"# Epic: Team and Whole-Product Release\n\n**ID:** E-009\n**Project:** clark-pro\n**Stage:** Ready\n**Version:** 1.0\n**Created:** 2026-07-13\n**Updated:** 2026-07-13\n**Sources:** [Authoritative epics](../../research/history/import-2026-07-13/product/03-epics-and-stories.md), [Whole-product roadmap](../../research/history/import-2026-07-13/roadmap.md)\n\n---\n\n## Outcome\n\nCreators and teams can coordinate, sync, and delegate bounded work while retaining local canonical ownership, tenant isolation, and a complete usable export during hosted outages.\n\n## Success Metric\n\n| Metric | Baseline | Target |\n|--------|----------|--------|\n| Representative full weekly cycles completed end to end | 0 | 4 before Clark Pro 1.0 |\n| Offline conflicts resolved through last-write-wins data loss | No team sync implementation yet | 0 |\n\n## Primary Persona\n\nThe Collaborating Team Lead\n\n## Dependencies\n\n- E-002 (Native Studio and Durable Harness)\n- E-003 (Idea Foundry and Creation Studio)\n- E-008 (Distribution and Observation)\n\n## Stories\n\n| ID | Title | Status | Stage |\n|----|-------|--------|-------|\n| S-009-001 | Shared Workspaces, Roles, and Approval | Backlog | Ready |\n| S-009-002 | Encrypted Event Sync and Asset Mirror | Backlog | Ready |\n| S-009-003 | Scoped Remote Workers and Schedules | Backlog | Ready |\n| S-009-004 | Four-Week Whole-Product Proof | Backlog | Ready |\n| S-009-005 | Release, Hosted Continuity, and Tenant Isolation | Backlog | Ready |\n\n---\n"},{"rel":"epics/E-009-team-and-whole-product-release/S-009-001-shared-workspaces-roles-and-approval.md","content":"# Story: Shared Workspaces, Roles, and Approval\n\n**ID:** S-009-001\n**Project:** clark-pro\n**Epic:** E-009\n**Stage:** Ready\n**Status:** Backlog\n**Priority:** P1\n**Phase:** P-003-02\n**Version:** 1.0\n**Created:** 2026-07-13\n**Updated:** 2026-07-13\n**Sources:** [Authoritative epics](../../research/history/import-2026-07-13/product/03-epics-and-stories.md), [Whole-product roadmap](../../research/history/import-2026-07-13/roadmap.md)\n\n---\n\n## Story\n\nAs a **team_member**, I want to **coordinate assignments, comments, decisions, and approval under workspace roles**, so that **teams can collaborate without collapsing personal and shared authority**.\n\n## Goal\n\nDeliver the observable capability described above through Clark's canonical workspace, with enough evidence to determine whether it is complete.\n\n## Why / Rationale\n\nTeams can collaborate without collapsing personal and shared authority. This story is separated from adjacent work so the board can report verified progress without treating an incomplete product epic as finished.\n\n## Functional Requirements\n\n- Define roles and authorization for every aggregate, read, mutation, assignment, comment, and approval.\n- Keep personal creator memory separate unless an explicit share decision is recorded.\n\n## Acceptance Criteria\n\n- [ ] Given a team member lacks a required workspace role, when they attempt a protected mutation, then Clark denies it and records the authorization result.\n- [ ] Given a personal memory has not been shared, when team context compiles, then the memory remains unavailable.\n\n## Negative Scenarios\n\n- A failed trust, evidence, compatibility, recovery, or policy check must leave the prior canonical state intact and expose a valid next action.\n\n## Future Scope\n\n- Scope not named in this story remains in sibling stories or a later release; this story does not absorb the full parent epic.\n\n## Do Not Do\n\n- In this story, do not infer completion from UI presence, documents, or mocked fixtures when the acceptance criteria require runtime or human evidence.\n- Do not bypass Clark's event, permission, approval, provenance, or rollback contracts to make the happy path appear complete.\n\n---\n"},{"rel":"epics/E-009-team-and-whole-product-release/S-009-002-encrypted-event-sync-and-asset-mirror.md","content":"# Story: Encrypted Event Sync and Asset Mirror\n\n**ID:** S-009-002\n**Project:** clark-pro\n**Epic:** E-009\n**Stage:** Ready\n**Status:** Backlog\n**Priority:** P0\n**Phase:** P-003-02\n**Version:** 1.0\n**Created:** 2026-07-13\n**Updated:** 2026-07-13\n**Sources:** [Authoritative epics](../../research/history/import-2026-07-13/product/03-epics-and-stories.md), [Whole-product roadmap](../../research/history/import-2026-07-13/roadmap.md)\n\n---\n\n## Story\n\nAs a **team_member**, I want to **work offline and reconcile events and assets without losing concurrent changes**, so that **local-first collaboration remains deterministic across devices**.\n\n## Goal\n\nDeliver the observable capability described above through Clark's canonical workspace, with enough evidence to determine whether it is complete.\n\n## Why / Rationale\n\nLocal-first collaboration remains deterministic across devices. This story is separated from adjacent work so the board can report verified progress without treating an incomplete product epic as finished.\n\n## Functional Requirements\n\n- Synchronize encrypted event envelopes and content-addressed assets with explicit ordering and conflict semantics.\n- Avoid last-write-wins replacement of canonical decisions, approvals, or artifact versions.\n\n## Acceptance Criteria\n\n- [ ] Given two offline Macs append non-conflicting events, when they reconnect, then both histories converge with valid ordering and hash integrity.\n- [ ] Given concurrent commands conflict, when sync resolves them, then Clark preserves both evidence trails and requires an explicit domain decision where necessary.\n\n## Negative Scenarios\n\n- A failed trust, evidence, compatibility, recovery, or policy check must leave the prior canonical state intact and expose a valid next action.\n\n## Future Scope\n\n- Scope not named in this story remains in sibling stories or a later release; this story does not absorb the full parent epic.\n\n## Do Not Do\n\n- In this story, do not infer completion from UI presence, documents, or mocked fixtures when the acceptance criteria require runtime or human evidence.\n- Do not bypass Clark's event, permission, approval, provenance, or rollback contracts to make the happy path appear complete.\n\n---\n"},{"rel":"epics/E-009-team-and-whole-product-release/S-009-003-scoped-remote-workers-and-schedules.md","content":"# Story: Scoped Remote Workers and Schedules\n\n**ID:** S-009-003\n**Project:** clark-pro\n**Epic:** E-009\n**Stage:** Ready\n**Status:** Backlog\n**Priority:** P1\n**Phase:** P-003-02\n**Version:** 1.0\n**Created:** 2026-07-13\n**Updated:** 2026-07-13\n**Sources:** [Authoritative epics](../../research/history/import-2026-07-13/product/03-epics-and-stories.md), [Whole-product roadmap](../../research/history/import-2026-07-13/roadmap.md)\n\n---\n\n## Story\n\nAs a **workspace_admin**, I want to **delegate long jobs and schedules through revocable, sensitivity-bounded remote envelopes**, so that **work can continue while the Mac sleeps without copying broad personal authority to the cloud**.\n\n## Goal\n\nDeliver the observable capability described above through Clark's canonical workspace, with enough evidence to determine whether it is complete.\n\n## Why / Rationale\n\nWork can continue while the Mac sleeps without copying broad personal authority to the cloud. This story is separated from adjacent work so the board can report verified progress without treating an incomplete product epic as finished.\n\n## Functional Requirements\n\n- Use signed job envelopes, device identity, scoped credential delegation, sensitivity policy, expiry, and revocation.\n- Reconcile remote results through the canonical local event model and preserve offline access.\n\n## Acceptance Criteria\n\n- [ ] Given a job is delegated, when the remote worker runs it, then it can access only the named workspace, inputs, credentials, capabilities, and time window.\n- [ ] Given the worker is compromised or revoked, when it attempts unrelated memory or credential access, then the request fails and local export remains available.\n\n## Negative Scenarios\n\n- A failed trust, evidence, compatibility, recovery, or policy check must leave the prior canonical state intact and expose a valid next action.\n\n## Future Scope\n\n- Scope not named in this story remains in sibling stories or a later release; this story does not absorb the full parent epic.\n\n## Do Not Do\n\n- In this story, do not infer completion from UI presence, documents, or mocked fixtures when the acceptance criteria require runtime or human evidence.\n- Do not bypass Clark's event, permission, approval, provenance, or rollback contracts to make the happy path appear complete.\n\n---\n"},{"rel":"epics/E-009-team-and-whole-product-release/S-009-004-four-week-whole-product-proof.md","content":"# Story: Four-Week Whole-Product Proof\n\n**ID:** S-009-004\n**Project:** clark-pro\n**Epic:** E-009\n**Stage:** Ready\n**Status:** Backlog\n**Priority:** P0\n**Phase:** P-003-02\n**Version:** 1.0\n**Created:** 2026-07-13\n**Updated:** 2026-07-13\n**Sources:** [Authoritative epics](../../research/history/import-2026-07-13/product/03-epics-and-stories.md), [Whole-product roadmap](../../research/history/import-2026-07-13/roadmap.md)\n\n---\n\n## Story\n\nAs a **creator**, I want to **operate the complete capture-to-learning cycle for four representative weeks**, so that **Clark Pro 1.0 is judged by real continuity, recovery, publishability, and learning rather than screen completion**.\n\n## Goal\n\nDeliver the observable capability described above through Clark's canonical workspace, with enough evidence to determine whether it is complete.\n\n## Why / Rationale\n\nClark Pro 1.0 is judged by real continuity, recovery, publishability, and learning rather than screen completion. This story is separated from adjacent work so the board can report verified progress without treating an incomplete product epic as finished.\n\n## Functional Requirements\n\n- Run capture, understand, create, review, distribute, observe, reflect, and improve across the creator's actual channels.\n- Record provenance, interruptions, publications, fallbacks, time, cost, creator judgment, memory changes, and skill changes.\n\n## Acceptance Criteria\n\n- [ ] Given four consecutive weekly cycles finish, when evidence is audited, then every required action, artifact, publication, observation, memory, and Skill revision has complete lineage.\n- [ ] Given any duplicate publication, unexplained state, failed restore, silent learning, or missing fallback occurs, when the exit gate is evaluated, then Clark Pro 1.0 remains blocked.\n\n## Negative Scenarios\n\n- A failed trust, evidence, compatibility, recovery, or policy check must leave the prior canonical state intact and expose a valid next action.\n\n## Future Scope\n\n- Scope not named in this story remains in sibling stories or a later release; this story does not absorb the full parent epic.\n\n## Do Not Do\n\n- In this story, do not infer completion from UI presence, documents, or mocked fixtures when the acceptance criteria require runtime or human evidence.\n- Do not bypass Clark's event, permission, approval, provenance, or rollback contracts to make the happy path appear complete.\n\n---\n"},{"rel":"epics/E-009-team-and-whole-product-release/S-009-005-release-hosted-continuity-and-tenant-isolation.md","content":"# Story: Release, Hosted Continuity, and Tenant Isolation\n\n**ID:** S-009-005\n**Project:** clark-pro\n**Epic:** E-009\n**Stage:** Ready\n**Status:** Backlog\n**Priority:** P0\n**Phase:** P-003-02\n**Version:** 1.0\n**Created:** 2026-07-13\n**Updated:** 2026-07-13\n**Sources:** [Authoritative epics](../../research/history/import-2026-07-13/product/03-epics-and-stories.md), [Whole-product roadmap](../../research/history/import-2026-07-13/roadmap.md)\n\n---\n\n## Story\n\nAs a **workspace_admin**, I want to **install a signed production release and retain complete local access during hosted failure**, so that **a managed offering adds elasticity without becoming the owner of canonical creator state**.\n\n## Goal\n\nDeliver the observable capability described above through Clark's canonical workspace, with enough evidence to determine whether it is complete.\n\n## Why / Rationale\n\nA managed offering adds elasticity without becoming the owner of canonical creator state. This story is separated from adjacent work so the board can report verified progress without treating an incomplete product epic as finished.\n\n## Functional Requirements\n\n- Complete signing, notarization, privacy, vulnerability response, organization policy, billing, tenant isolation, reliability, and audit evidence.\n- Verify hosted outage behavior, local workspace access, complete export, and recovery.\n\n## Acceptance Criteria\n\n- [ ] Given a production build, when release checks run, then signing, notarization, privacy, update, rollback, security, and incident-response evidence is attributable and passing.\n- [ ] Given the hosted service is unavailable, when a creator opens Clark, then local workspace access and complete export remain usable without cross-tenant exposure.\n\n## Negative Scenarios\n\n- A failed trust, evidence, compatibility, recovery, or policy check must leave the prior canonical state intact and expose a valid next action.\n\n## Future Scope\n\n- Scope not named in this story remains in sibling stories or a later release; this story does not absorb the full parent epic.\n\n## Do Not Do\n\n- In this story, do not infer completion from UI presence, documents, or mocked fixtures when the acceptance criteria require runtime or human evidence.\n- Do not bypass Clark's event, permission, approval, provenance, or rollback contracts to make the happy path appear complete.\n\n---\n"},{"rel":"README.md","content":"# Clark Pro Requirements\n\nClark Pro is a Mac-first, memory-native creator operating system that connects intent, evidence, creation, review, distribution, outcomes, memory, and governed reusable capabilities in one local-first workspace.\n\n**Status:** Active\n\n## Linked Repos\n\n| Role | Repository |\n|------|------------|\n| Requirements and implementation | [shubhamdasdev/Clark-pro](https://github.com/shubhamdasdev/Clark-pro) |\n| Product Team framework | [openron/product-team](https://github.com/openron/product-team) |\n\n## Structure\n\n| Path | Contents |\n|------|----------|\n| [brief.md](brief.md) | Product problem, north star, roles, personas, scope, and constraints |\n| [epics/](epics/) | Nine outcome epics and 42 evidence-reconciled stories |\n| [releases/](releases/) | Current QA release and the next single-user and whole-product queues |\n| [index.yaml](index.yaml) | Generated project map used by Product Team and the live board |\n| [research/history/](research/history/) | Archived authoritative inputs and implementation evidence used for this import |\n\n## Getting Started\n\nFrom the Product Team folder, run `pm board clark-pro --port 3000`. The board watches these Markdown files, so story Status and Stage changes appear without a manual refresh.\n"},{"rel":"releases/R-001-local-trust-core.md","content":"# Release: Local Trust Core\n\n**ID:** R-001\n**Project:** clark-pro\n**Stage:** Ready\n**Status:** QA\n**Version:** 1.0\n**Created:** 2026-07-13\n**Updated:** 2026-07-13\n\n---\n\n## Goal\n\nValidate the already-implemented local trust core as one bounded release: generated contracts, hardened desktop/Harness boundaries, evidence-honest Idea Foundry, governed MCP and Bridge, governed memory, Tool Pack lifecycle, and Class A Skill trust.\n\n## Stories in Scope\n\n| Story | Title | Epic | Stage | Status |\n|-------|-------|------|-------|--------|\n| S-001-001 | Versioned Contracts and Upcasters | E-001 | Ready | Done |\n| S-001-002 | Ground Prototype and Evidence Ledger | E-001 | Ready | QA |\n| S-002-001 | Hardened Mac Shell Boundary | E-002 | Ready | Done |\n| S-002-002 | Durable Event Store and Run Recovery | E-002 | Ready | Done |\n| S-003-001 | Immutable Idea Capture and Revision Lineage | E-003 | Ready | Done |\n| S-003-002 | Evidence-Honest Idea Inspection and Canvas | E-003 | Ready | Done |\n| S-004-001 | Governed Bundled MCP Capability | E-004 | Ready | Done |\n| S-004-002 | Scoped Clark Bridge Core | E-004 | Ready | Done |\n| S-005-001 | Evidence-Bound Memory Promotion | E-005 | Ready | Done |\n| S-005-002 | Scoped Retrieval, Correction, and Forgetting | E-005 | Ready | Done |\n| S-006-001 | Tool Pack Quarantine and Trust Gates | E-006 | Ready | Done |\n| S-006-002 | Atomic Tool Pack Activation and Rollback | E-006 | Ready | Done |\n| S-006-003 | OpenCut Candidate Blocked Upstream | E-006 | Ready | Done |\n| S-007-001 | Bundled Class A Skill Trust Lifecycle | E-007 | Ready | Done |\n| S-007-002 | Skill Update, Expansion Denial, and Rollback | E-007 | Ready | Done |\n\n## Out of Scope\n\n- Representative creator and commercial Ground signoff\n- Production signing, Keychain, social publishing, community Skill execution, and real third-party Tool Pack execution\n\n## Dependencies\n\n- Required human Ground walkthroughs and named signoff remain outside this release and block product-level Ground closure.\n\n## Definition of Done\n\n- All stories in scope are `Status: Done`.\n- Required automated, human, migration, recovery, security, and release evidence is attributable and linked.\n- Product Team validation has no blocking errors and the static board export matches the committed requirements.\n\n## developer Handoff\n\n1. Load the `` skill and pull the latest main branch.\n2. Read this release, then the story files below in dependency order.\n3. Set a story to `In Progress` when picked up and `QA` only after self-testing every acceptance criterion.\n4. File a Change Request instead of silently changing approved requirements.\n\n### Pickup Order\n\n- `requirements/epics/E-001-contracts-and-product-proof/S-001-001-versioned-contracts-and-upcasters.md` — Versioned Contracts and Upcasters\n- `requirements/epics/E-001-contracts-and-product-proof/S-001 var showRaw=false;
var activeIdx=-1;

// Build tree
function buildTree(files){
  var root={children:{},files:[]};
  files.forEach(function(f,i){
    var parts=f.rel.split('/');
    var node=root;
    for(var j=0;j<parts.length-1;j++){
      if(!node.children[parts[j]])node.children[parts[j]]={children:{},files:[]};
      node=node.children[parts[j]];
    }
    node.files.push({name:parts[parts.length-1],idx:i});
  });
  return root;
}

function renderTree(node,container,depth){
  // Sort folders first, then files
  var folders=Object.keys(node.children).sort();
  var fileItems=node.files.sort(function(a,b){return a.name.localeCompare(b.name);});

  folders.forEach(function(fname){
    var folder=document.createElement('div');
    folder.className='tree-folder';
    var label=document.createElement('div');
    label.className='tree-folder-label';
    label.style.paddingLeft=(depth*14+8)+'px';
    var arrow=document.createElement('span');
    arrow.className='arrow open';
    arrow.textContent='▶';
    label.appendChild(arrow);
    var text=document.createTextNode(' '+fname);
    label.appendChild(text);
    folder.appendChild(label);

    var children=document.createElement('div');
    children.className='tree-children';
    renderTree(node.children[fname],children,depth+1);
    folder.appendChild(children);

    label.onclick=function(){
      var collapsed=children.classList.toggle('collapsed');
      arrow.classList.toggle('open',!collapsed);
    };
    container.appendChild(folder);
  });

  fileItems.forEach(function(f){
    var el=document.createElement('div');
    el.className='tree-file';
    el.textContent=f.name;
    el.style.paddingLeft=(depth*14+28)+'px';
    el.dataset.idx=f.idx;
    el.onclick=function(){selectFile(f.idx);};
    container.appendChild(el);
  });
}

function selectFile(idx){
  activeIdx=idx;
  // Update active state
  document.querySelectorAll('.tree-file').forEach(function(el){
    el.classList.toggle('active',parseInt(el.dataset.idx)===idx);
  });
  renderContent();
}

function renderContent(){
  if(activeIdx<0)return;
  var f=FILES[activeIdx];
  var content=document.getElementById('content');
  content.innerHTML='';

  var pathEl=document.createElement('div');
  pathEl.style.display='flex';
  pathEl.style.alignItems='center';
  pathEl.style.gap='8px';
  pathEl.style.marginBottom='16px';
  var pathText=document.createElement('span');
  pathText.id='file-path';
  pathText.textContent=f.rel;
  pathEl.appendChild(pathText);
  var toggle=document.createElement('button');
  toggle.id='raw-toggle';
  toggle.textContent=showRaw?'rendered':'raw';
  toggle.onclick=function(){showRaw=!showRaw;renderContent();};
  pathEl.appendChild(toggle);
  content.appendChild(pathEl);

  var body=document.createElement('div');
  if(showRaw){
    body.className='raw';
    body.textContent=f.content;
  }else{
    body.className='rendered';
    body.innerHTML=marked.parse(f.content);
  }
  content.appendChild(body);
}

// Init
var tree=buildTree(FILES);
var sidebar=document.getElementById('sidebar');
renderTree(tree,sidebar,0);

// Auto-select first file
if(FILES.length>0)selectFile(0);
</script>
