n/popups/webview/permission denial, environment/secret canaries | Any expansion or leak |\n| Event integrity/recovery | append/idempotence/hash chain, projection rebuild, kill-at-state, orphan lease, async reconnect | Duplicate/lost/invalid state |\n| Extension supply chain | immutable acquisition, license/SBOM/provenance, hostile archive, interface ladder, activation/update/rollback | Missing/failed gate or escape |\n| Skill sandbox | hidden executable, signature/advisory, filesystem/network/process/capability/time/memory hostile corpus | Any undeclared authority |\n| Publication | schema/account/policy, response loss, duplicate response, restart, revoke, reconcile, export | Duplicate or unexplained state |\n| Memory/privacy | proposal/promotion, leakage, poisoning, expiry, correction, logical/physical forget, backup disclosure | Forgotten retrieval or false erasure claim |\n| Portability | age interoperability, corruption/path/size/schema/disk/interruption, clean-Mac restore | Failed round trip or active-state mutation on invalid input |\n| Accessibility/performance | keyboard, VoiceOver, 200% zoom, reduced motion, 50-object Canvas, oldest supported Mac | Critical unreachable/unannounced action; agreed baseline gate failure |\n| Team/hosted | role matrix, offline convergence, replay/revoke/envelope, tenant isolation, audit logs, outage/local export | Data loss, authority leak, local continuity failure |\n\n## Cadence\n\n| Trigger | Required run |\n|---------|--------------|\n| Every PR | Changed story T-plan Unit/Harness + analytics, contract drift, lint/security, focused Playwright |\n| Main nightly | Full deterministic Harness/conformance/hostile suites + TF-006/009/015 + HP-001…009 |\n| Weekly | Backup clean-Mac restore, packaged Mac accessibility/performance baseline, dependency/vulnerability scan |\n| R-002/R-003 infrastructure change | Relevant AT acceptance suite and gate evidence before story branches proceed |\n| Release candidate | All in-scope T and TR, all applicable TF/probes, migration/update/rollback, diagnostics canary, manual/human gates |\n| After production BUG | Target story T plus every TF journey listing the story; add regression fixture before close |\n\n## Defect Severity and Triage\n\n| Severity | Definition | Disposition |\n|----------|------------|-------------|\n| P0 | Secret/content/tenant exposure, duplicate external mutation, canonical corruption/data loss, sandbox escape, false approval/erasure, app cannot launch/restore | Stop work/release; incident owner immediately |\n| P1 | Core flow blocked, incorrect authority/evidence, unrecoverable run, inaccessible critical action, no safe fallback | Release blocked until fixed and regression added |\n| P2 | Degraded secondary path with safe workaround and no integrity/trust loss | Named owner and explicit risk acceptance may defer |\n| P3 | Cosmetic/documentation issue with no ambiguity, accessibility, or state impact | Backlog with release note if user-visible |\n\n## Evidence and Traceability\n\nEvery pass records build/commit, story/release/flow ID, TC/ITC/journey/probe ID, fixture/schema, environment, precondition, executor, result, screenshot/log/receipt paths, and defect link. Product/human evidence additionally records participant/provider, observation method, assistance, and signoff owner. Evidence never contains raw secrets or unapproved creator content.\n\n## Release Decision\n\n- R-001 can leave QA only when S-001-002 becomes Done through required evidence, every scoped P0/P1/ITC passes, and existing suites remain green.\n- R-002 cannot become Ready for coding until AT-002-001…004 are Ready (they are) and cannot begin story execution until the architecture gate opens after all ATs are Done. It cannot ship without Ground, packaged Mac, restore, real Tool Pack, accessibility, and creator-loop evidence.\n- R-003 follows the same gate for AT-003-001…003 and cannot ship without publication, learning, sync, remote, tenant, hosted-outage/local-export, and four-week proof.\n- No release decision uses invented performance/SLO numbers; baseline evidence precedes a threshold decision.\n"},{"rel":"qa/TF-006-run-the-full-week-loop.md","content":"# Flow Test Plan: Run the Full-Week loop\n\n**ID:** TF-006\n**Project:** clark-pro\n**Flow:** [UF-006 Run the Full-Week loop](../flows/UF-006-run-the-full-week-loop.md)\n**Type:** Flow regression — evergreen, re-run every release + nightly\n**Stage:** Active\n**Version:** 1.0\n**Created:** 2026-07-13\n**Updated:** 2026-07-13\n**Owner:** QA Agent (curated by PM)\n**Style:** Journeys\n\n> Each journey is one continuous UI/runtime session. Clark executes the product-team Maestro bucket through Playwright Electron while preserving journey IDs, shared setup, assertions, screenshots, and run-log evidence.\n\n---\n\n## Scope\n\nProtect the primary daily/weekly creator spine across evidence ingestion, governed memory and extensions, bounded creation, exact-version review, scheduling, and whole-cycle proof.\n\n**In scope:**\n- Cross-story state continuity, exact-version authority, interruption/recovery, provider ambiguity, and the bound health probes HP-002, HP-003, HP-004, HP-006, HP-008.\n- All AC across S-003-003, S-003-004, S-003-005, S-005-003, S-006-004, S-007-003, S-008-002, S-009-004 at the journey level; story test plans remain unit safety nets.\n\n**Out of scope:**\n- Re-running every T-NNN case individually; TF is the journey-level test of record.\n- Production content, secrets, or real external mutation in nightly CI; sandbox/recorded providers mirror the contract.\n\n## Lifecycle & Cadence\n\n| Trigger | Action | Pass criteria |\n|---------|--------|---------------|\n| **Pre-release** | Run all journeys end-to-end on the release candidate build | All journeys complete successfully |\n| **Pre-ship (R-NNN Shipped)** | Re-run all journeys on production build | All complete |\n| **Nightly (post-launch)** | Run all journeys against production | Failures alert QA channel; ≥2 consecutive nightly fails escalate to PM |\n| **After any BUG fix lands on a touched story** | Re-run any journey whose Stories Covered list includes the BUG's story | Targeted journey passes |\n| **Flow diff** | When UF-NNN changes materially, bump TF-NNN version and update affected journeys | Plan stays in sync with the flow |\n\nThe QA Agent records every run in the Run Log.\n\n## Journey A — Prepare a trustworthy week from real source material\n\n**Story arc:** A recurring creator opens a project, confirms sources, memory, the real supported Tool Pack, the selected Skill, budget, and authority before choosing an angle.\n\n**Stories covered:** S-003-003, S-005-003, S-006-004, S-007-003\n**ACs hit inline:** S-003-003/AC-001, S-003-003/AC-002; S-005-003/AC-001, S-005-003/AC-002; S-006-004/AC-001, S-006-004/AC-002; S-007-003/AC-001, S-007-003/AC-002\n**T-NNN backup (don't re-run):** T-003-003, T-005-003, T-006-004, T-007-003\n\n**Preconditions:**\n- The exact release fixture for UF-006 is seeded, the build/schema/consent state is recorded, and required sandbox providers are deterministic.\n- Bound health probes HP-002, HP-003, HP-004, HP-006, HP-008 are queryable without exposing creative content or secrets.\n\n**The journey:**\n\n1. Open Focus on the seeded representative Full Week project.\n2. ✓ Verify: selected Brand Constitution, accounts, budget, time window, and required review gates are visible.\n3. Add text, URL, screenshot, and media sources through capture.\n4. ✓ Verify: originals and provenance exist without research/generation starting on capture.\n5. Run Check readiness and open Run Approval.\n6. ✓ Verify: exact Tool Pack, adapter, capability, Skill, memory policy, cost, and permission revisions are named.\n7. Deny one expanded permission in the alt fixture.\n8. ✓ Verify: no external execution occurs and the prior trusted package/Skill remains active.\n9. Approve the valid exact plan.\n10. Follow Sensemaking to the angle decision in Focus.\n11. ✓ Verify: claims, uncertainty, source health, and included/excluded memory references are inspectable.\n12. Choose an angle and open Canvas.\n13. ✓ Verify: the graph and receipt lineage match the exact approved plan.\n14. Capture evidence screenshots and the HP-002/HP-004/HP-006 probe receipts.\n\n**Alt branch — permission, provider, or interruption denial:** Repeat the highest-authority action with the permission revoked or provider unavailable. ✓ Verify: no hidden mutation occurs, prior canonical state remains intact, and the journey rejoins through the named recovery/reconciliation/export path.\n\n**Failure indicators:**\n- Any cross-story handoff loses exact version, actor, evidence, permission, cost, state, or recovery context.\n- A bound probe (HP-002, HP-003, HP-004, HP-006, HP-008) fails, an external mutation duplicates, or an unknown state is mislabeled terminal.\n- The UI appears complete while canonical, human, provider, or release evidence remains absent.\n\n---\n\n## Journey B — Create, compare, and approve a coordinated body of work\n\n**Story arc:** The creator lets text and media branches execute under the approved plan, reconnects one async job, compares versions, and approves only the evidence-complete exact artifact.\n\n**Stories covered:** S-003-004, S-003-005, S-005-003, S-006-004, S-007-003\n**ACs hit inline:** S-003-004/AC-001, S-003-004/AC-002; S-003-005/AC-001, S-003-005/AC-002; S-005-003/AC-001, S-005-003/AC-002; S-006-004/AC-001, S-006-004/AC-002; S-007-003/AC-001, S-007-003/AC-002\n**T-NNN backup (don't re-run):** T-003-004, T-003-005, T-005-003, T-006-004, T-007-003\n\n**Preconditions:**\n- The exact release fixture for UF-006 is seeded, the build/schema/consent state is recorded, and required sandbox providers are deterministic.\n- Bound health probes HP-002, HP-003, HP-004, HP-006, HP-008 are queryable without exposing creative content or secrets.\n\n**The journey:**\n\n1. Resume the approved Full Week run from Canvas.\n2. ✓ Verify: bounded text and media branches start with named revisions and budgets.\n3. Interrupt the Harness during one asynchronous media provider job.\n4. Relaunch Clark and open Recovery Summary.\n5. ✓ Verify: the provider job reconnects by external identity and no second paid job starts.\n6. Return to Canvas and wait for Review gates.\n7. ✓ Verify: each artifact records inputs, provider/model, Tool Pack/capability, Skill, memory, cost, and technical metadata.\n8. Open Review and Version Comparison.\n9. ✓ Verify: synchronized previews/diffs preserve version identity and show evidence/policy/accessibility/disclosure state.\n10. Approve one exact version and reject one alternative with a reason.\n11. Change the upstream angle and open Impact Preview.\n12. ✓ Verify: stale artifacts, reusable work, invalid approval, schedule risk, and regeneration cost appear before action.\n13. Approve the replacement exact version.\n14. Capture HP-003 and lineage evidence.\n\n**Alt branch — permission, provider, or interruption denial:** Repeat the highest-authority action with the permission revoked or provider unavailable. ✓ Verify: no hidden mutation occurs, prior canonical state remains intact, and the journey rejoins through the named recovery/reconciliation/export path.\n\n**Failure indicators:**\n- Any cross-story handoff loses exact version, actor, evidence, permission, cost, state, or recovery context.\n- A bound probe (HP-002, HP-003, HP-004, HP-006, HP-008) fails, an external mutation duplicates, or an unknown state is mislabeled terminal.\n- The UI appears complete while canonical, human, provider, or release evidence remains absent.\n\n---\n\n## Journey C — Publish the week and close the evidence-to-learning loop\n\n**Story arc:** The creator moves approved work to Timeline, submits one idempotent intent, reviews outcome evidence, and finalizes one weekly-cycle record without silent memory or Skill change.\n\n**Stories covered:** S-003-005, S-008-002, S-009-004\n**ACs hit inline:** S-003-005/AC-001, S-003-005/AC-002; S-008-002/AC-001, S-008-002/AC-002; S-009-004/AC-001, S-009-004/AC-002\n**T-NNN backup (don't re-run):** T-003-005, T-008-002, T-009-004\n\n**Preconditions:**\n- The exact release fixture for UF-006 is seeded, the build/schema/consent state is recorded, and required sandbox providers are deterministic.\n- Bound health probes HP-002, HP-003, HP-004, HP-006, HP-008 are queryable without exposing creative content or secrets.\n\n**The journey:**\n\n1. Open Timeline with the approved platform artifact.\n2. ✓ Verify: account health, platform requirements, approval version, and schedule state are visible.\n3. Open Publication Approval and submit the exact intent.\n4. ✓ Verify: an intent/idempotency identity and provider receipt are persisted before verification.\n5. Simulate a provider response loss after commit.\n6. ✓ Verify: the intent enters Reconciliation and no blind retry occurs.\n7. Resolve the fixture to one verified publication.\n8. Open Observation and review fresh plus missing/incomparable fields.\n9. ✓ Verify: lineage, definitions, freshness, missingness, and sample count remain visible.\n10. Run reflection/strategy and reject one proposal.\n11. ✓ Verify: rejected learning remains inactive and does not return without new evidence.\n12. Finalize the weekly cycle evidence record.\n13. ✓ Verify: capture → understand → create → review → distribute → observe → reflect → improve lineage is complete.\n14. Capture HP-007/HP-008 and weekly evidence.\n\n**Alt branch — permission, provider, or interruption denial:** Repeat the highest-authority action with the permission revoked or provider unavailable. ✓ Verify: no hidden mutation occurs, prior canonical state remains intact, and the journey rejoins through the named recovery/reconciliation/export path.\n\n**Failure indicators:**\n- Any cross-story handoff loses exact version, actor, evidence, permission, cost, state, or recovery context.\n- A bound probe (HP-002, HP-003, HP-004, HP-006, HP-008) fails, an external mutation duplicates, or an unknown state is mislabeled terminal.\n- The UI appears complete while canonical, human, provider, or release evidence remains absent.\n\n---\n\n## Coverage matrix\n\n| Story | All ACs covered by | Notes |\n|-------|--------------------|-------|\n| S-003-003 Source Ingestion and Claim Ledger | Journey A (all checkpoints) | AC-001 and AC-002 exercised in continuous state; T-003-003 remains the unit-level safety net |\n| S-003-004 Writing, Media, and Platform Variants | Journey B (all checkpoints) | AC-001 and AC-002 exercised in continuous state; T-003-004 remains the unit-level safety net |\n| S-003-005 Version-Specific Review and Policy Gates | Journey B (all checkpoints), Journey C (all checkpoints) | AC-001 and AC-002 exercised in continuous state; T-003-005 remains the unit-level safety net |\n| S-005-003 Semantic Retrieval and Reflection Lineage | Journey A (all checkpoints), Journey B (all checkpoints) | AC-001 and AC-002 exercised in continuous state; T-005-003 remains the unit-level safety net |\n| S-006-004 Real Third-Party Acquisition and Execution | Journey A (all checkpoints), Journey B (all checkpoints) | AC-001 and AC-002 exercised in continuous state; T-006-004 remains the unit-level safety net |\n| S-007-003 Run-Scoped Skill Invocation and Receipts | Journey A (all checkpoints), Journey B (all checkpoints) | AC-001 and AC-002 exercised in continuous state; T-007-003 remains the unit-level safety net |\n| S-008-002 Postiz Scheduling and Publication Ledger | Journey C (all checkpoints) | AC-001 and AC-002 exercised in continuous state; T-008-002 remains the unit-level safety net |\n| S-009-004 Four-Week Whole-Product Proof | Journey C (all checkpoints) | AC-001 and AC-002 exercised in continuous state; T-009-004 remains the unit-level safety net |\n\nEvery AC across S-003-003, S-003-004, S-003-005, S-005-003, S-006-004, S-007-003, S-008-002, S-009-004 is verified by at least one continuous journey. No invented story behavior; T-NNN are not re-run at flow level.\n\n## Maestro implementation notes (for the QA Agent)\n\n- One Playwright Electron flow per journey, retaining product-team naming `TF-006-journey-a|b|c`; do not split state continuity.\n- Alt branches live in separate files such as `TF-006-journey-a-alt-permission-denied.spec.mjs` and reuse a shared seeded setup.\n- Map ✓ Verify checkpoints to semantic role/name assertions and canonical debug-receipt queries; use AI visual assertions only for non-deterministic media layout.\n- Capture one screenshot per ✓ Verify plus final state, and attach bound probe receipts HP-002, HP-003, HP-004, HP-006, HP-008.\n- Run the listed T-plan Unit/Harness cases as cheap CI prechecks before the full UI journey.\n- Never seed production credentials or creator content; use versioned representative fixtures and recorded provider responses.\n\n## Run Log\n\n| Run date | Build / commit | Trigger | Result | Failed journeys | Notes |\n|----------|----------------|---------|--------|-----------------|-------|\n| _no runs yet_ | — | — | — | — | Plan v1.0 created 2026-07-13 |\n"},{"rel":"qa/TF-009-schedule-and-publish.md","content":"# Flow Test Plan: Schedule and publish\n\n**ID:** TF-009\n**Project:** clark-pro\n**Flow:** [UF-009 Schedule and publish](../flows/UF-009-schedule-and-publish.md)\n**Type:** Flow regression — evergreen, re-run every release + nightly\n**Stage:** Active\n**Version:** 1.0\n**Created:** 2026-07-13\n**Updated:** 2026-07-13\n**Owner:** QA Agent (curated by PM)\n**Style:** Journeys\n\n> Each journey is one continuous UI/runtime session. Clark executes the product-team Maestro bucket through Playwright Electron while preserving journey IDs, shared setup, assertions, screenshots, and run-log evidence.\n\n---\n\n## Scope\n\nProtect the external-mutation safety boundary across account scope, exact approval, idempotent publication, reconciliation, and deterministic fallback export.\n\n**In scope:**\n- Cross-story state continuity, exact-version authority, interruption/recovery, provider ambiguity, and the bound health probes HP-004, HP-007.\n- All AC across S-008-001, S-008-002, S-008-003 at the journey level; story test plans remain unit safety nets.\n\n**Out of scope:**\n- Re-running every T-NNN case individually; TF is the journey-level test of record.\n- Production content, secrets, or real external mutation in nightly CI; sandbox/recorded providers mirror the contract.\n\n## Lifecycle & Cadence\n\n| Trigger | Action | Pass criteria |\n|---------|--------|---------------|\n| **Pre-release** | Run all journeys end-to-end on the release candidate build | All journeys complete successfully |\n| **Pre-ship (R-NNN Shipped)** | Re-run all journeys on production build | All complete |\n| **Nightly (post-launch)** | Run all journeys against production | Failures alert QA channel; ≥2 consecutive nightly fails escalate to PM |\n| **After any BUG fix lands on a touched story** | Re-run any journey whose Stories Covered list includes the BUG's story | Targeted journey passes |\n| **Flow diff** | When UF-NNN changes materially, bump TF-NNN version and update affected journeys | Plan stays in sync with the flow |\n\nThe QA Agent records every run in the Run Log.\n\n## Journey A — Connect an account and verify one live publication\n\n**Story arc:** A workspace admin connects a scoped account; the creator schedules an approved exact version and follows it to verified live state.\n\n**Stories covered:** S-008-001, S-008-002\n**ACs hit inline:** S-008-001/AC-001, S-008-001/AC-002; S-008-002/AC-001, S-008-002/AC-002\n**T-NNN backup (don't re-run):** T-008-001, T-008-002\n\n**Preconditions:**\n- The exact release fixture for UF-009 is seeded, the build/schema/consent state is recorded, and required sandbox providers are deterministic.\n- Bound health probes HP-004, HP-007 are queryable without exposing creative content or secrets.\n\n**The journey:**\n\n1. Open Connections and select the social provider.\n2. Review publisher, scopes, workspace grants, domains, cost, and trust state.\n3. ✓ Verify: no token material is rendered or stored in canonical events.\n4. Complete broker-owned authorization and health checks.\n5. Open Timeline and select the approved artifact.\n6. ✓ Verify: current platform schema, account health, disclosure, and exact approval are valid.\n7. Schedule the artifact and open Publication Approval.\n8. Submit the exact intent once.\n9. ✓ Verify: idempotency identity and provider receipt persist before observation.\n10. Observe until the fixture reports verified live.\n11. ✓ Verify: live URL/receipt reconcile to one intent and one artifact version.\n12. Revoke the account.\n13. ✓ Verify: future dependent work blocks and affected schedules are identified.\n14. Capture HP-004/HP-007 evidence.\n\n**Alt branch — permission, provider, or interruption denial:** Repeat the highest-authority action with the permission revoked or provider unavailable. ✓ Verify: no hidden mutation occurs, prior canonical state remains intact, and the journey rejoins through the named recovery/reconciliation/export path.\n\n**Failure indicators:**\n- Any cross-story handoff loses exact version, actor, evidence, permission, cost, state, or recovery context.\n- A bound probe (HP-004, HP-007) fails, an external mutation duplicates, or an unknown state is mislabeled terminal.\n- The UI appears complete while canonical, human, provider, or release evidence remains absent.\n\n---\n\n## Journey B — Reconcile an ambiguous provider outcome without duplication\n\n**Story arc:** A creator loses the provider response after submission, restarts Clark, and resolves the publication by observation rather than retry.\n\n**Stories covered:** S-008-002\n**ACs hit inline:** S-008-002/AC-001, S-008-002/AC-002\n**T-NNN backup (don't re-run):** T-008-002\n\n**Preconditions:**\n- The exact release fixture for UF-009 is seeded, the build/schema/consent state is recorded, and required sandbox providers are deterministic.\n- Bound health probes HP-004, HP-007 are queryable without exposing creative content or secrets.\n\n**The journey:**\n\n1. Seed an approved artifact and healthy account in Timeline.\n2. Submit through the response-loss-after-commit fixture.\n3. Terminate Harness before a response is recorded.\n4. Relaunch Clark and open Recovery Summary.\n5. ✓ Verify: the publication is classified needs_reconciliation, not failed or ready-to-retry.\n6. Open Reconciliation and inspect intent/last receipt.\n7. Run Check provider state.\n8. ✓ Verify: no new submit call occurs during observation.\n9. Resolve the provider fixture to live.\n10. ✓ Verify: exactly one verified publication exists and the original intent is terminal.\n11. Replay the same intent command.\n12. ✓ Verify: it returns the existing publication, not a duplicate.\n13. Capture the HP-007 receipt and provider call count.\n\n**Alt branch — permission, provider, or interruption denial:** Repeat the highest-authority action with the permission revoked or provider unavailable. ✓ Verify: no hidden mutation occurs, prior canonical state remains intact, and the journey rejoins through the named recovery/reconciliation/export path.\n\n**Failure indicators:**\n- Any cross-story handoff loses exact version, actor, evidence, permission, cost, state, or recovery context.\n- A bound probe (HP-004, HP-007) fails, an external mutation duplicates, or an unknown state is mislabeled terminal.\n- The UI appears complete while canonical, human, provider, or release evidence remains absent.\n\n---\n\n## Journey C — Export safely when automation cannot proceed\n\n**Story arc:** A creator encounters a connector outage, exports a complete platform-valid package, performs the human handoff, and records the assisted result distinctly.\n\n**Stories covered:** S-008-003\n**ACs hit inline:** S-008-003/AC-001, S-008-003/AC-002\n**T-NNN backup (don't re-run):** T-008-003\n\n**Preconditions:**\n- The exact release fixture for UF-009 is seeded, the build/schema/consent state is recorded, and required sandbox providers are deterministic.\n- Bound health probes HP-004, HP-007 are queryable without exposing creative content or secrets.\n\n**The journey:**\n\n1. Open Timeline with an approved artifact and an unavailable connector.\n2. Choose the documented export fallback.\n3. ✓ Verify: Export Package names exact artifact version, platform, metadata, disclosures, and lineage.\n4. Build the deterministic package.\n5. ✓ Verify: media/copy/metadata/checksums/instructions pass local validation.\n6. Inspect the manifest and compare it with canonical provenance.\n7. Complete the manual platform handoff in the sandbox.\n8. Record the assisted result and live URL/receipt.\n9. ✓ Verify: the publication state is assisted/exported, not falsely labeled direct API verified.\n10. Repeat package generation.\n11. ✓ Verify: equivalent inputs produce the same manifest/checksums.\n12. Return to Timeline and inspect the final state.\n13. Capture export and assisted-result evidence.\n\n**Alt branch — permission, provider, or interruption denial:** Repeat the highest-authority action with the permission revoked or provider unavailable. ✓ Verify: no hidden mutation occurs, prior canonical state remains intact, and the journey rejoins through the named recovery/reconciliation/export path.\n\n**Failure indicators:**\n- Any cross-story handoff loses exact version, actor, evidence, permission, cost, state, or recovery context.\n- A bound probe (HP-004, HP-007) fails, an external mutation duplicates, or an unknown state is mislabeled terminal.\n- The UI appears complete while canonical, human, provider, or release evidence remains absent.\n\n---\n\n## Coverage matrix\n\n| Story | All ACs covered by | Notes |\n|-------|--------------------|-------|\n| S-008-001 Social Account and Credential Center | Journey A (all checkpoints) | AC-001 and AC-002 exercised in continuous state; T-008-001 remains the unit-level safety net |\n| S-008-002 Postiz Scheduling and Publication Ledger | Journey A (all checkpoints), Journey B (all checkpoints) | AC-001 and AC-002 exercised in continuous state; T-008-002 remains the unit-level safety net |\n| S-008-003 Assisted Handoff and Deterministic Export | Journey C (all checkpoints) | AC-001 and AC-002 exercised in continuous state; T-008-003 remains the unit-level safety net |\n\nEvery AC across S-008-001, S-008-002, S-008-003 is verified by at least one continuous journey. No invented story behavior; T-NNN are not re-run at flow level.\n\n## Maestro implementation notes (for the QA Agent)\n\n- One Playwright Electron flow per journey, retaining product-team naming `TF-009-journey-a|b|c`; do not split state continuity.\n- Alt branches live in separate files such as `TF-009-journey-b-alt-provider-unavailable.spec.mjs` and reuse a shared seeded setup.\n- Map ✓ Verify checkpoints to semantic role/name assertions and canonical debug-receipt queries; use AI visual assertions only for non-deterministic media layout.\n- Capture one screenshot per ✓ Verify plus final state, and attach bound probe receipts HP-004, HP-007.\n- Run the listed T-plan Unit/Harness cases as cheap CI prechecks before the full UI journey.\n- Never seed production credentials or creator content; use versioned representative fixtures and recorded provider responses.\n\n## Run Log\n\n| Run date | Build / commit | Trigger | Result | Failed journeys | Notes |\n|----------|----------------|---------|--------|-----------------|-------|\n| _no runs yet_ | — | — | — | — | Plan v1.0 created 2026-07-13 |\n"},{"rel":"qa/TF-015-mac-sleeps-quits-or-crashes.md","content":"# Flow Test Plan: Mac sleeps, quits, or crashes\n\n**ID:** TF-015\n**Project:** clark-pro\n**Flow:** [UF-015 Mac sleeps, quits, or crashes](../flows/UF-015-mac-sleeps-quits-or-crashes.md)\n**Type:** Flow regression — evergreen, re-run every release + nightly\n**Stage:** Active\n**Version:** 1.0\n**Created:** 2026-07-13\n**Updated:** 2026-07-13\n**Owner:** QA Agent (curated by PM)\n**Style:** Journeys\n\n> Each journey is one continuous UI/runtime session. Clark executes the product-team Maestro bucket through Playwright Electron while preserving journey IDs, shared setup, assertions, screenshots, and run-log evidence.\n\n---\n\n## Scope\n\nProtect continuity when the renderer, Harness, Mac, client, provider, relay, or hosted worker disappears while work, approval, or publication is in flight.\n\n**In scope:**\n- Cross-story state continuity, exact-version authority, interruption/recovery, provider ambiguity, and the bound health probes HP-001, HP-002, HP-003, HP-005, HP-007, HP-009, HP-010.\n- All AC across S-002-002, S-004-003, S-008-002, S-009-003, S-009-005 at the journey level; story test plans remain unit safety nets.\n\n**Out of scope:**\n- Re-running every T-NNN case individually; TF is the journey-level test of record.\n- Production content, secrets, or real external mutation in nightly CI; sandbox/recorded providers mirror the contract.\n\n## Lifecycle & Cadence\n\n| Trigger | Action | Pass criteria |\n|---------|--------|---------------|\n| **Pre-release** | Run all journeys end-to-end on the release candidate build | All journeys complete successfully |\n| **Pre-ship (R-NNN Shipped)** | Re-run all journeys on production build | All complete |\n| **Nightly (post-launch)** | Run all journeys against production | Failures alert QA channel; ≥2 consecutive nightly fails escalate to PM |\n| **After any BUG fix lands on a touched story** | Re-run any journey whose Stories Covered list includes the BUG's story | Targeted journey passes |\n| **Flow diff** | When UF-NNN changes materially, bump TF-NNN version and update affected journeys | Plan stays in sync with the flow |\n\nThe QA Agent records every run in the Run Log.\n\n## Journey A — Recover local work at every durable gate\n\n**Story arc:** A creator starts work from Studio and Bridge, kills the relevant process at a checkpoint, and returns to the same run/review identity with no duplicate.\n\n**Stories covered:** S-002-002, S-004-003\n**ACs hit inline:** S-002-002/AC-001, S-002-002/AC-002; S-004-003/AC-001, S-004-003/AC-002\n**T-NNN backup (don't re-run):** T-002-002, T-004-003\n\n**Preconditions:**\n- The exact release fixture for UF-015 is seeded, the build/schema/consent state is recorded, and required sandbox providers are deterministic.\n- Bound health probes HP-001, HP-002, HP-003, HP-005, HP-007, HP-009, HP-010 are queryable without exposing creative content or secrets.\n\n**The journey:**\n\n1. Start a fixture run from Focus and note run/intent/artifact identities.\n2. Pair a scoped Bridge client and attach it to the same workspace.\n3. Interrupt Harness during a running step.\n4. Relaunch Clark and open Recovery Summary.\n5. ✓ Verify: the step is classified, orphan lease revoked, and exact plan/checkpoint retained.\n6. Reconnect the Bridge client with the same intent.\n7. ✓ Verify: it receives the existing durable job rather than creating another.\n8. Resume to a waiting Review gate.\n9. Quit the renderer while Harness remains alive.\n10. Reopen Studio.\n11. ✓ Verify: the same review context and exact artifact version appear.\n12. Delete/rebuild projections in the test harness.\n13. ✓ Verify: state and event-chain integrity reproduce identically.\n14. Capture HP-001/002/003/005 evidence.\n\n**Alt branch — permission, provider, or interruption denial:** Repeat the highest-authority action with the permission revoked or provider unavailable. ✓ Verify: no hidden mutation occurs, prior canonical state remains intact, and the journey rejoins through the named recovery/reconciliation/export path.\n\n**Failure indicators:**\n- Any cross-story handoff loses exact version, actor, evidence, permission, cost, state, or recovery context.\n- A bound probe (HP-001, HP-002, HP-003, HP-005, HP-007, HP-009, HP-010) fails, an external mutation duplicates, or an unknown state is mislabeled terminal.\n- The UI appears complete while canonical, human, provider, or release evidence remains absent.\n\n---\n\n## Journey B — Let only explicitly delegated work continue during sleep\n\n**Story arc:** A workspace admin delegates one sensitivity-safe job, sleeps the Mac, revokes the worker, and confirms unrelated personal authority and local continuity remain protected.\n\n**Stories covered:** S-009-003, S-009-005\n**ACs hit inline:** S-009-003/AC-001, S-009-003/AC-002; S-009-005/AC-001, S-009-005/AC-002\n**T-NNN backup (don't re-run):** T-009-003, T-009-005\n\n**Preconditions:**\n- The exact release fixture for UF-015 is seeded, the build/schema/consent state is recorded, and required sandbox providers are deterministic.\n- Bound health probes HP-001, HP-002, HP-003, HP-005, HP-007, HP-009, HP-010 are queryable without exposing creative content or secrets.\n\n**The journey:**\n\n1. Open Run Approval for a remote-eligible job.\n2. Inspect named workspace, inputs, credential lease, capabilities, sensitivity, expiry, and worker identity.\n3. Approve the exact envelope and put the Mac to sleep.\n4. ✓ Verify: local-only jobs pause while only the delegated job continues.\n5. Wake the Mac and open Recovery Summary.\n6. ✓ Verify: the signed worker result is validated before canonical append.\n7. Attempt unrelated memory/credential access from the worker fixture.\n8. ✓ Verify: access is denied and audited.\n9. Revoke the worker and replay the envelope.\n10. ✓ Verify: replay/revoked access fails.\n11. Disable hosted relay/worker service.\n12. Open the local workspace and export it.\n13. ✓ Verify: complete local access/export work without cross-tenant exposure.\n14. Capture HP-010 and local continuity evidence.\n\n**Alt branch — permission, provider, or interruption denial:** Repeat the highest-authority action with the permission revoked or provider unavailable. ✓ Verify: no hidden mutation occurs, prior canonical state remains intact, and the journey rejoins through the named recovery/reconciliation/export path.\n\n**Failure indicators:**\n- Any cross-story handoff loses exact version, actor, evidence, permission, cost, state, or recovery context.\n- A bound probe (HP-001, HP-002, HP-003, HP-005, HP-007, HP-009, HP-010) fails, an external mutation duplicates, or an unknown state is mislabeled terminal.\n- The UI appears complete while canonical, human, provider, or release evidence remains absent.\n\n---\n\n## Journey C — Reconcile publication before any recovered retry\n\n**Story arc:** A creator submits a publication immediately before crash, then uses recovery and provider observation to prove the outcome before any retry is possible.\n\n**Stories covered:** S-002-002, S-008-002\n**ACs hit inline:** S-002-002/AC-001, S-002-002/AC-002; S-008-002/AC-001, S-008-002/AC-002\n**T-NNN backup (don't re-run):** T-002-002, T-008-002\n\n**Preconditions:**\n- The exact release fixture for UF-015 is seeded, the build/schema/consent state is recorded, and required sandbox providers are deterministic.\n- Bound health probes HP-001, HP-002, HP-003, HP-005, HP-007, HP-009, HP-010 are queryable without exposing creative content or secrets.\n\n**The journey:**\n\n1. Seed one approved artifact and healthy account.\n2. Submit the publication intent.\n3. Crash after provider commit but before Clark records the response.\n4. Relaunch Clark.\n5. ✓ Verify: Recovery Summary identifies an ambiguous publication intent.\n6. Open Reconciliation.\n7. Inspect intent, last local receipt, provider identity, and retry safety.\n8. Run provider observation.\n9. ✓ Verify: no submit retry fires while state is unknown.\n10. Resolve fixture to verified live or proven not submitted.\n11. If live, terminalize the original intent; if absent, request a fresh explicit retry decision.\n12. ✓ Verify: one outcome and one canonical intent; no duplicate.\n13. Run backup/restore fixture and inspect the publication state after restore.\n14. Capture HP-007/HP-009 evidence.\n\n**Alt branch — permission, provider, or interruption denial:** Repeat the highest-authority action with the permission revoked or provider unavailable. ✓ Verify: no hidden mutation occurs, prior canonical state remains intact, and the journey rejoins through the named recovery/reconciliation/export path.\n\n**Failure indicators:**\n- Any cross-story handoff loses exact version, actor, evidence, permission, cost, state, or recovery context.\n- A bound probe (HP-001, HP-002, HP-003, HP-005, HP-007, HP-009, HP-010) fails, an external mutation duplicates, or an unknown state is mislabeled terminal.\n- The UI appears complete while canonical, human, provider, or release evidence remains absent.\n\n---\n\n## Coverage matrix\n\n| Story | All ACs covered by | Notes |\n|-------|--------------------|-------|\n| S-002-002 Durable Event Store and Run Recovery | Journey A (all checkpoints), Journey C (all checkpoints) | AC-001 and AC-002 exercised in continuous state; T-002-002 remains the unit-level safety net |\n| S-004-003 Durable Bridge Tasks and Client Pairing | Journey A (all checkpoints) | AC-001 and AC-002 exercised in continuous state; T-004-003 remains the unit-level safety net |\n| S-008-002 Postiz Scheduling and Publication Ledger | Journey C (all checkpoints) | AC-001 and AC-002 exercised in continuous state; T-008-002 remains the unit-level safety net |\n| S-009-003 Scoped Remote Workers and Schedules | Journey B (all checkpoints) | AC-001 and AC-002 exercised in continuous state; T-009-003 remains the unit-level safety net |\n| S-009-005 Release, Hosted Continuity, and Tenant Isolation | Journey B (all checkpoints) | AC-001 and AC-002 exercised in continuous state; T-009-005 remains the unit-level safety net |\n\nEvery AC across S-002-002, S-004-003, S-008-002, S-009-003, S-009-005 is verified by at least one continuous journey. No invented story behavior; T-NNN are not re-run at flow level.\n\n## Maestro implementation notes (for the QA Agent)\n\n- One Playwright Electron flow per journey, retaining product-team naming `TF-015-journey-a|b|c`; do not split state continuity.\n- Alt branches live in separate files such as `TF-015-journey-c-alt-reconciliation-unavailable.spec.mjs` and reuse a shared seeded setup.\n- Map ✓ Verify checkpoints to semantic role/name assertions and canonical debug-receipt queries; use AI visual assertions only for non-deterministic media layout.\n- Capture one screenshot per ✓ Verify plus final state, and attach bound probe receipts HP-001, HP-002, HP-003, HP-005, HP-007, HP-009, HP-010.\n- Run the listed T-plan Unit/Harness cases as cheap CI prechecks before the full UI journey.\n- Never seed production credentials or creator content; use versioned representative fixtures and recorded provider responses.\n\n## Run Log\n\n| Run date | Build / commit | Trigger | Result | Failed journeys | Notes |\n|----------|----------------|---------|--------|-----------------|-------|\n| _no runs yet_ | — | — | — | — | Plan v1.0 created 2026-07-13 |\n"},{"rel":"README.md","content":"# Clark Pro Requirements\n\nClark Pro is a Mac-first, memory-native creator operating system that connects intent, evidence, creation, review, distribution, outcomes, memory, and governed reusable capabilities in one local-first workspace.\n\n**Status:** Active\n\n## Linked Repos\n\n| Role | Repository |\n|------|------------|\n| Requirements and implementation | [shubhamdasdev/Clark-pro](https://github.com/shubhamdasdev/Clark-pro) |\n| Product Team framework | [openron/product-team](https://github.com/openron/product-team) |\n\n## Structure\n\n| Path | Contents |\n|------|----------|\n| [brief.md](brief.md) | Product problem, north star, roles, personas, scope, and constraints |\n| [epics/](epics/) | Nine outcome epics and 42 evidence-reconciled stories |\n| [releases/](releases/) | Current QA release and the next single-user and whole-product queues |\n| [index.yaml](index.yaml) | Generated project map used by Product Team and the live board |\n| [research/history/](research/history/) | Archived authoritative inputs and implementation evidence used for this import |\n\n## Getting Started\n\nFrom the Product Team folder, run `pm board clark-pro --port 3000`. The board watches these Markdown files, so story Status and Stage changes appear without a manual refresh.\n"},{"rel":"reference/analytics.md","content":"# Analytics Plan — Clark Pro\n\n**Project:** clark-pro\n**Version:** 1.0\n**Updated:** 2026-07-13\n\n> Product-behaviour measurement. Operational reliability, logs, traces, audit, and SLO signals live in `observability.md`. Analytics export is governed by the same local-first consent posture: no event leaves the Mac without explicit opt-in.\n\n---\n\n## Analytics Platform\n\n| Concern | Decision | Notes |\n|---------|----------|-------|\n| Event collection | Clark-owned product-event mapper from committed domain events to a privacy-safe local SQLite projection | Server/Harness-side after canonical commit; the renderer never becomes the event source of truth |\n| Local analysis | DuckDB over a user-approved Parquet export of the analytics projection | Portable, inspectable, no mandatory account or cloud |\n| Product dashboard | Embedded Clark Metrics screen using typed SQL views and Apache ECharts | Charts always have accessible table, definition, freshness, and sample count |\n| Optional team sink | PostHog, only after explicit opt-in and allowlist/canary approval | Useful funnels/retention; never receives creative content or raw canonical IDs |\n| Client vs. server | Harness-side preferred; UI events only for clearly defined inspection actions | Outcome events fire after durable commit, not button click or render |\n\n## Naming Conventions\n\n- Events are past-tense `snake_case` outcome phrases.\n- `user_id` and timestamp are implicit locally; optional export uses a rotating pseudonymous installation key, never an account email or workspace ID.\n- Properties are bounded enums or booleans. No UUIDs, raw URLs, paths, account names, artifact/source/memory text, prompt/completion, tokens, or free-form notes.\n- An event fires once after the canonical state transition. Retry, replay, projection rebuild, or UI remount must not double-fire.\n- Event schema version and app release are transport metadata, not ad-hoc properties.\n\n## User Dimensions\n\n| Dimension | Type | Description | Set When | Cardinality note |\n|-----------|------|-------------|----------|------------------|\n| `operator_role` | enum | Role context for the action: creator, workspace_admin, reviewer, external_agent, team_member | command actor is resolved | 5 values |\n| `workspace_mode` | enum | personal_local or shared_team | workspace created/imported | 2 values |\n| `installation_cohort_month` | string YYYY-MM | Local activation cohort for retention analysis | first successful workspace setup | ~12 values/year |\n| `release_channel` | enum | development, alpha, beta, stable | build start | 4 values |\n| `analytics_export_opt_in` | bool | Whether privacy-safe product events may leave the Mac | consent change | 2 values; false by default |\n| `creator_experience_band` | enum | first_week, establishing, recurring | derived from completed weekly cycles | 3 values; no raw count exported |\n\n## Core Funnel\n\n| Step | Event | Source | Meaning |\n|------|-------|--------|---------|\n| 1 | `idea_revision_created` | AE-003 | Intent entered canonical lineage |\n| 2 | `creation_loop_completed` | AE-003 | Bounded creator work produced persisted outputs |\n| 3 | `artifact_version_approved` | AE-003 | Exact work passed creator/policy review |\n| 4 | `publication_terminalized` | AE-008 | External intent reached a known state or explicit reconciliation |\n| 5 | `observation_reviewed` | AE-008 | Outcome evidence was inspected with limitations |\n| 6 | `memory_proposal_decided` or `strategy_proposal_decided` | AE-005 / AE-008 | Learning changed only through a visible decision |\n| 7 | `weekly_cycle_completed` | AE-009 | Whole capture-to-learning cycle evidence finalized |\n\n## Metric Catalogue\n\n| Metric | Definition | Events / source | Target |\n|--------|------------|-----------------|--------|\n| First-value activation | installations with idea revision → approved artifact in first cohort window | AE-003 funnel | Establish baseline |\n| Weekly whole-cycle completion | completed weekly cycles by creator experience band | `weekly_cycle_completed` | 4 consecutive representative cycles before 1.0 (product exit gate) |\n| Publishability | approved artifacts judged publishable with normal editing / reviewed artifacts | validation evidence + `artifact_version_approved` | At least 80% in Stratum 3 validation (existing product gate) |\n| Mutation receipt completeness | paid/mutating actions with permission + provenance receipt / all such actions | canonical audit projection | 100% |\n| Publication ambiguity | intents without explicit terminal or reconciliation state | `publication_terminalized` + publication projection | 0 |\n| Duplicate verified publication | duplicate live outcomes per intent | publication projection + HP-007 | 0 |\n| Recovery continuity | interrupted runs recovered/paused/reconciled without duplicate / supported interruptions | `run_recovery_completed` | 100% supported states |\n| Evidence honesty | reviewed claims blocked or explicitly asserted when source absent | AE-003 + claim ledger | 100% final factual assertions supported or explicit creator assertion |\n| Memory governance | proposal decision mix and forgotten-item retrieval leakage | AE-005 + memory corpus | leakage 0; decision mix baseline first |\n| Reuse-first proof | real external Tool Pack runs with complete evidence and rollback | AE-006 | At least 1 before production creation gate |\n| Skill receipt coverage | production invocations with exact revision/permission/cost receipt | AE-007 | 100% after invocation ships |\n| Sync convergence | multi-device fixtures converged without last-write-wins loss | AE-009 | 100% fixtures; last-write-wins loss 0 |\n\n## Dashboard Requirements\n\n### Creator Loop and North Star\n\n**Controls:** date range (7d, 28d, quarter, all), installation cohort month, experience band, workspace mode, release channel, refresh/last-updated.\n\n**Display order:** weekly-cycle scorecard and trend → seven-step core funnel with step conversion → time-between-step distribution → approved artifact/publishability table → publication route/state stack → observation-to-decision conversion. Sources: local analytics SQL views over AE-003, AE-005, AE-008, AE-009.\n\n### Trust and Governance\n\n**Controls:** date range, operator role, release, trust surface (credential, capability, Tool Pack, Skill, memory, publication, team).\n\n**Display order:** receipt completeness scorecard → blocked/denied decision trend → Tool Pack eligibility/activation funnel → Skill promotion/invocation/regression funnel → memory decision mix → publication ambiguity/duplicate table. Sources: AE-002, AE-004–008 plus canonical audit completeness view.\n\n### Release and Validation\n\n**Controls:** release, build, evidence class, story/epic, result, last-updated.\n\n**Display order:** Ground evidence status → creator walkthrough outcomes → release trust gates → recovery/restore evidence → conformance results → whole-week evidence table. Sources: AE-001, AE-002, AE-004, AE-006, AE-007, AE-009.\n\n## Epic Analytics Docs\n\n| Doc | Epic | Events |\n|-----|------|--------|\n| AE-001 | E-001 Contracts and Product Proof | `ground_evidence_updated`, `creator_validation_completed`, `ground_signoff_decided` |\n| AE-002 | E-002 Native Studio and Durable Harness | `run_recovery_completed`, `workspace_restore_completed`, `release_trust_gate_completed` |\n| AE-003 | E-003 Idea Foundry and Creation Studio | `idea_revision_created`, `artifact_version_approved`, `creation_loop_completed` |\n| AE-004 | E-004 MCP and Clark Bridge | `bridge_mutation_completed`, `bridge_job_reconnected`, `client_conformance_completed` |\n| AE-005 | E-005 Governed Creator Memory | `memory_proposal_decided`, `memory_forget_completed`, `memory_influence_inspected` |\n| AE-006 | E-006 Reuse-First Tool Packs | `tool_pack_evaluated`, `tool_pack_revision_activated`, `external_tool_pack_run_completed` |\n| AE-007 | E-007 Governed Agent Skills | `skill_revision_decided`, `skill_invocation_completed`, `skill_regression_evaluated` |\n| AE-008 | E-008 Distribution and Observation | `publication_terminalized`, `observation_reviewed`, `strategy_proposal_decided` |\n| AE-009 | E-009 Team and Whole-Product Release | `workspace_sync_converged`, `weekly_cycle_completed`, `hosted_continuity_verified` |\n\n## Implementation Notes\n\n1. Find the story’s parent epic and read its `AE-NNN.md`.\n2. Implement only rows whose Story column matches the story.\n3. Fire after the canonical commit or completed inspection named in Trigger; never on render, click intent, retry, replay, or projection rebuild.\n4. Validate event name, properties, enum values, one-fire semantics, and PII/content absence with the story’s `Automation: Analytics` test case.\n5. Keep the local analytics projection rebuildable from canonical events without turning analytics rows into canonical product state.\n6. Remote export stays off by default and passes the ADR-0018 canary corpus before release.\n"},{"rel":"reference/arch.md","content":"# Technical Architecture — Clark Pro\n\n**Project:** clark-pro\n**Version:** 1.0\n**Updated:** 2026-07-13\n**Sources:** [Full architecture](../../clark-pro/architecture.md), [Implementation contracts](../../clark-pro/product/04-architecture-and-tech-stack.md), [ADR registry](../../clark-pro/decisions/README.md)\n\n---\n\n## Architecture Thesis\n\nClark Pro is a local-first Mac creator operating system with a durable isolated Harness. The Mac owns canonical identity, event history, artifacts, memory, credentials, approvals, and policy decisions. Models, MCP servers, Tool Packs, social platforms, and optional workers are replaceable execution dependencies behind versioned contracts.\n\nThe permanent topology already exists in bounded form: Electron main/preload/renderer boundaries, a supervised TypeScript Harness utility process, JSON Schema 2020-12 contracts and generated types, SQLite/WAL canonical events and replayable projections, content-addressed assets, governed MCP, memory, Tool Pack, and Skill projections. Later releases extend this topology; they do not introduce a browser-owned or cloud-owned second state model.\n\n## Runtime Topology\n\n```mermaid\nflowchart TB\n  Creator[\"Creator / reviewer / workspace admin\"] --> Studio[\"Clark Studio — Electron + React renderer\"]\n  Studio -->|\"typed allowlisted IPC\"| Main[\"Electron main + preload boundary\"]\n  Main -->|\"private validated MessagePort\"| Harness[\"Clark Harness — TypeScript utility process\"]\n  Harness --> Domain[\"Domain contracts + command/policy layer\"]\n  Domain --> Events[(\"SQLite/WAL immutable events + projections\")]\n  Domain --> Assets[(\"Content-addressed local asset store\")]\n  Domain --> Broker[\"macOS Keychain credential broker\"]\n  Harness --> Capabilities[\"Capability adapters: MCP / API / CLI / local / file\"]\n  Capabilities --> Packs[\"Quarantined Tool Packs and Skill sandbox\"]\n  Capabilities --> Providers[\"Model, media, Postiz, social providers\"]\n  Harness --> Bridge[\"Clark Bridge — localhost MCP server\"]\n  External[\"Scoped external agent\"] --> Bridge\n  Harness -. \"explicit encrypted job envelope\" .-> Worker[\"Optional remote worker / relay\"]\n  Worker -. \"signed result + encrypted workspace events\" .-> Harness\n```\n\n## Technology Decisions\n\n| Layer | Decision | Why it fits Clark |\n|-------|----------|-------------------|\n| Mac shell | Electron, signed/notarized, Hardened Runtime | Native Mac surface plus TypeScript MCP/agent ecosystem and React Flow |\n| Renderer | React + TypeScript + Vite; React Flow; Zustand only for transient UI | No SSR; canonical state remains in Harness projections |\n| Process boundary | Sandboxed renderer, context isolation, named preload methods, sender validation | Renderer has no ambient filesystem, shell, network credential, or raw IPC authority |\n| Harness | Supervised TypeScript utility process/local daemon | Long work and recovery survive renderer reload; provider failures remain isolated |\n| Contracts | JSON Schema 2020-12, generated TypeScript, Ajv runtime validation | One schema authority across IPC, persistence, Bridge, packages, and history |\n| Persistence | SQLite WAL repositories, immutable events, deterministic projections | Portable single-user canonical truth with recovery and audit |\n| Assets | SHA-256 content-addressed objects plus typed metadata and previews | Integrity, deduplication, export, and future encrypted mirroring |\n| Secrets | macOS Keychain broker and short-lived scoped leases | Raw credentials never enter renderer, ordinary database rows, logs, or prompts |\n| Search / memory | SQLite FTS; bounded vector extension only for similarity retrieval | Structured, inspectable memory remains primary |\n| Media | Isolated ffmpeg/ffprobe and provider workers | Deterministic validation with resource/time ceilings |\n| Integrations | Capability contract beneath governed Tool Packs and Skills | Reuse excellent open-source engines without adopting their schema or authority |\n| Observability | Clark allowlist schemas + manual OpenTelemetry instrumentation; local by default | Vendor-neutral diagnostics without silent content exfiltration |\n| Hosted evolution | Encrypted event relay, content-addressed mirror, scoped signed worker envelopes | Adds continuity/team work while personal local replica remains usable and canonical |\n\n## Trust Boundaries\n\n| Boundary | Allowed | Explicitly forbidden |\n|----------|---------|----------------------|\n| Renderer → preload | Named schema-validated queries/commands | Raw IPC channels, executable strings, secret values, arbitrary paths/network |\n| Main → Harness | Validated command envelopes over a private port | Unscoped environment inheritance or renderer-originated process commands |\n| Harness → credential broker | Opaque credential reference and short lease | Credential values in domain events, logs, graph JSON, model context |\n| Harness → capability | Exact revision, bounded input, intent, permission/budget lease | Ambient workspace access, undeclared egress, silent retry after ambiguous mutation |\n| Tool Pack / Skill → runtime | Intersection of package declaration, creator ceiling, workspace policy, run grant | Trust by installation, permission expansion, canonical-model replacement |\n| Local → remote worker | Signed, expiring, sensitivity-scoped job envelope | Whole-Keychain copy, unrelated memory, permanent broad authority |\n| External client → Bridge | Local pairing, bearer outside renderer, workspace/tool/resource scope | Cross-workspace reads, approval authority by default, direct database access |\n\n## Canonical Data and Recovery\n\nEvery accepted command appends a versioned event with actor, command, workspace, aggregate version, timestamp, and typed payload. Aggregate versions prevent accidental overwrites. Projection checkpoints are disposable and replayable. Per-workspace event-chain integrity, exact run-plan hashes, input hashes, intent IDs, provider job IDs, and content hashes provide recovery anchors.\n\n- Artifact versions append; canonical selection is a decision event.\n- Publication intent, provider submission, and verified live state remain distinct.\n- Memory and Skill proposals stay inactive until an explicit revision-specific decision.\n- Needs-reconciliation never blind-retries.\n- Restore validates authentication, manifest, hashes, paths, schemas, and migration preview before canonical mutation.\n\n## Integration and Plugin-First Boundary\n\nClark uses the accepted integration ladder: MCP → stable CLI → HTTP API → supported library → WASM component → supervised sidecar → typed file handoff → isolated browser automation → maintained fork. A Tool Pack is the installable governance unit that binds immutable source, license/SBOM/provenance, vulnerability evidence, adapter/capability revisions, converters, safe UI, compatibility, migrations, tests, updates, and rollback.\n\nOpenCut remains a useful architecture reference and a pinned `blocked_upstream` fixture. Until a reviewed revision exposes a stable supported interface, Clark grants it no executable component. This prevents “plugin-first” from becoming “run arbitrary Git repositories.”\n\n## Non-Functional Requirements\n\n| Concern | Requirement | Evidence path |\n|---------|-------------|---------------|\n| Privacy | No telemetry or crash upload leaves the Mac before explicit opt-in/action; allowlist attributes only | ADR-0018 canary corpus and network capture |\n| Durability | Forced termination at every supported run/publication state preserves exact identity and avoids duplicate mutation | Harness chaos fixtures + TF-015 |\n| Portability | Encrypted age-v1 backups restore on a clean Mac with independent tooling and no raw secrets | ADR-0019 fixtures + T-002-003 |\n| Accessibility | Keyboard and VoiceOver reach/announce every critical action and state; 200% zoom/reduced motion supported | S-002-005 and DS specs |\n| Performance | Baseline p50/p95/p99 locally before setting targets; 50-object Canvas fixture remains responsive | Observability dashboard + S-002-005 |\n| Security | Signed/notarized build, Hardened Runtime, scoped Keychain leases, supply-chain gates, sandbox hostile corpus | R-002 architecture gate and release QA |\n| Availability | Personal local operation and complete export remain usable during hosted outage | S-009-005, HP-010, TF-015 |\n| Compatibility | Every supported capability, Bridge client, Tool Pack, Skill, schema, migration, and rollback has versioned conformance evidence | Contract/MCP/package suites |\n\n## Architecture Deep Dives\n\n| Doc | Decision | Main consumers |\n|-----|----------|----------------|\n| [ARCH-001](arch/ARCH-001-local-runtime-and-trust-boundaries.md) | Permanent local process and authority topology | E-002, E-004 |\n| [ARCH-002](arch/ARCH-002-event-state-recovery-and-reconciliation.md) | Event state, exact-version recovery, and ambiguous mutation handling | E-002, E-003, E-008 |\n| [ARCH-003](arch/ARCH-003-governed-extension-execution.md) | Capability, Tool Pack, Skill, media, and external-engine isolation | E-004, E-006, E-007 |\n| [ARCH-004](arch/ARCH-004-encrypted-sync-remote-work-and-hosted-evolution.md) | Team sync, device identity, remote workers, and tenant boundaries | E-009 |\n\n## Release Architecture Sequence\n\n| Release | Foundation before story work | Gate outcome |\n|---------|------------------------------|--------------|\n| R-001 Local Trust Core | Existing executable contract, boundary, event, MCP, memory, Tool Pack, and Skill evidence | QA validates the already-built bounded core; no new infrastructure gate |\n| R-002 Single-User Creator Alpha | Release security/Keychain, portable restore, isolated external execution, privacy-safe observability | Closed until AT-002-001…004 are Done |\n| R-003 Whole-Product Beta | Distribution/reconciliation, encrypted relay/sync, hosted isolation and operational telemetry | Closed until AT-003-001…003 are Done |\n"},{"rel":"reference/arch/ARCH-001-local-runtime-and-trust-boundaries.md","content":"# Architecture: Local Runtime and Trust Boundaries\n\n**ID:** ARCH-001\n**Project:** clark-pro\n**Type:** System Design\n**Version:** 1.0\n**Updated:** 2026-07-13\n**Sources:** [Architecture](../../../clark-pro/architecture.md), [Implementation contracts](../../../clark-pro/product/04-architecture-and-tech-stack.md)\n\n---\n\n## Purpose\n\nDefine the permanent Mac process topology and the authority boundary that every UI, credential, capability, Bridge, and package story must preserve.\n\nConnected stories: `S-002-001`, `S-002-004`, `S-004-001`, `S-004-002`, `S-004-003`, `S-008-001`, `S-009-005`. Connected flows: UF-001, UF-002, UF-013.\n\n## The Goal\n\nA compromised or malformed renderer can display bad pixels, but it cannot directly read secrets, execute arbitrary commands, mutate canonical state, or grant capability authority.\n\n## Current State\n\nThe bounded Ground implementation proves the Electron/Harness/event/contract shape for selected stories. Production signing, complete provider execution, broad creator loops, remote sync, and hosted operations remain release-gated rather than assumed complete.\n\n## Architectural Decision\n\n### Decision\n\nKeep Electron main/preload as a narrow native boundary and place all domain commands, credentials, capabilities, packages, and long-running work in a supervised Harness process. Renderer state is a projection and may never become an authority source.\n\n### Rationale\n\nThis decision preserves local canonical ownership, exact-version provenance, inspectable authority, deterministic recovery, and replaceable dependencies while allowing each release to extend the same contracts.\n\n### Alternatives Considered\n\n| Approach | Why Rejected |\n|----------|--------------|\n| Node-enabled renderer | Collapses the most important trust boundary and makes any content-rendering bug a credential/execution bug. |\n| One Electron main process for all work | Provider, media, or agent failure would threaten UI lifecycle and recovery. |\n| Required cloud API | Violates offline ownership and makes personal canonical operation dependent on a service. |\n\n## Design\n\n```mermaid\nflowchart LR\n  Renderer[\"Sandboxed renderer\"] -->|\"named typed methods\"| Preload[\"Allowlisted preload\"]\n  Preload --> Main[\"Electron main\"]\n  Main -->|\"private validated port\"| Harness[\"Harness utility process\"]\n  Harness --> Commands[\"Command + policy layer\"]\n  Commands --> Store[(\"Events / projections / assets\")]\n  Harness --> Broker[\"Keychain broker\"]\n  Harness --> Adapters[\"Scoped capability adapters\"]\n  Renderer -. \"forbidden\" .-> Broker\n  Renderer -. \"forbidden\" .-> Adapters\n```\n\n## Constraints & Non-Goals\n\n- No raw filesystem, shell, credential, network, MCP transport, or Harness port in renderer.\n- Main owns lifecycle/native integration, not business execution.\n- Localhost Bridge exposure beyond local requires TLS, scoped authentication, and explicit action.\n- This architecture does not claim that a planned provider, Tool Pack, remote service, or hosted control already exists.\n\n## Implementation Notes\n\n- Use schema validation on both sides of IPC and sender/origin validation in main.\n- Pass opaque credential references; issue short-lived leases only inside Harness execution.\n- Tag every log/span with process type and release, never raw workspace content.\n- Emit only allowlisted operational telemetry with correlation IDs and no raw creative, secret, identity, path, or prompt content.\n\n## Consumed By\n\n| Consumer | How |\n|----------|-----|\n| S-002-001 | Implements or verifies this architecture boundary. |\n| S-002-004 | Implements or verifies this architecture boundary. |\n| S-004-001 | Implements or verifies this architecture boundary. |\n| S-004-002 | Implements or verifies this architecture boundary. |\n| S-004-003 | Implements or verifies this architecture boundary. |\n| S-008-001 | Implements or verifies this architecture boundary. |\n| S-009-005 | Implements or verifies this architecture boundary. |\n| UF-001, UF-002, UF-013 | Exercises the boundary through the linked user journey. |\n| arch.md | Summarizes this decision for release and coding-agent handoff. |\n"},{"rel":"reference/arch/ARCH-002-event-state-recovery-and-reconciliation.md","content":"# Architecture: Event State, Recovery, and Reconciliation\n\n**ID:** ARCH-002\n**Project:** clark-pro\n**Type:** Data Flow\n**Version:** 1.0\n**Updated:** 2026-07-13\n**Sources:** [Architecture](../../../clark-pro/architecture.md), [Implementation contracts](../../../clark-pro/product/04-architecture-and-tech-stack.md)\n\n---\n\n## Purpose\n\nDefine how append-only events, exact run plans, external job identities, publication intents, and projection replay prevent lost or duplicated work.\n\nConnected stories: `S-002-002`, `S-002-003`, `S-003-001`, `S-003-004`, `S-003-005`, `S-004-003`, `S-008-002`, `S-008-003`, `S-009-004`. Connected flows: UF-006, UF-007, UF-009, UF-015.\n\n## The Goal\n\nAfter renderer reload, Harness death, Mac sleep, network loss, or ambiguous provider response, Clark can classify every item and resume only under safe fresh authority.\n\n## Current State\n\nThe bounded Ground implementation proves the Electron/Harness/event/contract shape for selected stories. Production signing, complete provider execution, broad creator loops, remote sync, and hosted operations remain release-gated rather than assumed complete.\n\n## Architectural Decision\n\n### Decision\n\nUse immutable versioned events as canonical state, persist the exact validated run plan and external identities, rebuild projections deterministically, and route ambiguous mutations into explicit reconciliation instead of automatic retry.\n\n### Rationale\n\nThis decision preserves local canonical ownership, exact-version provenance, inspectable authority, deterministic recovery, and replaceable dependencies while allowing each release to extend the same contracts.\n\n### Alternatives Considered\n\n| Approach | Why Rejected |\n|----------|--------------|\n| Mutable job rows only | Cannot reconstruct why state changed or safely prove idempotence after crash. |\n| Recompile latest plan on recovery | Mutable definitions could change authority or inputs under an old approval. |\n| Retry on timeout | A provider may have committed the mutation before the response was lost. |\n\n## Design\n\n```mermaid\nsequenceDiagram\n  participant UI as Studio\n  participant H as Harness\n  participant E as Event Store\n  participant P as Provider\n  UI->>H: Start exact plan + intent\n  H->>E: Append run.planned / run.started\n  H->>P: Execute with provider job/idempotency identity\n  Note over H: crash / sleep / disconnect\n  H->>E: Replay and classify incomplete state\n  H->>P: Observe by external identity\n  alt Result proven\n    H->>E: Append terminal event\n  else Ambiguous mutation\n    H->>E: Append needs_reconciliation\n  end\n  H-->>UI: Recovery Summary\n```\n\n## Constraints & Non-Goals\n\n- Aggregate versions and command IDs enforce idempotence; external intent identity is retained even when provider support is weak.\n- Approval applies only to the exact artifact version and required platform adaptation.\n- Restore validates fully in quarantine before active canonical state changes.\n- This architecture does not claim that a planned provider, Tool Pack, remote service, or hosted control already exists.\n\n## Implementation Notes\n\n- Persist input hashes, capability revisions, permission snapshot, budget, provider job ID, and checkpoint.\n- Classify orphaned calls and revoke leases before retrying under fresh authority.\n- Projection deletion/rebuild is a required release test, not a production recovery shortcut.\n- Emit only allowlisted operational telemetry with correlation IDs and no raw creative, secret, identity, path, or prompt content.\n\n## Consumed By\n\n| Consumer | How |\n|----------|-----|\n| S-002-002 | Implements or verifies this architecture boundary. |\n| S-002-003 | Implements or verifies this architecture boundary. |\n| S-003-001 | Implements or verifies this architecture boundary. |\n| S-003-004 | Implements or verifies this architecture boundary. |\n| S-003-005 | Implements or verifies this architecture boundary. |\n| S-004-003 | Implements or verifies this architecture boundary. |\n| S-008-002 | Implements or verifies this architecture boundary. |\n| S-008-003 | Implements or verifies this architecture boundary. |\n| S-009-004 | Implements or verifies this architecture boundary. |\n| UF-006, UF-007, UF-009, UF-015 | Exercises the boundary through the linked user journey. |\n| arch.md | Summarizes this decision for release and coding-agent handoff. |\n"},{"rel":"reference/arch/ARCH-003-governed-extension-execution.md","content":"# Architecture: Governed Extension Execution\n\n**ID:** ARCH-003\n**Project:** clark-pro\n**Type:** Integration Pattern\n**Version:** 1.0\n**Updated:** 2026-07-13\n**Sources:** [Architecture](../../../clark-pro/architecture.md), [Implementation contracts](../../../clark-pro/product/04-architecture-and-tech-stack.md)\n\n---\n\n## Purpose\n\nDefine the reusable plugin-first boundary for MCP servers, open-source engines, Tool Packs, Skills, media workers, and converters without granting installation-time trust.\n\nConnected stories: `S-004-001`, `S-006-001`, `S-006-002`, `S-006-003`, `S-006-004`, `S-006-005`, `S-007-001`, `S-007-002`, `S-007-003`, `S-007-004`, `S-007-005`. Connected flows: UF-002, UF-003, UF-004, UF-006, UF-012.\n\n## The Goal\n\nClark can reuse mature external engines through stable supported interfaces while canonical creator truth, authority, provenance, compatibility, update, and rollback stay governed by Clark.\n\n## Current State\n\nThe bounded Ground implementation proves the Electron/Harness/event/contract shape for selected stories. Production signing, complete provider execution, broad creator loops, remote sync, and hosted operations remain release-gated rather than assumed complete.\n\n## Architectural Decision\n\n### Decision\n\nRepresent specialized actions as versioned capabilities and distribute external integrations as quarantined Tool Packs. Skills provide governed procedure, not an authority bypass. Execution receives only the intersection of declaration, trust ceiling, workspace policy, and run grant.\n\n### Rationale\n\nThis decision preserves local canonical ownership, exact-version provenance, inspectable authority, deterministic recovery, and replaceable dependencies while allowing each release to extend the same contracts.\n\n### Alternatives Considered\n\n| Approach | Why Rejected |\n|----------|--------------|\n| Embed a repository as a plugin | A Git URL does not define interface stability, legal posture, permissions, migration, or rollback. |\n| Use Skills as executable packages | Conflates procedural knowledge with supply chain and runtime isolation. |\n| Fork on first friction | Creates permanent security and maintenance ownership before Clark has proven differentiated value. |\n\n## Design\n\n```mermaid\nflowchart TD\n  Source[\"Pinned source or release\"] --> Quarantine[\"Quarantine: identity + legal + SBOM + provenance\"]\n  Quarantine --> Interface{\"Stable supported interface?\"}\n  Interface -->|\"No\"| Blocked[\"blocked_upstream — zero authority\"]\n  Interface -->|\"Yes\"| Conformance[\"Adapter / converter / UI / hostile / migration / rollback tests\"]\n  Conformance --> Decision[\"Explicit activation decision\"]\n  Decision --> Runtime[\"Run-scoped capability lease\"]\n  Skill[\"Promoted Skill revision\"] --> Intersection{\"Package ∩ trust ∩ workspace ∩ run\"}\n  Runtime --> Intersection --> Receipt[\"Canonical outputs + permission/cost/provenance receipt\"]\n```\n\n## Constraints & Non-Goals\n\n- Use interface ladder order unless a documented reuse review justifies deviation.\n- External schemas never replace Clark workspace, workflow, approval, memory, provenance, or publication intent.\n- Updates re-enter quarantine and retain a verified exact rollback revision.\n- This architecture does not claim that a planned provider, Tool Pack, remote service, or hosted control already exists.\n\n## Implementation Notes\n\n- Acquisition verifies source/artifact identity before unpack or build and rejects traversal, symlink, and dependency-confusion attacks.\n- UI is declarative, Clark-rendered, sandboxed-origin, or explicit external-app handoff.\n- OpenCut remains blocked until a reviewed revision provides a stable supported boundary and full activation evidence.\n- Emit only allowlisted operational telemetry with correlation IDs and no raw creative, secret, identity, path, or prompt content.\n\n## Consumed By\n\n| Consumer | How |\n|----------|-----|\n| S-004-001 | Implements or verifies this architecture boundary. |\n| S-006-001 | Implements or verifies this architecture boundary. |\n| S-006-002 | Implements or verifies this architecture boundary. |\n| S-006-003 | Implements or verifies this architecture boundary. |\n| S-006-004 | Implements or verifies this architecture boundary. |\n| S-006-005 | Implements or verifies this architecture boundary. |\n| S-007-001 | Implements or verifies this architecture boundary. |\n| S-007-002 | Implements or verifies this architecture boundary. |\n| S-007-003 | Implements or verifies this architecture boundary. |\n| S-007-004 | Implements or verifies this architecture boundary. |\n| S-007-005 | Implements or verifies this architecture boundary. |\n| UF-002, UF-003, UF-004, UF-006, UF-012 | Exercises the boundary through the linked user journey. |\n| arch.md | Summarizes this decision for release and coding-agent handoff. |\n"},{"rel":"reference/arch/ARCH-004-encrypted-sync-remote-work-and-hosted-evolution.md","content":"# Architecture: Encrypted Sync, Remote Work, and Hosted Evolution\n\n**ID:** ARCH-004\n**Project:** clark-pro\n**Type:** Sync Strategy\n**Version:** 1.0\n**Updated:** 2026-07-13\n**Sources:** [Architecture](../../../clark-pro/architecture.md), [Implementation contracts](../../../clark-pro/product/04-architecture-and-tech-stack.md)\n\n---\n\n## Purpose\n\nDefine how team event synchronization, asset mirroring, remote execution, organization policy, and tenant isolation extend rather than replace the personal local system.\n\nConnected stories: `S-009-001`, `S-009-002`, `S-009-003`, `S-009-004`, `S-009-005`. Connected flows: UF-015.\n\n## The Goal\n\nTwo Macs can work offline and converge without last-write-wins loss, while a remote worker can continue explicitly delegated work without receiving unrelated personal memory or credentials.\n\n## Current State\n\nThe bounded Ground implementation proves the Electron/Harness/event/contract shape for selected stories. Production signing, complete provider execution, broad creator loops, remote sync, and hosted operations remain release-gated rather than assumed complete.\n\n## Architectural Decision\n\n### Decision\n\nSynchronize encrypted workspace-scoped event envelopes and content-addressed assets through a relay, preserve aggregate ordering and explicit conflict decisions, and execute remote jobs from signed expiring envelopes with device identity and scoped credential delegation.\n\n### Rationale\n\nThis decision preserves local canonical ownership, exact-version provenance, inspectable authority, deterministic recovery, and replaceable dependencies while allowing each release to extend the same contracts.\n\n### Alternatives Considered\n\n| Approach | Why Rejected |\n|----------|--------------|\n| Cloud database becomes canonical | Makes local ownership and hosted-outage operation false. |\n| Raw last-write-wins row sync | Can erase concurrent approvals, decisions, and artifact versions. |\n| Copy personal Keychain to worker | Expands authority far beyond the named job and weakens revocation. |\n\n## Design\n\n```mermaid\nsequenceDiagram\n  participant A as Mac A local replica\n  participant R as Encrypted relay\n  participant B as Mac B local replica\n  participant W as Scoped worker\n  A->>R: Encrypted signed event envelope + asset hashes\n  B->>R: Encrypted signed concurrent envelope\n  R-->>A: Ordered workspace envelopes\n  R-->>B: Ordered workspace envelopes\n  A->>A: Validate chain, aggregate versions, conflict policy\n  B->>B: Validate chain, aggregate versions, conflict policy\n  A->>W: Signed expiring job envelope\n  W-->>A: Signed result receipt\n  A->>A: Validate and append canonical result event\n```\n\n## Constraints & Non-Goals\n\n- Cloud provider and tenancy service are selected during R-003 execution; contracts remain provider-neutral until then.\n- Personal and team creator models are separate unless an explicit share event exists.\n- Local export must remain complete and usable without relay or hosted service.\n- This architecture does not claim that a planned provider, Tool Pack, remote service, or hosted control already exists.\n\n## Implementation Notes\n\n- Use per-device identity, replay protection, expiry, revocation, and sensitivity policy in every envelope.\n- Assets mirror by content hash; metadata and access remain workspace scoped.\n- Hosted logs and traces must use platform audit logs plus Clark application audit events without creative content.\n- Emit only allowlisted operational telemetry with correlation IDs and no raw creative, secret, identity, path, or prompt content.\n\n## Consumed By\n\n| Consumer | How |\n|----------|-----|\n| S-009-001 | Implements or verifies this architecture boundary. |\n| S-009-002 | Implements or verifies this architecture boundary. |\n| S-009-003 | Implements or verifies this architecture boundary. |\n| S-009-004 | Implements or verifies this architecture boundary. |\n| S-009-005 | Implements or verifies this architecture boundary. |\n| UF-015 | Exercises the boundary through the linked user journey. |\n| arch.md | Summarizes this decision for release and coding-agent handoff. |\n"},{"rel":"reference/design/design-tokens.md","content":"# Clark Pro Design Tokens\n\n**Project:** clark-pro\n**Version:** 1.0\n**Updated:** 2026-07-13\n**Source:** `clark-pro/apps/desktop/src/renderer/app.css`\n\n---\n\n## Color Tokens\n\n| Token | Value | Semantic use |\n|-------|-------|--------------|\n| `color.bg` | `#111318` | Window and application background |\n| `color.surface` | `#181B21` | Standard panels |\n| `color.surfaceRaised` | `#20242C` | Selected/raised content |\n| `color.border` | `#313641` | Dividers and control borders |\n| `color.text` | `#F5F3ED` | Primary content |\n| `color.textMuted` | `#9AA3B2` | Secondary content |\n| `color.accent` | `#FF6B35` | Primary creator action and active location |\n| `color.accentSoft` | `#3A241D` | Selection surface |\n| `color.focus` | `#7AB8FF` | Keyboard focus ring |\n| `color.success` | `#63D297` | Verified/complete |\n| `color.warning` | `#E7B85D` | Pending/quarantine/reconciliation |\n| `color.danger` | `#F1A4A4` | Destructive/error text |\n| `color.dangerSurface` | `#321D1D` | Destructive surface |\n\n## Typography Tokens\n\n| Token | Value | Use |\n|-------|-------|-----|\n| `font.sans` | `Inter, ui-sans-serif, -apple-system, BlinkMacSystemFont, \"SF Pro Text\", sans-serif` | Product UI |\n| `font.mono` | `ui-monospace, SFMono-Regular, Menlo, monospace` | Hashes, receipts, schema/code |\n| `text.eyebrow` | 11px / 760 / 0.12em | Uppercase location or category |\n| `text.meta` | 11px / 500 / 1.45 | Supporting metadata |\n| `text.body` | 13px / 450 / 1.55 | Dense product copy |\n| `text.heading3` | 17px / 700 / 1.25 | Panel or inspector heading |\n| `text.heading2` | 24px / 760 / 1.2 | View heading |\n| `text.editor` | 16px / 450 / 1.65 | Long-form creator content |\n\n## Spacing and Shape Tokens\n\n| Token | Value |\n|-------|-------|\n| `space.1` | 4px |\n| `space.2` | 8px |\n| `space.3` | 12px |\n| `space.4` | 16px |\n| `space.5` | 20px |\n| `space.6` | 24px |\n| `space.8` | 32px |\n| `radius.control` | 8px |\n| `radius.panel` | 12px |\n| `radius.pill` | 999px |\n| `focus.width` | 3px |\n| `target.minimum` | 44px |\n\n## State Mapping\n\n| Domain state | Surface | Text/icon color | Rule |\n|--------------|---------|-----------------|------|\n| verified / complete / active | `#1D382B` | `color.success` | Always show the state word |\n| running / selected / specified | `#263249` | `#AEC7F6` | Use progress or selected icon |\n| waiting / quarantine / needs_reconciliation | `#3D291D` | `#EFBD72` | Must include owner/next action |\n| failed
